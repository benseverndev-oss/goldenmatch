# Dependabot configuration — security + version updates per ecosystem.
# Security alerts fire on every push regardless; this file controls weekly
# version-bump PR cadence so we don't get drowned in updates.

version: 2
updates:
  # Python — workspace root pyproject.toml
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    groups:
      python-prod:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      python-dev:
        dependency-type: "development"

  # TypeScript — the pnpm workspace (one root pnpm-lock.yaml covers every
  # member under packages/typescript/*). The old "/packages/goldenmatch-js"
  # path did not exist, so Dependabot covered NO TS package; "/" (the lockfile
  # root) covers the whole workspace.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "typescript"
    groups:
      ts-prod:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      ts-dev:
        dependency-type: "development"

  # Rust — every crate under packages/rust/extensions/* (15+ crates: native
  # accelerators, FFI UDFs, score/graph/fingerprint cores, wasm, pgrx, embed).
  # Previously UNCOVERED, so crate CVE bumps (e.g. pyo3) were hand-planned.
  - package-ecosystem: "cargo"
    directories:
      - "/packages/rust/extensions/*"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "rust"
    groups:
      rust-deps:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"

  # Docker — Dockerfile.mcp at repo root + per-package
  - package-ecosystem: "docker"
    directory: "/packages/python/goldenmatch"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "docker"
