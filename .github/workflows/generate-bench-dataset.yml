name: generate-bench-dataset

# Generate the C3 5M (or configurable-N) bench dataset and publish as a
# Release asset under a dedicated tag. Bumping the tag is the explicit
# signal that the dataset's contents have changed -- bench workflows
# pin to a specific tag so a fixture change doesn't silently move the
# numbers under their feet.
#
# Trigger: workflow_dispatch (manual). Default: 5,000,000 rows under
# tag `bench-dataset-v1`. Bump the tag (v2, v3...) when changing the
# fixture shape; never overwrite an existing tag's asset.

on:
  workflow_dispatch:
    inputs:
      rows:
        description: "Row count to generate"
        required: false
        default: "5000000"
      tag:
        description: "Release tag (bump when fixture shape changes)"
        required: false
        default: "bench-dataset-v1"

permissions:
  contents: write  # required to create / update releases

jobs:
  generate:
    name: "generate bench dataset"
    runs-on: large-new-64GB
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Install goldenmatch
        working-directory: packages/python/goldenmatch
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Generate + validate dataset
        working-directory: packages/python/goldenmatch
        run: |
          mkdir -p bench-dataset
          python scripts/generate_bench_dataset.py \
            --rows "${{ inputs.rows }}" \
            --out "bench-dataset/bench_${{ inputs.rows }}.parquet"
          ls -lh bench-dataset/

      - name: Upload validation report to step summary
        if: always()
        working-directory: packages/python/goldenmatch
        run: |
          echo '## generate-bench-dataset' >> "$GITHUB_STEP_SUMMARY"
          echo "Tag: \`${{ inputs.tag }}\`  Rows: \`${{ inputs.rows }}\`" >> "$GITHUB_STEP_SUMMARY"
          if [ -f "bench-dataset/bench_${{ inputs.rows }}.parquet" ]; then
            size=$(du -h "bench-dataset/bench_${{ inputs.rows }}.parquet" | cut -f1)
            echo "Size: \`$size\`" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Publish as Release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: packages/python/goldenmatch
        run: |
          # Create the release if it doesn't exist; otherwise upload to
          # the existing one. --clobber so a re-run with the same tag
          # replaces the asset (manual intent: same tag = same fixture
          # contents, regenerate via the same generator code).
          if ! gh release view "${{ inputs.tag }}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "${{ inputs.tag }}" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Bench dataset ${{ inputs.tag }}" \
              --notes "Synthetic ${{ inputs.rows }}-row C3 bench fixture. Generated by scripts/generate_bench_dataset.py. See workflow run for validation report."
          fi
          gh release upload "${{ inputs.tag }}" \
            "bench-dataset/bench_${{ inputs.rows }}.parquet" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
