name: bench-distributed-stack

on:
  workflow_dispatch:
    inputs:
      rows:
        description: "Synthetic df row count"
        required: false
        default: "5000000"
      ref:
        description: "Branch / tag / SHA to bench (default: workflow ref)"
        required: false
      dataset_tag:
        description: "Release tag of pre-generated bench dataset (empty = generate on the fly)"
        required: false
        default: "bench-dataset-v1"

jobs:
  bench:
    name: "bench distributed stack (chunked vs Component 1+2+3)"
    runs-on: large-new-64GB
    # 300 min = baseline (~160 min observed in run 25980529866) +
    # treatment-target (~128 min if it beats baseline by 20%) +
    # 12 min buffer. If treatment runs longer than 128 min, that's
    # already the kill criterion failing on wall_pct alone -- the
    # workflow timing out IS the FAIL signal. Do NOT extend further
    # without justifying against measured numbers.
    timeout-minutes: 300

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install goldenmatch with ray extra + py-spy
        working-directory: packages/python/goldenmatch
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[ray]"
          # py-spy: sampling profiler. Used in the next step to capture
          # a flamegraph of the bench process. Linux runners are root-
          # capable so py-spy can attach without setcap.
          pip install py-spy

      - name: Download pre-generated dataset
        # Pulls the parquet asset from the Release identified by
        # dataset_tag. Falls back to in-script generation when the
        # tag is empty -- preserves the on-the-fly path for ad-hoc
        # row counts that don't have a pre-published asset.
        if: inputs.dataset_tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: packages/python/goldenmatch
        run: |
          mkdir -p bench-dataset
          gh release download "${{ inputs.dataset_tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "bench_${{ inputs.rows }}.parquet" \
            --dir bench-dataset/
          ls -lh bench-dataset/

      - name: Run bench under py-spy
        working-directory: packages/python/goldenmatch
        env:
          GOLDENMATCH_AUTOCONFIG_MEMORY: "0"
        run: |
          mkdir -p bench-out
          DATASET_ARG=""
          if [ -f "bench-dataset/bench_${{ inputs.rows }}.parquet" ]; then
            DATASET_ARG="--dataset bench-dataset/bench_${{ inputs.rows }}.parquet"
            echo "Using pre-generated dataset: bench-dataset/bench_${{ inputs.rows }}.parquet"
          else
            echo "No pre-generated dataset found; falling back to in-script generation."
          fi
          # py-spy record samples the entire bench process (including
          # ThreadPool workers via --subprocesses), writes the SVG
          # flamegraph incrementally so even an OOM-killed runner
          # leaves a partial profile. --rate 50 = 50 Hz sampling (low
          # overhead at minute-scale walls). --idle includes blocked
          # threads (useful for "where do workers wait" analysis).
          py-spy record \
            --output bench-out/profile.svg \
            --format flamegraph \
            --rate 50 \
            --idle \
            --subprocesses \
            -- \
            python scripts/bench_distributed_stack.py \
              --rows "${{ inputs.rows }}" \
              $DATASET_ARG \
              --store-dir bench-out/store \
              --out bench-out/results.json
          echo '## bench-distributed-stack results' >> "$GITHUB_STEP_SUMMARY"
          if [ -f bench-out/results.json ]; then
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat bench-out/results.json >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo '_results.json missing -- bench died before write. See profile.svg artifact for flamegraph._' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload results + profile
        # if: always() so a FAIL verdict (script exits 1) or a hard
        # runner kill still uploads whatever was written. py-spy
        # writes the SVG incrementally so even partial profiles
        # survive an OOM-kill.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-distributed-stack-${{ inputs.rows }}-rows
          path: |
            packages/python/goldenmatch/bench-out/results.json
            packages/python/goldenmatch/bench-out/profile.svg
          if-no-files-found: warn
          retention-days: 30
