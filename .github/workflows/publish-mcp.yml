name: Publish to MCP Registry

# Syncs the suite's server.json files to the official MCP Registry
# (registry.modelcontextprotocol.io) so the listings stay in lockstep with PyPI,
# then mirrors server.json's `description` onto the matching Smithery listing
# (smithery.ai) via its PATCH API so the two catalogs never drift. server.json
# is the single source of truth for the description on both surfaces.
#
# Triggers:
#   - release: published — fires automatically after a PyPI publish workflow
#     lands. Tag pattern decides which package to sync. Mirror of the
#     `publish-<pkg>.yml` workflows' tag patterns so we re-sync exactly once
#     per release.
#   - workflow_dispatch — manual fire with `package` input (single name or
#     `all`) for the initial drift-close and any later one-off refreshes.
#
# Auth: GitHub OIDC. The registry trusts GitHub Actions tokens for
# `io.github.<user>/*` namespaces — no PAT, no API token, no secrets to
# manage. Requires `id-token: write` permission scoped to the publish step.
#
# CLI: mcp-publisher (Go binary, installed from the latest release tarball).
# Pin the version once the registry stabilises out of preview; for now,
# `latest` is fine — the CLI is conservative about breaking changes.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      package:
        description: "Which package to (re-)publish to the MCP Registry"
        required: true
        type: choice
        options:
          - all
          - goldenmatch
          - goldencheck
          - goldenflow
          - goldenpipe
          - infermap
          - goldenanalysis
        default: all

permissions:
  contents: read

jobs:
  # Resolve which packages to sync on this run. Release events map a tag
  # pattern → one package; workflow_dispatch can request all five.
  resolve:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.set.outputs.packages }}
    steps:
      - id: set
        shell: bash
        env:
          EVENT: ${{ github.event_name }}
          TAG: ${{ github.event.release.tag_name }}
          DISPATCH_PKG: ${{ inputs.package }}
        run: |
          set -euo pipefail
          PKGS=()
          if [ "$EVENT" = "release" ]; then
            # Tag patterns mirror the PyPI publish-*.yml workflow `if:` guards.
            # Order matters: goldencheck-types-v* is a prefix of goldencheck-v*
            # so check the longer prefix first.
            if   [[ "$TAG" == goldencheck-types-v* ]];  then : noop  # not on registry
            elif [[ "$TAG" == goldencheck-v* ]];        then PKGS+=(goldencheck)
            elif [[ "$TAG" == goldenflow-v* ]];         then PKGS+=(goldenflow)
            elif [[ "$TAG" == goldenpipe-v* ]];         then PKGS+=(goldenpipe)
            elif [[ "$TAG" == infermap-js-v* ]];        then : noop
            elif [[ "$TAG" == infermap-v* ]];           then PKGS+=(infermap)
            elif [[ "$TAG" == goldenmatch-js-v* ]];     then : noop
            elif [[ "$TAG" == goldenmatch-duckdb-v* ]]; then : noop  # not on registry
            elif [[ "$TAG" == goldenmatch-pg-v* ]];     then : noop  # not on registry
            elif [[ "$TAG" == goldensuite-mcp-v* ]];    then : noop  # aggregator -- transitively exposes sub-package tools
            elif [[ "$TAG" == goldenanalysis-native-v* ]]; then : noop  # not on registry
            elif [[ "$TAG" == goldenanalysis-js-v* ]];  then : noop
            elif [[ "$TAG" == goldenanalysis-v* ]];     then PKGS+=(goldenanalysis)
            elif [[ "$TAG" == v* ]];                    then PKGS+=(goldenmatch)
            fi
          else
            if [ "$DISPATCH_PKG" = "all" ]; then
              PKGS=(goldenmatch goldencheck goldenflow goldenpipe infermap goldenanalysis)
            else
              PKGS=("$DISPATCH_PKG")
            fi
          fi
          if [ ${#PKGS[@]} -eq 0 ]; then
            echo "packages=[]" >> "$GITHUB_OUTPUT"
          else
            json="["
            for p in "${PKGS[@]}"; do json+="\"$p\","; done
            json="${json%,}]"
            echo "packages=$json" >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: resolve
    if: needs.resolve.outputs.packages != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pkg: ${{ fromJSON(needs.resolve.outputs.packages) }}
    permissions:
      # Required for OIDC token retrieval (`mcp-publisher login github-oidc`).
      # No `contents: write` — the workflow never modifies the repo.
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      # Install mcp-publisher from the latest release tarball. The MCP
      # Registry team ships static binaries; no Go toolchain needed in CI.
      # Pin a version here (e.g. `v1.0.0`) once the registry exits preview.
      - name: Install mcp-publisher
        run: |
          ASSET="mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz"
          curl -fSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/${ASSET}" \
            | tar xz mcp-publisher
          chmod +x mcp-publisher
          ./mcp-publisher --help >/dev/null   # smoke

      - name: Resolve target version
        # Source of truth depends on the event:
        #
        # - release: read from the git tag. The tag (e.g. `goldenflow-v1.1.5`)
        #   is the canonical declaration of what's being shipped. Reading the
        #   version from PyPI here would race the parallel `publish-<pkg>.yml`
        #   workflow off the same release event (the prior 1.1.5 release saw the
        #   stale PyPI version because the publish hadn't completed). The git
        #   tag is race-free; the separate "Wait for ... PyPI" step below then
        #   handles the registry's server-side existence check.
        #
        # - workflow_dispatch: read from pyproject.toml in the package dir.
        #   Race-free; also lets us force-refresh listings without going
        #   through PyPI/release.
        id: ver
        shell: bash
        env:
          PKG: ${{ matrix.pkg }}
          EVENT: ${{ github.event_name }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT" = "release" ]; then
            # Tag patterns:
            #   v1.13.0                  -> goldenmatch
            #   goldencheck-v1.2.0       -> goldencheck
            #   goldenflow-v1.1.5        -> goldenflow
            #   goldenpipe-v1.1.0        -> goldenpipe
            #   infermap-v0.4.0          -> infermap
            # In every case the version is whatever follows the last `-v`
            # (or the leading `v` for the unprefixed goldenmatch case).
            V="${TAG##*-v}"
            V="${V#v}"
          else
            # pyproject.toml is the canonical version source per package.
            # `awk` instead of `python` so we don't need a setup-python step.
            FILE="packages/python/${PKG}/pyproject.toml"
            V=$(awk -F'"' '/^version[[:space:]]*=/ {print $2; exit}' "$FILE")
          fi
          if [ -z "$V" ] || ! echo "$V" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "::error::could not resolve version for ${PKG} (event=${EVENT}, raw=${V})"
            exit 1
          fi
          echo "version=${V}" >> "$GITHUB_OUTPUT"
          echo "::notice::publishing ${PKG} version ${V} (source: ${EVENT})"

      - name: Inject version into server.json
        # Keep the registry-level `version` and `packages[0].version` in
        # lockstep with the resolved source. server.json's other fields
        # (name, title, description, repository, remotes) stay whatever the
        # file in the repo says — those are publisher-curated, not synced.
        shell: bash
        env:
          PKG: ${{ matrix.pkg }}
          V: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          FILE="packages/python/${PKG}/server.json"
          jq --arg v "$V" '
            .version = $v
            | .packages |= map(if .registryType == "pypi" then .version = $v else . end)
          ' "$FILE" > "${FILE}.tmp"
          mv "${FILE}.tmp" "$FILE"
          echo "--- ${FILE} (post-injection) ---"
          cat "$FILE"

      - name: Wait for the version to be live on PyPI
        # The MCP Registry validates SERVER-SIDE that the PyPI package+version
        # exists at publish time. On `release` events this workflow runs in
        # PARALLEL with publish-<pkg>.yml, so the wheel may not be uploaded yet
        # when we publish -> the registry returns 400 "PyPI package not found
        # (status: 404)". Resolving the version from the git tag (above) fixed
        # the *version-read* race, but not this server-side validation race.
        #
        # Poll PyPI for the exact identifier+version (the registry uses the same
        # PyPI JSON API) before authenticating, so validate/publish always see a
        # live release. workflow_dispatch refreshes an already-published version,
        # so the poll passes on the first attempt. Fail fast here, before
        # consuming an OIDC token, if the release never lands.
        shell: bash
        env:
          PKG: ${{ matrix.pkg }}
          V: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          PYPI_NAME=$(jq -r '.packages[] | select(.registryType == "pypi") | .identifier' \
            "packages/python/${PKG}/server.json" | head -1)
          if [ -z "$PYPI_NAME" ] || [ "$PYPI_NAME" = "null" ]; then
            echo "::error::no pypi identifier in packages/python/${PKG}/server.json"
            exit 1
          fi
          URL="https://pypi.org/pypi/${PYPI_NAME}/${V}/json"
          echo "Waiting for ${PYPI_NAME}==${V} on PyPI (${URL})"
          # 40 * 15s = ~10 min ceiling; a PyPI publish normally lands in 1-2 min.
          for i in $(seq 1 40); do
            code=$(curl -s -o /dev/null -w '%{http_code}' "$URL" || echo 000)
            if [ "$code" = "200" ]; then
              echo "::notice::${PYPI_NAME}==${V} is live on PyPI (attempt ${i})"
              exit 0
            fi
            echo "attempt ${i}/40: HTTP ${code}, not live yet; sleeping 15s"
            sleep 15
          done
          echo "::error::${PYPI_NAME}==${V} did not appear on PyPI within ~10 min"
          exit 1

      - name: Authenticate to MCP Registry (GitHub OIDC)
        working-directory: packages/python/${{ matrix.pkg }}
        run: ../../../mcp-publisher login github-oidc

      - name: Validate server.json
        working-directory: packages/python/${{ matrix.pkg }}
        run: ../../../mcp-publisher validate

      - name: Publish to MCP Registry
        working-directory: packages/python/${{ matrix.pkg }}
        shell: bash
        env:
          PKG: ${{ matrix.pkg }}
          V: ${{ steps.ver.outputs.version }}
        run: |
          # The registry is IMMUTABLE per version: re-publishing an
          # already-listed version returns 400 "cannot publish duplicate
          # version". That's the expected, benign case for a workflow_dispatch
          # force-refresh (the version is already live; nothing to push) -- so
          # swallow it as success and let the Smithery sync below still run.
          # Any other publish error is a real failure and propagates.
          set +e
          out=$(../../../mcp-publisher publish 2>&1); code=$?
          echo "$out"
          if [ "$code" -eq 0 ]; then
            exit 0
          fi
          if echo "$out" | grep -q "cannot publish duplicate version"; then
            echo "::notice::${PKG} ${V} already on the registry (duplicate version) -- up to date; continuing."
            exit 0
          fi
          echo "::error::mcp-publisher publish failed for ${PKG} (exit ${code})"
          exit "$code"

      - name: Sync description to Smithery
        # Runs even if the publish step failed (e.g. a non-duplicate error) --
        # the Smithery description sync is INDEPENDENT of the registry, so it
        # should attempt regardless. Only a job cancellation skips it.
        if: ${{ !cancelled() }}
        # Smithery (smithery.ai) is a SEPARATE catalog from the MCP Registry. It
        # does NOT read server.json or smithery.yaml from the repo, so without
        # this step its `description` drifts from the registry's. This keeps them
        # in lockstep via Smithery's PATCH API, with server.json as the single
        # source of truth (the same field the registry publish above uses).
        #
        # Never fails the job:
        #   - SMITHERY_API_KEY secret absent (forks / PRs)  -> notice + skip.
        #   - server.json has no description                -> notice + skip.
        #   - server not listed on Smithery yet (HTTP 404)  -> notice + skip
        #     (infermap / goldenanalysis until added on the dashboard).
        #   - any other non-2xx                             -> ::warning:: only.
        #
        # SMITHERY_NAMESPACE is the Smithery listing namespace (benzsevern/*),
        # which is distinct from the registry's io.github.benseverndev-oss/*.
        env:
          PKG: ${{ matrix.pkg }}
          SMITHERY_API_KEY: ${{ secrets.SMITHERY_API_KEY }}
          SMITHERY_NAMESPACE: benzsevern
        shell: bash
        run: |
          set -uo pipefail
          if [ -z "${SMITHERY_API_KEY:-}" ]; then
            echo "::notice::SMITHERY_API_KEY not set; skipping Smithery description sync for ${PKG}"
            exit 0
          fi
          DESC=$(jq -r '.description // empty' "packages/python/${PKG}/server.json")
          if [ -z "$DESC" ]; then
            echo "::notice::no description in packages/python/${PKG}/server.json; skipping Smithery sync"
            exit 0
          fi
          QUALIFIED="${SMITHERY_NAMESPACE}/${PKG}"
          ENCODED="${SMITHERY_NAMESPACE}%2F${PKG}"
          BODY=$(jq -nc --arg d "$DESC" '{description: $d}')
          echo "PATCH https://api.smithery.ai/servers/${QUALIFIED}"
          code=$(curl -sS -o /tmp/smithery_resp -w '%{http_code}' \
            -X PATCH "https://api.smithery.ai/servers/${ENCODED}" \
            -H "Authorization: Bearer ${SMITHERY_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$BODY" || echo 000)
          if [ "$code" = "200" ] || [ "$code" = "204" ]; then
            echo "::notice::Smithery description synced for ${QUALIFIED} (HTTP ${code})"
          elif [ "$code" = "404" ]; then
            echo "::notice::${QUALIFIED} not listed on Smithery yet (HTTP 404); skipping. Add it on the Smithery dashboard to enable sync."
          else
            echo "::warning::Smithery description sync for ${QUALIFIED} returned HTTP ${code}; registry publish was unaffected."
            cat /tmp/smithery_resp || true
          fi

      - name: Summary
        if: always()
        shell: bash
        env:
          PKG: ${{ matrix.pkg }}
          V: ${{ steps.ver.outputs.version }}
        run: |
          NAME=$(jq -r '.name' "packages/python/${PKG}/server.json")
          {
            echo "## MCP Registry: ${PKG}"
            echo ""
            echo "- Synced version: \`${V}\`"
            echo "- Server: \`${NAME}\`"
            echo "- Registry listing: https://registry.modelcontextprotocol.io/v0/servers?search=${NAME}"
            echo "- Smithery: description synced from server.json (see the 'Sync description to Smithery' step for status)"
          } >> "$GITHUB_STEP_SUMMARY"
