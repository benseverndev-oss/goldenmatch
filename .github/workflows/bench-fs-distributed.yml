name: bench-fs-distributed

# Fellegi-Sunter dedupe at scale — two legs.
#   * `bench` (default): the Phase 3a FS-on-BUCKET single-box path at 5M+ rows
#     (wall + peak RSS + F1 against injected duplicates). The bucket backend
#     carries the Ray/DataFusion distribution wiring, so a healthy single-node
#     bucket run is the prerequisite for the distributed claim.
#   * `bench_distributed` (opt-in, `-f distributed=true`): the FIRST MEASURED
#     distributed FS F1 -- the FS config driven through the Phase-5 Ray pipeline
#     (GOLDENMATCH_DISTRIBUTED_PIPELINE=2: score -> block-shuffle ->
#     randomized_contraction WCC), F1-scored via the same injected-dup oracle.
#     Simulated single-box Ray cluster (regression check, not a multi-node parity
#     proof; the 100M multi-node FS proof is a follow-on).
# workflow_dispatch (+ a weekly scheduled bucket gate). Never runs in normal CI.
#
# Dispatch:
#   gh workflow run bench-fs-distributed.yml --ref claude/review-technical-work-en9SG \
#     -f rows=5000000 -f backend=bucket
on:
  # Weekly scheduled FS scale gate (#1805 checkbox 3): the guard against a
  # >=500K FS regression sitting below every PR gate, the way #1792/#1798 did.
  # Scheduled runs apply F1 / wall / peak-RSS thresholds; workflow_dispatch stays
  # measure-only unless the caller passes its own gate flags.
  schedule:
    - cron: "0 6 * * 1"  # Mondays 06:00 UTC
  workflow_dispatch:
    inputs:
      rows:
        description: "Base row count (dups are added on top, dup_frac of this)"
        required: false
        default: "5000000"
      dup_frac:
        description: "Injected duplicate fraction (GT pairs = rows * dup_frac)"
        required: false
        default: "0.2"
      backend:
        description: "Backend (bucket = the scale-out path; polars-direct for a baseline)"
        required: false
        default: "bucket"
      runner:
        description: "Runner label (16c/64GB recommended for 5M)"
        required: false
        default: "large-new-64GB"
      fs_native:
        description: "Enable the opt-in native FS kernel (GOLDENMATCH_FS_NATIVE=1)"
        required: false
        default: "false"
      fs_default_bucket:
        description: "FS route: 'true' = memory-bounded bucket route (the #1803 default), 'false' = legacy batched route (GOLDENMATCH_FS_DEFAULT_BUCKET=0). Set false for the legacy leg of a parity A/B."
        required: false
        default: "true"
      build_native:
        description: "Build the native extension before running"
        required: false
        default: "true"
      distributed:
        description: "Also run the Phase-5 DISTRIBUTED FS leg (Ray, simulated single-box cluster) for the first MEASURED distributed FS F1"
        required: false
        default: "false"
      dist_rows:
        description: "Distributed leg: base row count (simulated single-box Ray)"
        required: false
        default: "1000000"
      dist_partitions:
        description: "Distributed leg: Ray Dataset partition count"
        required: false
        default: "64"

permissions:
  contents: read

jobs:
  bench:
    # `inputs.*` are empty on the `schedule` trigger, so every input falls back to
    # its dispatch default via `|| '<default>'` -- the scheduled gate runs 5M on
    # the 64GB runner with F1/wall/RSS thresholds applied.
    runs-on: ${{ inputs.runner || 'large-new-64GB' }}
    timeout-minutes: 90
    env:
      # Explicit config is passed, so the controller never runs; keep memory off
      # for determinism (mirrors the other bench lanes).
      GOLDENMATCH_AUTOCONFIG_MEMORY: "0"
      # Standing scale knobs (root CLAUDE.md): jemalloc page-decay caps allocator
      # retention so the peak-RSS gate reflects the true live working set.
      _RJEM_MALLOC_CONF: "dirty_decay_ms:1000,muzzy_decay_ms:0"
      GOLDENMATCH_FS_NATIVE: ${{ inputs.fs_native == 'true' && '1' || '0' }}
      # Default backend (polars-direct/None) routes FS through the bucket scorer
      # unless this is 0 -- the legacy batched leg of the item-3 parity A/B.
      GOLDENMATCH_FS_DEFAULT_BUCKET: ${{ inputs.fs_default_bucket == 'false' && '0' || '1' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        if: ${{ inputs.build_native == 'true' }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        if: ${{ inputs.build_native == 'true' }}
        with:
          workspaces: packages/rust/extensions/native

      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            **/pyproject.toml

      - name: Sync workspace
        run: uv sync --all-packages

      - name: Build native extension
        if: ${{ inputs.build_native == 'true' }}
        run: uv run python scripts/build_native.py

      - name: FS dedupe at scale (wall + RSS + F1)
        run: |
          set -o pipefail
          uv run python packages/python/goldenmatch/scripts/bench_fs_distributed.py \
            --rows "${{ inputs.rows || '5000000' }}" \
            --dup-frac "${{ inputs.dup_frac || '0.2' }}" \
            --backend "${{ inputs.backend || 'bucket' }}" \
            ${{ github.event_name == 'schedule' && '--min-f1 0.85 --max-wall-seconds 2400 --max-peak-rss-gb 55' || '' }} \
            | tee /tmp/fs_dist.log
          {
            echo "### inputs"
            echo "- rows=\`${{ inputs.rows || '5000000' }}\`  dup_frac=\`${{ inputs.dup_frac || '0.2' }}\`  backend=\`${{ inputs.backend || 'bucket' }}\`"
            echo "- runner=\`${{ inputs.runner || 'large-new-64GB' }}\`  FS_NATIVE=\`${{ env.GOLDENMATCH_FS_NATIVE }}\`  gate=\`${{ github.event_name == 'schedule' && 'on' || 'off' }}\`"
            echo ""
            # The driver prints a markdown block after the KEY=VALUE lines.
            sed -n '/## bench-fs-distributed/,$p' /tmp/fs_dist.log
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: fs-distributed-${{ inputs.rows || '5000000' }}-${{ inputs.backend || 'bucket' }}
          path: /tmp/fs_dist.log
          retention-days: 30

  bench_distributed:
    # The FIRST MEASURED distributed FS F1. Opt-in (`-f distributed=true`); every
    # other distributed bench in the repo runs a WEIGHTED/exact config, so FS
    # (probabilistic) quality on the Phase-5 Ray engine has never been measured.
    # This runs `bench_fs_distributed.py --distributed`, which drives the FS
    # config through GOLDENMATCH_DISTRIBUTED_PIPELINE=2 (score -> block-shuffle ->
    # randomized_contraction WCC), persists the cluster assignments, and F1-scores
    # them against the injected-duplicate ground truth using the SAME oracle
    # (`evaluate_clusters`) as the single-box bucket leg.
    #
    # Honest scoping (mirrors bench-phase5-simulated): this is a SIMULATED
    # single-box Ray cluster (one NIC, one disk, shared page cache) -- a
    # regression check that FS runs end-to-end on the distributed engine with
    # correct recall, NOT a multi-node Splink-Spark parity proof. The multi-node
    # 100M FS proof is a follow-on (needs a real Ray cluster + a shared
    # GOLDENMATCH_DISTRIBUTED_WCC_SCRATCH=gs://... for the WCC checkpoint).
    if: ${{ inputs.distributed == 'true' }}
    runs-on: ${{ inputs.runner || 'large-new-64GB' }}
    timeout-minutes: 90
    env:
      GOLDENMATCH_AUTOCONFIG_MEMORY: "0"
      # Any lane that pip-installs + runs the pipeline sets the Arrow allocator
      # knob (mimalloc SIGSEGVs on the ThreadPoolExecutor/polars workers) and the
      # jemalloc page-decay knob (caps allocator retention at scale).
      ARROW_DEFAULT_MEMORY_POOL: system
      _RJEM_MALLOC_CONF: "dirty_decay_ms:1000,muzzy_decay_ms:0"
      # Pin the per-task scoring CPU reservation to 1 so the block-shuffle
      # HashShuffleAggregator actors can't starve the _score op on a single-box
      # simulated cluster (the module default of 2 is tuned for a many-core
      # multi-node box).
      GOLDENMATCH_DISTRIBUTED_SCORE_NUM_CPUS: "1"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Install goldenmatch with ray extra
        run: |
          python -m pip install --upgrade pip
          pip install -e packages/python/goldenmatch[ray]
          # pandas is a runtime dep of ray.data (not declared in the [ray] extra).
          pip install psutil pandas

      - name: FS dedupe DISTRIBUTED (Phase-5 Ray) — wall + F1
        run: |
          set -o pipefail
          python packages/python/goldenmatch/scripts/bench_fs_distributed.py \
            --distributed \
            --rows "${{ inputs.dist_rows || '1000000' }}" \
            --dup-frac "${{ inputs.dup_frac || '0.2' }}" \
            --partitions "${{ inputs.dist_partitions || '64' }}" \
            --block-shuffle 1 \
            ${{ github.event_name == 'schedule' && '--min-f1 0.85' || '' }} \
            | tee /tmp/fs_dist_ray.log
          {
            echo "### distributed FS (Phase-5 Ray, simulated single-box)"
            echo "- rows=\`${{ inputs.dist_rows || '1000000' }}\`  partitions=\`${{ inputs.dist_partitions || '64' }}\`  block_shuffle=\`1\`"
            echo ""
            sed -n '/## bench-fs-distributed/,$p' /tmp/fs_dist_ray.log
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: fs-distributed-ray-${{ inputs.dist_rows || '1000000' }}
          path: /tmp/fs_dist_ray.log
          retention-days: 30

  route_parity:
    # #1805 checkbox 4: raise the max FS route-vs-route parity scale. The per-PR
    # suite pins arrow-vs-polars FS membership parity at a few hundred rows
    # (test_fs_frame_lane_parity_1805); this runs the SAME axis at a moderate
    # scale the per-PR suite can't afford, so a scale-dependent frame-backend
    # divergence surfaces. Light enough for a normal runner (no native build).
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GOLDENMATCH_AUTOCONFIG_MEMORY: "0"
      ARROW_DEFAULT_MEMORY_POOL: system
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            **/pyproject.toml

      - name: Sync workspace
        run: uv sync --all-packages

      - name: FS route parity at moderate scale
        run: |
          set -o pipefail
          uv run python packages/python/goldenmatch/scripts/bench_fs_route_parity.py \
            --rows 20000 --dup-frac 0.2 | tee /tmp/fs_route_parity.log
          sed -n '/## bench-fs-route-parity/,$p' /tmp/fs_route_parity.log >> "$GITHUB_STEP_SUMMARY"

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: fs-route-parity-20000
          path: /tmp/fs_route_parity.log
          retention-days: 30
