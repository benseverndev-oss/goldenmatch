# Reusable npm-publish template for the TypeScript packages. Each
# packages/typescript/<pkg> has a thin `publish-<pkg>-js.yml` caller that fires
# on its `<pkg>-js-v*` tag and delegates here — so this single body replaces the
# ~70 near-identical lines that used to be copy-pasted across 7 workflows.
#
# Every TS package's dir name == its package.json `name` == its tag prefix base,
# so one `package` input parameterizes the working dir, the turbo filter, and the
# tag check. `build_deps` reproduces the per-package "Build workspace deps" step
# exactly (only the packages that had it pass true).
name: _publish-js (reusable)

on:
  workflow_call:
    inputs:
      package:
        description: "TS package dir under packages/typescript/ (== package.json name == tag prefix base)"
        required: true
        type: string
      build_deps:
        description: "Pre-build this package's workspace dependencies (turbo --filter=<pkg>^...) before typecheck/build"
        required: false
        type: boolean
        default: false
      build_wasm:
        description: "Build the package's opt-in WASM artifact (packages/typescript/<pkg>/scripts/build_wasm.sh) before typecheck/build so it ships in dist/"
        required: false
        type: boolean
        default: false
      ref:
        description: "Tag or commit to build (default: the triggering ref)"
        required: false
        type: string
        default: ""
      dry_run:
        description: "Pack and validate without publishing"
        required: false
        type: string
        default: "false"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: packages/typescript/${{ inputs.package }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Install dependencies
        working-directory: ${{ github.workspace }}
        run: pnpm install --frozen-lockfile

      # Composing packages must build their workspace deps first so typecheck/
      # test/build can resolve the deps' dist entrypoints.
      - name: Build workspace deps
        if: inputs.build_deps
        working-directory: ${{ github.workspace }}
        run: pnpm turbo run build --filter=${{ inputs.package }}^...

      # Build the opt-in WASM artifact into src/core/wasm/artifacts/ so tsup's
      # copy step ships it in dist/. Without this the artifact is gitignored /
      # CI-only and enableWasm() falls back to pure-TS for published users.
      # ubuntu-latest ships rustup/cargo; the script pins wasm-bindgen from the
      # crate's Cargo.lock. Runs before Typecheck/Test so those also see it.
      - name: Build WASM artifact
        if: inputs.build_wasm
        working-directory: ${{ github.workspace }}
        run: |
          rustup target add wasm32-unknown-unknown
          bash "packages/typescript/${{ inputs.package }}/scripts/build_wasm.sh"

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Test
        run: pnpm exec vitest run

      - name: Build
        run: pnpm run build

      - name: Verify version matches tag
        if: startsWith(github.ref, format('refs/tags/{0}-js-v', inputs.package))
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/${{ inputs.package }}-js-v}"
          PKG_VERSION=$(jq -r .version package.json)
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json ($PKG_VERSION)"
            exit 1
          fi
          echo "Version OK: $PKG_VERSION"

      - name: Pack (dry-run validation)
        if: inputs.dry_run == 'true'
        run: |
          pnpm pack
          # When build_wasm is on, PROVE the artifact actually made it into the
          # packed tarball (the whole point — a gitignored artifact silently
          # dropped means enableWasm() is inert for published users).
          if [ "${{ inputs.build_wasm }}" = "true" ]; then
            TGZ="$(ls -1 *.tgz | head -1)"
            echo "Tarball: $TGZ"
            if tar tzf "$TGZ" | grep -qE '\.wasm$'; then
              echo "OK: .wasm present in the tarball:"
              tar tzf "$TGZ" | grep -E '\.wasm(\.js)?$' || true
            else
              echo "ERROR: build_wasm=true but NO .wasm in the packed tarball" >&2
              tar tzf "$TGZ" | grep -i wasm || echo "(no wasm-related files at all)"
              exit 1
            fi
          fi

      - name: Publish to npm
        if: inputs.dry_run != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm publish --access public --provenance --no-git-checks
