name: CodeQL

# Static analysis (SAST) for OpenSSF Scorecard. Runs CodeQL across the
# Python + TypeScript surfaces; Rust is skipped (CodeQL's Rust support
# is still experimental as of this writing and the workspace already
# uses cargo audit via the rust_pgrx CI lane).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly fresh sweep on Sunday early-morning UTC.
    - cron: "23 7 * * 0"

permissions:
  contents: read

# Supersede in-flight scans for the same PR — an iterative re-push cancels the
# prior CodeQL run instead of running a duplicate multi-minute scan to
# completion. On `main` and scheduled sweeps `head_ref` is empty, so the key
# falls back to the unique run_id and those runs are NEVER cancelled.
concurrency:
  group: codeql-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  analyze:
    name: "Analyze (${{ matrix.language }})"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      # required for upload-sarif + private repos (no-op on public, kept
      # so the workflow works identically if the repo ever flips).
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language:
          - python
          - javascript-typescript

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v3
        with:
          languages: ${{ matrix.language }}
          # Use the security-extended query suite — the default is too
          # conservative for what we want from SAST gating.
          queries: security-extended

      - name: Autobuild
        # Python + JS are interpreted; autobuild is a no-op but the action
        # still expects the step in the pipeline. Keeping it explicit so
        # the same workflow scales if we add a compiled language later.
        uses: github/codeql-action/autobuild@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v3
        with:
          category: "/language:${{ matrix.language }}"
