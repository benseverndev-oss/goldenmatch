name: Publish goldenflow to npm

# Thin caller -> .github/workflows/_publish-js.yml (the shared template).
on:
  push:
    tags:
      - "goldenflow-js-v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag or commit to build (default: HEAD of main)"
        required: false
        default: ""
      dry_run:
        description: "Pack and validate without publishing"
        required: false
        default: "false"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    uses: ./.github/workflows/_publish-js.yml
    with:
      package: goldenflow
      # goldenflow bundles the goldenmatch-wasm-runtime workspace dep (tsup
      # noExternal) since the Wave 0c wasm work. tsc/tsup can't resolve its dist
      # entrypoint unless it's built first, so this MUST stay true or the publish
      # fails with TS2307 on backend.ts (every publish since 0.4.0 silently did).
      build_deps: true
      # Build the opt-in WASM artifact so it ships in dist/ (enableWasm() +
      # the fused chain reach published npm users; otherwise pure-TS only).
      build_wasm: true
      ref: ${{ inputs.ref || '' }}
      dry_run: ${{ inputs.dry_run || 'false' }}
    secrets: inherit
