# Measure the in-house ER embedder (goldenmatch.embeddings.inhouse) on real
# data — the #507 measurement venue. Febrl3 is generated by the recordlinkage
# library (no gitignored dataset needed), so this runs anywhere with network.
#
# Reports held-out pairwise F1 for the untrained (lexical n-gram) baseline vs
# the trained in-house model vs the no-signal floor, so a model change's lift
# is visible. Use this to validate #507 model improvements (hard-negative
# mining, token n-grams, MLP head): re-run before/after and compare the table.
#
# To run: GitHub → Actions → "bench-inhouse-embedder" → Run workflow.
name: bench-inhouse-embedder

on:
  workflow_dispatch:
    inputs:
      dataset:
        description: "Dataset: 'febrl3' (real, generated) or 'synthetic'"
        required: false
        default: "febrl3"
      epochs:
        description: "Training epochs"
        required: false
        default: "150"
      dim:
        description: "Embedding dimension"
        required: false
        default: "64"

permissions:
  contents: read

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GOLDENMATCH_AUTOCONFIG_MEMORY: "0"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Sync workspace
        run: uv sync --all-packages
      - name: Editable-install goldenmatch
        run: uv pip install -e packages/python/goldenmatch
      - name: Install recordlinkage (Febrl generator)
        run: uv pip install recordlinkage
      - name: Run in-house embedder benchmark
        run: |
          case "${{ inputs.dataset }}" in
            synthetic) MODE="--synthetic 2000" ;;
            *)         MODE="--febrl3" ;;
          esac
          .venv/bin/python scripts/bench_inhouse_embedder.py $MODE \
            --epochs "${{ inputs.epochs }}" --dim "${{ inputs.dim }}" \
            | tee -a "$GITHUB_STEP_SUMMARY"
