# Measure the in-house ER embedder (goldenmatch.embeddings.inhouse) on real
# data — the #507 measurement venue. Runs three benchmark families and writes
# held-out pairwise F1 (untrained lexical baseline vs trained model) to the
# step summary, so a model/loss change's lift is visible:
#   - febrl3            typographic dedup (recordlinkage-generated, no download)
#   - dblp-acm          bibliographic linkage (Leipzig)
#   - abt-buy / amazon-google   product linkage (Leipzig) — the SEMANTIC case
#
# Product datasets are run with both the cosine (default, #507) and the legacy
# euclidean loss so the improvement is explicit. Negatives are hard (nearest
# lexical non-match) so the task is discriminating.
#
# To run: GitHub → Actions → "bench-inhouse-embedder" → Run workflow.
name: bench-inhouse-embedder

on:
  workflow_dispatch:
    inputs:
      epochs:
        description: "Training epochs"
        required: false
        default: "200"
      dim:
        description: "Embedding dimension"
        required: false
        default: "64"

permissions:
  contents: read

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      GOLDENMATCH_AUTOCONFIG_MEMORY: "0"
      DSDIR: .profile_tmp/bench-datasets
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Sync workspace
        run: uv sync --all-packages
      - name: Editable-install goldenmatch
        run: uv pip install -e packages/python/goldenmatch
      - name: Install recordlinkage (Febrl generator)
        run: uv pip install recordlinkage
      - name: Fetch Leipzig datasets (dblp-acm, abt-buy, amazon-google)
        run: |
          mkdir -p "$DSDIR"
          for name in DBLP-ACM Abt-Buy Amazon-GoogleProducts; do
            curl -fSL -o "/tmp/$name.zip" "https://dbs.uni-leipzig.de/file/$name.zip"
            unzip -o "/tmp/$name.zip" -d "$DSDIR/$name" >/dev/null
          done
          ls -R "$DSDIR"
      - name: Benchmark — typographic + bibliographic (cosine)
        run: |
          .venv/bin/python scripts/bench_inhouse_embedder.py --febrl3 \
            --epochs "${{ inputs.epochs }}" --dim "${{ inputs.dim }}" | tee -a "$GITHUB_STEP_SUMMARY"
          .venv/bin/python scripts/bench_inhouse_embedder.py --leipzig dblp-acm \
            --datasets-dir "$DSDIR/DBLP-ACM" \
            --epochs "${{ inputs.epochs }}" --dim "${{ inputs.dim }}" | tee -a "$GITHUB_STEP_SUMMARY"
      - name: Benchmark — product/semantic (cosine vs euclidean, the #507 delta)
        run: |
          for ds in "abt-buy:Abt-Buy" "amazon-google:Amazon-GoogleProducts"; do
            name="${ds%%:*}"; dir="${ds##*:}"
            for loss in cosine euclidean; do
              .venv/bin/python scripts/bench_inhouse_embedder.py --leipzig "$name" \
                --datasets-dir "$DSDIR/$dir" --loss "$loss" \
                --epochs "${{ inputs.epochs }}" --dim "${{ inputs.dim }}" | tee -a "$GITHUB_STEP_SUMMARY"
            done
          done
