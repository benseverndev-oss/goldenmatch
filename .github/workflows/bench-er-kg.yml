# ER-KG-Bench runner. Regenerates results/{RESULTS.md,results.json} on a real
# runner because the goldenmatch auto / auto+fields / auto+llm rows (full
# dedupe_df + auto-config controller, each run twice for the determinism check)
# are too memory-heavy for a dev laptop. The benchmark dir sits OUTSIDE the main
# CI path filters, so this is its only CI lane.
#
# Two runs:
#   * OFFLINE (no key) -> the committed, reproducible-by-anyone table. Uploaded
#     as artifact `er-kg-results-offline`; download + commit these.
#   * KEYED (OPENAI_API_KEY Actions secret) -> the emb-openai + auto+llm rows
#     that stay OUT of the committed table. Printed to the run summary and
#     uploaded as `er-kg-results-keyed`; use for the README/HANDOFF prose.
#     (Secret mirrors the Infisical OPENAI_API_KEY; set via `gh secret set`.)
#
# Triggers on a push touching the benchmark SOURCE (not results/, so committing
# regenerated results does not loop) and on manual dispatch.
#
# To run: push to the er-kg-bench source, or Actions -> "bench-er-kg" -> Run.
name: bench-er-kg

on:
  workflow_dispatch:
  push:
    paths:
      - "packages/python/goldenmatch/benchmarks/er-kg-bench/dataset/**"
      - "packages/python/goldenmatch/benchmarks/er-kg-bench/erkgbench/**"
      - "packages/python/goldenmatch/benchmarks/er-kg-bench/demo/**"
      - "packages/python/goldenmatch/benchmarks/er-kg-bench/tests/**"
      - "packages/python/goldenmatch/benchmarks/er-kg-bench/requirements-real.txt"
      - "packages/python/goldenmatch/benchmarks/er-kg-bench/requirements-embed.txt"
      - ".github/workflows/bench-er-kg.yml"

permissions:
  contents: read

env:
  BENCH_DIR: packages/python/goldenmatch/benchmarks/er-kg-bench
  GOLDENMATCH_AUTOCONFIG_MEMORY: "0"  # no cross-run memory writes in CI

jobs:
  bench:
    # Tiny dataset (~171 records); ubuntu-latest (16 GB) provisions fast and has
    # ample headroom -- the cost is the controller, not data size.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv
      - name: Sync workspace + editable goldenmatch
        run: |
          uv sync --all-packages
          uv pip install -e packages/python/goldenmatch

      - name: Install optional real-framework deps
        # uv-created venvs ship no `pip`, so use uv's pip (same as the sync step's
        # `uv pip install -e`); it installs into the project .venv.
        run: uv pip install -r "$BENCH_DIR/requirements-real.txt"

      - name: Install embedder + spaCy model (Phase 2; offline lane, no key)
        # sentence-transformers (MiniLM, --embedder st cosine terms) + spacy + the
        # en_core_web_lg vector model (pinned as a wheel URL in requirements-embed.txt
        # so the pip-less uv venv installs it WITHOUT `spacy download`).
        run: uv pip install -r "$BENCH_DIR/requirements-embed.txt"

      - name: Pre-fetch MiniLM (retry transient HF 429s)
        # sentence-transformers downloads all-MiniLM-L6-v2 from HF at first use;
        # shared CI runners intermittently get 429s (Too Many Requests). Fetch it once
        # with backoff so the offline + keyed board runs hit the local cache instead of
        # re-downloading per run -- otherwise the whole lane flakes on a transient 429.
        run: |
          set -uo pipefail
          for i in 1 2 3 4 5; do
            "$GITHUB_WORKSPACE/.venv/bin/python" -c "from sentence_transformers import SentenceTransformer; SentenceTransformer('sentence-transformers/all-MiniLM-L6-v2')" && exit 0
            echo "HF fetch attempt $i failed; backing off $((i*15))s..." >&2
            sleep $((i*15))
          done
          echo "::error::could not fetch all-MiniLM-L6-v2 from HF after 5 retries"; exit 1

      - name: Run benchmark (offline -- the committed table)
        working-directory: ${{ env.BENCH_DIR }}
        # --embedder st activates the (emb) rows + the spaCy real row on the committed
        # board (still key-free): the measured embedder effect, visible side-by-side.
        run: "$GITHUB_WORKSPACE/.venv/bin/python erkgbench/run.py --embedder st"
      - name: Upload offline results (commit these)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: er-kg-results-offline
          path: ${{ env.BENCH_DIR }}/results/

      - name: Demo unit tests (offline narrative logic)
        working-directory: ${{ env.BENCH_DIR }}
        run: "$GITHUB_WORKSPACE/.venv/bin/python -m pytest demo/test_demo.py -v"

      - name: Real-adapter bench tests (fidelity gate + F1 pin)
        working-directory: ${{ env.BENCH_DIR }}
        run: "$GITHUB_WORKSPACE/.venv/bin/python -m pytest tests/test_real_resolvers.py tests/test_fidelity_column.py -v"

      - name: Regenerate demo DEMO.md (Tier 1)
        working-directory: ${{ env.BENCH_DIR }}
        run: "$GITHUB_WORKSPACE/.venv/bin/python demo/run_demo.py"

      - name: Upload demo artifact (commit DEMO.md from here on first run)
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: er-kg-demo
          path: ${{ env.BENCH_DIR }}/demo/DEMO.md

      - name: Check demo DEMO.md is committed and current
        run: |
          set -euo pipefail
          DEMO="$BENCH_DIR/demo/DEMO.md"
          # The regenerate step above just wrote DEMO.md from a fresh run. If that
          # differs from the committed copy (or it is untracked), the demo is stale.
          if [ -n "$(git status --porcelain -- "$DEMO")" ]; then
            echo "::error::$DEMO is uncommitted or stale -- run 'python demo/run_demo.py' and commit the result."
            git --no-pager diff -- "$DEMO" || true
            git status --porcelain -- "$DEMO"
            exit 1
          fi
          echo "$DEMO is committed and matches a fresh run."

      - name: Check demo HTML scaffolding is committed and current
        working-directory: ${{ env.BENCH_DIR }}
        # Gates the DETERMINISTIC scaffolding in demo.snapshot.json + demo.html
        # (graph structure, retrieved subgraph, harness numbers) against a fresh
        # offline run -- no key, no network. The recorded LLM transcript is NOT
        # recomputed here; it is regenerated + uploaded by the keyed step below.
        # Returns 0 (no-op) until demo.snapshot.json is bootstrapped, so this step
        # is safe to land before the first committed HTML artifact exists.
        run: "$GITHUB_WORKSPACE/.venv/bin/python demo/run_demo.py --check"

      - name: Run benchmark (keyed -- emb-openai + auto+llm; prose only)
        working-directory: ${{ env.BENCH_DIR }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "No OPENAI_API_KEY secret; skipping the keyed run." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          "$GITHUB_WORKSPACE/.venv/bin/python" erkgbench/run.py --embedder st
          "$GITHUB_WORKSPACE/.venv/bin/python" demo/run_demo.py > demo_keyed.txt 2>&1 || true
          {
            echo '## ER-KG demo (Tier 2: over-merge, key-gated prose)'
            echo '```'
            cat demo_keyed.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          {
            echo '## ER-KG-Bench (keyed run: emb-openai + auto+llm rows included)'
            echo '```'
            cat results/RESULTS.md
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload keyed results (prose source -- do NOT commit)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: er-kg-results-keyed
          path: ${{ env.BENCH_DIR }}/results/

      - name: Upload demo HTML + snapshot (keyed; download + commit to refresh the recorded transcript)
        # The keyed `demo/run_demo.py` above writes demo.html + demo.snapshot.json
        # with a REAL recorded gpt-4o-mini transcript. Bootstrap flow: download this
        # artifact and commit the two files (mirrors the results/ download+commit).
        # Upload-only -- never auto-committed, never gated-on-drift (the transcript is
        # non-deterministic). `if-no-files-found: ignore` so key-less runs don't error.
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: er-kg-demo-html
          path: |
            ${{ env.BENCH_DIR }}/demo/demo.html
            ${{ env.BENCH_DIR }}/demo/demo.snapshot.json
          if-no-files-found: ignore
