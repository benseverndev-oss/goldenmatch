name: Publish goldenmatch to PyPI

# Cut a release by pushing a bare `vX.Y.Z` tag (the TS/native/pg tags are
# prefixed -- e.g. goldenmatch-js-v* -- so they don't match `v*`). This
# workflow OWNS the GitHub Release: do NOT create the release yourself with
# `gh release create`. Immutable releases (repo setting) seal their assets at
# publish time, so the signed wheel/sdist/sigstore bundles MUST be uploaded
# while the release is still a DRAFT and only then published -- you cannot add
# assets to an already-published immutable release (that was the v2.1.0 red).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build + publish (e.g. v2.2.0). Created at `ref` if it does not exist yet."
        required: true
      ref:
        description: "Branch/commit to build from when the tag does not exist yet (default: this branch). The release is still named from `tag`."
        required: false
        default: ""
  # Reusable entry point for cut-goldenmatch-release.yml. That cutter pushes the
  # bare `v*` tag from a runner FIRST (a GITHUB_TOKEN tag push does not re-trigger
  # the `push: tags` event above), then calls this workflow with the tag already
  # created -- so the final `gh release edit --draft=false` only flips the draft
  # flag instead of creating the tag ref (the step the sandbox/ruleset blocks).
  workflow_call:
    inputs:
      tag:
        description: "Release tag to build + publish (e.g. v3.5.0). Must already exist."
        required: true
        type: string
      ref:
        description: "Commit/branch/tag to build from (default: the tag itself)."
        required: false
        type: string
        default: ""

permissions:
  id-token: write       # PyPI OIDC + cosign keyless signing
  contents: write       # create + publish the GitHub Release
  attestations: write   # build-provenance attestation

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    env:
      # push: inputs is empty -> github.ref_name (the pushed tag). dispatch/call:
      # inputs.tag. One expression covers all three triggers.
      TAG: ${{ inputs.tag || github.ref_name }}
      GH_REPO: ${{ github.repository }}
      GH_TOKEN: ${{ github.token }}
    defaults:
      run:
        working-directory: packages/python/goldenmatch
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          # push: inputs empty -> github.ref (the pushed tag). dispatch: inputs.ref
          # (default the dispatched branch) so a not-yet-created tag still works;
          # the release step creates the tag when it publishes. call: inputs.ref
          # is the already-pushed tag from the cutter.
          ref: ${{ inputs.ref || github.ref }}
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "22"
          cache: pnpm
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      # Build the web frontend BEFORE the wheel build so the staged dist
      # files (gitignored under goldenmatch/web/static/) are present and
      # `packages = ["goldenmatch"]` picks them up. Without this step the
      # wheel ships only `.gitkeep` and `goldenmatch[web]` users can't
      # serve the UI without running build_web.py themselves.
      - name: Install pnpm workspace deps
        working-directory: ${{ github.workspace }}
        run: pnpm install --frozen-lockfile
      - name: Build + stage web frontend
        working-directory: ${{ github.workspace }}
        run: python packages/python/goldenmatch/scripts/build_web.py
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        with:
          packages-dir: packages/python/goldenmatch/dist
          password: ${{ secrets.PYPI_TOKEN }}
          skip-existing: true

      # --- Signed-Releases (Scorecard): sign the wheel + sdist with cosign
      # keyless and attest build provenance, then create a DRAFT release with
      # the assets + their .sigstore bundles attached and publish it. Verify:
      #   cosign verify-blob --bundle goldenmatch-<v>-py3-none-any.whl.sigstore \
      #     goldenmatch-<v>-py3-none-any.whl \
      #     --certificate-identity-regexp 'github.com/benseverndev-oss/goldenmatch' \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2
      - name: Sign wheel + sdist (cosign keyless)
        run: |
          for f in dist/*.whl dist/*.tar.gz; do
            [ -e "$f" ] || continue
            cosign sign-blob --yes --bundle "${f}.sigstore" "${f}"
          done
      - name: Attest build provenance (wheel)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: packages/python/goldenmatch/dist/*.whl
      - name: Extract release notes from CHANGELOG
        run: |
          version="${TAG#v}"
          notes="${RUNNER_TEMP}/release-notes.md"
          # Print the `## [<version>]` section body, stop at the next `## [` header.
          awk -v ver="$version" '
            $0 ~ ("^## \\[" ver "\\]") {f=1; next}
            f && /^## \[/ {exit}
            f {print}
          ' CHANGELOG.md > "$notes"
          if [ ! -s "$notes" ]; then
            printf 'goldenmatch %s\n' "$version" > "$notes"
          fi
          echo "NOTES_FILE=$notes" >> "$GITHUB_ENV"
      # draft: true uploads assets while the release is still MUTABLE; the next
      # step publishes it, which is when an immutable release seals its assets.
      - name: Create draft release + attach signed assets
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v2
        with:
          tag_name: ${{ env.TAG }}
          target_commitish: ${{ inputs.ref || github.sha }}
          name: goldenmatch ${{ env.TAG }}
          body_path: ${{ env.NOTES_FILE }}
          draft: true
          files: |
            packages/python/goldenmatch/dist/*.whl
            packages/python/goldenmatch/dist/*.tar.gz
            packages/python/goldenmatch/dist/*.sigstore
      - name: Publish the release (seals it immutable, with assets attached)
        run: gh release edit "$TAG" --draft=false --latest
