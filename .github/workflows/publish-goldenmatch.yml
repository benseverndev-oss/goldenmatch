name: Publish goldenmatch to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag or commit to build (default: HEAD of main)"
        required: false
        default: ""

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    # On release events, only run for Python tags (e.g. v1.6.0). Skip TS-port tags
    # (goldenmatch-js-v*) and other package tags so they never accidentally publish
    # the Python package.
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    environment: pypi
    defaults:
      run:
        working-directory: packages/python/goldenmatch
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "20"
          cache: pnpm
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      # Build the web frontend BEFORE the wheel build so the staged dist
      # files (gitignored under goldenmatch/web/static/) are present and
      # `packages = ["goldenmatch"]` picks them up. Without this step the
      # wheel ships only `.gitkeep` and `goldenmatch[web]` users can't
      # serve the UI without running build_web.py themselves.
      - name: Install pnpm workspace deps
        working-directory: ${{ github.workspace }}
        run: pnpm install --frozen-lockfile
      - name: Build + stage web frontend
        working-directory: ${{ github.workspace }}
        run: python packages/python/goldenmatch/scripts/build_web.py
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        with:
          packages-dir: packages/python/goldenmatch/dist
          password: ${{ secrets.PYPI_TOKEN }}
          skip-existing: true
