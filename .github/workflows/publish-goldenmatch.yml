name: Publish goldenmatch to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag or commit to build (default: HEAD of main)"
        required: false
        default: ""

permissions:
  id-token: write       # PyPI OIDC + cosign keyless signing
  contents: write       # attach signed artifacts to the GitHub Release
  attestations: write   # build-provenance attestation

jobs:
  publish:
    # On release events, only run for Python tags (e.g. v1.6.0). Skip TS-port tags
    # (goldenmatch-js-v*) and other package tags so they never accidentally publish
    # the Python package.
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    environment: pypi
    defaults:
      run:
        working-directory: packages/python/goldenmatch
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "20"
          cache: pnpm
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      # Build the web frontend BEFORE the wheel build so the staged dist
      # files (gitignored under goldenmatch/web/static/) are present and
      # `packages = ["goldenmatch"]` picks them up. Without this step the
      # wheel ships only `.gitkeep` and `goldenmatch[web]` users can't
      # serve the UI without running build_web.py themselves.
      - name: Install pnpm workspace deps
        working-directory: ${{ github.workspace }}
        run: pnpm install --frozen-lockfile
      - name: Build + stage web frontend
        working-directory: ${{ github.workspace }}
        run: python packages/python/goldenmatch/scripts/build_web.py
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        with:
          packages-dir: packages/python/goldenmatch/dist
          password: ${{ secrets.PYPI_TOKEN }}
          skip-existing: true

      # --- Signed-Releases (Scorecard): sign the wheel + sdist with cosign
      # keyless and attach them, their .sigstore bundles, and a build-provenance
      # attestation to the GitHub Release. Only on release events (the dispatch
      # retro-publish path has no Release to attach to). Verify with:
      #   cosign verify-blob --bundle goldenmatch-<v>-py3-none-any.whl.sigstore \
      #     goldenmatch-<v>-py3-none-any.whl \
      #     --certificate-identity-regexp 'github.com/benseverndev-oss/goldenmatch' \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com
      - name: Install cosign
        if: github.event_name == 'release'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2
      - name: Sign wheel + sdist (cosign keyless)
        if: github.event_name == 'release'
        run: |
          for f in dist/*.whl dist/*.tar.gz; do
            [ -e "$f" ] || continue
            cosign sign-blob --yes --bundle "${f}.sigstore" "${f}"
          done
      - name: Attest build provenance (wheel)
        if: github.event_name == 'release'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: packages/python/goldenmatch/dist/*.whl
      - name: Attach signed artifacts to the release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8  # v2
        with:
          files: |
            packages/python/goldenmatch/dist/*.whl
            packages/python/goldenmatch/dist/*.tar.gz
            packages/python/goldenmatch/dist/*.sigstore
