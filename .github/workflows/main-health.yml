# main-health: catches the "invisible red" class -- a non-ci-required workflow
# (there are ~90 separate push/schedule lanes) going red on `main` with nothing
# to surface it (PRs stay green, the merge queue is unaffected). This scans every
# ACTIVE workflow's latest `main` run and reconciles the red set into a single
# tracking issue (opened/updated when red, auto-closed when main is clean).
#
# It deliberately exits 0 even when lanes are red -- the durable, notifying signal
# is the tracking issue, so this watcher never becomes just another silent red.
name: main-health

on:
  schedule:
    - cron: "17 */6 * * *" # every 6h, off the hour to dodge scheduler congestion
  workflow_dispatch:

permissions:
  contents: read
  actions: read # read other workflows' runs
  issues: write # open/update/close the tracking issue

concurrency:
  group: main-health
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Scan main-branch health and reconcile the tracking issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/check_main_health.py --repo "${{ github.repository }}"
