# Quality-invariant scale ladder (#510) — workflow_dispatch only.
#
# Runs scripts/quality_invariant_scale.py at a given rung on the same
# `large-new-64GB` runner that the rest of the bench-* workflows use. This
# is the 16c/64GB box CLAUDE.md's published bench numbers are from
# (5M-bucket = 53.7min/7.4GB, 25M-bucket = 6.5min/57.7GB peak RSS), so the
# RAM ceiling matches the documented scale-envelope and the QIS results are
# directly comparable to the Phase-5 / Phase-3 distributed work.
#
# Railway's qis-job caps at 24 GB and 10M-bucket-realistic exceeds that on
# the QIS realistic-shape (different block-key density than bench-dataset-v1).
# This workflow is the 10M-50M lane; 100M-200M still wants a Ray cluster
# (bench-phase5-end2end pattern).
#
# To run: GitHub → Actions → "bench-quality-invariant-scale" → Run workflow.
name: bench-quality-invariant-scale

on:
  workflow_dispatch:
    inputs:
      rows:
        description: "Rung size (10000000 = 10M, 25000000 = 25M, etc.)"
        required: false
        default: "10000000"
      shape:
        description: "realistic | phase5"
        required: false
        default: "realistic"
      backend:
        description: "polars | bucket | chunked | duckdb | ray (blank = planner auto-pick)"
        required: false
        default: "bucket"
      seed:
        description: "Generator seed"
        required: false
        default: "0"
      label:
        description: "Tag for the output artifact (e.g. '10m-bucket', '25m-duckdb')"
        required: false
        default: "ad-hoc"
      runner:
        description: "Runner override (default large-new-64GB; use ubuntu-latest for small rungs when the big runner queue is backed up)"
        required: false
        default: "large-new-64GB"
      slim_projection:
        description: "GOLDENMATCH_BUCKET_SLIM_PROJECTION value (0 or 1). Default '1' = today's behavior; pass '0' to bench the pre-slim baseline."
        required: false
        default: "1"
      precompute_rechunk:
        description: "GOLDENMATCH_PRECOMPUTE_RECHUNK value (0 or 1). PR #591 RSS-reduction A/B."
        required: false
        default: "0"

permissions:
  contents: read

jobs:
  scale-rung:
    # Runner is dispatch-input-overridable (default large-new-64GB, 16c/64GB
    # Ubuntu 24.04 per feedback_bench_default_runner). For small rungs (<=1M)
    # ubuntu-latest is 4c/16GB and runs the same harness fine -- useful when
    # the large-new-64GB queue is saturated and you just want native-build
    # validation without waiting.
    runs-on: ${{ inputs.runner || 'large-new-64GB' }}
    # 25M-bucket completes in 6.5 min on this box; 10M should be < 5 min.
    # 50M-duckdb is the long pole — give it a 5h cap.
    timeout-minutes: 300
    env:
      GOLDENMATCH_AUTOCONFIG_MEMORY: "0"
      # 50M+ rungs need this gate flipped on for the v3 planner to consider
      # ray. Harmless when the rung is < 50M.
      GOLDENMATCH_ENABLE_DISTRIBUTED_RAY: "1"
      # Native acceleration: REQUIRE the Rust/PyO3 kernel. "1" makes the loader
      # raise instead of silently falling back to Python. Per project_bucket_native_scoring_win
      # memory the bucket+native scorer is 1.7-3.7x faster than polars-direct
      # at 1k-60k clusters with identical accuracy. Without this gate the QIS
      # measurements have been running the pure-Python scoring path the whole
      # time -- which is what this workflow is supposed to measure goldenmatch
      # at its best, NOT its slowest.
      GOLDENMATCH_NATIVE: "1"
      # PR #576 gated the Polars-native address_normalize chain behind
      # this env var because an integration test failed parity (8 vs 5
      # clusters on sample CSV). Per-row parity tests pass; chain saves
      # ~65s at 10M QIS. Opt in here to measure the win on the bench.
      GOLDENMATCH_NATIVE_ADDRESS_NORMALIZE: "1"
      # PR #588: slim Polars projection before bucket_assign. Default off
      # (matches v29 baseline); flip via workflow_dispatch input for A/B.
      GOLDENMATCH_BUCKET_SLIM_PROJECTION: ${{ inputs.slim_projection || '0' }}
      # PR #591: rechunk after precompute_matchkey_transforms so the
      # bucket_slim_projection .select() can be true zero-copy.
      GOLDENMATCH_PRECOMPUTE_RECHUNK: ${{ inputs.precompute_rechunk || '0' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Sync workspace
        run: uv sync --all-packages

      - name: Editable-install goldenmatch (defensive)
        # Same "shadows worktree code" guard the other bench workflows use.
        run: uv pip install -e packages/python/goldenmatch

      - name: Install ray (for backend=ray rungs only)
        if: ${{ inputs.backend == 'ray' }}
        run: uv pip install "ray>=2.30,<3"

      - name: Set up Rust toolchain (for native build)
        uses: dtolnay/rust-toolchain@stable

      - name: Build native acceleration kernel
        # Drops goldenmatch._native into the editable install. Build script
        # gates on the SAME interpreter we use to run the harness, so the abi3
        # artifact is guaranteed to be importable. Without this step the
        # GOLDENMATCH_NATIVE=1 verify-load below would fail (and silently fall
        # back without it -- which is what's been happening on every prior
        # measurement run in this workflow).
        run: .venv/bin/python scripts/build_native.py

      - name: Verify native loaded
        run: |
          .venv/bin/python -c "
          from goldenmatch.core._native_loader import native_available, native_module
          mod = native_module()
          assert native_available(), 'goldenmatch._native not importable -- build_native.py output went to the wrong interpreter?'
          print('native loaded OK:', mod)
          "

      - name: Verify worktree install
        run: |
          .venv/bin/python -c "import goldenmatch, goldenmatch.core.pipeline; \
            assert 'packages/python/goldenmatch' in goldenmatch.__file__, \
              f'goldenmatch resolves to {goldenmatch.__file__} — not the worktree'; \
            print('worktree install OK:', goldenmatch.__file__)"

      - name: Run rung (rows=${{ inputs.rows }} shape=${{ inputs.shape }} backend=${{ inputs.backend }})
        # pipefail is critical: without it `python ... | tee ...` returns tee's
        # exit code, so a missing-file / traceback in the harness silently
        # reports the step as success. Bit run 26575594657 — checkout was on
        # main, scripts/ wasn't there yet, python exited 2, tee returned 0.
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .profile_tmp/qis
          BACKEND_FLAG=""
          if [ -n "${{ inputs.backend }}" ]; then
            BACKEND_FLAG="--backend ${{ inputs.backend }}"
          fi
          .venv/bin/python scripts/quality_invariant_scale.py \
            --rows ${{ inputs.rows }} \
            --shape ${{ inputs.shape }} \
            --seed ${{ inputs.seed }} \
            $BACKEND_FLAG \
            --out .profile_tmp/qis/qis_${{ inputs.label }}.json \
            | tee .profile_tmp/qis/qis_${{ inputs.label }}.log

      - name: Post headline to step summary
        if: always()
        run: |
          OUT=.profile_tmp/qis/qis_${{ inputs.label }}.json
          if [ ! -f "$OUT" ]; then
            echo "no rung output — earlier step failed" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          .venv/bin/python - <<'PY' >> $GITHUB_STEP_SUMMARY
          import json, os
          label = os.environ["LABEL"]
          d = json.load(open(f".profile_tmp/qis/qis_{label}.json"))
          # Harness schema (see scripts/quality_invariant_scale.py::run_rung):
          #   rows, wall_s.{generate,dedupe,total}, rss_mb_peak,
          #   pairwise.{f1,p,r,fp,fn}, b_cubed.{f1,p,r}, cluster.{f1,p,r,exact},
          #   shape, backend, committed_config.{health,stop_reason,iterations}
          wall = (d.get("wall_s") or {}).get("total", 0.0)
          ded = (d.get("wall_s") or {}).get("dedupe", 0.0)
          rss = d.get("rss_mb_peak")
          print(f"# qis rung: {label}")
          print()
          print(f"- rows: **{d.get('rows', 0):,}**  shape: `{d.get('shape', '?')}`  backend: `{d.get('backend', '?')}`")
          if rss is not None:
              print(f"- wall: **{wall:.1f}s** (dedupe {ded:.1f}s)  peak RSS: **{rss/1024:.1f} GB**")
          else:
              print(f"- wall: **{wall:.1f}s** (dedupe {ded:.1f}s)")
          print()
          print("## Quality")
          print()
          print("| metric | F1 | P | R |")
          print("|---|---|---|---|")
          for label_, key in (("pairwise", "pairwise"), ("b-cubed", "b_cubed"), ("cluster", "cluster")):
              m = d.get(key) or {}
              f1 = m.get("f1"); p = m.get("p"); r = m.get("r")
              if f1 is not None:
                  print(f"| {label_} | {f1:.4f} | {p:.4f} | {r:.4f} |")
          pw = d.get("pairwise") or {}
          if pw:
              print()
              print(f"- pairwise tp={pw.get('tp', 0):,} fp={pw.get('fp', 0):,} fn={pw.get('fn', 0):,}")
          ctrl = d.get("committed_config") or {}
          if ctrl:
              print()
              print("## Controller")
              print()
              print(f"- health: `{ctrl.get('health', '?')}`  stop_reason: `{ctrl.get('stop_reason', '?')}`  iterations: {ctrl.get('iterations', '?')}")
          PY
        env:
          LABEL: ${{ inputs.label }}

      - name: Upload rung artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: qis-${{ inputs.label }}
          path: |
            .profile_tmp/qis/qis_${{ inputs.label }}.json
            .profile_tmp/qis/qis_${{ inputs.label }}.log
          retention-days: 90
