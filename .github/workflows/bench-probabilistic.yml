# Probabilistic-vs-Splink accuracy panel — workflow_dispatch only.
#
# Runs GoldenMatch's PROBABILISTIC path (auto_configure_probabilistic_df +
# dedupe_df) against Splink across several ER datasets on ONE machine, then
# emits a comparison table (panel.md / panel.json) plus a recall-attribution
# split (blocking_recall vs threshold_loss) for the GoldenMatch side.
#
# Datasets without a Splink settings entry, a missing dataset, or a missing
# dep are recorded as skipped/error rows — never fatal to the panel. ncvr is
# always skipped by design (the raw sample carries no true-entity grouping).
#
# Three jobs (all workflow_dispatch, none a gate):
#   panel            — single-config panel (current FS auto-config) vs Splink.
#   panel-v1-v2      — runs the panel twice (GOLDENMATCH_FS_AUTOCONFIG_V2 0 vs 1)
#                      and diffs GoldenMatch F1 per dataset; the verdict gates the
#                      v2-default flip. Fetches DBLP-ACM (the one set we can't
#                      measure locally) best-effort from Leipzig.
#   panel-comparators — runs the panel twice (GOLDENMATCH_FS_DOMAIN_COMPARATORS
#                      0 vs 1, v2 auto-config default-on in BOTH so the flag is
#                      the only variable) and diffs F1 per dataset. historical_50k
#                      (real corrupted DOBs) is where the magnitude-aware date_diff
#                      comparator is expected to lift F1; this verdict gates the
#                      GOLDENMATCH_FS_DOMAIN_COMPARATORS default flip.
#   panel-tf         — runs the panel twice (GOLDENMATCH_FS_TF_ADJUSTMENT 0 vs 1)
#                      and diffs F1 per dataset. TF down-weights agreement on
#                      COMMON categorical values (surname/occupation/city/postcode)
#                      so it targets the over-merge regime (historical_50k GM
#                      precision 0.72 vs Splink 0.97); this verdict gates the
#                      GOLDENMATCH_FS_TF_ADJUSTMENT default flip. Also emits an
#                      over-merge diagnostic (what the false merges agree on) so a
#                      neutral result still explains WHY GM over-merges.
#   panel-honorific  — runs the panel twice (GOLDENMATCH_FS_STRIP_HONORIFICS 0 vs
#                      1) and diffs F1. Strips title/rank tokens leaked into name
#                      fields ("Sir", "Baronet") — the lever that reached the
#                      historical_50k over-merge TF could not (A/B: F1 +0.0108,
#                      precision +0.0245); gates the STRIP_HONORIFICS default flip.
#
# To run: GitHub -> Actions -> "bench-probabilistic" -> Run workflow.
name: bench-probabilistic

on:
  workflow_dispatch:
    inputs:
      datasets:
        description: "Comma-separated dataset names (single-config panel job)"
        required: false
        default: "historical_50k,dblp_acm,febrl3,ncvr,synthetic_person"
      compare_datasets:
        description: "Datasets for the v1-vs-v2 lane (ncvr excluded: unscoreable)"
        required: false
        default: "historical_50k,dblp_acm,febrl3,synthetic_person"
      fail_on_regression:
        description: "v1-vs-v2 lane: fail the job if v2 regresses any dataset's F1"
        type: boolean
        required: false
        default: false
      run_bakeoff:
        description: "Run the 3-engine bake-off lane (gm_zeroconfig + gm_probabilistic + Splink)"
        type: boolean
        required: false
        default: false
      run_comparators:
        description: "Run the FS domain-comparators OFF-vs-ON lane (gates the GOLDENMATCH_FS_DOMAIN_COMPARATORS default flip)"
        type: boolean
        required: false
        default: true
      run_tf:
        description: "Run the FS term-frequency OFF-vs-ON lane (gates the GOLDENMATCH_FS_TF_ADJUSTMENT default flip) + over-merge diagnostic"
        type: boolean
        required: false
        default: true
      run_honorific:
        description: "Run the FS honorific-strip OFF-vs-ON lane (gates the GOLDENMATCH_FS_STRIP_HONORIFICS default flip)"
        type: boolean
        required: false
        default: true
      run_discriminators:
        description: "Run the FS strong-discriminators OFF-vs-ON lane (discriminator negative-evidence; gates GOLDENMATCH_FS_STRONG_DISCRIMINATORS)"
        type: boolean
        required: false
        default: false
      run_threshold_sweep:
        description: "Run the FS link-threshold sweep diagnostic (is the default 0.50 cutoff badly placed? measure-first for threshold calibration)"
        type: boolean
        required: false
        default: false
      run_threshold_calibration:
        description: "Run the FS threshold-calibration OFF-vs-ON lane (Otsu adaptive cutoff; gates GOLDENMATCH_FS_CALIBRATE_THRESHOLD)"
        type: boolean
        required: false
        default: false
      em_sample_rows:
        description: "GOLDENMATCH_FS_EM_SAMPLE_ROWS for the panel job (empty = off; validates the EM-block-sample F1)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  panel:
    runs-on: large-new-64GB
    timeout-minutes: 120
    env:
      GOLDENMATCH_AUTOCONFIG_MEMORY: "0"
      # EM-block-sample flag (empty = off). Set via the em_sample_rows dispatch
      # input to validate that sampling EM's training blocks holds F1 on the
      # panel datasets (historical_50k is the real regression risk) before the
      # default flip. _fs_em_sample_rows() treats "" as off.
      GOLDENMATCH_FS_EM_SAMPLE_ROWS: ${{ inputs.em_sample_rows }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install goldenmatch[bench] (pulls splink + duckdb + pyarrow)
        run: pip install -e packages/python/goldenmatch[bench]

      - name: Install recordlinkage (for the febrl3 dataset loader)
        run: pip install recordlinkage

      - name: Run probabilistic panel
        run: |
          python scripts/bench_er_headtohead/run_panel.py \
            --datasets "${{ inputs.datasets || 'historical_50k,dblp_acm,febrl3,ncvr,synthetic_person' }}" \
            --out-dir prob_panel

      - name: Upload panel artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: prob-panel
          path: prob_panel/
          retention-days: 90

  # ── FS auto-config v1 vs v2 lane ──────────────────────────────────────────
  # Runs the panel twice — GOLDENMATCH_FS_AUTOCONFIG_V2=0 (legacy) and =1 (the
  # curated comparison set + orthogonal blocking) — and diffs GoldenMatch F1 per
  # dataset. This is the gate that clears the levers' default flip: v2 beats
  # Splink on the laptop-measurable PII sets (historical_50k/febrl3/synthetic),
  # but DBLP-ACM (Leipzig CSVs, gitignored) can only be checked here — the
  # low-card fuzzy floor could drop a low-cardinality bibliographic `venue`.
  # The verdict + per-dataset deltas land in the job summary.
  panel-v1-v2:
    runs-on: large-new-64GB
    timeout-minutes: 180
    env:
      GOLDENMATCH_AUTOCONFIG_MEMORY: "0"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install goldenmatch[bench] (pulls splink + duckdb + pyarrow)
        run: pip install -e packages/python/goldenmatch[bench]

      - name: Install recordlinkage (for the febrl3 dataset loader)
        run: pip install recordlinkage

      # DBLP-ACM is gitignored; fetch the Leipzig benchmark best-effort. On any
      # failure the panel records dblp_acm as skipped (never fatal), so the lane
      # still compares the other datasets.
      - name: Fetch DBLP-ACM (Leipzig, best-effort)
        continue-on-error: true
        run: |
          DEST=packages/python/goldenmatch/tests/benchmarks/datasets/DBLP-ACM
          mkdir -p "$DEST"
          if curl -fsSL --retry 3 -o /tmp/dblp-acm.zip https://dbs.uni-leipzig.de/file/DBLP-ACM.zip; then
            mkdir -p /tmp/dblp-acm && unzip -o /tmp/dblp-acm.zip -d /tmp/dblp-acm
            for f in DBLP2.csv ACM.csv DBLP-ACM_perfectMapping.csv; do
              found=$(find /tmp/dblp-acm -name "$f" | head -1)
              if [ -n "$found" ]; then cp "$found" "$DEST/$f"; else echo "::warning::DBLP-ACM file $f not in archive"; fi
            done
            ls -la "$DEST"
          else
            echo "::warning::DBLP-ACM download failed; dblp_acm will be skipped in the panel"
          fi

      - name: Run panel — v1 (GOLDENMATCH_FS_AUTOCONFIG_V2=0)
        env:
          GOLDENMATCH_FS_AUTOCONFIG_V2: "0"
        run: |
          python scripts/bench_er_headtohead/run_panel.py \
            --datasets "${{ inputs.compare_datasets || 'historical_50k,dblp_acm,febrl3,synthetic_person' }}" \
            --out-dir prob_panel_v1

      - name: Run panel — v2 (GOLDENMATCH_FS_AUTOCONFIG_V2=1)
        env:
          GOLDENMATCH_FS_AUTOCONFIG_V2: "1"
        run: |
          python scripts/bench_er_headtohead/run_panel.py \
            --datasets "${{ inputs.compare_datasets || 'historical_50k,dblp_acm,febrl3,synthetic_person' }}" \
            --out-dir prob_panel_v2

      - name: Compare v1 vs v2 (writes verdict to job summary)
        run: |
          FLAG=""
          if [ "${{ inputs.fail_on_regression }}" = "true" ]; then FLAG="--fail-on-regression"; fi
          python scripts/bench_er_headtohead/compare_panels.py \
            --v1 prob_panel_v1/panel.json \
            --v2 prob_panel_v2/panel.json \
            --out compare/compare.md $FLAG

      - name: Upload v1/v2 panels + comparison
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: prob-panel-v1-v2
          path: |
            prob_panel_v1/
            prob_panel_v2/
            compare/
          retention-days: 90

  # ── FS domain-comparators OFF vs ON lane ──────────────────────────────────
  # Runs the panel twice — GOLDENMATCH_FS_DOMAIN_COMPARATORS=0 (baseline; date
  # columns scored by edit-distance `levenshtein`) and =1 (the magnitude-aware
  # `date_diff`/`numeric_diff`/`geo_haversine` comparators) — and diffs
  # GoldenMatch F1 per dataset. v2 auto-config is default-on in BOTH runs (the
  # env var is unset), so the domain-comparators flag is the ONLY variable.
  # historical_50k carries real corrupted DOBs, so it is the dataset where the
  # date comparator is expected to lift F1 (offline synthetic fixtures ceiling at
  # F1=1.0); this verdict gates the GOLDENMATCH_FS_DOMAIN_COMPARATORS default
  # flip, mirroring how panel-v1-v2 gated the v2 flip.
  panel-comparators:
    if: ${{ inputs.run_comparators }}
    runs-on: large-new-64GB
    timeout-minutes: 180
    env:
      GOLDENMATCH_AUTOCONFIG_MEMORY: "0"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install goldenmatch[bench] (pulls splink + duckdb + pyarrow)
        run: pip install -e packages/python/goldenmatch[bench]

      - name: Install recordlinkage (for the febrl3 dataset loader)
        run: pip install recordlinkage

      # DBLP-ACM is gitignored; fetch the Leipzig benchmark best-effort. On any
      # failure the panel records dblp_acm as skipped (never fatal).
      - name: Fetch DBLP-ACM (Leipzig, best-effort)
        continue-on-error: true
        run: |
          DEST=packages/python/goldenmatch/tests/benchmarks/datasets/DBLP-ACM
          mkdir -p "$DEST"
          if curl -fsSL --retry 3 -o /tmp/dblp-acm.zip https://dbs.uni-leipzig.de/file/DBLP-ACM.zip; then
            mkdir -p /tmp/dblp-acm && unzip -o /tmp/dblp-acm.zip -d /tmp/dblp-acm
            for f in DBLP2.csv ACM.csv DBLP-ACM_perfectMapping.csv; do
              found=$(find /tmp/dblp-acm -name "$f" | head -1)
              if [ -n "$found" ]; then cp "$found" "$DEST/$f"; else echo "::warning::DBLP-ACM file $f not in archive"; fi
            done
            ls -la "$DEST"
          else
            echo "::warning::DBLP-ACM download failed; dblp_acm will be skipped in the panel"
          fi

      - name: Run panel — comparators OFF (GOLDENMATCH_FS_DOMAIN_COMPARATORS=0)
        env:
          GOLDENMATCH_FS_DOMAIN_COMPARATORS: "0"
        run: |
          python scripts/bench_er_headtohead/run_panel.py \
            --datasets "${{ inputs.compare_datasets || 'historical_50k,dblp_acm,febrl3,synthetic_person' }}" \
            --out-dir prob_panel_dc_off

      - name: Run panel — comparators ON (GOLDENMATCH_FS_DOMAIN_COMPARATORS=1)
        env:
          GOLDENMATCH_FS_DOMAIN_COMPARATORS: "1"
        run: |
          python scripts/bench_er_headtohead/run_panel.py \
            --datasets "${{ inputs.compare_datasets || 'historical_50k,dblp_acm,febrl3,synthetic_person' }}" \
            --out-dir prob_panel_dc_on

      - name: Compare OFF vs ON (writes verdict to job summary)
        run: |
          FLAG=""
          if [ "${{ inputs.fail_on_regression }}" = "true" ]; then FLAG="--fail-on-regression"; fi
          python scripts/bench_er_headtohead/compare_panels.py \
            --v1 prob_panel_dc_off/panel.json \
            --v2 prob_panel_dc_on/panel.json \
            --title "FS domain comparators OFF vs ON — GoldenMatch probabilistic path" \
            --a-label off --b-label on \
            --out compare_dc/compare.md $FLAG

      - name: Upload OFF/ON panels + comparison
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: prob-panel-comparators
          path: |
            prob_panel_dc_off/
            prob_panel_dc_on/
            compare_dc/
          retention-days: 90

  # ── FS term-frequency OFF-vs-ON lane ──────────────────────────────────────
  # Runs the panel twice (GOLDENMATCH_FS_TF_ADJUSTMENT 0 vs 1, v2 auto-config
  # default-on in BOTH so the flag is the only variable). TF down-weights
  # agreement on COMMON categorical values, so historical_50k (where GM
  # over-merges: precision 0.72 vs Splink 0.97) is the money row. Installs polars
  # so the GOLDENMATCH_BENCH_DUMP_PAIRS emitted-pair dump succeeds, then runs an
  # over-merge diagnostic: whether the false merges concentrate on common
  # categorical values (TF's target) or share only a blocking key (a cause TF
  # can't fix) — so a neutral F1 result still yields the "why". Verdict gates the
  # GOLDENMATCH_FS_TF_ADJUSTMENT default flip.
  panel-tf:
    if: ${{ inputs.run_tf }}
    runs-on: large-new-64GB
    timeout-minutes: 180
    env:
      GOLDENMATCH_AUTOCONFIG_MEMORY: "0"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install goldenmatch[bench] (pulls splink + duckdb + pyarrow)
        run: pip install -e packages/python/goldenmatch[bench]

      - name: Install recordlinkage (for the febrl3 dataset loader)
        run: pip install recordlinkage

      # goldenmatch is arrow-native (no polars dep); the emitted-pair dump under
      # GOLDENMATCH_BENCH_DUMP_PAIRS writes parquet via polars, so the diagnostic
      # needs it installed. Harmless to the panel itself.
      - name: Install polars (for the emitted-pair dump the diagnostic reads)
        run: pip install polars

      # DBLP-ACM is gitignored; fetch the Leipzig benchmark best-effort. On any
      # failure the panel records dblp_acm as skipped (never fatal).
      - name: Fetch DBLP-ACM (Leipzig, best-effort)
        continue-on-error: true
        run: |
          DEST=packages/python/goldenmatch/tests/benchmarks/datasets/DBLP-ACM
          mkdir -p "$DEST"
          if curl -fsSL --retry 3 -o /tmp/dblp-acm.zip https://dbs.uni-leipzig.de/file/DBLP-ACM.zip; then
            mkdir -p /tmp/dblp-acm && unzip -o /tmp/dblp-acm.zip -d /tmp/dblp-acm
            for f in DBLP2.csv ACM.csv DBLP-ACM_perfectMapping.csv; do
              found=$(find /tmp/dblp-acm -name "$f" | head -1)
              if [ -n "$found" ]; then cp "$found" "$DEST/$f"; else echo "::warning::DBLP-ACM file $f not in archive"; fi
            done
            ls -la "$DEST"
          else
            echo "::warning::DBLP-ACM download failed; dblp_acm will be skipped in the panel"
          fi

      - name: Run panel — TF OFF (GOLDENMATCH_FS_TF_ADJUSTMENT=0)
        env:
          GOLDENMATCH_FS_TF_ADJUSTMENT: "0"
        run: |
          python scripts/bench_er_headtohead/run_panel.py \
            --datasets "${{ inputs.compare_datasets || 'historical_50k,dblp_acm,febrl3,synthetic_person' }}" \
            --out-dir prob_panel_tf_off

      - name: Run panel — TF ON (GOLDENMATCH_FS_TF_ADJUSTMENT=1)
        env:
          GOLDENMATCH_FS_TF_ADJUSTMENT: "1"
        run: |
          python scripts/bench_er_headtohead/run_panel.py \
            --datasets "${{ inputs.compare_datasets || 'historical_50k,dblp_acm,febrl3,synthetic_person' }}" \
            --out-dir prob_panel_tf_on

      - name: Compare OFF vs ON (writes verdict to job summary)
        run: |
          FLAG=""
          if [ "${{ inputs.fail_on_regression }}" = "true" ]; then FLAG="--fail-on-regression"; fi
          python scripts/bench_er_headtohead/compare_panels.py \
            --v1 prob_panel_tf_off/panel.json \
            --v2 prob_panel_tf_on/panel.json \
            --title "FS term-frequency OFF vs ON — GoldenMatch probabilistic path" \
            --a-label tf-off --b-label tf-on \
            --out compare_tf/compare.md $FLAG

      # Over-merge diagnostic on historical_50k (the money row): reads the emitted
      # pairs from both runs, reports FP counts OFF-vs-ON and what the false merges
      # agree on. Best-effort — never fails the job.
      - name: Over-merge diagnostic — historical_50k
        continue-on-error: true
        run: |
          python scripts/bench_er_headtohead/diagnose_tf_over_merge.py \
            --dataset historical_50k \
            --pairs-off prob_panel_tf_off/historical_50k/gm_pairs \
            --pairs-on prob_panel_tf_on/historical_50k/gm_pairs

      - name: Upload OFF/ON panels + comparison + diagnostic
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: prob-panel-tf
          path: |
            prob_panel_tf_off/
            prob_panel_tf_on/
            compare_tf/
          retention-days: 90

  # ── FS honorific-strip OFF vs ON lane ─────────────────────────────────────
  # Runs the panel twice (GOLDENMATCH_FS_STRIP_HONORIFICS 0 vs 1, v2 auto-config
  # default-on in BOTH so the flag is the only variable). Honorific stripping
  # removes title/rank tokens leaked into name fields ("Sir", "Baronet") before
  # FS scores them — the lever that reached the historical_50k over-merge TF
  # could not (spike A/B: F1 +0.0108, precision +0.0245; GM overtakes Splink).
  # Verdict gates the GOLDENMATCH_FS_STRIP_HONORIFICS default flip.
  panel-honorific:
    if: ${{ inputs.run_honorific }}
    runs-on: large-new-64GB
    timeout-minutes: 180
    env:
      GOLDENMATCH_AUTOCONFIG_MEMORY: "0"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install goldenmatch[bench] (pulls splink + duckdb + pyarrow)
        run: pip install -e packages/python/goldenmatch[bench]

      - name: Install recordlinkage (for the febrl3 dataset loader)
        run: pip install recordlinkage

      # DBLP-ACM is gitignored; fetch the Leipzig benchmark best-effort. On any
      # failure the panel records dblp_acm as skipped (never fatal).
      - name: Fetch DBLP-ACM (Leipzig, best-effort)
        continue-on-error: true
        run: |
          DEST=packages/python/goldenmatch/tests/benchmarks/datasets/DBLP-ACM
          mkdir -p "$DEST"
          if curl -fsSL --retry 3 -o /tmp/dblp-acm.zip https://dbs.uni-leipzig.de/file/DBLP-ACM.zip; then
            mkdir -p /tmp/dblp-acm && unzip -o /tmp/dblp-acm.zip -d /tmp/dblp-acm
            for f in DBLP2.csv ACM.csv DBLP-ACM_perfectMapping.csv; do
              found=$(find /tmp/dblp-acm -name "$f" | head -1)
              if [ -n "$found" ]; then cp "$found" "$DEST/$f"; else echo "::warning::DBLP-ACM file $f not in archive"; fi
            done
            ls -la "$DEST"
          else
            echo "::warning::DBLP-ACM download failed; dblp_acm will be skipped in the panel"
          fi

      - name: Run panel — honorific OFF (GOLDENMATCH_FS_STRIP_HONORIFICS=0)
        env:
          GOLDENMATCH_FS_STRIP_HONORIFICS: "0"
        run: |
          python scripts/bench_er_headtohead/run_panel.py \
            --datasets "${{ inputs.compare_datasets || 'historical_50k,dblp_acm,febrl3,synthetic_person' }}" \
            --out-dir prob_panel_hon_off

      - name: Run panel — honorific ON (GOLDENMATCH_FS_STRIP_HONORIFICS=1)
        env:
          GOLDENMATCH_FS_STRIP_HONORIFICS: "1"
        run: |
          python scripts/bench_er_headtohead/run_panel.py \
            --datasets "${{ inputs.compare_datasets || 'historical_50k,dblp_acm,febrl3,synthetic_person' }}" \
            --out-dir prob_panel_hon_on

      - name: Compare OFF vs ON (writes verdict to job summary)
        run: |
          FLAG=""
          if [ "${{ inputs.fail_on_regression }}" = "true" ]; then FLAG="--fail-on-regression"; fi
          python scripts/bench_er_headtohead/compare_panels.py \
            --v1 prob_panel_hon_off/panel.json \
            --v2 prob_panel_hon_on/panel.json \
            --title "FS honorific-strip OFF vs ON — GoldenMatch probabilistic path" \
            --a-label hon-off --b-label hon-on \
            --out compare_hon/compare.md $FLAG

      - name: Upload OFF/ON panels + comparison
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: prob-panel-honorific
          path: |
            prob_panel_hon_off/
            prob_panel_hon_on/
            compare_hon/
          retention-days: 90

  # ── FS strong-discriminators OFF vs ON lane ───────────────────────────────
  # Runs the panel twice (GOLDENMATCH_FS_STRONG_DISCRIMINATORS 0 vs 1). ON adds a
  # one-sided negative-evidence penalty on discriminator fields (dob/birth_place),
  # so a CONFIDENT disagreement subtracts penalty_bits — rejecting namesakes that
  # agree on names but disagree on the discriminators (false merges disagree on
  # birth_place 1.9% / dob 0.4% vs 69% / 40% for true merges). NE never boosts on
  # agreement, so true matches are untouched (no recall cost). historical_50k is
  # the money row; gates the GOLDENMATCH_FS_STRONG_DISCRIMINATORS default flip.
  panel-strong-discriminators:
    if: ${{ inputs.run_discriminators }}
    runs-on: large-new-64GB
    timeout-minutes: 180
    env:
      GOLDENMATCH_AUTOCONFIG_MEMORY: "0"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install goldenmatch[bench] (pulls splink + duckdb + pyarrow)
        run: pip install -e packages/python/goldenmatch[bench]

      - name: Install recordlinkage (for the febrl3 dataset loader)
        run: pip install recordlinkage

      - name: Fetch DBLP-ACM (Leipzig, best-effort)
        continue-on-error: true
        run: |
          DEST=packages/python/goldenmatch/tests/benchmarks/datasets/DBLP-ACM
          mkdir -p "$DEST"
          if curl -fsSL --retry 3 -o /tmp/dblp-acm.zip https://dbs.uni-leipzig.de/file/DBLP-ACM.zip; then
            mkdir -p /tmp/dblp-acm && unzip -o /tmp/dblp-acm.zip -d /tmp/dblp-acm
            for f in DBLP2.csv ACM.csv DBLP-ACM_perfectMapping.csv; do
              found=$(find /tmp/dblp-acm -name "$f" | head -1)
              if [ -n "$found" ]; then cp "$found" "$DEST/$f"; else echo "::warning::DBLP-ACM file $f not in archive"; fi
            done
            ls -la "$DEST"
          else
            echo "::warning::DBLP-ACM download failed; dblp_acm will be skipped in the panel"
          fi

      - name: Run panel — discriminators OFF (GOLDENMATCH_FS_STRONG_DISCRIMINATORS=0)
        env:
          GOLDENMATCH_FS_STRONG_DISCRIMINATORS: "0"
        run: |
          python scripts/bench_er_headtohead/run_panel.py \
            --datasets "${{ inputs.compare_datasets || 'historical_50k,dblp_acm,febrl3,synthetic_person' }}" \
            --out-dir prob_panel_disc_off

      - name: Run panel — discriminators ON (GOLDENMATCH_FS_STRONG_DISCRIMINATORS=1)
        env:
          GOLDENMATCH_FS_STRONG_DISCRIMINATORS: "1"
        run: |
          python scripts/bench_er_headtohead/run_panel.py \
            --datasets "${{ inputs.compare_datasets || 'historical_50k,dblp_acm,febrl3,synthetic_person' }}" \
            --out-dir prob_panel_disc_on

      - name: Compare OFF vs ON (writes verdict to job summary)
        run: |
          FLAG=""
          if [ "${{ inputs.fail_on_regression }}" = "true" ]; then FLAG="--fail-on-regression"; fi
          python scripts/bench_er_headtohead/compare_panels.py \
            --v1 prob_panel_disc_off/panel.json \
            --v2 prob_panel_disc_on/panel.json \
            --title "FS strong-discriminators OFF vs ON — GoldenMatch probabilistic path" \
            --a-label disc-off --b-label disc-on \
            --out compare_disc/compare.md $FLAG

      - name: Upload OFF/ON panels + comparison
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: prob-panel-strong-discriminators
          path: |
            prob_panel_disc_off/
            prob_panel_disc_on/
            compare_disc/
          retention-days: 90

  # ── FS link-threshold sweep diagnostic ────────────────────────────────────
  # Sweeps the FS link threshold (default fixed 0.50) on historical_50k and
  # reports the P/R/F1 curve. Measure-first for threshold calibration: is 0.50
  # badly placed (headroom -> calibration is a lever) or near-optimal (the
  # over-merge is intrinsic to the weights, not the cutoff)? Not a gate.
  threshold-sweep:
    if: ${{ inputs.run_threshold_sweep }}
    runs-on: large-new-64GB
    timeout-minutes: 60
    env:
      GOLDENMATCH_AUTOCONFIG_MEMORY: "0"
      POLARS_SKIP_CPU_CHECK: "1"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install goldenmatch[bench] (pulls splink + duckdb + pyarrow)
        run: pip install -e packages/python/goldenmatch[bench]

      - name: Install recordlinkage (for the febrl3 dataset loader)
        run: pip install recordlinkage

      - name: FS threshold sweep — generalization across datasets
        run: |
          python scripts/bench_er_headtohead/diagnose_threshold_sweep.py \
            --datasets "${{ inputs.compare_datasets || 'historical_50k,febrl3,synthetic_person' }}"

  # ── FS threshold-calibration OFF vs ON lane ───────────────────────────────
  # Runs the panel twice (GOLDENMATCH_FS_CALIBRATE_THRESHOLD 0 vs 1). ON picks the
  # FS link cutoff per-dataset from the training-pair score distribution (Otsu)
  # instead of the fixed 0.50 default. The sweep showed 0.50 badly placed on
  # historical_50k (0.55 -> F1 0.80, +0.048) while clean datasets are flat/
  # forgiving. Must hold historical's gain AND keep febrl3/synthetic ~unchanged.
  # Gates the GOLDENMATCH_FS_CALIBRATE_THRESHOLD default flip.
  panel-threshold-calibration:
    if: ${{ inputs.run_threshold_calibration }}
    runs-on: large-new-64GB
    timeout-minutes: 180
    env:
      GOLDENMATCH_AUTOCONFIG_MEMORY: "0"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install goldenmatch[bench] (pulls splink + duckdb + pyarrow)
        run: pip install -e packages/python/goldenmatch[bench]

      - name: Install recordlinkage (for the febrl3 dataset loader)
        run: pip install recordlinkage

      - name: Fetch DBLP-ACM (Leipzig, best-effort)
        continue-on-error: true
        run: |
          DEST=packages/python/goldenmatch/tests/benchmarks/datasets/DBLP-ACM
          mkdir -p "$DEST"
          if curl -fsSL --retry 3 -o /tmp/dblp-acm.zip https://dbs.uni-leipzig.de/file/DBLP-ACM.zip; then
            mkdir -p /tmp/dblp-acm && unzip -o /tmp/dblp-acm.zip -d /tmp/dblp-acm
            for f in DBLP2.csv ACM.csv DBLP-ACM_perfectMapping.csv; do
              found=$(find /tmp/dblp-acm -name "$f" | head -1)
              if [ -n "$found" ]; then cp "$found" "$DEST/$f"; else echo "::warning::DBLP-ACM file $f not in archive"; fi
            done
          else
            echo "::warning::DBLP-ACM download failed; dblp_acm will be skipped"
          fi

      - name: Run panel — calibration OFF (GOLDENMATCH_FS_CALIBRATE_THRESHOLD=0)
        env:
          GOLDENMATCH_FS_CALIBRATE_THRESHOLD: "0"
        run: |
          python scripts/bench_er_headtohead/run_panel.py \
            --datasets "${{ inputs.compare_datasets || 'historical_50k,dblp_acm,febrl3,synthetic_person' }}" \
            --out-dir prob_panel_cal_off

      - name: Run panel — calibration ON (GOLDENMATCH_FS_CALIBRATE_THRESHOLD=1)
        env:
          GOLDENMATCH_FS_CALIBRATE_THRESHOLD: "1"
        run: |
          python scripts/bench_er_headtohead/run_panel.py \
            --datasets "${{ inputs.compare_datasets || 'historical_50k,dblp_acm,febrl3,synthetic_person' }}" \
            --out-dir prob_panel_cal_on

      - name: Compare OFF vs ON (writes verdict to job summary)
        run: |
          FLAG=""
          if [ "${{ inputs.fail_on_regression }}" = "true" ]; then FLAG="--fail-on-regression"; fi
          python scripts/bench_er_headtohead/compare_panels.py \
            --v1 prob_panel_cal_off/panel.json \
            --v2 prob_panel_cal_on/panel.json \
            --title "FS threshold-calibration OFF vs ON — GoldenMatch probabilistic path" \
            --a-label cal-off --b-label cal-on \
            --out compare_cal/compare.md $FLAG

      - name: Upload OFF/ON panels + comparison
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: prob-panel-threshold-calibration
          path: |
            prob_panel_cal_off/
            prob_panel_cal_on/
            compare_cal/
          retention-days: 90

  # ── 3-engine bake-off lane ────────────────────────────────────────────────
  # Runs scripts/bench_er_headtohead/run_bakeoff.py: gm_zeroconfig +
  # gm_probabilistic + a hand-rolled Splink spec, scored by the SAME evaluator,
  # across 4 datasets (historical_50k, febrl3, synthetic_person, dblp_acm).
  # Engines are subprocesses: gm_zeroconfig + gm_probabilistic run pure-Python
  # (numpy FS), while gm_prob_native runs the native Rust FS kernel
  # (GOLDENMATCH_FS_NATIVE=1) — so this job DOES build the native ext and asserts
  # the score_block_pairs_fs symbol is present before running (a missing kernel
  # would silently fall back to numpy in probabilistic mode and mislabel the
  # native column). Measurement lane only — not a gate. Toggled by the
  # run_bakeoff input; the toggle takes effect once this workflow is on the
  # default branch.
  bake-off:
    if: ${{ inputs.run_bakeoff }}
    runs-on: large-new-64GB
    timeout-minutes: 180
    env:
      GOLDENMATCH_AUTOCONFIG_MEMORY: "0"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install goldenmatch[bench] (pulls splink + duckdb + pyarrow)
        run: pip install -e packages/python/goldenmatch[bench]

      - name: Install recordlinkage (for the febrl3 dataset loader)
        run: pip install recordlinkage

      # DBLP-ACM is gitignored; fetch the Leipzig benchmark best-effort. On any
      # failure the bake-off records dblp_acm as skipped (never fatal), so the
      # lane still measures the other datasets.
      - name: Fetch DBLP-ACM (Leipzig, best-effort)
        continue-on-error: true
        run: |
          DEST=packages/python/goldenmatch/tests/benchmarks/datasets/DBLP-ACM
          mkdir -p "$DEST"
          if curl -fsSL --retry 3 -o /tmp/dblp-acm.zip https://dbs.uni-leipzig.de/file/DBLP-ACM.zip; then
            mkdir -p /tmp/dblp-acm && unzip -o /tmp/dblp-acm.zip -d /tmp/dblp-acm
            for f in DBLP2.csv ACM.csv DBLP-ACM_perfectMapping.csv; do
              found=$(find /tmp/dblp-acm -name "$f" | head -1)
              if [ -n "$found" ]; then cp "$found" "$DEST/$f"; else echo "::warning::DBLP-ACM file $f not in archive"; fi
            done
            ls -la "$DEST"
          else
            echo "::warning::DBLP-ACM download failed; dblp_acm will be skipped in the bake-off"
          fi

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: packages/rust/extensions/native

      - name: Build native ext (for the gm_prob_native FS kernel)
        run: python scripts/build_native.py

      - name: Assert the native FS kernel symbol is present
        run: |
          python - <<'PY'
          from goldenmatch.core._native_loader import native_module
          mod = native_module()
          assert mod is not None, "native ext did not load after build_native.py"
          assert hasattr(mod, "score_block_pairs_fs"), (
              "native ext loaded but score_block_pairs_fs is MISSING -- the "
              "gm_prob_native column would silently fall back to numpy. Rebuild "
              "the crate / bump goldenmatch-native so the FS kernel symbol ships."
          )
          print("OK: score_block_pairs_fs present")
          PY

      - name: Run bake-off
        run: python scripts/bench_er_headtohead/run_bakeoff.py --out-dir bakeoff_out

      - name: Upload bake-off results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: bakeoff
          path: |
            bakeoff_out/bakeoff.md
            bakeoff_out/bakeoff.json
          retention-days: 90
