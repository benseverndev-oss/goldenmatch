# Probabilistic-vs-Splink accuracy panel — workflow_dispatch only.
#
# Runs GoldenMatch's PROBABILISTIC path (auto_configure_probabilistic_df +
# dedupe_df) against Splink across several ER datasets on ONE machine, then
# emits a comparison table (panel.md / panel.json) plus a recall-attribution
# split (blocking_recall vs threshold_loss) for the GoldenMatch side.
#
# Datasets without a Splink settings entry, a missing dataset, or a missing
# dep are recorded as skipped/error rows — never fatal to the panel. ncvr is
# always skipped by design (the raw sample carries no true-entity grouping).
#
# Two jobs (both workflow_dispatch, neither a gate):
#   panel        — single-config panel (current FS auto-config) vs Splink.
#   panel-v1-v2  — runs the panel twice (GOLDENMATCH_FS_AUTOCONFIG_V2 0 vs 1)
#                  and diffs GoldenMatch F1 per dataset; the verdict gates the
#                  v2-default flip. Fetches DBLP-ACM (the one set we can't
#                  measure locally) best-effort from Leipzig.
#
# To run: GitHub -> Actions -> "bench-probabilistic" -> Run workflow.
name: bench-probabilistic

on:
  workflow_dispatch:
    inputs:
      datasets:
        description: "Comma-separated dataset names (single-config panel job)"
        required: false
        default: "historical_50k,dblp_acm,febrl3,ncvr,synthetic_person"
      compare_datasets:
        description: "Datasets for the v1-vs-v2 lane (ncvr excluded: unscoreable)"
        required: false
        default: "historical_50k,dblp_acm,febrl3,synthetic_person"
      fail_on_regression:
        description: "v1-vs-v2 lane: fail the job if v2 regresses any dataset's F1"
        type: boolean
        required: false
        default: false

permissions:
  contents: read

jobs:
  panel:
    runs-on: large-new-64GB
    timeout-minutes: 120
    env:
      GOLDENMATCH_AUTOCONFIG_MEMORY: "0"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Install goldenmatch[bench] (pulls splink + duckdb + pyarrow)
        run: pip install -e packages/python/goldenmatch[bench]

      - name: Install recordlinkage (for the febrl3 dataset loader)
        run: pip install recordlinkage

      - name: Run probabilistic panel
        run: |
          python scripts/bench_er_headtohead/run_panel.py \
            --datasets "${{ inputs.datasets || 'historical_50k,dblp_acm,febrl3,ncvr,synthetic_person' }}" \
            --out-dir prob_panel

      - name: Upload panel artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: prob-panel
          path: prob_panel/
          retention-days: 90

  # ── FS auto-config v1 vs v2 lane ──────────────────────────────────────────
  # Runs the panel twice — GOLDENMATCH_FS_AUTOCONFIG_V2=0 (legacy) and =1 (the
  # curated comparison set + orthogonal blocking) — and diffs GoldenMatch F1 per
  # dataset. This is the gate that clears the levers' default flip: v2 beats
  # Splink on the laptop-measurable PII sets (historical_50k/febrl3/synthetic),
  # but DBLP-ACM (Leipzig CSVs, gitignored) can only be checked here — the
  # low-card fuzzy floor could drop a low-cardinality bibliographic `venue`.
  # The verdict + per-dataset deltas land in the job summary.
  panel-v1-v2:
    runs-on: large-new-64GB
    timeout-minutes: 180
    env:
      GOLDENMATCH_AUTOCONFIG_MEMORY: "0"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Install goldenmatch[bench] (pulls splink + duckdb + pyarrow)
        run: pip install -e packages/python/goldenmatch[bench]

      - name: Install recordlinkage (for the febrl3 dataset loader)
        run: pip install recordlinkage

      # DBLP-ACM is gitignored; fetch the Leipzig benchmark best-effort. On any
      # failure the panel records dblp_acm as skipped (never fatal), so the lane
      # still compares the other datasets.
      - name: Fetch DBLP-ACM (Leipzig, best-effort)
        continue-on-error: true
        run: |
          DEST=packages/python/goldenmatch/tests/benchmarks/datasets/DBLP-ACM
          mkdir -p "$DEST"
          if curl -fsSL --retry 3 -o /tmp/dblp-acm.zip https://dbs.uni-leipzig.de/file/DBLP-ACM.zip; then
            mkdir -p /tmp/dblp-acm && unzip -o /tmp/dblp-acm.zip -d /tmp/dblp-acm
            for f in DBLP2.csv ACM.csv DBLP-ACM_perfectMapping.csv; do
              found=$(find /tmp/dblp-acm -name "$f" | head -1)
              if [ -n "$found" ]; then cp "$found" "$DEST/$f"; else echo "::warning::DBLP-ACM file $f not in archive"; fi
            done
            ls -la "$DEST"
          else
            echo "::warning::DBLP-ACM download failed; dblp_acm will be skipped in the panel"
          fi

      - name: Run panel — v1 (GOLDENMATCH_FS_AUTOCONFIG_V2=0)
        env:
          GOLDENMATCH_FS_AUTOCONFIG_V2: "0"
        run: |
          python scripts/bench_er_headtohead/run_panel.py \
            --datasets "${{ inputs.compare_datasets || 'historical_50k,dblp_acm,febrl3,synthetic_person' }}" \
            --out-dir prob_panel_v1

      - name: Run panel — v2 (GOLDENMATCH_FS_AUTOCONFIG_V2=1)
        env:
          GOLDENMATCH_FS_AUTOCONFIG_V2: "1"
        run: |
          python scripts/bench_er_headtohead/run_panel.py \
            --datasets "${{ inputs.compare_datasets || 'historical_50k,dblp_acm,febrl3,synthetic_person' }}" \
            --out-dir prob_panel_v2

      - name: Compare v1 vs v2 (writes verdict to job summary)
        run: |
          FLAG=""
          if [ "${{ inputs.fail_on_regression }}" = "true" ]; then FLAG="--fail-on-regression"; fi
          python scripts/bench_er_headtohead/compare_panels.py \
            --v1 prob_panel_v1/panel.json \
            --v2 prob_panel_v2/panel.json \
            --out compare/compare.md $FLAG

      - name: Upload v1/v2 panels + comparison
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: prob-panel-v1-v2
          path: |
            prob_panel_v1/
            prob_panel_v2/
            compare/
          retention-days: 90
