# goldengraph (Python pipeline) build signal — SP4b. The `goldengraph` package
# is STANDALONE (excluded from the uv workspace, like goldenmatch-kg): it pulls
# goldenmatch + the goldengraph-native engine wheel (built here via maturin), so
# it is installed + tested on its own lane, NOT in the ci.yml matrix.
#
# Informational lane (NOT ci-required). It is the only real-execution signal for
# the pipeline, so confirm it green before arming auto-merge. Resolution accuracy
# is goldenmatch's concern (+ SP6 eval); these tests verify extraction parsing,
# the resolve->store marshaling (injected resolver), and the goldenmatch-backed
# resolve on exact duplicates.
name: goldengraph-pipeline

on:
  workflow_dispatch:
  push:
    paths:
      - "packages/python/goldengraph/**"
      - "packages/rust/extensions/goldengraph-native/**"
      - "packages/rust/extensions/goldengraph-core/**"
      - "packages/python/goldenmatch/benchmarks/er-kg-bench/erkgbench/qa_e2e/**"
      - "packages/python/goldenmatch/benchmarks/er-kg-bench/tests/test_qa_goldengraph_smoke.py"
      - ".github/workflows/goldengraph-pipeline.yml"

permissions:
  contents: read

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # goldenmatch's ER pipeline (score_buckets / dedupe) allocates through pyarrow's
    # bundled mimalloc on the polars / ThreadPoolExecutor worker threads it spawns;
    # mimalloc's per-thread heap init SIGSEGVs (exit 139, core dumped) on this runner --
    # the same crash the `rust` lane hit, whose #1627 fix note anticipated other
    # pyarrow-invoking lanes needing it too (see packages/rust/extensions/CLAUDE.md).
    # Force pyarrow onto the system memory pool (the documented Arrow remedy) for every
    # gate that runs goldenmatch's pipeline.
    env:
      ARROW_DEFAULT_MEMORY_POOL: system
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Install goldenmatch + build/install the goldengraph-native engine wheel
        run: |
          python -m pip install --upgrade pip maturin pytest
          # Install goldenmatch from MONOREPO SOURCE, not PyPI. goldengraph's
          # zero-config resolve runs goldenmatch's arrow-native FS path, whose
          # polars-free blocking spine (blocker.py's `to_frame(native)` branch,
          # the "blocking-spine eviction for zero-config") the last PyPI release
          # predates -- against a stale published goldenmatch the polars-free
          # resolve hard-fails at `pl.from_arrow`. Source keeps the lane honest
          # for the CURRENT monorepo state and stays polars-free (base install,
          # no [polars] extra -- goldengraph is Arrow-native by design).
          python -m pip install -e packages/python/goldenmatch
          maturin build --release \
            -m packages/rust/extensions/goldengraph-native/Cargo.toml --out dist
          python -m pip install dist/*.whl
      - name: Install goldengraph (standalone) + run the pipeline tests
        run: |
          python -m pip install --no-deps -e packages/python/goldengraph
          python -m pytest packages/python/goldengraph/tests -q

      - name: QA-e2e goldengraph smoke (real PyStore, stub LLM/embedder/resolver)
        # The GraphRAG evidence harness (#1) adapter exercised end-to-end against the
        # real native engine -- no network, no goldenmatch dedupe. importorskip's
        # goldengraph_native, so it only runs where the wheel built (here).
        working-directory: packages/python/goldenmatch/benchmarks/er-kg-bench
        env:
          POLARS_SKIP_CPU_CHECK: "1"
        run: python -m pytest tests/test_qa_goldengraph_smoke.py -v

      - name: ER-quality ablation gate (deterministic, key-free, builds bridge-recall)
        # The (ER_accuracy)^hops thesis at the retrieval layer: build the store per
        # resolution dial from gold triples (no LLM extraction), measure bridge-recall
        # by hop. Gates HARD on monotonic decay + a widening oracle-none gap;
        # goldengraph>=name_only is a soft WARN (offline fuzzy only separates on
        # string-close variants). No API key, no network.
        working-directory: packages/python/goldenmatch/benchmarks/er-kg-bench
        env:
          POLARS_SKIP_CPU_CHECK: "1"
        run: |
          python -m pytest tests/test_qa_ablation.py -v
          python -m erkgbench.qa_e2e.run_ablation \
            --seed 7 --n-questions 80 --ambiguity 0.6 --out-md ABLATION.md

      - name: Upload ABLATION.md
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: goldengraph-er-ablation
          path: packages/python/goldenmatch/benchmarks/er-kg-bench/ABLATION.md
          if-no-files-found: ignore

      - name: Aggregation capability gate (deterministic, key-free)
        # The first capability RAG structurally can't do: set/count aggregation.
        # goldengraph exact traversal is size-invariant; a passage-window floor's
        # recall collapses as the set outgrows passage_k. Gates HARD on size-invariant
        # goldengraph set-F1 + floor collapse + a WIDENING gap with set size. No key.
        working-directory: packages/python/goldenmatch/benchmarks/er-kg-bench
        env:
          POLARS_SKIP_CPU_CHECK: "1"
        run: |
          python -m pytest tests/test_qa_aggregation_traversal.py -v
          python -m erkgbench.qa_e2e.run_aggregation \
            --seed 7 --n-anchors 60 --ambiguity 0.6 --passage-k 10 --out-md AGGREGATION.md

      - name: Upload AGGREGATION.md
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: goldengraph-aggregation
          path: packages/python/goldenmatch/benchmarks/er-kg-bench/AGGREGATION.md
          if-no-files-found: ignore

      - name: Real-world aggregation -- oracle vs real ER (Phase 1.5, key-free)
        # Non-oracle aggregation on the committed Wikidata fixture: the store must cluster
        # the alias variants ITSELF via goldenmatch's real resolver, so GG set-F1 folds in
        # ER quality on top of traversal. Runs the wheel-gated TINY unit tests (real km
        # clusters variants; real merge -> one node -> full recovery; imperfect ER dips GG
        # below oracle; oracle default byte-identical), then a small bucket-balanced E2E
        # over v1 that writes the oracle-vs-real delta + anchor-fragmentation evidence.
        working-directory: packages/python/goldenmatch/benchmarks/er-kg-bench
        env:
          POLARS_SKIP_CPU_CHECK: "1"
        run: |
          python -m pytest tests/test_realworld_aggregation.py -v
          python scripts/run_realworld_phase15_e2e.py \
            --anchors-per-bucket 8 --out-md RESULTS_REALWORLD_AGGREGATION.md
          # Phase 2: the COMPOUNDED win -- co-occurrence corpus + ER-blind floor. goldengraph's
          # real dedup beats a naive RAG's alias over-counting on the COUNT query.
          python scripts/run_realworld_phase2_e2e.py \
            --anchors-per-bucket 8 --out-md RESULTS_REALWORLD_COOCCURRENCE.md

      - name: Upload RESULTS_REALWORLD_AGGREGATION.md
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: goldengraph-realworld-aggregation
          path: packages/python/goldenmatch/benchmarks/er-kg-bench/RESULTS_REALWORLD_AGGREGATION.md
          if-no-files-found: ignore

      - name: Upload RESULTS_REALWORLD_COOCCURRENCE.md
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: goldengraph-realworld-cooccurrence
          path: packages/python/goldenmatch/benchmarks/er-kg-bench/RESULTS_REALWORLD_COOCCURRENCE.md
          if-no-files-found: ignore

      - name: Temporal as_of capability gate (deterministic, key-free)
        # The second capability RAG structurally can't do: as-of a PAST date after a
        # correction. goldengraph store.as_of(D) returns the edge true at D; a
        # temporal-blind floor returns the latest -> wrong on past. Runs the valid_to
        # round-trip + as_of e2e first, then gates HARD on gg accuracy in both regimes
        # + gg >> floor on PAST queries. No key.
        working-directory: packages/python/goldenmatch/benchmarks/er-kg-bench
        env:
          POLARS_SKIP_CPU_CHECK: "1"
        run: |
          python -m pytest tests/test_qa_temporal_store.py -v
          python -m erkgbench.qa_e2e.run_temporal \
            --seed 7 --n-facts 40 --ambiguity 0.6 --out-md TEMPORAL.md

      - name: Upload TEMPORAL.md
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: goldengraph-temporal
          path: packages/python/goldenmatch/benchmarks/er-kg-bench/TEMPORAL.md
          if-no-files-found: ignore

      - name: KG-vs-KG capability scorecard gate (deterministic, key-free)
        # Slice D: does each KG framework's documented ER strategy (as a record_key dial) cost it
        # on the capabilities goldengraph wins? Runs oracle/goldengraph-fuzzy/exact-match/none
        # through bridge-recall + aggregation set-F1. Gates HARD on goldengraph beating the
        # exact-match tier (LightRAG/MS-GraphRAG) by a frozen margin on every metric. No key.
        working-directory: packages/python/goldenmatch/benchmarks/er-kg-bench
        env:
          POLARS_SKIP_CPU_CHECK: "1"
        run: |
          python -m pytest tests/test_qa_kg_scorecard.py -v
          python -m erkgbench.qa_e2e.run_kg_scorecard \
            --seed 7 --n-questions 80 --n-anchors 60 --ambiguity 0.6 --out-md KG_SCORECARD.md

      - name: Upload KG_SCORECARD.md
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: goldengraph-kg-scorecard
          path: packages/python/goldenmatch/benchmarks/er-kg-bench/KG_SCORECARD.md
          if-no-files-found: ignore

      - name: Query-router gate (deterministic, key-free)
        # Slice 1 of the KG/RAG router: classify_query routes B1 list-questions to the aggregate
        # lever; the engine-native aggregate_members returns the exact set (name space, amb=0.0).
        # Gates HARD on classifier recall + slot accuracy + routed set-F1. No key.
        working-directory: packages/python/goldenmatch/benchmarks/er-kg-bench
        env:
          POLARS_SKIP_CPU_CHECK: "1"
        run: |
          python -m pytest tests/test_qa_router.py -v
          python -m erkgbench.qa_e2e.run_router_eval --seed 7 --n-anchors 60 --out-md ROUTER.md

      - name: Upload ROUTER.md
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: goldengraph-router
          path: packages/python/goldenmatch/benchmarks/er-kg-bench/ROUTER.md
          if-no-files-found: ignore

      - name: Unified planner gate (deterministic, key-free)
        # Slice 4a meta-kernel JOIN: a query workload's capability demand picks the ER resolution
        # tier (capability -> FUZZY, lookup -> EXACT), and slice-D's measured kg_scorecard proves
        # FUZZY beats EXACT on the workload's capability. Gates HARD on routing + the measured deltas.
        working-directory: packages/python/goldenmatch/benchmarks/er-kg-bench
        env:
          POLARS_SKIP_CPU_CHECK: "1"
        run: |
          python -m pytest tests/test_qa_unified.py -v
          python -m erkgbench.qa_e2e.run_unified_eval \
            --seed 7 --n-anchors 60 --n-facts 40 --n-questions 80 --out-md UNIFIED.md

      - name: Upload UNIFIED.md
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: goldengraph-unified
          path: packages/python/goldenmatch/benchmarks/er-kg-bench/UNIFIED.md
          if-no-files-found: ignore

      - name: Tier-resolver gate (deterministic, key-free)
        # Slice 4b: 4a's UnifiedPlan made EXECUTABLE -- resolution_tier -> the resolver ingest uses.
        # Proves the tiers resolve differently: FUZZY merges variant surfaces EXACT cannot (same-
        # concept distinct-surface merge recall on the engineered universe; FUZZY 0.467 vs EXACT 0.0).
        # Needs goldenmatch (dedupe_df). Gates HARD on FUZZY - EXACT >= MARGIN.
        working-directory: packages/python/goldenmatch/benchmarks/er-kg-bench
        env:
          POLARS_SKIP_CPU_CHECK: "1"
        run: |
          python -m pytest tests/test_qa_tier.py -v
          python -m erkgbench.qa_e2e.run_tier_eval --out-md TIER.md

      - name: Upload TIER.md
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: goldengraph-tier
          path: packages/python/goldenmatch/benchmarks/er-kg-bench/TIER.md
          if-no-files-found: ignore

      - name: Unified entry-point gate (deterministic, key-free)
        # Slice 4c (program close): the GoldenGraph facade end-to-end -- profile workload ->
        # tier-resolver build -> auto answer, ONE budget across build+ask, ER scale plan surfaced.
        # Gates HARD on routing (FUZZY + aggregate set-F1) + budget-sharing + the plan scaling with
        # corpus size. Needs goldenmatch + the native wheel.
        working-directory: packages/python/goldenmatch/benchmarks/er-kg-bench
        env:
          POLARS_SKIP_CPU_CHECK: "1"
        run: |
          python -m pytest tests/test_qa_unified_entry.py -v
          python -m erkgbench.qa_e2e.run_unified_entry_eval --seed 7 --n-anchors 60 --out-md UNIFIED_ENTRY.md

      - name: Upload UNIFIED_ENTRY.md
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: goldengraph-unified-entry
          path: packages/python/goldenmatch/benchmarks/er-kg-bench/UNIFIED_ENTRY.md
          if-no-files-found: ignore

      - name: Crossover capability gate (deterministic, key-free)
        # Slice C: where (if anywhere) the KG overtakes passage-RAG under retrieval
        # starvation. graph reachability is passage_k-invariant; a lexical passage floor
        # decays as passage_k shrinks. Gates HARD on graph-flat + RAG-monotone +
        # RAG-starts-high + a measurement-frozen crossover cell. No key.
        working-directory: packages/python/goldenmatch/benchmarks/er-kg-bench
        env:
          POLARS_SKIP_CPU_CHECK: "1"
        run: |
          python -m pytest tests/test_qa_crossover.py -v
          python -m erkgbench.qa_e2e.run_crossover \
            --seed 7 --n-questions 80 --out-md CROSSOVER.md

      - name: Upload CROSSOVER.md
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: goldengraph-crossover
          path: packages/python/goldenmatch/benchmarks/er-kg-bench/CROSSOVER.md
          if-no-files-found: ignore
