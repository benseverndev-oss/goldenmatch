# goldengraph (Python pipeline) build signal — SP4b. The `goldengraph` package
# is STANDALONE (excluded from the uv workspace, like goldenmatch-kg): it pulls
# goldenmatch + the goldengraph-native engine wheel (built here via maturin), so
# it is installed + tested on its own lane, NOT in the ci.yml matrix.
#
# Informational lane (NOT ci-required). It is the only real-execution signal for
# the pipeline, so confirm it green before arming auto-merge. Resolution accuracy
# is goldenmatch's concern (+ SP6 eval); these tests verify extraction parsing,
# the resolve->store marshaling (injected resolver), and the goldenmatch-backed
# resolve on exact duplicates.
name: goldengraph-pipeline

on:
  workflow_dispatch:
  push:
    paths:
      - "packages/python/goldengraph/**"
      - "packages/rust/extensions/goldengraph-native/**"
      - "packages/rust/extensions/goldengraph-core/**"
      - "packages/python/goldenmatch/benchmarks/er-kg-bench/erkgbench/qa_e2e/**"
      - "packages/python/goldenmatch/benchmarks/er-kg-bench/tests/test_qa_goldengraph_smoke.py"
      - ".github/workflows/goldengraph-pipeline.yml"

permissions:
  contents: read

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Install goldenmatch + build/install the goldengraph-native engine wheel
        run: |
          python -m pip install --upgrade pip maturin pytest goldenmatch
          maturin build --release \
            -m packages/rust/extensions/goldengraph-native/Cargo.toml --out dist
          python -m pip install dist/*.whl
      - name: Install goldengraph (standalone) + run the pipeline tests
        run: |
          python -m pip install --no-deps -e packages/python/goldengraph
          python -m pytest packages/python/goldengraph/tests -q

      - name: QA-e2e goldengraph smoke (real PyStore, stub LLM/embedder/resolver)
        # The GraphRAG evidence harness (#1) adapter exercised end-to-end against the
        # real native engine -- no network, no goldenmatch dedupe. importorskip's
        # goldengraph_native, so it only runs where the wheel built (here).
        working-directory: packages/python/goldenmatch/benchmarks/er-kg-bench
        env:
          POLARS_SKIP_CPU_CHECK: "1"
        run: python -m pytest tests/test_qa_goldengraph_smoke.py -v

      - name: ER-quality ablation gate (deterministic, key-free, builds bridge-recall)
        # The (ER_accuracy)^hops thesis at the retrieval layer: build the store per
        # resolution dial from gold triples (no LLM extraction), measure bridge-recall
        # by hop. Gates HARD on monotonic decay + a widening oracle-none gap;
        # goldengraph>=name_only is a soft WARN (offline fuzzy only separates on
        # string-close variants). No API key, no network.
        working-directory: packages/python/goldenmatch/benchmarks/er-kg-bench
        env:
          POLARS_SKIP_CPU_CHECK: "1"
        run: |
          python -m pytest tests/test_qa_ablation.py -v
          python -m erkgbench.qa_e2e.run_ablation \
            --seed 7 --n-questions 80 --ambiguity 0.6 --out-md ABLATION.md

      - name: Upload ABLATION.md
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: goldengraph-er-ablation
          path: packages/python/goldenmatch/benchmarks/er-kg-bench/ABLATION.md
          if-no-files-found: ignore

      - name: Aggregation capability gate (deterministic, key-free)
        # The first capability RAG structurally can't do: set/count aggregation.
        # goldengraph exact traversal is size-invariant; a passage-window floor's
        # recall collapses as the set outgrows passage_k. Gates HARD on size-invariant
        # goldengraph set-F1 + floor collapse + a WIDENING gap with set size. No key.
        working-directory: packages/python/goldenmatch/benchmarks/er-kg-bench
        env:
          POLARS_SKIP_CPU_CHECK: "1"
        run: |
          python -m pytest tests/test_qa_aggregation_traversal.py -v
          python -m erkgbench.qa_e2e.run_aggregation \
            --seed 7 --n-anchors 60 --ambiguity 0.6 --passage-k 10 --out-md AGGREGATION.md

      - name: Upload AGGREGATION.md
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: goldengraph-aggregation
          path: packages/python/goldenmatch/benchmarks/er-kg-bench/AGGREGATION.md
          if-no-files-found: ignore

      - name: Crossover capability gate (deterministic, key-free)
        # Slice C: where (if anywhere) the KG overtakes passage-RAG under retrieval
        # starvation. graph reachability is passage_k-invariant; a lexical passage floor
        # decays as passage_k shrinks. Gates HARD on graph-flat + RAG-monotone +
        # RAG-starts-high + a measurement-frozen crossover cell. No key.
        working-directory: packages/python/goldenmatch/benchmarks/er-kg-bench
        env:
          POLARS_SKIP_CPU_CHECK: "1"
        run: |
          python -m pytest tests/test_qa_crossover.py -v
          python -m erkgbench.qa_e2e.run_crossover \
            --seed 7 --n-questions 80 --out-md CROSSOVER.md

      - name: Upload CROSSOVER.md
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: goldengraph-crossover
          path: packages/python/goldenmatch/benchmarks/er-kg-bench/CROSSOVER.md
          if-no-files-found: ignore
