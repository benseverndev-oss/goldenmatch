name: bench-columnar-drop-pairscores

# Measure-first SP4 bench (workflow_dispatch only). Builds the native ext fresh so
# the columnar gate-ON path hits the real Arrow kernel (confidence/min/avg off
# metadata), then benches build_clusters gate-OFF (dict path) vs gate-ON (columnar,
# pair_scores={}) at scale. Decides whether to flip GOLDENMATCH_COLUMNAR_CLUSTER_BUILD
# default-ON. Parity (byte-identical except pair_scores) is asserted before any perf.
on:
  workflow_dispatch:
    inputs:
      np:
        description: "Comma-separated target pair counts"
        default: "1000000,5000000"
      runs:
        description: "Repetitions per measurement (median)"
        default: "3"

permissions:
  contents: read

jobs:
  bench:
    runs-on: large-new-64GB
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            **/pyproject.toml
      - run: uv sync --all-packages
      - name: Build native extension (exposes build_clusters_arrow)
        run: uv run python scripts/build_native.py
      - name: Bench columnar drop-pairscores (gate ON vs OFF)
        run: |
          set -o pipefail
          uv run python packages/python/goldenmatch/scripts/bench_columnar_drop_pairscores.py \
            --np "${{ inputs.np }}" --runs "${{ inputs.runs }}" \
            --output .profile_tmp/columnar_drop_pairscores.json | tee /tmp/columnar_drop.txt
          { echo '## bench-columnar-drop-pairscores'; echo '```'; cat /tmp/columnar_drop.txt; echo '```'; } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: columnar-drop-pairscores
          path: .profile_tmp/columnar_drop_pairscores.json
          retention-days: 30
