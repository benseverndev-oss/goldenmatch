name: count-max-vs-last

# Phase-2 parity-relaxation blast-radius measurement (workflow_dispatch only).
# Runs a realistic zero-config dedupe over the realistic_person fixture, captures
# the RAW all_pairs stream + cluster partition via a monkeypatch on
# build_clusters, then quantifies three relaxations:
#   R1  LAST-WINS vs MAX dedup of per-cluster pair_scores.
#   R2  order-free avg_edge epsilon-band near the weak boundary.
#   R3  bottleneck / MST tie-break ambiguity.
# Native is built fresh because the realistic run may use native dedup/build
# paths. Counts are printed to stdout AND appended to $GITHUB_STEP_SUMMARY.
on:
  workflow_dispatch:
    inputs:
      n:
        description: "Comma-separated row counts"
        default: "1000000,5000000"

permissions:
  contents: read

jobs:
  count:
    runs-on: large-new-64GB
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            **/pyproject.toml
      - run: uv sync --all-packages
      - name: Build native extension (realistic run may use native dedup/build)
        run: uv run python scripts/build_native.py
      - name: Count MAX-vs-LAST blast radius (R1/R2/R3)
        run: |
          set -o pipefail
          uv run python packages/python/goldenmatch/scripts/count_max_vs_last.py \
            --n "${{ inputs.n }}" | tee /tmp/count_max_vs_last.txt
          { echo '## count-max-vs-last'; echo '```'; cat /tmp/count_max_vs_last.txt; echo '```'; } >> "$GITHUB_STEP_SUMMARY"
