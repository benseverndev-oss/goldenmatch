# GraphRAG evidence program #1 -- end-to-end multi-hop QA head-to-head.
# Opt-in (workflow_dispatch only): real LLM, hard cost cap. NOT ci-required.
# Each engine x ambiguity is its own budget-capped, independently-timed job (matrix);
# the `aggregate` job merges every run into the RESULTS_QA_E2E.md headline + decay curve.
name: bench-graphrag-qa

on:
  workflow_dispatch:
    inputs:
      corpus:
        description: "engineered | musique"
        default: "engineered"
      max_questions:
        description: "questions to run"
        default: "300"
      ambiguity:
        description: "comma-separated engineered ambiguity sweep (the decay curve)"
        default: "0.0,0.25,0.5,0.75,1.0"
      budget_usd:
        description: "hard cost cap per (engine, ambiguity) run"
        default: "25"
      engine:
        description: "all | goldengraph | lightrag | ms_graphrag | graphiti"
        default: "all"
      trace:
        description: "goldengraph only: localize where each answer is lost (extraction/retrieval/synthesis)"
        default: "false"
      trace_limit:
        description: "goldengraph only: how many questions the localize trace inspects (0 = all; bigger = real SCORING-vs-RECALL shatter distribution)"
        default: "10"
      cross_doc_link:
        description: "goldengraph only: enable cross-document entity linking (merge bridge entities across paragraphs)"
        default: "false"
      link_threshold:
        description: "goldengraph only: embedding cosine cutoff for cross-doc linking (lower = more merging)"
        default: "0.82"
      profile_link:
        description: "goldengraph only: use the goldenprofile anti-shatter engine as the cross-doc matcher (needs cross_doc_link=true)"
        default: "false"
      profile_merge_threshold:
        description: "goldengraph only: goldenprofile merge threshold (engine ScoreConfig default 0.72)"
        default: "0.72"
      build_workers:
        description: "goldengraph only: concurrent per-doc LLM workers at build (rate-limit-bounded; retry/backoff absorbs 429s)"
        # 12, not 8: the N=50 build-debug showed wall/summed-extract ~= 8x at 8
        # workers (near-linear, not saturated), so more concurrency still buys
        # overlap; the adapter's exp-backoff retry absorbs the extra 429 pressure.
        # The library default stays 8 for arbitrary users on tight RPM tiers; this
        # only raises it for the bench account, which tolerates it.
        default: "12"
      build_debug:
        description: "goldengraph only: print the per-sub-step build timing breakdown (extract/resolve/fingerprint/link/append) for hotspot analysis"
        default: "false"
      extractor:
        description: "goldengraph only: document extractor -- api (LLM) | rebel | gliner (in-house local model prototype-eval)"
        default: "api"
      distill_log:
        description: "goldengraph only: capture (text->extraction)+(entity->fingerprint) pairs to a JSONL artifact for in-house distillation"
        default: "false"
      literal_attrs:
        description: "goldengraph only: capture literal attribute values (dates/quantities/amounts) as typed leaf nodes so the graph can answer non-entity questions"
        default: "false"
      judge:
        description: "ALL engines: also score a format-fair LLM-judge answer-equivalence metric (fixed gpt-4o-mini judge) so terse vs verbose answers compare fairly"
        default: "true"

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      ambiguities: ${{ steps.mk.outputs.ambiguities }}
    steps:
      - id: mk
        env:
          AMB: ${{ inputs.ambiguity }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json, os
          vals = [v.strip() for v in os.environ["AMB"].split(",") if v.strip()]
          print("ambiguities=" + json.dumps(vals))
          PY

  goldengraph:
    needs: setup
    if: ${{ inputs.engine == 'all' || inputs.engine == 'goldengraph' }}
    runs-on: large-new-64GB
    # Large-N MuSiQue builds a graph from ~20 docs/question sequentially (per-doc LLM
    # extraction + fingerprint synthesis), so N=200 (~4000 docs) needs hours, not the
    # 60 min that fit the small-N runs. Raised under the hosted 360-min job ceiling.
    timeout-minutes: 330
    strategy:
      fail-fast: false
      matrix:
        ambiguity: ${{ fromJSON(needs.setup.outputs.ambiguities) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Install goldenmatch + native engine wheel + goldengraph + datasets
        run: |
          python -m pip install --upgrade pip maturin pytest goldenmatch datasets openai
          maturin build --release \
            -m packages/rust/extensions/goldengraph-native/Cargo.toml --out dist
          # goldenprofile-native: the anti-shatter cross-doc matcher (GOLDENGRAPH_PROFILE_LINK)
          maturin build --release \
            -m packages/rust/extensions/goldenprofile-native/Cargo.toml --out dist
          python -m pip install dist/*.whl
          python -m pip install --no-deps -e packages/python/goldengraph
          # In-house local-extractor prototype-eval deps (only when selected).
          if [ "${{ inputs.extractor }}" != "api" ]; then
            python -m pip install transformers torch
            if [ "${{ inputs.extractor }}" = "gliner" ]; then python -m pip install gliner; fi
          fi
      - name: Run goldengraph end-to-end (real LLM, budget-capped)
        working-directory: packages/python/goldenmatch/benchmarks/er-kg-bench
        env:
          OPENAI_API_KEY: ${{ secrets.GOLDENGRAPH_OPENAI_API_KEY }}
          POLARS_SKIP_CPU_CHECK: "1"
          GOLDENGRAPH_QA_TRACE: ${{ inputs.trace }}
          GOLDENGRAPH_QA_TRACE_LIMIT: ${{ inputs.trace_limit }}
          GOLDENGRAPH_CROSS_DOC_LINK: ${{ inputs.cross_doc_link }}
          GOLDENGRAPH_LINK_THRESHOLD: ${{ inputs.link_threshold }}
          GOLDENGRAPH_PROFILE_LINK: ${{ inputs.profile_link }}
          GOLDENGRAPH_PROFILE_MERGE_THRESHOLD: ${{ inputs.profile_merge_threshold }}
          GOLDENGRAPH_BUILD_WORKERS: ${{ inputs.build_workers }}
          GOLDENGRAPH_BUILD_DEBUG: ${{ inputs.build_debug }}
          GOLDENGRAPH_EXTRACTOR: ${{ inputs.extractor }}
          GOLDENGRAPH_LITERAL_ATTRS: ${{ inputs.literal_attrs }}
          GOLDENGRAPH_DISTILL_LOG: ${{ inputs.distill_log == 'true' && format('results/distill_goldengraph_amb{0}.jsonl', matrix.ambiguity) || '' }}
        run: |
          mkdir -p results
          python -m erkgbench.qa_e2e.run_qa_e2e \
            --engine goldengraph \
            --corpus "${{ inputs.corpus }}" \
            --max-questions "${{ inputs.max_questions }}" \
            --ambiguity "${{ matrix.ambiguity }}" \
            --budget-usd "${{ inputs.budget_usd }}" \
            ${{ inputs.judge == 'true' && '--judge' || '' }} \
            --out-md "results/RESULTS_QA_E2E_goldengraph_amb${{ matrix.ambiguity }}.md" \
            --out-json "results/results_qa_e2e_goldengraph_amb${{ matrix.ambiguity }}.json"
      - name: Upload results
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: graphrag-qa-results-goldengraph-amb${{ matrix.ambiguity }}
          path: packages/python/goldenmatch/benchmarks/er-kg-bench/results/results_qa_e2e_goldengraph_amb${{ matrix.ambiguity }}*.*
          if-no-files-found: ignore
      - name: Upload distillation pairs
        if: ${{ always() && inputs.distill_log == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: graphrag-distill-goldengraph-amb${{ matrix.ambiguity }}
          path: packages/python/goldenmatch/benchmarks/er-kg-bench/results/distill_goldengraph_amb${{ matrix.ambiguity }}.jsonl
          if-no-files-found: ignore

  lightrag:
    needs: setup
    if: ${{ inputs.engine == 'all' || inputs.engine == 'lightrag' }}
    runs-on: large-new-64GB
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        ambiguity: ${{ fromJSON(needs.setup.outputs.ambiguities) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Install lightrag + goldenmatch + datasets (isolated)
        run: python -m pip install --upgrade pip pytest numpy "lightrag-hku" goldenmatch datasets openai
      - name: Run LightRAG end-to-end (real LLM, budget-capped)
        working-directory: packages/python/goldenmatch/benchmarks/er-kg-bench
        env:
          OPENAI_API_KEY: ${{ secrets.GOLDENGRAPH_OPENAI_API_KEY }}
          POLARS_SKIP_CPU_CHECK: "1"
        run: |
          python -m erkgbench.qa_e2e.run_qa_e2e \
            --engine lightrag \
            --corpus "${{ inputs.corpus }}" \
            --max-questions "${{ inputs.max_questions }}" \
            --ambiguity "${{ matrix.ambiguity }}" \
            --budget-usd "${{ inputs.budget_usd }}" \
            ${{ inputs.judge == 'true' && '--judge' || '' }} \
            --out-md "results/RESULTS_QA_E2E_lightrag_amb${{ matrix.ambiguity }}.md" \
            --out-json "results/results_qa_e2e_lightrag_amb${{ matrix.ambiguity }}.json"
      - name: Upload results
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: graphrag-qa-results-lightrag-amb${{ matrix.ambiguity }}
          path: packages/python/goldenmatch/benchmarks/er-kg-bench/results/results_qa_e2e_lightrag_amb${{ matrix.ambiguity }}*.*
          if-no-files-found: ignore

  ms_graphrag:
    needs: setup
    if: ${{ inputs.engine == 'all' || inputs.engine == 'ms_graphrag' }}
    runs-on: large-new-64GB
    timeout-minutes: 90  # MS-GraphRAG indexing is the long pole
    strategy:
      fail-fast: false
      matrix:
        ambiguity: ${{ fromJSON(needs.setup.outputs.ambiguities) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Install graphrag + goldenmatch + datasets (isolated)
        run: python -m pip install --upgrade pip pytest numpy pandas pyarrow "graphrag==3.1.0" goldenmatch datasets openai
      - name: Run MS-GraphRAG end-to-end (real LLM, budget-capped)
        working-directory: packages/python/goldenmatch/benchmarks/er-kg-bench
        env:
          OPENAI_API_KEY: ${{ secrets.GOLDENGRAPH_OPENAI_API_KEY }}
          GRAPHRAG_API_KEY: ${{ secrets.GOLDENGRAPH_OPENAI_API_KEY }}
          POLARS_SKIP_CPU_CHECK: "1"
        run: |
          python -m erkgbench.qa_e2e.run_qa_e2e \
            --engine ms_graphrag \
            --corpus "${{ inputs.corpus }}" \
            --max-questions "${{ inputs.max_questions }}" \
            --ambiguity "${{ matrix.ambiguity }}" \
            --budget-usd "${{ inputs.budget_usd }}" \
            ${{ inputs.judge == 'true' && '--judge' || '' }} \
            --out-md "results/RESULTS_QA_E2E_ms_graphrag_amb${{ matrix.ambiguity }}.md" \
            --out-json "results/results_qa_e2e_ms_graphrag_amb${{ matrix.ambiguity }}.json"
      - name: Upload results
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: graphrag-qa-results-ms_graphrag-amb${{ matrix.ambiguity }}
          path: packages/python/goldenmatch/benchmarks/er-kg-bench/results/results_qa_e2e_ms_graphrag_amb${{ matrix.ambiguity }}*.*
          if-no-files-found: ignore

  graphiti:
    needs: setup
    if: ${{ inputs.engine == 'all' || inputs.engine == 'graphiti' }}
    runs-on: large-new-64GB
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        ambiguity: ${{ fromJSON(needs.setup.outputs.ambiguities) }}
    services:
      falkordb:
        image: falkordb/falkordb:latest
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Install graphiti-core + goldenmatch + datasets + openai (isolated)
        run: python -m pip install --upgrade pip pytest numpy "graphiti-core[falkordb]" goldenmatch datasets openai
      - name: Run Graphiti end-to-end (real LLM + FalkorDB, budget-capped)
        working-directory: packages/python/goldenmatch/benchmarks/er-kg-bench
        env:
          OPENAI_API_KEY: ${{ secrets.GOLDENGRAPH_OPENAI_API_KEY }}
          FALKORDB_HOST: localhost
          FALKORDB_PORT: "6379"
          POLARS_SKIP_CPU_CHECK: "1"
        run: |
          python -m erkgbench.qa_e2e.run_qa_e2e \
            --engine graphiti \
            --corpus "${{ inputs.corpus }}" \
            --max-questions "${{ inputs.max_questions }}" \
            --ambiguity "${{ matrix.ambiguity }}" \
            --budget-usd "${{ inputs.budget_usd }}" \
            ${{ inputs.judge == 'true' && '--judge' || '' }} \
            --out-md "results/RESULTS_QA_E2E_graphiti_amb${{ matrix.ambiguity }}.md" \
            --out-json "results/results_qa_e2e_graphiti_amb${{ matrix.ambiguity }}.json"
      - name: Upload results
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: graphrag-qa-results-graphiti-amb${{ matrix.ambiguity }}
          path: packages/python/goldenmatch/benchmarks/er-kg-bench/results/results_qa_e2e_graphiti_amb${{ matrix.ambiguity }}*.*
          if-no-files-found: ignore

  aggregate:
    needs: [goldengraph, lightrag, ms_graphrag, graphiti]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Download every engine x ambiguity result
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          pattern: graphrag-qa-results-*
          path: dl
          merge-multiple: true
      - name: Aggregate into the RESULTS_QA_E2E headline + decay curve
        working-directory: packages/python/goldenmatch/benchmarks/er-kg-bench
        run: |
          mkdir -p results
          find "$GITHUB_WORKSPACE/dl" -name 'results_qa_e2e_*.json' -exec cp {} results/ \; || true
          if ls results/results_qa_e2e_*.json >/dev/null 2>&1; then
            python -m erkgbench.qa_e2e.aggregate_qa_e2e \
              --results-dir results --out results/RESULTS_QA_E2E.md
            echo "----- RESULTS_QA_E2E.md -----"
            cat results/RESULTS_QA_E2E.md
          else
            echo "::warning::no result JSONs to aggregate (all engine jobs skipped or failed)"
          fi
      - name: Upload aggregated headline
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: graphrag-qa-results-AGGREGATE
          path: packages/python/goldenmatch/benchmarks/er-kg-bench/results/RESULTS_QA_E2E.md
          if-no-files-found: ignore
