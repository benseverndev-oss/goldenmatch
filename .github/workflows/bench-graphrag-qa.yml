# GraphRAG evidence program #1 -- end-to-end multi-hop QA head-to-head.
# Opt-in (workflow_dispatch only): real LLM, hard cost cap. NOT ci-required.
# Each engine x ambiguity is its own budget-capped, independently-timed job (matrix);
# the `aggregate` job merges every run into the RESULTS_QA_E2E.md headline + decay curve.
#
# INPUT BUDGET: GitHub caps workflow_dispatch at 10 inputs. The many per-engine tuning
# knobs are consolidated into one `opts` passthrough (newline KEY=VALUE -> env), and the
# run-mode toggles into one `mode` enum, to stay under the cap. See `opts` below for keys.
name: bench-graphrag-qa

on:
  workflow_dispatch:
    inputs:
      corpus:
        description: "engineered | musique | hotpotqa | 2wikimultihop (the last three fetch a seeded Hub subset on demand; set max_questions for the headline N)"
        default: "engineered"
      max_questions:
        description: "questions to run (use a SMALL value ~12 for a local_llm run -- CPU inference is slow)"
        default: "300"
      ambiguity:
        description: "comma-separated engineered ambiguity sweep (the decay curve)"
        default: "0.0,0.25,0.5,0.75,1.0"
      engine:
        description: "all | goldengraph | lightrag | ms_graphrag | graphiti | text_rag | goldenmatch_rag | goldenmatch_entity_rag (head_to_head mode only)"
        default: "all"
      mode:
        description: "head_to_head | local_vs_auto_ab | env_ab | scorecard | aggregation_llm | temporal_llm | crossover_llm | kg_capability | router_capability | extraction_f1 | synthesis_gold | retrieval_coverage"
        default: "head_to_head"
      budget_usd:
        description: "hard cost cap per (engine, ambiguity) run"
        default: "25"
      judge:
        description: "also score a format-fair LLM-judge answer-equivalence metric (fixed gpt-4o-mini judge)"
        default: "true"
      local_llm:
        description: "goldengraph: run against a LOCAL Ollama OSS chat model (e.g. qwen2.5:7b-instruct). EMPTY = use the OpenAI API. No key needed; non-gating. Embed model via opts LOCAL_EMBED_MODEL (default nomic-embed-text)."
        default: ""
      opts:
        description: "newline KEY=VALUE passthrough -> env (overrides the baked bench defaults). Keys: GOLDENGRAPH_QA_MODE(local|hybrid) GOLDENGRAPH_HYBRID_FILTER(none|path) GOLDENGRAPH_QA_PASSAGE_K GOLDENGRAPH_QA_RETRIEVAL_HOPS GOLDENGRAPH_QA_NODE_BUDGET GOLDENGRAPH_CROSS_DOC_LINK GOLDENGRAPH_LINK_THRESHOLD GOLDENGRAPH_PROFILE_LINK GOLDENGRAPH_PROFILE_MERGE_THRESHOLD GOLDENGRAPH_BUILD_WORKERS GOLDENGRAPH_BUILD_DEBUG GOLDENGRAPH_EXTRACTOR(api|rebel|gliner) GOLDENGRAPH_LITERAL_ATTRS GOLDENGRAPH_QA_TRACE GOLDENGRAPH_QA_TRACE_LIMIT GOLDENGRAPH_DISTILL_LOG(1) TEXT_RAG_TOP_K GOLDENMATCH_RAG_TOP_K SCORECARD_BUDGET_USD LOCAL_EMBED_MODEL"
        default: ""
      ab_env:
        description: "env_ab mode ONLY: the answer-time env var + values to A/B on ONE shared graph, as NAME:v1,v2[,..]. e.g. GOLDENGRAPH_SYNTH_SAMPLES:1,5 measures self-consistency voting free of build variance."
        default: "GOLDENGRAPH_SYNTH_SAMPLES:1,5"

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      ambiguities: ${{ steps.mk.outputs.ambiguities }}
    steps:
      - id: mk
        env:
          AMB: ${{ inputs.ambiguity }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json, os
          vals = [v.strip() for v in os.environ["AMB"].split(",") if v.strip()]
          print("ambiguities=" + json.dumps(vals))
          PY

  goldengraph:
    needs: setup
    if: ${{ inputs.mode == 'head_to_head' && (inputs.engine == 'all' || inputs.engine == 'goldengraph') }}
    runs-on: large-new-64GB
    # Large-N MuSiQue builds a graph from ~20 docs/question sequentially (per-doc LLM
    # extraction + fingerprint synthesis), so N=200 (~4000 docs) needs hours, not the
    # 60 min that fit the small-N runs. Raised under the hosted 360-min job ceiling.
    timeout-minutes: 330
    strategy:
      fail-fast: false
      matrix:
        ambiguity: ${{ fromJSON(needs.setup.outputs.ambiguities) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Resolve bench env (baked defaults, then opts override)
        # opts lines are appended AFTER the defaults, so a duplicate KEY in opts wins
        # (GITHUB_ENV = last assignment wins). Only well-formed KEY=VALUE lines pass.
        env:
          OPTS: ${{ inputs.opts }}
        run: |
          {
            echo "GOLDENGRAPH_BUILD_WORKERS=12"
            echo "GOLDENGRAPH_QA_TRACE_LIMIT=10"
            echo "GOLDENGRAPH_LINK_THRESHOLD=0.82"
            echo "GOLDENGRAPH_PROFILE_MERGE_THRESHOLD=0.72"
            echo "GOLDENGRAPH_QA_RETRIEVAL_HOPS=6"
            echo "GOLDENGRAPH_QA_NODE_BUDGET=256"
            echo "GOLDENGRAPH_QA_MODE=hybrid"
            echo "GOLDENGRAPH_QA_PASSAGE_K=10"
            echo "GOLDENGRAPH_HYBRID_FILTER=none"
            echo "GOLDENGRAPH_EXTRACTOR=api"
            echo "TEXT_RAG_TOP_K=10"
            echo "GOLDENMATCH_RAG_TOP_K=10"
            echo "SCORECARD_BUDGET_USD=2"
            echo "LOCAL_EMBED_MODEL=nomic-embed-text"
            printf '%s\n' "$OPTS"
          } | grep -E '^[A-Za-z_][A-Za-z0-9_]*=' >> "$GITHUB_ENV"
      # Persist the prompt-hash LLM extraction cache across runs (goldengraph engine
      # only). The dominant build cost is per-document extraction LLM calls (~50 min
      # at N=150); the cache (GOLDENGRAPH_LLM_CACHE) is a small JSON-lines file keyed
      # by the EXACT prompt+model, so re-running the SAME corpus skips those calls.
      # Scoped by corpus + extraction model (+ ambiguity for matrix hygiene); the
      # per-run key suffix + restore-keys prefix restore an older/partial cache and
      # top it up. Prompt-hash keying is self-invalidating (a prompt change misses
      # and repopulates), so no code SHA is needed in the key.
      - name: Restore/save the goldengraph extraction LLM cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ${{ github.workspace }}/.gg_llm_cache
          key: gg-llmcache-${{ inputs.corpus }}-${{ inputs.local_llm != '' && inputs.local_llm || 'api' }}-amb${{ matrix.ambiguity }}-${{ github.run_id }}
          restore-keys: |
            gg-llmcache-${{ inputs.corpus }}-${{ inputs.local_llm != '' && inputs.local_llm || 'api' }}-amb${{ matrix.ambiguity }}-
            gg-llmcache-${{ inputs.corpus }}-${{ inputs.local_llm != '' && inputs.local_llm || 'api' }}-
      - name: Install goldenmatch + native engine wheel + goldengraph + datasets
        run: |
          python -m pip install --upgrade pip maturin pytest goldenmatch datasets openai polars
          maturin build --release \
            -m packages/rust/extensions/goldengraph-native/Cargo.toml --out dist
          # goldenprofile-native: the anti-shatter cross-doc matcher (GOLDENGRAPH_PROFILE_LINK)
          maturin build --release \
            -m packages/rust/extensions/goldenprofile-native/Cargo.toml --out dist
          python -m pip install dist/*.whl
          python -m pip install --no-deps -e packages/python/goldengraph
          # Overlay the REPO goldenmatch (pure-Python) so THIS branch's OPENAI_BASE_URL embedding
          # change is the one that runs -- the PyPI goldenmatch above lacks it, so a local_llm run's
          # embeddings would otherwise hit api.openai.com with the dummy key (401). The native kernel
          # still comes from the goldenmatch-native wheel pulled by the PyPI install.
          python -m pip install --no-deps -e packages/python/goldenmatch
          # In-house local-extractor prototype-eval deps (only when selected via opts).
          if [ "${GOLDENGRAPH_EXTRACTOR:-api}" != "api" ]; then
            python -m pip install transformers torch
            if [ "${GOLDENGRAPH_EXTRACTOR}" = "gliner" ]; then python -m pip install gliner; fi
          fi
      - name: Start local OSS LLM (Ollama)
        # Free, key-free real-LLM path: an OpenAI-compatible server in the runner. The goldengraph
        # OpenAIClient honors OPENAI_BASE_URL automatically; the embedding provider honors it too
        # (this lane's goldenmatch change). Non-gating -- the deterministic gates stay the signal.
        if: ${{ inputs.local_llm != '' }}
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve > ollama.log 2>&1 &
          for i in $(seq 1 30); do curl -sf http://localhost:11434/api/version && break || sleep 2; done
          ollama pull "${{ inputs.local_llm }}"
          ollama pull "$LOCAL_EMBED_MODEL"
      - name: Run goldengraph end-to-end (real LLM, budget-capped)
        working-directory: packages/python/goldenmatch/benchmarks/er-kg-bench
        env:
          # local_llm (non-empty) swaps the OpenAI API for the local Ollama server. Empty strings
          # read as UNSET by the code (or-default), so the non-local path is byte-identical to before.
          OPENAI_API_KEY: ${{ inputs.local_llm != '' && 'ollama' || secrets.GOLDENGRAPH_OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ inputs.local_llm != '' && 'http://localhost:11434/v1' || '' }}
          OPENAI_MODEL: ${{ inputs.local_llm }}
          OPENAI_EMBED_MODEL: ${{ inputs.local_llm != '' && env.LOCAL_EMBED_MODEL || '' }}
          # Points the bench extraction/build client at the actions/cache-persisted dir
          # (restored above). Only the goldengraph engine's BUILD client is cached; the
          # answer-time synth client stays uncached. Absolute path = the same dir the
          # cache step persists.
          GOLDENGRAPH_LLM_CACHE: ${{ github.workspace }}/.gg_llm_cache
          POLARS_SKIP_CPU_CHECK: "1"
        run: |
          mkdir -p results
          # GOLDENGRAPH_DISTILL_LOG=1 in opts -> expand to the per-ambiguity artifact path.
          if [ "${GOLDENGRAPH_DISTILL_LOG:-}" = "1" ] || [ "${GOLDENGRAPH_DISTILL_LOG:-}" = "true" ]; then
            export GOLDENGRAPH_DISTILL_LOG="results/distill_goldengraph_amb${{ matrix.ambiguity }}.jsonl"
          fi
          python -m erkgbench.qa_e2e.run_qa_e2e \
            --engine goldengraph \
            --corpus "${{ inputs.corpus }}" \
            --max-questions "${{ inputs.max_questions }}" \
            --ambiguity "${{ matrix.ambiguity }}" \
            --budget-usd "${{ inputs.budget_usd }}" \
            ${{ inputs.judge == 'true' && '--judge' || '' }} \
            --out-md "results/RESULTS_QA_E2E_goldengraph_amb${{ matrix.ambiguity }}.md" \
            --out-json "results/results_qa_e2e_goldengraph_amb${{ matrix.ambiguity }}.json"
      - name: Upload results
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: graphrag-qa-results-goldengraph-amb${{ matrix.ambiguity }}
          path: packages/python/goldenmatch/benchmarks/er-kg-bench/results/results_qa_e2e_goldengraph_amb${{ matrix.ambiguity }}*.*
          if-no-files-found: ignore
      - name: Upload distillation pairs
        if: ${{ always() && env.GOLDENGRAPH_DISTILL_LOG != '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: graphrag-distill-goldengraph-amb${{ matrix.ambiguity }}
          path: packages/python/goldenmatch/benchmarks/er-kg-bench/results/distill_goldengraph_amb${{ matrix.ambiguity }}.jsonl
          if-no-files-found: ignore

  # Same-run local-vs-auto A/B: ONE shared graph, every question answered under both
  # mode=local (default path, chain routing on) and mode=auto -> the deltas are purely
  # the answer-time routing's effect. The headline for "is chain routing worth making
  # the local default?". Single run (no ambiguity matrix); opts still override env.
  goldengraph_ab:
    needs: setup
    if: ${{ inputs.mode == 'local_vs_auto_ab' }}
    runs-on: large-new-64GB
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Resolve bench env (baked defaults, then opts override)
        env:
          OPTS: ${{ inputs.opts }}
        run: |
          {
            echo "GOLDENGRAPH_BUILD_WORKERS=12"
            echo "GOLDENGRAPH_LINK_THRESHOLD=0.82"
            echo "GOLDENGRAPH_PROFILE_MERGE_THRESHOLD=0.72"
            echo "GOLDENGRAPH_QA_RETRIEVAL_HOPS=6"
            echo "GOLDENGRAPH_QA_NODE_BUDGET=256"
            echo "GOLDENGRAPH_EXTRACTOR=api"
            printf '%s\n' "$OPTS"
          } | grep -E '^[A-Za-z_][A-Za-z0-9_]*=' >> "$GITHUB_ENV"
      - name: Install goldenmatch + native engine wheel + goldengraph + datasets
        run: |
          # polars: the hybrid path's passage retriever (goldenmatch_rag._make_frame)
          # imports it; goldenmatch itself is polars-free, so these A/B jobs install it
          # explicitly for GOLDENGRAPH_QA_MODE=hybrid runs (harmless for local-mode runs).
          python -m pip install --upgrade pip maturin pytest goldenmatch datasets openai polars
          maturin build --release \
            -m packages/rust/extensions/goldengraph-native/Cargo.toml --out dist
          maturin build --release \
            -m packages/rust/extensions/goldenprofile-native/Cargo.toml --out dist
          python -m pip install dist/*.whl
          python -m pip install --no-deps -e packages/python/goldengraph
          python -m pip install --no-deps -e packages/python/goldenmatch
      - name: Run local-vs-auto A/B (real LLM, budget-capped, one shared graph)
        working-directory: packages/python/goldenmatch/benchmarks/er-kg-bench
        env:
          OPENAI_API_KEY: ${{ secrets.GOLDENGRAPH_OPENAI_API_KEY }}
          POLARS_SKIP_CPU_CHECK: "1"
          # datasets pulls a fresh-pip pyarrow whose bundled mimalloc SIGSEGVs on the
          # pipeline's worker threads -- the documented repo standard for any lane that
          # pip-installs goldenmatch/pyarrow and runs the pipeline (goldengraph resolve).
          ARROW_DEFAULT_MEMORY_POOL: system
        run: |
          mkdir -p results
          python -m erkgbench.qa_e2e.run_local_vs_auto_ab \
            --corpus "${{ inputs.corpus }}" \
            --max-questions "${{ inputs.max_questions }}" \
            --ambiguity "0.5" \
            --budget-usd "${{ inputs.budget_usd }}" \
            ${{ inputs.judge == 'true' && '--judge' || '' }} \
            --out-md "results/RESULTS_QA_LOCAL_VS_AUTO_AB.md" \
            --out-json "results/results_qa_local_vs_auto_ab.json"
          echo "### Local-vs-auto A/B" >> "$GITHUB_STEP_SUMMARY"
          cat results/RESULTS_QA_LOCAL_VS_AUTO_AB.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload A/B results
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: graphrag-qa-local-vs-auto-ab
          path: packages/python/goldenmatch/benchmarks/er-kg-bench/results/results_qa_local_vs_auto_ab.*
          if-no-files-found: ignore

  goldengraph_env_ab:
    needs: setup
    if: ${{ inputs.mode == 'env_ab' }}
    runs-on: large-new-64GB
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Resolve bench env (baked defaults, then opts override)
        env:
          OPTS: ${{ inputs.opts }}
        run: |
          {
            echo "GOLDENGRAPH_BUILD_WORKERS=12"
            echo "GOLDENGRAPH_LINK_THRESHOLD=0.82"
            echo "GOLDENGRAPH_PROFILE_MERGE_THRESHOLD=0.72"
            echo "GOLDENGRAPH_QA_RETRIEVAL_HOPS=6"
            echo "GOLDENGRAPH_QA_NODE_BUDGET=256"
            echo "GOLDENGRAPH_EXTRACTOR=api"
            printf '%s\n' "$OPTS"
          } | grep -E '^[A-Za-z_][A-Za-z0-9_]*=' >> "$GITHUB_ENV"
      - name: Parse ab_env (NAME:v1,v2 -> --env / --values)
        env:
          AB_ENV: ${{ inputs.ab_env }}
        run: |
          python3 - <<'PY' >> "$GITHUB_ENV"
          import os
          spec = os.environ["AB_ENV"].strip()
          name, _, values = spec.partition(":")
          name = name.strip()
          values = values.strip()
          if not name or not values or "," not in values:
              raise SystemExit(f"ab_env must be NAME:v1,v2[,..], got {spec!r}")
          print(f"AB_VAR={name}")
          print(f"AB_VALUES={values}")
          PY
      # Same prompt-hash extraction cache as the head_to_head job (see the comment
      # there). env_ab has NO ambiguity matrix, so the key uses inputs.ambiguity; the
      # `<corpus>-<model>-` restore-keys prefix is SHARED with head_to_head, so a cache
      # populated by either mode warms the other (same corpus + extraction model).
      - name: Restore/save the goldengraph extraction LLM cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ${{ github.workspace }}/.gg_llm_cache
          key: gg-llmcache-${{ inputs.corpus }}-${{ inputs.local_llm != '' && inputs.local_llm || 'api' }}-amb${{ inputs.ambiguity }}-${{ github.run_id }}
          restore-keys: |
            gg-llmcache-${{ inputs.corpus }}-${{ inputs.local_llm != '' && inputs.local_llm || 'api' }}-amb${{ inputs.ambiguity }}-
            gg-llmcache-${{ inputs.corpus }}-${{ inputs.local_llm != '' && inputs.local_llm || 'api' }}-
      - name: Install goldenmatch + native engine wheel + goldengraph + datasets
        run: |
          # polars: the hybrid path's passage retriever (goldenmatch_rag._make_frame)
          # imports it; goldenmatch itself is polars-free, so these A/B jobs install it
          # explicitly for GOLDENGRAPH_QA_MODE=hybrid runs (harmless for local-mode runs).
          python -m pip install --upgrade pip maturin pytest goldenmatch datasets openai polars
          maturin build --release \
            -m packages/rust/extensions/goldengraph-native/Cargo.toml --out dist
          maturin build --release \
            -m packages/rust/extensions/goldenprofile-native/Cargo.toml --out dist
          python -m pip install dist/*.whl
          python -m pip install --no-deps -e packages/python/goldengraph
          python -m pip install --no-deps -e packages/python/goldenmatch
      - name: Run env A/B (real LLM, budget-capped, one shared graph)
        working-directory: packages/python/goldenmatch/benchmarks/er-kg-bench
        env:
          # Embeddings (text-embedding-3-large) stay on OpenAI: OpenRouter serves NO
          # embeddings endpoint, and the daily cap that blocked run #167 was on the
          # gpt-4o-mini CHAT model only (embeddings have a separate, un-exhausted limit).
          OPENAI_API_KEY: ${{ secrets.GOLDENGRAPH_OPENAI_API_KEY }}
          # goldengraph CHAT (extraction + synthesis) -> OpenRouter, bypassing the
          # gpt-4o-mini requests-per-day cap. GOLDENGRAPH_LLM_* overrides only the chat
          # client (llm.py); the embedder above is untouched. Model must be the OpenRouter
          # id (`openai/gpt-4o-mini`), read by the engine via OPENAI_MODEL (_chat_model()).
          # Revert to all-OpenAI by dropping these three lines.
          GOLDENGRAPH_LLM_BASE_URL: https://openrouter.ai/api/v1
          GOLDENGRAPH_LLM_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_MODEL: openai/gpt-4o-mini
          # Points the bench extraction/build client at the actions/cache-persisted dir
          # (restored above). Only the goldengraph engine's BUILD client is cached; the
          # answer-time synth client stays uncached. Same dir the cache step persists.
          GOLDENGRAPH_LLM_CACHE: ${{ github.workspace }}/.gg_llm_cache
          POLARS_SKIP_CPU_CHECK: "1"
          # datasets pulls a fresh-pip pyarrow whose bundled mimalloc SIGSEGVs on the
          # pipeline's worker threads -- the documented repo standard for any lane that
          # pip-installs goldenmatch/pyarrow and runs the pipeline (goldengraph resolve).
          ARROW_DEFAULT_MEMORY_POOL: system
        run: |
          mkdir -p results
          python -m erkgbench.qa_e2e.run_env_ab \
            --corpus "${{ inputs.corpus }}" \
            --max-questions "${{ inputs.max_questions }}" \
            --ambiguity "0.5" \
            --env "$AB_VAR" \
            --values "$AB_VALUES" \
            --budget-usd "${{ inputs.budget_usd }}" \
            ${{ inputs.judge == 'true' && '--judge' || '' }} \
            --out-md "results/RESULTS_QA_ENV_AB.md" \
            --out-json "results/results_qa_env_ab.json"
          echo "### Env A/B ($AB_VAR)" >> "$GITHUB_STEP_SUMMARY"
          cat results/RESULTS_QA_ENV_AB.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload env A/B results
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: graphrag-qa-env-ab
          path: packages/python/goldenmatch/benchmarks/er-kg-bench/results/results_qa_env_ab.*
          if-no-files-found: ignore

  lightrag:
    needs: setup
    if: ${{ inputs.mode == 'head_to_head' && (inputs.engine == 'all' || inputs.engine == 'lightrag') }}
    runs-on: large-new-64GB
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        ambiguity: ${{ fromJSON(needs.setup.outputs.ambiguities) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Install lightrag + goldenmatch + datasets (isolated)
        run: python -m pip install --upgrade pip pytest numpy "lightrag-hku" goldenmatch datasets openai
      - name: Run LightRAG end-to-end (real LLM, budget-capped)
        working-directory: packages/python/goldenmatch/benchmarks/er-kg-bench
        env:
          OPENAI_API_KEY: ${{ secrets.GOLDENGRAPH_OPENAI_API_KEY }}
          POLARS_SKIP_CPU_CHECK: "1"
        run: |
          python -m erkgbench.qa_e2e.run_qa_e2e \
            --engine lightrag \
            --corpus "${{ inputs.corpus }}" \
            --max-questions "${{ inputs.max_questions }}" \
            --ambiguity "${{ matrix.ambiguity }}" \
            --budget-usd "${{ inputs.budget_usd }}" \
            ${{ inputs.judge == 'true' && '--judge' || '' }} \
            --out-md "results/RESULTS_QA_E2E_lightrag_amb${{ matrix.ambiguity }}.md" \
            --out-json "results/results_qa_e2e_lightrag_amb${{ matrix.ambiguity }}.json"
      - name: Upload results
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: graphrag-qa-results-lightrag-amb${{ matrix.ambiguity }}
          path: packages/python/goldenmatch/benchmarks/er-kg-bench/results/results_qa_e2e_lightrag_amb${{ matrix.ambiguity }}*.*
          if-no-files-found: ignore

  text_rag:
    needs: setup
    if: ${{ inputs.mode == 'head_to_head' && (inputs.engine == 'all' || inputs.engine == 'text_rag') }}
    runs-on: ubuntu-latest  # no KG build -- just embeddings + chat; the light lane
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        ambiguity: ${{ fromJSON(needs.setup.outputs.ambiguities) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Resolve bench env (opts -> TEXT_RAG_TOP_K)
        env:
          OPTS: ${{ inputs.opts }}
        run: |
          { echo "TEXT_RAG_TOP_K=10"; printf '%s\n' "$OPTS"; } | grep -E '^[A-Za-z_][A-Za-z0-9_]*=' >> "$GITHUB_ENV"
      - name: Install text-RAG baseline deps (isolated)
        run: python -m pip install --upgrade pip pytest numpy goldenmatch datasets openai
      - name: Run text-RAG baseline end-to-end (real LLM, budget-capped)
        working-directory: packages/python/goldenmatch/benchmarks/er-kg-bench
        env:
          OPENAI_API_KEY: ${{ secrets.GOLDENGRAPH_OPENAI_API_KEY }}
          POLARS_SKIP_CPU_CHECK: "1"
        run: |
          python -m erkgbench.qa_e2e.run_qa_e2e \
            --engine text_rag \
            --corpus "${{ inputs.corpus }}" \
            --max-questions "${{ inputs.max_questions }}" \
            --ambiguity "${{ matrix.ambiguity }}" \
            --budget-usd "${{ inputs.budget_usd }}" \
            ${{ inputs.judge == 'true' && '--judge' || '' }} \
            --out-md "results/RESULTS_QA_E2E_text_rag_amb${{ matrix.ambiguity }}.md" \
            --out-json "results/results_qa_e2e_text_rag_amb${{ matrix.ambiguity }}.json"
      - name: Upload results
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: graphrag-qa-results-text_rag-amb${{ matrix.ambiguity }}
          path: packages/python/goldenmatch/benchmarks/er-kg-bench/results/results_qa_e2e_text_rag_amb${{ matrix.ambiguity }}*.*
          if-no-files-found: ignore

  goldenmatch_rag:
    needs: setup
