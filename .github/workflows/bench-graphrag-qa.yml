# GraphRAG evidence program #1 -- end-to-end multi-hop QA head-to-head.
# Opt-in (workflow_dispatch only): real LLM, hard cost cap. NOT ci-required.
# PR A ships the goldengraph engine only; LightRAG / MS-GraphRAG / Graphiti
# arrive as PRs B/C/D against the same harness.
name: bench-graphrag-qa

on:
  workflow_dispatch:
    inputs:
      corpus:
        description: "engineered | musique"
        default: "engineered"
      max_questions:
        description: "questions to run"
        default: "20"
      budget_usd:
        description: "hard cost cap per run"
        default: "25"

permissions:
  contents: read

jobs:
  goldengraph:
    runs-on: large-new-64GB
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Install goldenmatch + native engine wheel + goldengraph + datasets
        run: |
          python -m pip install --upgrade pip maturin pytest goldenmatch datasets openai
          maturin build --release \
            -m packages/rust/extensions/goldengraph-native/Cargo.toml --out dist
          python -m pip install dist/*.whl
          python -m pip install --no-deps -e packages/python/goldengraph
      - name: Run goldengraph end-to-end (real LLM, budget-capped)
        working-directory: packages/python/goldenmatch/benchmarks/er-kg-bench
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          POLARS_SKIP_CPU_CHECK: "1"
        run: |
          python -m erkgbench.qa_e2e.run_qa_e2e \
            --engine goldengraph \
            --corpus "${{ inputs.corpus }}" \
            --max-questions "${{ inputs.max_questions }}" \
            --budget-usd "${{ inputs.budget_usd }}" \
            --out-md results/RESULTS_QA_E2E_goldengraph.md \
            --out-json results/results_qa_e2e_goldengraph.json
      - name: Upload results
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: graphrag-qa-results-goldengraph
          path: packages/python/goldenmatch/benchmarks/er-kg-bench/results/results_qa_e2e_goldengraph*.*
          if-no-files-found: ignore

  lightrag:
    runs-on: large-new-64GB
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Install lightrag + goldenmatch + datasets (isolated)
        run: python -m pip install --upgrade pip pytest numpy "lightrag-hku" goldenmatch datasets openai
      - name: Run LightRAG end-to-end (real LLM, budget-capped)
        working-directory: packages/python/goldenmatch/benchmarks/er-kg-bench
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          POLARS_SKIP_CPU_CHECK: "1"
        run: |
          python -m erkgbench.qa_e2e.run_qa_e2e \
            --engine lightrag \
            --corpus "${{ inputs.corpus }}" \
            --max-questions "${{ inputs.max_questions }}" \
            --budget-usd "${{ inputs.budget_usd }}" \
            --out-md results/RESULTS_QA_E2E_lightrag.md \
            --out-json results/results_qa_e2e_lightrag.json
      - name: Upload results
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: graphrag-qa-results-lightrag
          path: packages/python/goldenmatch/benchmarks/er-kg-bench/results/results_qa_e2e_lightrag*.*
          if-no-files-found: ignore
