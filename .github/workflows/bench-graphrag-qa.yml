          path: packages/python/goldenmatch/benchmarks/er-kg-bench/results/results_qa_e2e_goldenmatch_entity_rag_amb${{ matrix.ambiguity }}*.*
          if-no-files-found: ignore

  ms_graphrag:
    needs: setup
    if: ${{ inputs.mode == 'head_to_head' && (inputs.engine == 'all' || inputs.engine == 'ms_graphrag') }}
    runs-on: large-new-64GB
    timeout-minutes: 90  # MS-GraphRAG indexing is the long pole
    strategy:
      fail-fast: false
      matrix:
        ambiguity: ${{ fromJSON(needs.setup.outputs.ambiguities) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Install graphrag + goldenmatch + datasets (isolated)
        run: python -m pip install --upgrade pip pytest numpy pandas pyarrow "graphrag==3.1.0" goldenmatch datasets openai
      - name: Run MS-GraphRAG end-to-end (real LLM, budget-capped)
        working-directory: packages/python/goldenmatch/benchmarks/er-kg-bench
        env:
          OPENAI_API_KEY: ${{ secrets.GOLDENGRAPH_OPENAI_API_KEY }}
          GRAPHRAG_API_KEY: ${{ secrets.GOLDENGRAPH_OPENAI_API_KEY }}
          POLARS_SKIP_CPU_CHECK: "1"
        run: |
          python -m erkgbench.qa_e2e.run_qa_e2e \
            --engine ms_graphrag \
            --corpus "${{ inputs.corpus }}" \
            --max-questions "${{ inputs.max_questions }}" \
            --ambiguity "${{ matrix.ambiguity }}" \
            --budget-usd "${{ inputs.budget_usd }}" \
            ${{ inputs.judge == 'true' && '--judge' || '' }} \
            --out-md "results/RESULTS_QA_E2E_ms_graphrag_amb${{ matrix.ambiguity }}.md" \
            --out-json "results/results_qa_e2e_ms_graphrag_amb${{ matrix.ambiguity }}.json"
      - name: Upload results
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: graphrag-qa-results-ms_graphrag-amb${{ matrix.ambiguity }}
          path: packages/python/goldenmatch/benchmarks/er-kg-bench/results/results_qa_e2e_ms_graphrag_amb${{ matrix.ambiguity }}*.*
          if-no-files-found: ignore

  graphiti:
    needs: setup
    if: ${{ inputs.mode == 'head_to_head' && (inputs.engine == 'all' || inputs.engine == 'graphiti') }}
    runs-on: large-new-64GB
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        ambiguity: ${{ fromJSON(needs.setup.outputs.ambiguities) }}
    services:
      falkordb:
        image: falkordb/falkordb:latest
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Install graphiti-core + goldenmatch + datasets + openai (isolated)
        run: python -m pip install --upgrade pip pytest numpy "graphiti-core[falkordb]" goldenmatch datasets openai
      - name: Run Graphiti end-to-end (real LLM + FalkorDB, budget-capped)
        working-directory: packages/python/goldenmatch/benchmarks/er-kg-bench
        env:
          OPENAI_API_KEY: ${{ secrets.GOLDENGRAPH_OPENAI_API_KEY }}
          FALKORDB_HOST: localhost
          FALKORDB_PORT: "6379"
          POLARS_SKIP_CPU_CHECK: "1"
        run: |
          python -m erkgbench.qa_e2e.run_qa_e2e \
            --engine graphiti \
            --corpus "${{ inputs.corpus }}" \
            --max-questions "${{ inputs.max_questions }}" \
            --ambiguity "${{ matrix.ambiguity }}" \
            --budget-usd "${{ inputs.budget_usd }}" \
            ${{ inputs.judge == 'true' && '--judge' || '' }} \
            --out-md "results/RESULTS_QA_E2E_graphiti_amb${{ matrix.ambiguity }}.md" \
            --out-json "results/results_qa_e2e_graphiti_amb${{ matrix.ambiguity }}.json"
      - name: Upload results
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: graphrag-qa-results-graphiti-amb${{ matrix.ambiguity }}
          path: packages/python/goldenmatch/benchmarks/er-kg-bench/results/results_qa_e2e_graphiti_amb${{ matrix.ambiguity }}*.*
          if-no-files-found: ignore

  aggregate:
    needs: [goldengraph, lightrag, ms_graphrag, graphiti, text_rag, goldenmatch_rag, goldenmatch_entity_rag]
    if: ${{ always() && inputs.mode == 'head_to_head' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Download every engine x ambiguity result
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          pattern: graphrag-qa-results-*
          path: dl
          merge-multiple: true
      - name: Aggregate into the RESULTS_QA_E2E headline + decay curve
        working-directory: packages/python/goldenmatch/benchmarks/er-kg-bench
        run: |
          mkdir -p results
          find "$GITHUB_WORKSPACE/dl" -name 'results_qa_e2e_*.json' -exec cp {} results/ \; || true
          if ls results/results_qa_e2e_*.json >/dev/null 2>&1; then
            python -m erkgbench.qa_e2e.aggregate_qa_e2e \
              --results-dir results --out results/RESULTS_QA_E2E.md
            echo "----- RESULTS_QA_E2E.md -----"
            cat results/RESULTS_QA_E2E.md
          else
            echo "::warning::no result JSONs to aggregate (all engine jobs skipped or failed)"
          fi
      - name: Upload aggregated headline
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: graphrag-qa-results-AGGREGATE
          path: packages/python/goldenmatch/benchmarks/er-kg-bench/results/RESULTS_QA_E2E.md
          if-no-files-found: ignore

  scorecard:
    # Opt-in real-LLM confirmation rows (NON-gating), selected by `mode`. One mode per dispatch.
    if: ${{ inputs.mode != 'head_to_head' && inputs.mode != 'extraction_f1' && inputs.mode != 'synthesis_gold' && inputs.mode != 'retrieval_coverage' }}
    runs-on: large-new-64GB
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Resolve bench env (opts -> SCORECARD_BUDGET_USD)
        env:
          OPTS: ${{ inputs.opts }}
        run: |
          { echo "SCORECARD_BUDGET_USD=2"; printf '%s\n' "$OPTS"; } | grep -E '^[A-Za-z_][A-Za-z0-9_]*=' >> "$GITHUB_ENV"
      - name: Install goldenmatch + native engine wheel + goldengraph + datasets
        run: |
          python -m pip install --upgrade pip maturin pytest goldenmatch datasets openai polars
          maturin build --release \
            -m packages/rust/extensions/goldengraph-native/Cargo.toml --out dist
          python -m pip install dist/*.whl
          python -m pip install --no-deps -e packages/python/goldengraph
      - name: Run the real-LLM scorecard (budget-capped, opt-in)
        if: ${{ inputs.mode == 'scorecard' }}
        working-directory: packages/python/goldenmatch/benchmarks/er-kg-bench
        env:
          OPENAI_API_KEY: ${{ secrets.GOLDENGRAPH_OPENAI_API_KEY }}
          POLARS_SKIP_CPU_CHECK: "1"
        run: |
          python -m erkgbench.qa_e2e.run_scorecard \
            --seed 7 --n-questions 60 --ambiguity 0.6 \
            --budget-usd "$SCORECARD_BUDGET_USD" \
            --out-md SCORECARD.md
      - name: Upload SCORECARD.md
        if: ${{ always() && inputs.mode == 'scorecard' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: graphrag-qa-scorecard
          path: packages/python/goldenmatch/benchmarks/er-kg-bench/SCORECARD.md
          if-no-files-found: ignore
      - name: Run the real-LLM RAG aggregation floor (slice B1, opt-in)
        if: ${{ inputs.mode == 'aggregation_llm' }}
        working-directory: packages/python/goldenmatch/benchmarks/er-kg-bench
        env:
          OPENAI_API_KEY: ${{ secrets.GOLDENGRAPH_OPENAI_API_KEY }}
          POLARS_SKIP_CPU_CHECK: "1"
        # --with-llm adds the realistic RAG row. This opt-in lane is NON-gating (the
        # deterministic gate is goldengraph-pipeline's job) -> `|| true` so the gate
        # exit code can't fail this confirmation run.
        run: |
          python -m erkgbench.qa_e2e.run_aggregation \
            --seed 7 --n-anchors 60 --ambiguity 0.6 --passage-k 10 \
            --with-llm --budget-usd "$SCORECARD_BUDGET_USD" \
            --out-md AGGREGATION_LLM.md || true
      - name: Upload AGGREGATION_LLM.md
        if: ${{ always() && inputs.mode == 'aggregation_llm' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: graphrag-qa-aggregation-llm
          path: packages/python/goldenmatch/benchmarks/er-kg-bench/AGGREGATION_LLM.md
          if-no-files-found: ignore
      - name: Run the real-LLM RAG temporal floor (slice B2, opt-in)
        if: ${{ inputs.mode == 'temporal_llm' }}
        working-directory: packages/python/goldenmatch/benchmarks/er-kg-bench
        env:
          OPENAI_API_KEY: ${{ secrets.GOLDENGRAPH_OPENAI_API_KEY }}
          POLARS_SKIP_CPU_CHECK: "1"
        # --with-llm adds the realistic RAG row; NON-gating (`|| true`; the
        # deterministic gate is goldengraph-pipeline's job).
        run: |
          python -m erkgbench.qa_e2e.run_temporal \
            --seed 7 --n-facts 40 --ambiguity 0.6 \
            --with-llm --budget-usd "$SCORECARD_BUDGET_USD" \
            --out-md TEMPORAL_LLM.md || true
      - name: Upload TEMPORAL_LLM.md
        if: ${{ always() && inputs.mode == 'temporal_llm' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: graphrag-qa-temporal-llm
          path: packages/python/goldenmatch/benchmarks/er-kg-bench/TEMPORAL_LLM.md
          if-no-files-found: ignore
      - name: Run the real-LLM answer-match crossover (slice C, opt-in)
        if: ${{ inputs.mode == 'crossover_llm' }}
        working-directory: packages/python/goldenmatch/benchmarks/er-kg-bench
        env:
          OPENAI_API_KEY: ${{ secrets.GOLDENGRAPH_OPENAI_API_KEY }}
          POLARS_SKIP_CPU_CHECK: "1"
        # --with-llm adds the answer-match crossover table. NON-gating (the deterministic
        # recall gate is goldengraph-pipeline's job) -> `|| true` so the recall gate exit
        # code can't fail this confirmation run.
        run: |
          python -m erkgbench.qa_e2e.run_crossover \
            --seed 7 --n-questions 80 \
            --with-llm --budget-usd "$SCORECARD_BUDGET_USD" \
            --out-md CROSSOVER.md --llm-out-md CROSSOVER_ANSWER_MATCH.md || true
      - name: Upload CROSSOVER_ANSWER_MATCH.md
        if: ${{ always() && inputs.mode == 'crossover_llm' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: graphrag-qa-crossover-answer-match
          path: packages/python/goldenmatch/benchmarks/er-kg-bench/CROSSOVER_ANSWER_MATCH.md
          if-no-files-found: ignore
      - name: Real-framework KG capability confirmation (slice D, opt-in)
        if: ${{ inputs.mode == 'kg_capability' }}
        working-directory: packages/python/goldenmatch/benchmarks/er-kg-bench
        env:
          OPENAI_API_KEY: ${{ secrets.GOLDENGRAPH_OPENAI_API_KEY }}
          POLARS_SKIP_CPU_CHECK: "1"
        # --with-frameworks drives the real LightRAG/MS-GraphRAG/Graphiti adapters over the
        # aggregation list-questions (confirms the exact-match dial model + a real Graphiti
        # semantic-ER number). NON-gating (`|| true`; the deterministic gate is
        # goldengraph-pipeline's job). Engines whose extras/infra (FalkorDB) are absent record n/a.
        run: |
          python -m erkgbench.qa_e2e.run_kg_scorecard \
            --seed 7 --n-questions 80 --n-anchors 60 --ambiguity 0.6 \
            --with-frameworks --budget-usd "$SCORECARD_BUDGET_USD" \
            --out-md KG_SCORECARD.md --frameworks-out-md KG_SCORECARD_FRAMEWORKS.md || true
      - name: Upload KG_SCORECARD_FRAMEWORKS.md
        if: ${{ always() && inputs.mode == 'kg_capability' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: graphrag-qa-kg-frameworks
          path: packages/python/goldenmatch/benchmarks/er-kg-bench/KG_SCORECARD_FRAMEWORKS.md
          if-no-files-found: ignore
      - name: Query-router auto-vs-local confirmation (slice 1, opt-in)
        if: ${{ inputs.mode == 'router_capability' }}
        working-directory: packages/python/goldenmatch/benchmarks/er-kg-bench
        env:
          OPENAI_API_KEY: ${{ secrets.GOLDENGRAPH_OPENAI_API_KEY }}
          POLARS_SKIP_CPU_CHECK: "1"
        # --with-llm compares ask(mode=auto) (routes to the aggregate lever) vs ask(mode=local)
        # on the aggregation list-questions. NON-gating (`|| true`; the deterministic gate is
        # goldengraph-pipeline's job). A build failure (missing key / 429) records n/a.
        run: |
          python -m erkgbench.qa_e2e.run_router_eval \
            --seed 7 --n-anchors 60 \
            --with-llm --budget-usd "$SCORECARD_BUDGET_USD" \
            --out-md ROUTER.md --llm-out-md ROUTER_LLM.md || true
      - name: Upload ROUTER_LLM.md
        if: ${{ always() && inputs.mode == 'router_capability' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: graphrag-qa-router-llm
          path: packages/python/goldenmatch/benchmarks/er-kg-bench/ROUTER_LLM.md
          if-no-files-found: ignore

  extraction_f1:
    # The low-noise instrument for the extraction A/B: extraction-F1 vs PLANTED gold for several
    # extractor configs (api_json / api_nojson / rebel), far less noisy than end-to-end answer-match.
    # Wheel-free (no PyStore) -> no maturin build. `api*` configs need Ollama (local_llm); `rebel`
    # needs transformers+torch. Non-gating; writes EXTRACTION_F1.md.
    needs: setup
    if: ${{ inputs.mode == 'extraction_f1' }}
    runs-on: large-new-64GB
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Install goldenmatch + goldengraph + datasets + rebel deps (no wheel -- extraction is pure)
        run: |
          python -m pip install --upgrade pip pytest goldenmatch datasets openai transformers torch
          python -m pip install --no-deps -e packages/python/goldengraph
      - name: Start local OSS LLM (Ollama)
        if: ${{ inputs.local_llm != '' }}
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve > ollama.log 2>&1 &
          for i in $(seq 1 30); do curl -sf http://localhost:11434/api/version && break || sleep 2; done
          ollama pull "${{ inputs.local_llm }}"
      - name: Run extraction-F1 eval (api_json / api_nojson / rebel)
        working-directory: packages/python/goldenmatch/benchmarks/er-kg-bench
        env:
          OPENAI_API_KEY: ${{ inputs.local_llm != '' && 'ollama' || secrets.GOLDENGRAPH_OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ inputs.local_llm != '' && 'http://localhost:11434/v1' || '' }}
          OPENAI_MODEL: ${{ inputs.local_llm }}
          POLARS_SKIP_CPU_CHECK: "1"
        # max_questions sizes the corpus; use a SMALL value for a local Ollama run (CPU per-doc extract).
        run: |
          python -m erkgbench.qa_e2e.run_extraction_eval \
            --configs api_json,api_schema \
            --n-questions "${{ inputs.max_questions }}" --ambiguity 0.6 \
            --out-md EXTRACTION_F1.md
      - name: Upload EXTRACTION_F1.md
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: graphrag-qa-extraction-f1
          path: packages/python/goldenmatch/benchmarks/er-kg-bench/EXTRACTION_F1.md
          if-no-files-found: ignore

  synthesis_gold:
    # Stage 0 of the distillation pivot: synthesis-given-gold (hand the model the GOLD subgraph +
    # question -> answer-match). LOW => synthesis is the bottleneck; HIGH but low end-to-end =>
    # retrieval is. Wheel-free (subgraph dicts, no PyStore); api needs Ollama (local_llm). Non-gating.
    needs: setup
    if: ${{ inputs.mode == 'synthesis_gold' }}
    runs-on: large-new-64GB
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Install goldenmatch + goldengraph + datasets (no wheel -- synthesis is pure)
        run: |
          python -m pip install --upgrade pip pytest goldenmatch datasets openai
          python -m pip install --no-deps -e packages/python/goldengraph
      - name: Start local OSS LLM (Ollama)
        if: ${{ inputs.local_llm != '' }}
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve > ollama.log 2>&1 &
          for i in $(seq 1 30); do curl -sf http://localhost:11434/api/version && break || sleep 2; done
          ollama pull "${{ inputs.local_llm }}"
      - name: Run synthesis-given-gold (isolation)
        working-directory: packages/python/goldenmatch/benchmarks/er-kg-bench
        env:
          OPENAI_API_KEY: ${{ inputs.local_llm != '' && 'ollama' || secrets.GOLDENGRAPH_OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ inputs.local_llm != '' && 'http://localhost:11434/v1' || '' }}
          OPENAI_MODEL: ${{ inputs.local_llm }}
          POLARS_SKIP_CPU_CHECK: "1"
        run: |
          python -m erkgbench.qa_e2e.run_synthesis_eval \
            --n-questions "${{ inputs.max_questions }}" --ambiguity 0.6 \
            --out-md SYNTHESIS_GOLD.md
      - name: Upload SYNTHESIS_GOLD.md
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: graphrag-qa-synthesis-gold
          path: packages/python/goldenmatch/benchmarks/er-kg-bench/SYNTHESIS_GOLD.md
          if-no-files-found: ignore

  retrieval_coverage:
    # Stage 0b: does answer-time retrieval surface the gold chain? Isolates retrieval on a PERFECT
    # oracle graph (no extraction LLM -- only the embedder is exercised). LOW anchor-seed = mis-seeding;
    # LOW chain-coverage = the undirected ball drops the directed chain. Needs the wheel (PyStore) +
    # the embedder (Ollama nomic-embed-text). Non-gating.
    needs: setup
    if: ${{ inputs.mode == 'retrieval_coverage' }}
    runs-on: large-new-64GB
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Install goldenmatch + native wheel + goldengraph (retrieval needs PyStore + embedder)
        run: |
          python -m pip install --upgrade pip maturin pytest goldenmatch datasets openai polars
          maturin build --release \
            -m packages/rust/extensions/goldengraph-native/Cargo.toml --out dist
          python -m pip install dist/*.whl
          python -m pip install --no-deps -e packages/python/goldengraph
          # Repo goldenmatch overlay: the OPENAI_BASE_URL embedding change (so the embedder hits Ollama).
          python -m pip install --no-deps -e packages/python/goldenmatch
      - name: Start local OSS embedder (Ollama)
        if: ${{ inputs.local_llm != '' }}
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve > ollama.log 2>&1 &
          for i in $(seq 1 30); do curl -sf http://localhost:11434/api/version && break || sleep 2; done
          ollama pull nomic-embed-text
      - name: Run retrieval-coverage eval (oracle graph)
        working-directory: packages/python/goldenmatch/benchmarks/er-kg-bench
        env:
          OPENAI_API_KEY: ${{ inputs.local_llm != '' && 'ollama' || secrets.GOLDENGRAPH_OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ inputs.local_llm != '' && 'http://localhost:11434/v1' || '' }}
          OPENAI_EMBED_MODEL: ${{ inputs.local_llm != '' && 'nomic-embed-text' || '' }}
          POLARS_SKIP_CPU_CHECK: "1"
        run: |
          python -m erkgbench.qa_e2e.run_retrieval_eval \
            --n-questions "${{ inputs.max_questions }}" --ambiguity 0.6 \
            --out-md RETRIEVAL_COVERAGE.md
      - name: Upload RETRIEVAL_COVERAGE.md
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: graphrag-qa-retrieval-coverage
          path: packages/python/goldenmatch/benchmarks/er-kg-bench/RETRIEVAL_COVERAGE.md
          if-no-files-found: ignore
