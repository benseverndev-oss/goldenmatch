name: ci

on:
  push:
    branches: [main]
  pull_request:

# Locked-down by default. Individual jobs escalate as needed.
# OpenSSF Scorecard / Token-Permissions check requires this top-level scope.
permissions:
  contents: read

# Supersede in-flight runs for the same PR — a new push cancels the prior run
# so the expensive matrix (pgrx/maturin/native/distributed lanes) isn't burning
# runners on a commit nobody is waiting on. On `main` the group key falls back to
# the unique run_id, so pushes to main are NEVER cancelled (each gets its own
# group) and every main commit is fully verified.
concurrency:
  group: ci-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # Path-filter: compute which areas of the monorepo changed so downstream
  # jobs only run when relevant. Doc-only PRs (README, wiki references,
  # screenshots) skip every code job. Workflow-file changes force every job
  # to re-run so the workflow itself stays under test.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      # JSON array of changed Python package names (empty if none).
      python_pkgs: ${{ steps.set_python.outputs.pkgs }}
      typescript: ${{ steps.filter.outputs.typescript }}
      web_ui_e2e: ${{ steps.filter.outputs.web }}
      rust: ${{ steps.filter.outputs.rust }}
      action: ${{ steps.filter.outputs.action }}
      ci_workflow: ${{ steps.filter.outputs.ci_workflow }}
      pyright_slice: ${{ steps.filter.outputs.pyright_slice }}
      python_goldenmatch_postgres: ${{ steps.filter.outputs.python_goldenmatch_postgres }}
      benchmark_runner: ${{ steps.filter.outputs.benchmark_runner }}
      rust_pgrx: ${{ steps.filter.outputs.rust_pgrx }}
      duckdb_extensions: ${{ steps.filter.outputs.duckdb_extensions }}
      native: ${{ steps.filter.outputs.native }}
      goldencheck_native: ${{ steps.filter.outputs.goldencheck_native }}
      analysis_native: ${{ steps.filter.outputs.analysis_native }}
      native_flow: ${{ steps.filter.outputs.native_flow }}
      goldenembed: ${{ steps.filter.outputs.goldenembed }}
      embed: ${{ steps.filter.outputs.embed }}
      distributed: ${{ steps.filter.outputs.distributed }}
      sail: ${{ steps.filter.outputs.sail }}
      readme_callouts: ${{ steps.filter.outputs.readme_callouts }}
      wasm_score: ${{ steps.filter.outputs.wasm_score }}
      analysis_wasm: ${{ steps.filter.outputs.analysis_wasm }}
      ts_parity: ${{ steps.filter.outputs.ts_parity }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        id: filter
        with:
          # `filters` runs against the diff between the PR head and base
          # (or push head and the previous push for branch builds). Per-path
          # globs are unanchored — `'foo/**'` matches at any depth.
          filters: |
            ci_workflow:
              - '.github/workflows/ci.yml'
            python_root:
              - 'pyproject.toml'
              - 'uv.lock'
            python_goldenmatch:
              - 'packages/python/goldenmatch/**'
              # Stage A: the standalone datafusion-ffi UDF crate is built into
              # the goldenmatch venv in the `python` lane and exercised by
              # tests/test_datafusion_ffi_udf.py. A crate-only change must
              # re-trigger that lane so the FFI feasibility gate re-runs.
              - 'packages/rust/extensions/datafusion-udf/**'
              # Stage B: the FFI scorer UDFs delegate to the shared score-core
              # crate. A score-core-only change must re-trigger this lane so the
              # FFI scorer-parity test (vs native) re-runs.
              - 'packages/rust/extensions/score-core/**'
            python_goldenmatch_postgres:
              - 'packages/python/goldenmatch/tests/test_db.py'
              - 'packages/python/goldenmatch/tests/test_reconcile.py'
              - 'packages/python/goldenmatch/tests/_pg_helpers.py'
              - 'packages/python/goldenmatch/goldenmatch/db/**'
            python_goldencheck:
              - 'packages/python/goldencheck/**'
            python_goldenflow:
              - 'packages/python/goldenflow/**'
            python_goldenpipe:
              - 'packages/python/goldenpipe/**'
            python_infermap:
              - 'packages/python/infermap/**'
            python_goldensuite_mcp:
              - 'packages/python/goldensuite-mcp/**'
            python_goldencheck_types:
              - 'packages/python/goldencheck-types/**'
            python_goldenanalysis:
              - 'packages/python/goldenanalysis/**'
            typescript:
              - 'packages/typescript/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
            wasm_score:
              - 'packages/rust/extensions/score-wasm/**'
              - 'packages/rust/extensions/score-core/**'
              - 'packages/typescript/goldenmatch/src/core/wasm/**'
              - 'packages/typescript/goldenmatch/src/core/scorer.ts'
              - 'packages/typescript/goldenmatch/tests/parity/wasm-scorer.test.ts'
              - 'packages/typescript/goldenmatch-wasm-runtime/**'
            analysis_wasm:
              - 'packages/rust/extensions/analysis-wasm/**'
              - 'packages/rust/extensions/analysis-core/**'
              - 'packages/typescript/goldenanalysis/src/core/wasm/**'
              - 'packages/typescript/goldenanalysis/src/core/aggregate.ts'
              - 'packages/typescript/goldenanalysis/tests/parity/wasm-aggregate.test.ts'
              - 'packages/typescript/goldenmatch-wasm-runtime/**'
            ts_parity:
              # TS parity-fixture staleness gate (#856): a Python behaviour
              # change that is not mirrored into the committed TS fixtures must
              # turn the ts_parity_freshness lane red. Trigger on the fixture
              # producers (goldenmatch + goldenpipe Python), the committed
              # fixtures, and the gate tooling itself.
              - 'packages/python/goldenmatch/**'
              - 'packages/python/goldenpipe/**'
              - 'packages/typescript/goldenmatch/tests/parity/**'
              - 'packages/typescript/goldenpipe/tests/fixtures/**'
              - 'scripts/regen_ts_parity_fixtures.sh'
              - 'scripts/check_ts_parity_freshness.py'
            web:
              - 'packages/python/goldenmatch/web/**'
              - 'packages/python/goldenmatch/goldenmatch/web/**'
              - 'packages/python/goldenmatch/scripts/build_web.py'
              - 'packages/python/goldenmatch/pyproject.toml'
              - 'pnpm-lock.yaml'
            benchmark_runner:
              - 'scripts/run_benchmarks.py'
              - 'scripts/dqbench_adapters/**'
              - 'docs/reproducing-benchmarks.md'
              # #435: changes to the library being benchmarked must also
              # trigger the smoke. Before this, refiner / blocker /
              # scorer / pipeline / autoconfig changes could silently
              # regress benchmark recall + escape CI.
              - 'packages/python/goldenmatch/goldenmatch/core/autoconfig*.py'
              - 'packages/python/goldenmatch/goldenmatch/core/blocker.py'
              - 'packages/python/goldenmatch/goldenmatch/core/blocking_candidates.py'
              - 'packages/python/goldenmatch/goldenmatch/core/scorer.py'
              - 'packages/python/goldenmatch/goldenmatch/core/cluster.py'
              - 'packages/python/goldenmatch/goldenmatch/core/pipeline.py'
              - 'packages/python/goldenmatch/goldenmatch/core/matchkey.py'
              - 'packages/python/goldenmatch/goldenmatch/core/golden*.py'
              - 'packages/python/goldenmatch/goldenmatch/core/probabilistic.py'
              - 'packages/python/goldenmatch/goldenmatch/core/learned_blocking.py'
            rust:
              - 'packages/rust/**'
            rust_pgrx:
              # The Postgres extension lives in `packages/rust/extensions/postgres/`
              # and is excluded from the cargo workspace (pgrx + workspace mode
              # is broken — see root CLAUDE.md). It needs its own lane that
              # builds via `cargo pgrx install`, so trigger only on changes to
              # that subtree, the shared bridge it links against, or workspace
              # configuration.
              - 'packages/rust/extensions/postgres/**'
              - 'packages/rust/extensions/bridge/**'
              # goldenembed is a path dep of the postgres crate (gm_embed /
              # goldenmatch_embed_local) and supplies the embed-smoke fixture,
              # so a goldenembed change must rebuild + re-smoke this lane.
              - 'packages/rust/extensions/goldenembed/**'
              - 'packages/rust/extensions/Cargo.toml'
            duckdb_extensions:
              # The DuckDB UDF package is pure Python but lives under
              # packages/rust/extensions/duckdb/ alongside the Rust crates.
              # Gate strictly on its own subtree so editing Rust code doesn't
              # spin up a Python lane for it.
              - 'packages/rust/extensions/duckdb/**'
            native:
              # The native acceleration ext (PyO3) is a standalone workspace,
              # so the `rust` job's `cargo test --workspace` never builds it.
              # This lane builds the .so and runs the Python parity suite
              # (which SKIPS when the ext is absent). Trigger on the crate plus
              # the Python files it's wired into + the build script.
              - 'packages/rust/extensions/native/**'
              - 'packages/rust/extensions/fingerprint-core/**'
              # Stage B: the native scorers are now thin shims over the shared
              # score-core crate. A score-core change alters native behavior, so
              # re-run the native build + parity suite.
              - 'packages/rust/extensions/score-core/**'
              - 'packages/python/goldenmatch/goldenmatch/core/_native_loader.py'
              - 'packages/python/goldenmatch/goldenmatch/core/_hashing.py'
              - 'packages/python/goldenmatch/goldenmatch/core/cluster.py'
              - 'packages/python/goldenmatch/goldenmatch/core/pairs.py'
              - 'packages/python/goldenmatch/goldenmatch/embeddings/**'
              - 'packages/python/goldenmatch/tests/test_native_parity.py'
              - 'packages/python/goldenmatch/tests/test_record_fingerprint.py'
              - 'packages/python/goldenmatch/tests/test_pairs.py'
              - 'packages/python/goldenmatch/tests/test_embeddings.py'
              - 'packages/python/goldenmatch/tests/test_inhouse_embedder.py'
              - 'scripts/build_native.py'
            goldencheck_native:
              # GoldenCheck's native acceleration ext (PyO3), a standalone
              # workspace like goldenmatch's `native`. Builds the .so and runs the
              # Python parity suite (which SKIPS when the ext is absent), so
              # without this lane the goldencheck kernels are UNTESTED in CI.
              - 'packages/rust/extensions/goldencheck-native/**'
              - 'packages/rust/extensions/goldencheck-core/**'
              - 'packages/python/goldencheck/goldencheck/core/_native_loader.py'
              - 'packages/python/goldencheck/goldencheck/baseline/statistical.py'
              - 'packages/python/goldencheck/goldencheck/drift/detector.py'
              - 'packages/python/goldencheck/goldencheck/relations/composite_key.py'
              - 'packages/python/goldencheck/goldencheck/relations/functional_dependency.py'
              - 'packages/python/goldencheck/goldencheck/relations/approx_fd.py'
              - 'packages/python/goldencheck/goldencheck/profilers/fuzzy_values.py'
              - 'packages/python/goldencheck/tests/core/test_native_parity.py'
              - 'scripts/build_goldencheck_native.py'
            analysis_native:
              # GoldenAnalysis's optional native accelerator (analysis-core/native,
              # PyO3, standalone workspace). Builds the .so and runs the parity
              # suite (which SKIPS when the ext is absent), so without this lane
              # the histogram/quantile kernels are UNTESTED in CI.
              - 'packages/rust/extensions/analysis-native/**'
              - 'packages/rust/extensions/analysis-core/**'
              - 'packages/python/goldenanalysis/goldenanalysis/core/_native_loader.py'
              - 'packages/python/goldenanalysis/goldenanalysis/core/aggregate.py'
              - 'packages/python/goldenanalysis/tests/core/test_native_parity.py'
              - 'scripts/build_analysis_native.py'
            native_flow:
              # GoldenFlow's optional native phone kernel — a standalone maturin
              # workspace, so the `rust` job's cargo test --workspace never
              # builds it and the python matrix runs goldenflow WITHOUT the ext
              # (native path SKIPS). This lane builds the .so + runs the parity
              # suite. Trigger on the crate, the extensions workspace manifest,
              # the Python files it's wired into, and the build script.
              - 'packages/rust/extensions/native-flow/**'
              - 'packages/rust/extensions/Cargo.toml'
              - 'packages/python/goldenflow/goldenflow/core/_native_loader.py'
              - 'packages/python/goldenflow/goldenflow/transforms/_native.py'
              - 'packages/python/goldenflow/goldenflow/transforms/phone.py'
              - 'packages/python/goldenflow/goldenflow/transforms/_fastpath.py'
              - 'packages/python/goldenflow/tests/transforms/test_native_parity.py'
              - 'packages/python/goldenflow/tests/transforms/test_fastpath_parity.py'
              - 'packages/python/goldenflow/scripts/build_native.py'
            goldenembed:
              # Standalone Rust embedding runtime (char n-gram featurize + ONNX
              # inference via ort). Own workspace, not in the `rust` job's
              # `cargo test --workspace`, so it needs its own lane.
              - 'packages/rust/extensions/goldenembed/**'
            embed:
              # goldenmatch-embed: the maturin/pyo3 wheel that exposes the
              # goldenembed runtime to Python (GoldenEmbed.load(...).embed(...)).
              # Own workspace; not in the `rust` job's `cargo test --workspace`,
              # so it needs its own build+smoke lane. The wheel depends on the
              # goldenembed crate, so a goldenembed-only change must re-trigger.
              - 'packages/rust/extensions/embed-py/**'
              - 'packages/rust/extensions/goldenembed/**'
            distributed:
              # Ray-backed distributed paths. The main `python` job installs
              # without the `ray` extra, so every tests/test_distributed_*.py
              # SKIPS there (pytest.importorskip("ray")). The `distributed` job
              # installs ray so they actually run. Trigger on the distributed
              # package, its tests, and the core modules those paths call into
              # (cluster.UnionFind backs two_phase_wcc; ray_backend drives
              # distributed scoring).
              - 'packages/python/goldenmatch/goldenmatch/distributed/**'
              - 'packages/python/goldenmatch/tests/test_distributed_*.py'
              - 'packages/python/goldenmatch/goldenmatch/core/cluster.py'
              - 'packages/python/goldenmatch/goldenmatch/backends/ray_backend.py'
            sail:
              # Sail tier (distributed, Spark Connect). The main `python` job
              # installs without the `sail` extra, so tests/test_sail_*.py SKIP
              # there (pytest.importorskip). The `sail` job installs
              # goldenmatch[sail] (pysail + pyspark[connect]) so they run.
              - 'packages/python/goldenmatch/goldenmatch/sail/**'
              - 'packages/python/goldenmatch/tests/test_sail_*.py'
            action:
              - 'packages/actions/**'
            readme_callouts:
              # README "what's new" callouts are auto-synced from the
              # goldenmatch CHANGELOG by scripts/sync_readme_callouts.py.
              # Trigger the check whenever the source, either target, or
              # the script itself changes.
              - 'README.md'
              - 'packages/python/goldenmatch/README.md'
              - 'packages/python/goldenmatch/CHANGELOG.md'
              - 'scripts/sync_readme_callouts.py'
            pyright_slice:
              - 'pyrightconfig.json'
              - 'packages/python/goldenmatch/goldenmatch/core/autoconfig.py'
              - 'packages/python/goldenmatch/goldenmatch/core/autoconfig_controller.py'
              - 'packages/python/goldenmatch/goldenmatch/core/autoconfig_history.py'
              - 'packages/python/goldenmatch/goldenmatch/core/autoconfig_policy.py'
              - 'packages/python/goldenmatch/goldenmatch/core/autoconfig_rules.py'
              - 'packages/python/goldenmatch/goldenmatch/core/autoconfig_negative_evidence.py'
              - 'packages/python/goldenmatch/goldenmatch/core/autoconfig_memory.py'
              - 'packages/python/goldenmatch/goldenmatch/core/autoconfig_verify.py'
              - 'packages/python/goldenmatch/goldenmatch/core/indicators.py'
              - 'packages/python/goldenmatch/goldenmatch/core/complexity_profile.py'
              - 'packages/python/goldenmatch/goldenmatch/core/scorer.py'
              - 'packages/python/goldenmatch/goldenmatch/config/**'
      # Build the python matrix dynamically: only include packages whose code
      # actually changed. A workflow-file or root-pyproject change expands to
      # all packages so dependency-resolution changes can't slip through.
      - id: set_python
        shell: bash
        env:
          ALL: ${{ steps.filter.outputs.ci_workflow == 'true' || steps.filter.outputs.python_root == 'true' }}
        run: |
          set -euo pipefail
          PKGS=()
          if [ "$ALL" = "true" ]; then
            PKGS=(goldenmatch goldencheck goldencheck-types goldenflow goldenpipe infermap goldensuite-mcp goldenanalysis)
          else
            [ "${{ steps.filter.outputs.python_goldenmatch }}" = "true" ]       && PKGS+=(goldenmatch)
            [ "${{ steps.filter.outputs.python_goldencheck }}" = "true" ]       && PKGS+=(goldencheck)
            [ "${{ steps.filter.outputs.python_goldencheck_types }}" = "true" ] && PKGS+=(goldencheck-types)
            [ "${{ steps.filter.outputs.python_goldenflow }}" = "true" ]        && PKGS+=(goldenflow)
            [ "${{ steps.filter.outputs.python_goldenpipe }}" = "true" ]        && PKGS+=(goldenpipe)
            [ "${{ steps.filter.outputs.python_infermap }}" = "true" ]          && PKGS+=(infermap)
            [ "${{ steps.filter.outputs.python_goldensuite_mcp }}" = "true" ]   && PKGS+=(goldensuite-mcp)
            [ "${{ steps.filter.outputs.python_goldenanalysis }}" = "true" ]    && PKGS+=(goldenanalysis)
          fi
          if [ ${#PKGS[@]} -eq 0 ]; then
            echo "pkgs=[]" >> "$GITHUB_OUTPUT"
          else
            json="["
            for p in "${PKGS[@]}"; do json+="\"$p\","; done
            json="${json%,}]"
            echo "pkgs=$json" >> "$GITHUB_OUTPUT"
          fi

  python:
    needs: changes
    if: needs.changes.outputs.python_pkgs != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        pkg: ${{ fromJSON(needs.changes.outputs.python_pkgs) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            **/pyproject.toml
      - run: uv sync --all-packages
      # Scale-mode DataFusion edge stream (cluster_edges_df.py) lives behind the
      # optional `datafusion` extra, which `uv sync --all-packages` does NOT
      # install. Install it explicitly for the goldenmatch lane so its parity
      # tests actually RUN — they `pytest.importorskip("datafusion")` and would
      # SILENTLY SKIP (a false green) otherwise. test_cluster_edges_df.py also
      # carries a loud no-importorskip guard that fails if this install is missing.
      - if: matrix.pkg == 'goldenmatch'
        run: uv pip install 'datafusion>=53,<54'
      # GoldenAnalysis's suite adapters consume goldenmatch/goldencheck/goldenflow/
      # goldenpipe outputs. uv sync --all-packages installs those workspace members,
      # but install the [match,check,flow,pipe] extras explicitly so the real-producer
      # integration tests (tests/integration/) actually RUN rather than self-skip via
      # their importlib.find_spec markers — the same false-green guard as the
      # goldenmatch datafusion lane above.
      - if: matrix.pkg == 'goldenanalysis'
        run: uv pip install -e 'packages/python/goldenanalysis[match,check,flow,pipe]'
      # Ruff config is driven by the root pyproject.toml [tool.ruff.lint] section
      # (F/I/B-narrowed/UP). Drop the --select override so pyproject's select+ignore wins.
      - run: uv run ruff check packages/python/${{ matrix.pkg }}
      # Arrow-native roadmap Phase 6 (#628): every map_elements call
      # in prep-stage hot paths must carry a # noqa: GM-MAP-ELEMENTS:
      # justification comment. Catches accidentally-added per-row
      # Python before it ships. Lint runs only when goldenmatch is the
      # matrix package (the gated files are goldenmatch-only).
      - if: matrix.pkg == 'goldenmatch'
        run: uv run python scripts/check_map_elements.py
      # DataFusion FFI ScalarUDF gate (Stage B). Build the standalone
      # `datafusion-udf` crate into the project venv and install the Python
      # `datafusion` runtime so tests/test_datafusion_ffi_udf.py can register the
      # native string-scorer UDFs (jaro_winkler / token_sort / levenshtein) via
      # the PyCapsule FFI bridge and diff them against the `goldenmatch._native`
      # per-pair scorers (both delegate to the shared score-core crate). The test
      # HARD-imports goldenmatch_datafusion_udf (no importorskip), so a build
      # break here surfaces as a test FAILURE, not a skip — that's the loud guard
      # for the whole DataFusion spine. goldenmatch-only (the only lane with the
      # test) and a Rust compile, not a Python import, so it can't trip the box's
      # import-hang. The in-tree `_native` ext (which the parity test HARD-
      # asserts) is built in a follow-on step below.
      - if: matrix.pkg == 'goldenmatch'
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: clippy
      - if: matrix.pkg == 'goldenmatch'
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: packages/rust/extensions/datafusion-udf
      - name: Install the datafusion runtime + build the FFI UDF crate (goldenmatch only)
        if: matrix.pkg == 'goldenmatch'
        run: |
          uv pip install 'datafusion>=53,<54'
          # Build a wheel, then `uv pip install` it into the project .venv (the
          # env `uv run pytest` uses). `maturin develop` under `uv run --with
          # maturin` installs into maturin's EPHEMERAL --with overlay env, NOT
          # .venv -> ModuleNotFound at test time. Mirror the native_wheel lane:
          # build the abi3 wheel, then install it into .venv.
          uv run --with maturin maturin build --release \
            --manifest-path packages/rust/extensions/datafusion-udf/Cargo.toml --out dist-dfudf
          uv pip install dist-dfudf/*.whl
      # Stage B: tests/test_datafusion_ffi_udf.py diffs the FFI string scorers
      # against the Python `rapidfuzz` package (the FFI UDFs delegate to the
      # shared score-core crate = rapidfuzz 0.5.0; test_native_parity already
      # proves rust-rapidfuzz == python-rapidfuzz). So this lane does NOT build
      # `_native` — doing so would pull native-only schema tests into this lane.
      # Per-package --ignore lists mirror the pre-fold tuning each repo had
      # (documented in each package's own CLAUDE.md). Without these, packages with
      # known-skip tests would make CI perpetually red and train people to ignore
      # the signal entirely — worse than no step.
      #   goldenmatch: torch segfaults without GPU; postgres tests need a DB; MCP
      #               watch tests are flaky on Linux runners; benchmark datasets
      #               are gitignored (test_autoconfig_benchmarks).
      #   infermap:    duplicate conftest in benchmark/runners/python/tests/.
      # Skip mechanism is path-based (not name-based) so adding a tests/ dir to a
      # currently-skipped package auto-enables it with a visible notice.
      - name: pytest
        shell: bash
        run: |
          if [ ! -d "packages/python/${{ matrix.pkg }}/tests" ]; then
            echo "::notice::No tests/ directory in packages/python/${{ matrix.pkg }} — skipping pytest"
            exit 0
          fi
          IGNORE=""
          case "${{ matrix.pkg }}" in
            goldenmatch)
              IGNORE="--ignore=packages/python/goldenmatch/tests/test_db.py \
                      --ignore=packages/python/goldenmatch/tests/test_reconcile.py \
                      --ignore=packages/python/goldenmatch/tests/test_mcp_and_watch.py \
                      --ignore=packages/python/goldenmatch/tests/test_embedder.py \
                      --ignore=packages/python/goldenmatch/tests/test_llm_boost.py \
                      --ignore=packages/python/goldenmatch/tests/test_autoconfig_benchmarks.py"
              ;;
            infermap)
              IGNORE="--ignore=packages/python/infermap/benchmark"
              ;;
          esac
          # --timeout=120 surfaces any hung test as a failure with a stack
          # trace (vs the whole job timing out at 6h with zero diagnostics).
          # PR #66 hit a goldencheck pytest hang on Linux that didn't
          # reproduce locally — this converts that into actionable signal.
          #
          # For goldenmatch only: also produce coverage.xml in this same
          # pytest run so the floor check (next step) has the artifact
          # without re-executing the suite.
          COV=""
          COV_REPORT=""
          SERIAL_HEAVY=""
          if [ "${{ matrix.pkg }}" = "goldenmatch" ]; then
            COV="--cov=goldenmatch"
            COV_REPORT="--cov-report=xml:packages/python/goldenmatch/coverage.xml --cov-report=term"
            # test_controller_adaptive_e2e runs the FULL real auto-config
            # iteration loop -- the suite's heaviest test. Under `-n auto` +
            # coverage on a 16GB runner its peak OOM-kills an xdist worker
            # (silent "node down: Not properly terminated", no traceback). Run
            # it SERIALLY (full runner memory, no worker contention) and combine
            # coverage via --cov-append so the floor check still sees its lines.
            SERIAL_HEAVY="packages/python/goldenmatch/tests/test_controller_adaptive_e2e.py"
          fi
          # --durations=20 surfaces the slowest tests in the CI log (#433).
          if [ -n "$SERIAL_HEAVY" ]; then
            # Parallel run: everything except the heavy file. Collect coverage
            # data only; the serial run below appends and writes the xml.
            uv run pytest packages/python/${{ matrix.pkg }} -n auto --timeout=120 --timeout-method=thread --durations=20 $COV $IGNORE --ignore="$SERIAL_HEAVY"
            # Serial run for the heavy file: full runner memory, no xdist.
            # Higher per-test timeout (300s vs 120s): this file's
            # test_gate_fires_via_real_iteration_loop runs the FULL auto-config
            # iteration loop on a 100K adversarial fixture (~45s locally; ~2-2.7x
            # under CI coverage instrumentation). Bucket-native-default + the
            # multi-pass/oversized parity work legitimately added per-iteration
            # scoring cost (parity-over-speed, by design), tipping it past the
            # generic 120s. 300s gives ample headroom while still surfacing a
            # genuine hang.
            uv run pytest "$SERIAL_HEAVY" --timeout=300 --timeout-method=thread --durations=20 $COV --cov-append $COV_REPORT
          else
            uv run pytest packages/python/${{ matrix.pkg }} -n auto --timeout=120 --timeout-method=thread --durations=20 $COV $COV_REPORT $IGNORE
          fi
      # Per-module coverage gate (goldenmatch only — other packages don't yet
      # have floors defined). Reads the coverage.xml produced by the pytest
      # step above. Fails CI if any tracked module regresses below its floor
      # in scripts/check_coverage_floors.py. Ratchet floors upward over
      # time; never silently drop a module from the dict.
      - name: Coverage floors (goldenmatch only)
        if: matrix.pkg == 'goldenmatch'
        shell: bash
        run: |
          uv run python scripts/check_coverage_floors.py packages/python/goldenmatch/coverage.xml

  # Visibility lanes for tests that the main `python` job currently --ignores.
  # Each lane runs the gated tests with explicit prerequisites; when prereqs
  # aren't met (no DB credential, no API key), the lane reports "not-configured"
  # with a ::notice:: annotation rather than silently passing or failing.
  # This converts "we have tests but skip them in CI" into auditable signal.
  python_skipped_lanes:
    needs: changes
    # Run when goldenmatch python changed OR the workflow itself changed.
    # Matrix runs all lanes regardless of which prereqs are configured;
    # each lane self-reports its prereq state.
    if: contains(needs.changes.outputs.python_pkgs, 'goldenmatch') || needs.changes.outputs.ci_workflow == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        lane:
          # `db` lane removed 2026-05-10: now runs for real in the
          # `python_postgres` job below, against a services Postgres container.
          - { name: mcp_watch,    tests: "tests/test_mcp_and_watch.py",              needs: "MCP runtime + watch fixtures" }
          - { name: llm_boost,    tests: "tests/test_llm_boost.py",                  needs: "OPENAI_API_KEY secret + torch (segfaults locally)" }
          - { name: embedder,     tests: "tests/test_embedder.py",                   needs: "Vertex AI credentials + torch" }
          - { name: benchmarks,   tests: "tests/test_autoconfig_benchmarks.py",      needs: "DBLP-ACM/Febrl3/NCVR datasets (gitignored)" }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            **/pyproject.toml
      - run: uv sync --all-packages
      - name: Run ${{ matrix.lane.name }} lane
        shell: bash
        env:
          LANE_NAME: ${{ matrix.lane.name }}
          LANE_TESTS: ${{ matrix.lane.tests }}
          LANE_NEEDS: ${{ matrix.lane.needs }}
        run: |
          set -euo pipefail
          # Each lane decides whether its prereqs are met. Today none are
          # configured in CI; lanes report "not-configured" with a clear
          # message so the gap is visible. As prereqs land (Postgres
          # service, API-key secret, etc.) the corresponding lane flips to
          # "configured" and runs its tests.
          case "$LANE_NAME" in
            mcp_watch)
              CONFIGURED="false"  # No MCP runtime fixtures in CI
              ;;
            llm_boost)
              # OPENAI_API_KEY is set as a repo secret only for nightly benchmark runs
              if [ -n "${OPENAI_API_KEY:-}" ]; then CONFIGURED="true"; else CONFIGURED="false"; fi
              ;;
            embedder)
              CONFIGURED="false"  # No Vertex AI service account in CI
              ;;
            benchmarks)
              # benchmarks data lives in tests/benchmarks/datasets (gitignored).
              # Synthetic-fixture benchmarks run separately in the synthetic_benchmarks job.
              if [ -d packages/python/goldenmatch/tests/benchmarks/datasets/DBLP-ACM ]; then
                CONFIGURED="true"
              else
                CONFIGURED="false"
              fi
              ;;
            *)
              CONFIGURED="false"
              ;;
          esac

          if [ "$CONFIGURED" = "true" ]; then
            echo "::notice title=lane $LANE_NAME::prereqs met — running"
            cd packages/python/goldenmatch
            uv run pytest $LANE_TESTS -n auto --timeout=180 --timeout-method=thread
          else
            # Use ::notice:: (not ::warning:: or ::error::) so the lane
            # passes but is auditable. The lane name + needs string surface
            # in the GitHub Checks UI so reviewers can see what's gated.
            echo "::notice title=lane $LANE_NAME (not-configured)::tests skipped — needs: $LANE_NEEDS"
            echo "::notice::To enable this lane, see docs/ci-lanes.md"
            # Exit zero — "not-configured" is informational, not a failure.
            exit 0
          fi

  # Real Postgres lane for goldenmatch.db tests. Boots a Postgres 16 services
  # container (matches the pinned PG version in packages/rust/extensions) and
  # runs `tests/test_db.py` + `tests/test_reconcile.py` against it. The shared
  # fixture in `tests/_pg_helpers.py` provisions a unique database per test
  # off the admin URL and drops it on teardown — no cross-test pollution.
  # Gated by path filter so the lane only fires when DB code or DB tests
  # change (plus workflow self-edits).
  python_postgres:
    needs: changes
    if: |
      needs.changes.outputs.python_goldenmatch_postgres == 'true' ||
      needs.changes.outputs.ci_workflow == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        # `pg_isready` health-check so GH Actions only marks the job started
        # after Postgres is actually accepting connections.
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      # _pg_helpers reads this to provision per-test databases off the admin
      # connection instead of spawning a local `testing.postgresql`.
      GOLDENMATCH_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            **/pyproject.toml
      - run: uv sync --all-packages
      - name: Run Postgres-backed tests
        shell: bash
        run: |
          cd packages/python/goldenmatch
          # -n 0 (serial): per-test DB provisioning + the shared admin
          # connection make xdist worker contention plausible; serial avoids
          # the headache for a small (~30-test) lane.
          uv run pytest tests/test_db.py tests/test_reconcile.py \
            -n 0 --timeout=180 --timeout-method=thread -v

  # Synthetic-fixture benchmark smoke. Runs on every PR against committed
  # synthetic fixtures (t3_synthetic.csv, t3_clean_compat.csv, red_provoking.csv,
  # t1_synthetic.csv) so a regression in the auto-config controller is caught
  # at PR time without needing the gitignored real benchmark datasets.
  # Real-benchmark runs (DBLP-ACM/Febrl3/NCVR/DQbench) live in the separate
  # benchmarks.yml workflow (schedule + workflow_dispatch).
  synthetic_benchmarks:
    needs: changes
    if: contains(needs.changes.outputs.python_pkgs, 'goldenmatch') || needs.changes.outputs.ci_workflow == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            **/pyproject.toml
      - run: uv sync --all-packages
      - name: Run synthetic benchmarks
        shell: bash
        run: |
          # Each synthetic test asserts an end-to-end behavioral contract
          # (T3 collision pairs filtered, T1 corruption pairs deduplicated,
          # red_provoving fixture commits a config, etc.). Failure here means
          # a PR broke something the unit tests didn't catch.
          cd packages/python/goldenmatch
          uv run pytest \
            tests/test_dqbench_t1_recovery.py \
            tests/test_dqbench_t3_recovery.py \
            -n auto --timeout=180 --timeout-method=thread -v
      - name: Synthetic benchmark summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Synthetic benchmark results"
            echo ""
            echo "These run against committed synthetic fixtures on every PR."
            echo "Real-benchmark runs (DBLP-ACM/Febrl3/NCVR/DQbench) require gitignored datasets and run via the separate \`benchmarks.yml\` workflow."
          } >> "$GITHUB_STEP_SUMMARY"

  # Smoke lane for `scripts/run_benchmarks.py` and the committed
  # `scripts/dqbench_adapters/` helpers. The real-dataset runs live in
  # `benchmarks.yml` (Mondays + workflow_dispatch); this lane catches
  # packaging regressions (broken imports, sys.path issues, helper
  # renames) on every PR that touches the runner without needing the
  # gitignored DBLP/NCVR/dqbench datasets.
  #
  # `continue-on-error: true` so a regression here surfaces as a visible
  # red X without blocking merges — the runner is tooling, not a release
  # gate. Real number reproducibility is gated by the benchmarks.yml
  # workflow.
  benchmark_runner_smoke:
    needs: changes
    if: needs.changes.outputs.benchmark_runner == 'true' || needs.changes.outputs.ci_workflow == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            **/pyproject.toml
      - run: uv sync --all-packages
      # `recordlinkage` ships the Febrl3 dataset bundled — installing it
      # lets the smoke run actually exercise the febrl3 helper end-to-end
      # without needing any gitignored dataset. The other three datasets
      # (DBLP-ACM, NCVR, DQbench) are gracefully skipped by the runner
      # when their files / CLIs aren't on disk.
      - run: uv pip install recordlinkage pyarrow
      - name: Import smoke
        shell: bash
        run: |
          uv run python -c "
          import sys
          from pathlib import Path
          sys.path.insert(0, 'scripts')
          import dqbench_adapters
          from dqbench_adapters import febrl3, ncvr, leipzig_eval
          # goldenmatch_zeroconfig requires dqbench (optional, not installed in CI) — skip import smoke
          print('dqbench_adapters package + 3 standalone helpers imported OK')
          "
      - name: Run benchmarks --help
        shell: bash
        run: |
          uv run python scripts/run_benchmarks.py --help
      - name: Run febrl3 end-to-end
        shell: bash
        env:
          GOLDENMATCH_AUTOCONFIG_MEMORY: "0"
        run: |
          uv run python scripts/run_benchmarks.py \
            --datasets febrl3 --output /tmp/febrl3_smoke.json
          # F1 floor is well below the published 0.9443 number; the lane
          # protects the runner's wiring, not its accuracy. Real floor
          # lives in tests/test_autoconfig_benchmarks.py.
          uv run python -c "
          import json
          r = json.load(open('/tmp/febrl3_smoke.json'))['results'][0]
          # #438: 0.80 -> 0.85 (DOB + surname-substring blocking passes),
          # then 0.85 -> 0.90 after #538's composite name+DOB exact matchkey
          # lifted the CI-measured F1 to 0.9124 (deterministic, memory off).
          assert r['f1'] >= 0.90, f'Febrl3 smoke regressed: {r}'
          print('febrl3 smoke F1=', r['f1'])
          "
      - name: Smoke summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Benchmark runner smoke"
            echo ""
            echo "Imports + \`--help\` + a real Febrl3 run (the only published dataset that ships via pip)."
            echo "DBLP-ACM / NCVR / DQbench composite reproduce against gitignored datasets in \`benchmarks.yml\`."
          } >> "$GITHUB_STEP_SUMMARY"

  typescript:
    needs: changes
    if: needs.changes.outputs.typescript == 'true' || needs.changes.outputs.ci_workflow == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8
        # Reads version from root package.json `packageManager` field.
        # That field MUST be exact semver (pnpm@9.15.0) — ranges error.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20
          cache: pnpm
        # cache: pnpm requires (a) pnpm on PATH (handled above) and
        # (b) pnpm-lock.yaml committed at repo root.
      - run: pnpm install --frozen-lockfile
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: .turbo
          key: turbo-${{ github.sha }}
          restore-keys: turbo-
      # `lint` is omitted: every TS package's lint script is currently identical
      # to its typecheck script (`tsc --noEmit`), so running both wastes a turbo
      # task per package on cold runs. Re-add `lint` here when ESLint lands and
      # the scripts diverge.
      - run: pnpm turbo run build test typecheck

  wasm_score:
    needs: changes
    if: needs.changes.outputs.wasm_score == 'true' || needs.changes.outputs.ci_workflow == 'true'
    # Opt-in WASM scorer lane: builds the score-wasm artifact, then runs the
    # parity test UN-skipped (it skips elsewhere with no artifact) + an
    # informational benchmark. The artifact-free wasm-backend/wasm-fallback unit
    # tests already run in the `typescript` lane above.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: packages/rust/extensions/score-wasm
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build WASM artifact (installs the matching wasm-bindgen-cli)
        run: bash packages/rust/extensions/score-wasm/build_wasm.sh
      - name: Build shared wasm-runtime (the parity test imports goldenmatch-wasm-runtime)
        run: pnpm --filter goldenmatch-wasm-runtime build
      - name: WASM parity (un-skipped — artifact now present) [THE GATE]
        run: pnpm --filter goldenmatch exec vitest run tests/parity/wasm-scorer.test.ts
      - name: Benchmark (informational; dist artifact-path under tsup bundling TBD on first run)
        continue-on-error: true
        run: |
          pnpm --filter goldenmatch build
          node packages/typescript/goldenmatch/scripts/bench_wasm_scorer.mjs 1500

  analysis_wasm:
    needs: changes
    if: needs.changes.outputs.analysis_wasm == 'true' || needs.changes.outputs.ci_workflow == 'true'
    # Opt-in WASM aggregate lane: builds the analysis-wasm artifact, then runs the
    # parity test UN-skipped (it skips elsewhere with no artifact) + an
    # informational benchmark. The artifact-free goldenanalysis tests + the
    # shared goldenmatch-wasm-runtime build run in the `typescript` lane above.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: packages/rust/extensions/analysis-wasm
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build WASM artifact (installs the matching wasm-bindgen-cli)
        run: bash packages/rust/extensions/analysis-wasm/build_wasm.sh
      - name: Build shared wasm-runtime (the parity test imports goldenmatch-wasm-runtime)
        run: pnpm --filter goldenmatch-wasm-runtime build
      - name: WASM aggregate parity (un-skipped — artifact now present) [THE GATE]
        run: pnpm --filter goldenanalysis exec vitest run tests/parity/wasm-aggregate.test.ts
      - name: Benchmark (informational; dist artifact-path under tsup bundling TBD on first run)
        continue-on-error: true
        run: |
          pnpm --filter goldenanalysis build
          node packages/typescript/goldenanalysis/scripts/bench_wasm_aggregate.mjs 1000000

  web_ui_e2e:
    needs: changes
    if: needs.changes.outputs.web_ui_e2e == 'true' || needs.changes.outputs.ci_workflow == 'true'
    # End-to-end smoke for the goldenmatch[web] UI: builds the frontend,
    # boots the FastAPI backend against the pytest fixture project, runs
    # one Playwright scenario covering home → run → cluster.
    # The TS job above already exercises `pnpm build` and the vitest unit
    # tests via turbo — this job adds the Python+browser integration that
    # turbo can't cover.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20
          cache: pnpm
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pnpm install --frozen-lockfile
      - name: Install goldenmatch[web]
        run: pip install -e "packages/python/goldenmatch[web]"
      - name: Build + stage frontend into wheel-include path
        run: python packages/python/goldenmatch/scripts/build_web.py
      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Playwright browsers
        run: pnpm -C packages/python/goldenmatch/web/frontend exec playwright install --with-deps chromium
      - name: Playwright smoke
        run: pnpm -C packages/python/goldenmatch/web/frontend exec playwright test
      - name: Upload Playwright trace on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: playwright-trace
          path: packages/python/goldenmatch/web/frontend/test-results
          if-no-files-found: ignore

  rust:
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci_workflow == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: packages/rust/extensions
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      # The bridge embeds CPython (pyo3 auto-initialize) and calls the goldenmatch
      # Python API. Provision a CLEAN interpreter -- the system python3 carries a
      # debian-managed typing_extensions (no RECORD) that pip can't upgrade for
      # goldenmatch's pydantic. Install goldenmatch into it and pin PYO3_PYTHON +
      # LD_LIBRARY_PATH so the bridge build embeds that same interpreter and the
      # test binary loads its libpython at runtime. Then the bridge tests exercise
      # the marshalling surface for real instead of self-skipping
      # (GOLDENMATCH_BRIDGE_REQUIRE_PY=1 below -> a Python failure is a hard fail).
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      - name: Install goldenmatch + pin the pyo3 interpreter
        run: |
          python -m pip install goldenmatch pyarrow
          echo "PYO3_PYTHON=$(which python)" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$(python -c 'import sysconfig; print(sysconfig.get_config_var("LIBDIR"))')" >> "$GITHUB_ENV"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: |
            packages/rust/extensions
            packages/rust/extensions/graph-core
            packages/rust/extensions/score-core
      - run: cargo test --workspace
        # Bridge tests now hard-require goldenmatch (installed above) -- a Python
        # import/marshalling failure fails the lane instead of silently skipping.
        env:
          GOLDENMATCH_BRIDGE_REQUIRE_PY: "1"
      - run: cargo clippy --workspace -- -D warnings
      # The standalone pyo3-free sibling crates (graph-core, score-core) are
      # each their own [workspace], so `cargo test --workspace` above (which
      # only builds the `bridge` member) never touches them. Their logic IS
      # exercised indirectly (native parity + the datafusion FFI tests), but
      # their own unit tests + clippy were dead in CI. Run them explicitly.
      - run: cargo test --manifest-path graph-core/Cargo.toml
      - run: cargo clippy --manifest-path graph-core/Cargo.toml -- -D warnings
      - run: cargo test --manifest-path score-core/Cargo.toml
      - run: cargo clippy --manifest-path score-core/Cargo.toml -- -D warnings

  # Measured Rust line coverage (cargo-llvm-cov). The structural audit's unit
  # tests (graph-core / score-core / fingerprint-core / native / bridge) are now
  # QUANTIFIED + tracked, so coverage regressions and remaining cold spots are
  # visible per PR instead of guessed at. Informational baseline (no floor gate
  # yet): each crate is measured independently and a failure to instrument
  # degrades to "(failed)" in the job summary rather than blocking the job.
  # Reuses the rust job's setup-python + goldenmatch dance so the bridge/native
  # tests run under instrumentation (a skipped test would understate coverage).
  rust_coverage:
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci_workflow == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: packages/rust/extensions
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: llvm-tools-preview
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      - name: Install goldenmatch + pin the pyo3 interpreter
        run: |
          python -m pip install goldenmatch pyarrow
          echo "PYO3_PYTHON=$(which python)" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$(python -c 'import sysconfig; print(sysconfig.get_config_var("LIBDIR"))')" >> "$GITHUB_ENV"
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      - name: Measure per-crate line coverage
        env:
          GOLDENMATCH_BRIDGE_REQUIRE_PY: "1"
        run: |
          echo "## Rust line coverage (cargo-llvm-cov --summary-only)" >> "$GITHUB_STEP_SUMMARY"
          measure() {
            local label="$1"; shift
            echo "### $label" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            if cargo llvm-cov --summary-only "$@" >/tmp/cov.txt 2>/tmp/cov.err; then
              local total
              total=$(grep -iE "TOTAL" /tmp/cov.txt | tail -1)
              [ -z "$total" ] && total=$(tail -1 /tmp/cov.txt)
              echo "COVERAGE_RESULT ${label} | ${total}"   # grep-able marker in the job log
              echo "$total" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "COVERAGE_RESULT ${label} | FAILED"
              echo "::warning::rust_coverage: ${label} failed to instrument"
              sed -n '1,15p' /tmp/cov.err || true
              echo "(coverage run failed -- see job log)" >> "$GITHUB_STEP_SUMMARY"
            fi
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          }
          measure "bridge"           --workspace
          measure "native"           --no-default-features --manifest-path native/Cargo.toml
          measure "graph-core"       --manifest-path graph-core/Cargo.toml
          measure "score-core"       --manifest-path score-core/Cargo.toml
          measure "fingerprint-core" --manifest-path fingerprint-core/Cargo.toml
          measure "goldenembed"      --manifest-path goldenembed/Cargo.toml

  # Native acceleration extension (PyO3). The crate is a standalone workspace
  # (its `extension-module` pyo3 feature is incompatible with the bridge's
  # `auto-initialize`), so the `rust` job above never builds it. This lane
  # builds the .so into the goldenmatch package and runs the Python parity
  # suite — which `skipif`s when the ext is absent, so without this lane the
  # native kernels would be UNTESTED in CI. The parity tests assert the native
  # path matches the pure-Python path bit-for-bit (GOLDENMATCH_NATIVE 0 vs 1).
  native:
    needs: changes
    if: needs.changes.outputs.native == 'true' || needs.changes.outputs.ci_workflow == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: packages/rust/extensions/native
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            **/pyproject.toml
      - run: uv sync --all-packages
      - name: Diagnostics (toolchain + dep versions)
        run: |
          (cd packages/rust/extensions/native && rustc --version && cargo clippy --version)
          uv run python -c "import sys, rapidfuzz, polars; print('python', sys.version.split()[0], 'rapidfuzz', rapidfuzz.__version__, 'polars', polars.__version__)"
      - name: clippy (native crate)
        working-directory: packages/rust/extensions/native
        run: cargo clippy --release -- -D warnings
      - name: clippy + test (fingerprint-core crate)
        # Shared pyo3-free canonicalizer (also a dep of the pgrx crate). Its own
        # unit tests pin the canonical vectors; the native parity + pgrx pg_test
        # exercise it through each surface.
        working-directory: packages/rust/extensions/fingerprint-core
        run: |
          cargo clippy -- -D warnings
          cargo test
      - name: Unit-test the native kernels (pure-Rust helpers)
        # extension-module is gated behind a default feature so the test binary
        # can link libpython (--no-default-features turns it off). Covers
        # soundex/featurize/pairs-math/C-ABI logic that the Python parity suite
        # only exercises indirectly. Build below still uses default features.
        timeout-minutes: 5
        working-directory: packages/rust/extensions/native
        env:
          PYO3_PYTHON: /usr/bin/python3
        run: |
          sudo apt-get update && sudo apt-get install -y libpython3-dev
          cargo test --no-default-features
      - name: Build native extension into the package
        # No --offline: CI has network + a cold cache on first run.
        run: uv run python scripts/build_native.py
      - name: Install ONNX runtime (exercises the in-house embedder export path)
        # The [inhouse-embeddings] extra; without it the ONNX parity tests skip.
        run: uv pip install onnx onnxruntime
      - name: Parity + in-house suite (ext present -> native path runs, not skips)
        run: |
          uv run pytest \
            packages/python/goldenmatch/tests/test_native_parity.py \
            packages/python/goldenmatch/tests/test_native_block_seq_parity.py \
            packages/python/goldenmatch/tests/test_record_fingerprint.py \
            packages/python/goldenmatch/tests/test_pairs.py \
            packages/python/goldenmatch/tests/test_embeddings.py \
            packages/python/goldenmatch/tests/test_inhouse_embedder.py \
            -v

  # GoldenCheck native parity: the goldencheck-native ext (PyO3, standalone
  # workspace) isn't built by the `rust` job's `cargo test --workspace`. This
  # lane clippy's the crates, builds the .so into the goldencheck package, and
  # runs the parity suite — which `skipif`s when the ext is absent, so without
  # this lane the goldencheck kernels would be UNTESTED in CI. Parity asserts the
  # native path matches pure-Python (Benford byte-identical; composite-key/FD
  # integer-exact), incl. a GOLDENCHECK_NATIVE=1 required-mode run.
  goldencheck_native:
    needs: changes
    if: needs.changes.outputs.goldencheck_native == 'true' || needs.changes.outputs.ci_workflow == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: packages/rust/extensions/goldencheck-native
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            **/pyproject.toml
      - run: uv sync --all-packages
      - name: clippy + test (goldencheck-core, pyo3-free kernels)
        working-directory: packages/rust/extensions/goldencheck-core
        run: |
          cargo clippy -- -D warnings
          cargo test
      - name: clippy (goldencheck-native ext crate)
        working-directory: packages/rust/extensions/goldencheck-native
        run: cargo clippy --release -- -D warnings
      - name: Build native extension into the package
        # No --offline: CI has network + a cold cache on first run.
        run: uv run python scripts/build_goldencheck_native.py
      - name: Install deep-profiling + Arrow deps the parity tests need
        # baseline (numpy/scipy) for the Benford path; pyarrow is the Arrow C
        # Data Interface bridge the kernels read through (the [native] extra).
        run: uv pip install numpy scipy pyarrow
      - name: Parity suite (ext present -> native path runs, not skips)
        run: |
          uv run pytest \
            packages/python/goldencheck/tests/core/test_native_parity.py \
            packages/python/goldencheck/tests/relations/test_composite_key.py \
            packages/python/goldencheck/tests/relations/test_approx_duplicate.py \
            packages/python/goldencheck/tests/relations/test_functional_dependency.py \
            packages/python/goldencheck/tests/relations/test_approx_fd.py \
            packages/python/goldencheck/tests/profilers/test_fuzzy_values.py \
            -v
      - name: Required-native mode (GOLDENCHECK_NATIVE=1 must use the kernel)
        env:
          GOLDENCHECK_NATIVE: "1"
        run: uv run pytest packages/python/goldencheck/tests/core -q

  # GoldenAnalysis native parity: the analysis-native ext (PyO3, standalone
  # workspace) isn't built by the `rust` job. This lane clippy's the crates,
  # builds the .so into the goldenanalysis package, and runs the parity suite —
  # which `skipif`s when the ext is absent. Parity asserts the native histogram/
  # quantile match pure-Python byte-for-byte, incl. a GOLDENANALYSIS_NATIVE=1
  # required-mode run. `_GATED_ON` is empty, so this proves the kernels are READY,
  # not yet wired into the pure path (the wall-verified flip is a follow-up).
  goldenanalysis_native:
    needs: changes
    if: needs.changes.outputs.analysis_native == 'true' || needs.changes.outputs.ci_workflow == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: packages/rust/extensions/analysis-native
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            **/pyproject.toml
      - run: uv sync --all-packages
      - name: clippy + test (analysis-core, pyo3-free kernels)
        working-directory: packages/rust/extensions/analysis-core
        run: |
          cargo clippy -- -D warnings
          cargo test
      - name: clippy (analysis-native ext crate)
        working-directory: packages/rust/extensions/analysis-native
        run: cargo clippy --release -- -D warnings
      - name: Build native extension into the package
        # No --offline: CI has network + a cold cache on first run.
        run: uv run python scripts/build_analysis_native.py
      - name: Parity suite (ext present -> native path runs, not skips)
        run: |
          uv run pytest \
            packages/python/goldenanalysis/tests/core/test_native_parity.py \
            -v
      - name: Required-native mode (GOLDENANALYSIS_NATIVE=1 must import the wheel)
        env:
          GOLDENANALYSIS_NATIVE: "1"
        run: uv run pytest packages/python/goldenanalysis/tests/core -q

  # goldenmatch-native distribution smoke: build the SEPARATE maturin/abi3
  # wheel (the polars / polars-runtime split) and prove the runtime loads
  # through the wheel path. Distinct from `native`, which builds the in-tree
  # `goldenmatch._native` .so via build_native.py and runs the parity suite.
  # Here we deliberately DON'T run build_native.py, so the loader must fall
  # back to `goldenmatch_native._native` from the installed wheel.
  native_wheel:
    needs: changes
    if: needs.changes.outputs.native == 'true' || needs.changes.outputs.ci_workflow == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: packages/rust/extensions/native
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            **/pyproject.toml
      # Frontend only (pure-Python goldenmatch); NO build_native.py, so
      # `goldenmatch._native` is absent and the loader must use the wheel.
      - run: uv sync --all-packages
      - name: Build the goldenmatch-native wheel (maturin, abi3)
        run: uv run --with maturin maturin build --release --manifest-path packages/rust/extensions/native/Cargo.toml --out dist
      - name: Install the wheel + smoke-test the split
        run: |
          uv pip install dist/goldenmatch_native-*.whl
          uv run python - <<'PY'
          import goldenmatch_native  # the separately-distributed runtime package
          from goldenmatch.core import _native_loader
          mod = _native_loader.native_module()
          assert mod is not None, "loader did not discover goldenmatch_native"
          assert mod.__name__ == "goldenmatch_native._native", mod.__name__
          fp = mod.record_fingerprint({"a": "x"})
          assert fp == "7381d5ba2dac5be0af49232a3209ab8d0dc2e4ed804a60ce533fdfe5254307e3", fp
          assert _native_loader.native_enabled("hashing") is True
          print("OK: goldenmatch-native wheel loads via the split path; fingerprint vector matches")
          PY

  # GoldenFlow's optional native phone kernel is a standalone maturin workspace,
  # so the `rust` job's cargo test --workspace never builds it and the python
  # matrix runs goldenflow WITHOUT the ext (the native path SKIPS). This lane
  # builds the in-tree goldenflow._native .so via build_native.py and runs the
  # parity suite with the ext PRESENT, so the NANP-gated native path actually
  # executes (GOLDENFLOW_NATIVE auto, plus the explicit 0/1 env tests) and is
  # asserted byte-identical to the pure phonenumbers reference. Mirrors `native`.
  native_flow:
    needs: changes
    if: needs.changes.outputs.native_flow == 'true' || needs.changes.outputs.ci_workflow == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: packages/rust/extensions/native-flow
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            **/pyproject.toml
      - run: uv sync --all-packages
      - name: clippy + fmt (native-flow crate)
        working-directory: packages/rust/extensions/native-flow
        run: |
          cargo fmt --check
          cargo clippy --release -- -D warnings
      - name: Build native extension into the package
        # No --offline: CI has network + a cold cache on first run.
        run: uv run python packages/python/goldenflow/scripts/build_native.py
      - name: Install pyarrow (zero-copy Series<->kernel bridge for the native path)
        # goldenflow core doesn't depend on pyarrow (only the [native] extra
        # does); without it the native runner returns None and the parity tests
        # that import pyarrow error at collection. Install it explicitly.
        run: uv pip install pyarrow
      - name: Parity suite (ext present -> NANP-gated native path runs, not skips)
        run: |
          uv run pytest \
            packages/python/goldenflow/tests/transforms/test_native_parity.py \
            packages/python/goldenflow/tests/transforms/test_fastpath_parity.py \
            packages/python/goldenflow/tests/transforms/test_phone.py \
            packages/python/goldenflow/tests/transforms/test_dates.py \
            -v

  # goldenflow-native distribution smoke: build the SEPARATE maturin/abi3 wheel
  # and prove the runtime loads through the wheel path. Distinct from
  # `native_flow`, which builds the in-tree goldenflow._native .so via
  # build_native.py. Here we deliberately DON'T run build_native.py, so the
  # loader must fall back to `goldenflow_native._native` from the wheel.
  native_flow_wheel:
    needs: changes
    if: needs.changes.outputs.native_flow == 'true' || needs.changes.outputs.ci_workflow == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: packages/rust/extensions/native-flow
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            **/pyproject.toml
      # Frontend only (pure-Python goldenflow); NO build_native.py, so
      # `goldenflow._native` is absent and the loader must use the wheel.
      - run: uv sync --all-packages
      - name: Build the goldenflow-native wheel (maturin, abi3)
        run: uv run --with maturin maturin build --release --manifest-path packages/rust/extensions/native-flow/Cargo.toml --out dist
      - name: Install the wheel + smoke-test the split
        run: |
          uv pip install pyarrow dist/goldenflow_native-*.whl
          uv run python - <<'PY'
          import pyarrow as pa
          import goldenflow_native  # the separately-distributed runtime package
          from goldenflow.core import _native_loader
          mod = _native_loader.native_module()
          assert mod is not None, "loader did not discover goldenflow_native"
          assert mod.__name__ == "goldenflow_native._native", mod.__name__
          assert _native_loader.native_enabled("phone") is True
          # nanp_only kernel: NANP resolves, international -> null (Python settles)
          out = mod.phone_e164_arrow(
              pa.array(["(201) 555-0123", "+44 20 7946 0958"], type=pa.string()), "US", True
          ).to_pylist()
          assert out == ["+12015550123", None], out
          print("OK: goldenflow-native wheel loads via the split path; nanp_only kernel correct")
          PY

  # Standalone Rust embedding runtime (goldenembed): builds the crate (which
  # links onnxruntime via the `ort` crate) and runs the featurizer unit tests.
  # The full ONNX-inference parity vs Python is validated out-of-CI against a
  # trained model; the unit tests cover the deterministic featurizer here.
  goldenembed:
    needs: changes
    if: needs.changes.outputs.goldenembed == 'true' || needs.changes.outputs.ci_workflow == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: packages/rust/extensions/goldenembed
      - name: clippy
        working-directory: packages/rust/extensions/goldenembed
        run: cargo clippy --release --all-targets -- -D warnings
      - name: test
        working-directory: packages/rust/extensions/goldenembed
        run: cargo test --release

  # goldenmatch-embed wheel smoke: build the SEPARATE maturin/pyo3 wheel
  # (packages/rust/extensions/embed-py/) that exposes the goldenembed runtime
  # to Python and prove it loads + embeds a saved fixture model. Distinct from
  # `goldenembed`, which only clippy/tests the underlying Rust crate. maturin
  # normalizes the dist name `goldenmatch-embed` -> `goldenmatch_embed`.
  embed_wheel:
    needs: changes
    if: needs.changes.outputs.embed == 'true' || needs.changes.outputs.ci_workflow == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: packages/rust/extensions/embed-py
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            **/pyproject.toml
      - run: uv sync --all-packages
      - name: Build the goldenmatch-embed wheel (maturin, pyo3)
        run: uv run --with maturin maturin build --release --manifest-path packages/rust/extensions/embed-py/Cargo.toml --out dist
      - name: Install the wheel + smoke-test load/embed
        run: |
          uv pip install dist/goldenmatch_embed-*.whl
          uv run python - <<'PY'
          from goldenmatch_embed import GoldenEmbed
          import math, pathlib
          model_dir = "packages/rust/extensions/goldenembed/tests/fixtures/tiny_model"
          m = GoldenEmbed.load(model_dir)
          vecs = m.embed(["John Smith", "Jon Smyth"])
          assert len(vecs) == 2, vecs
          assert m.dim == len(vecs[0]) > 0, (m.dim, len(vecs[0]))
          assert all(math.isfinite(x) for x in vecs[0]), "non-finite embedding value"
          # Best-effort parity vs the Python in-house path (acceptance: within tolerance).
          # Skip if the in-house embedder can't load this fixture in CI (don't fail the lane on that).
          try:
              from goldenmatch.embeddings import embed_records
              ref = embed_records(["John Smith"], provider="inhouse", model=model_dir)[0]
              a = vecs[0]
              dot = sum(x*y for x, y in zip(a, ref)); na = math.sqrt(sum(x*x for x in a)); nb = math.sqrt(sum(y*y for y in ref))
              cos = dot/(na*nb) if na and nb else 0.0
              assert cos >= 0.999, f"wheel vs in-house cosine {cos} < 0.999"
              print(f"OK: goldenmatch-embed wheel loads + embeds; in-house parity cosine={cos:.6f}")
          except ImportError as e:
              print(f"OK: goldenmatch-embed wheel loads + embeds (dim={m.dim}); in-house parity skipped ({e})")
          PY

  # Ray-backed distributed lane. The full goldenmatch `python` job runs
  # `uv sync --all-packages` WITHOUT the optional `ray` extra, so every
  # tests/test_distributed_*.py SKIPS there via `pytest.importorskip("ray")`.
  # Installing ray here makes them actually execute — most importantly the
  # quality-invariance gate in test_distributed_clustering.py, which asserts
  # the three distributed routes (scipy.csgraph / label propagation /
  # two-phase WCC) produce the SAME connected components as the in-memory
  # build_clusters AND are invariant to Ray partition count (1/2/3/7).
  distributed:
    needs: changes
    if: needs.changes.outputs.distributed == 'true' || needs.changes.outputs.ci_workflow == 'true'
    runs-on: ubuntu-latest
    # 30 (was 20): the #844 randomized-contraction WCC ray gate adds a ~3.5 min
    # blocking step on top of the invariance gate (~5.5 min) + broad coverage
    # (~9.5 min) + setup, which pushed the total past the old 20 min cap (the job
    # was cancelled mid-run -> spurious "distributed" failure). 30 gives headroom.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            **/pyproject.toml
      - run: uv sync --all-packages
      # ray is an optional extra; install it into the uv venv so the ray-gated
      # tests/test_distributed_*.py actually run (they skip everywhere else via
      # pytest.importorskip). pandas<3 because ray pins pandas<3.
      - name: Install ray extra
        run: uv pip install 'ray[default]>=2.0' 'pandas<3'
      # CRITICAL: run the ray tests with the venv python DIRECTLY, not `uv run`.
      # Under `uv run`, ray's raylet spawns workers via uv, which hits a
      # VIRTUAL_ENV mismatch, ignores the venv, and launches a python with no
      # ray on its path -> every worker dies (ModuleNotFoundError: ray) and all
      # tasks hang forever ("object not ready"). Diagnosed 2026-05-26 on a
      # hosted runner via the worker logs. `.venv/bin/python` makes ray spawn
      # workers that can import ray. Serial (no -n auto): xdist workers would
      # each start a ray cluster and race on ports.
      # --timeout=300 (not 120): the label-prop partition-count invariance cases
      # iterate to fixpoint on chains (label-prop's worst case) and sit ~100s on
      # a 2-core hosted runner; 120s clipped them. Job-level timeout-minutes: 30
      # is the real backstop.
      #
      # GATE (blocking): the quality-invariance gate is this lane's reason for
      # existing -- it proves the three distributed clustering routes agree with
      # the in-memory build_clusters and are invariant to Ray partition count.
      - name: Distributed quality-invariance gate (blocking)
        run: |
          .venv/bin/python -c "import ray, scipy, polars; print('ray', ray.__version__)"
          .venv/bin/python -m pytest packages/python/goldenmatch/tests/test_distributed_clustering.py \
            --timeout=300 --durations=20 -v
      # GATE (blocking, #844): the randomized-contraction WCC is new + clean (no
      # pre-existing fragility), so its ray-gated tests gate here rather than
      # riding the non-blocking broad-coverage step. Proves the distributed path
      # matches the scipy-verified pure-Polars driver + the routing contract.
      - name: Randomized-contraction WCC ray gate (blocking)
        run: |
          .venv/bin/python -m pytest packages/python/goldenmatch/tests/test_distributed_randomized_contraction_wcc.py \
            --timeout=300 --durations=20 -v
      # BROAD COVERAGE (non-blocking): the rest of the ray-gated suite (controller
      # / pipeline / golden / e2e). These exercise real ray execution but several
      # carry pre-existing, ray-independent fragilities surfaced the first time
      # they actually ran (e.g. degenerate single-/few-value fixtures that explode
      # the in-memory blocking+clustering path, and an RSS-growth threshold tuned
      # for a different runner). They run here for visibility but must not block an
      # unrelated PR. Tracked for follow-up; do not gate on them until cleaned up.
      - name: Distributed broad coverage (non-blocking)
        continue-on-error: true
        run: |
          .venv/bin/python -m pytest packages/python/goldenmatch/tests/test_distributed_*.py \
            --ignore=packages/python/goldenmatch/tests/test_distributed_clustering.py \
            --ignore=packages/python/goldenmatch/tests/test_distributed_randomized_contraction_wcc.py \
            --timeout=300 --durations=20 -v

  # Sail tier (distributed, Spark Connect). The Sail tier re-expresses the
  # one-box DataFusion spine's relational plan against PySpark/Spark Connect.
  # This lane installs goldenmatch[sail] (pysail + pyspark[connect]) and runs
  # tests/test_sail_*.py against an in-process Sail Spark Connect server (they
  # SKIP everywhere else via pytest.importorskip). Spec:
  # docs/superpowers/specs/2026-06-03-sail-tier-design.md (Stage S1).
  sail:
    needs: changes
    if: needs.changes.outputs.sail == 'true' || needs.changes.outputs.ci_workflow == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            **/pyproject.toml
      - run: uv sync --all-packages
      # Sail (Spark Connect) optional stack. NO Java: pyspark[connect] is a
      # pure-gRPC client (no py4j/JVM launch) and the Sail server is Rust.
      # Install VIA THE EXTRA so the pyproject [sail] entry is exercised.
      - name: Install sail extra
        run: uv pip install -e 'packages/python/goldenmatch[sail]'
      # Run with the venv python directly (NOT `uv run`): the Sail server
      # spawns in-process; mirror the ray lane's venv-python discipline.
      - name: Sail connectivity gate (blocking)
        run: |
          .venv/bin/python -c "import pysail, pyspark; print('pyspark', pyspark.__version__)"
          .venv/bin/python -m pytest packages/python/goldenmatch/tests/test_sail_connectivity.py -v --timeout=300
      # GATE (blocking): the S1 score/dedup pair-set parity vs a python-rapidfuzz
      # reference -- the reason this lane exists at S1.
      - name: Sail score/dedup parity gate (blocking)
        run: |
          .venv/bin/python -m pytest packages/python/goldenmatch/tests/test_sail_score_parity.py -v --timeout=300
      # GATE (blocking): connected-components partition parity -- the make-or-
      # break S2 gate (the Union-Find holdout, computed distributed on Sail).
      - name: Sail WCC parity gate (blocking)
        run: |
          .venv/bin/python -m pytest packages/python/goldenmatch/tests/test_sail_clustering_parity.py -v --timeout=300
      # GATE (blocking): golden survivorship content parity per multi-member
      # cluster vs the one-box merge_field primitive (S3).
      - name: Sail golden parity gate (blocking)
        run: |
          .venv/bin/python -m pytest packages/python/goldenmatch/tests/test_sail_golden_parity.py -v --timeout=300
      # GATE (blocking): identity create + edge-emit parity vs the one-box
      # resolve_clusters on a fresh store (S5) -- same_as edge-set + record->
      # entity partition equivalence + count + determinism.
      - name: Sail identity parity gate (blocking)
        run: |
          .venv/bin/python -m pytest packages/python/goldenmatch/tests/test_sail_identity_parity.py -v --timeout=300
      # GATE (blocking): the full Sail pipeline (load->...->golden[->identity])
      # runs end-to-end on Sail (S4 + S5 emit_identity).
      - name: Sail end-to-end pipeline gate (blocking)
        run: |
          .venv/bin/python -m pytest packages/python/goldenmatch/tests/test_sail_pipeline.py -v --timeout=300

  action:
    needs: changes
    if: needs.changes.outputs.action == 'true' || needs.changes.outputs.ci_workflow == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - run: test -f packages/actions/goldencheck/action.yml && echo "action.yml present"

  # Postgres extension build + smoke test across PG 15 / 16 / 17. The pgrx
  # crate is excluded from the cargo workspace (pgrx workspace-mode is
  # broken), so the main `rust` job's `cargo test --workspace` never
  # touches it — this lane covers the gap.
  #
  # Mirrors the matrix the standalone goldenmatch-extensions repo ran
  # before it was archived. Installs the relevant PG dev headers, builds
  # the extension via `cargo pgrx install`, then exercises the SQL
  # surface end-to-end via psql (scalar scorer, table dedupe, autoconfig).
  #
  # If this lane breaks on a Python-only change, the trigger filter is
  # wrong — Postgres extension build failures should only surface when
  # postgres/, bridge/, or workspace files actually change.
  rust_pgrx:
    needs: changes
    if: needs.changes.outputs.rust_pgrx == 'true' || needs.changes.outputs.ci_workflow == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        pg: [15, 16, 17]
    env:
      PG_VERSION: ${{ matrix.pg }}
    defaults:
      run:
        working-directory: packages/rust/extensions
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: packages/rust/extensions

      - name: Install PG ${{ matrix.pg }} dev headers
        # The PostgreSQL apt repo carries every PG major in parallel. Required
        # because pgrx needs `pg_config` for the specific PG version it's
        # building against, and Ubuntu ships only one PG by default.
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update
          sudo apt-get install -y "postgresql-${PG_VERSION}" "postgresql-server-dev-${PG_VERSION}" libclang-dev
          sudo chmod a+rwx "/usr/share/postgresql/${PG_VERSION}/extension" "/usr/lib/postgresql/${PG_VERSION}/lib"

      - name: Install goldenmatch (Python bridge target)
        # The pgrx extension embeds Python via pyo3 and imports goldenmatch
        # (and goldenflow, for the goldenflow_* transform functions) at
        # runtime. The package install here is what `init()` in the
        # bridge will find when Postgres starts.
        run: pip install --break-system-packages goldenmatch>=1.1.0 goldenflow pyarrow

      - name: Install cargo-pgrx
        # 0.12.9 pin matches the pgrx version in
        # packages/rust/extensions/postgres/Cargo.toml. Upgrading pgrx is
        # a coordinated change — bump both pins together.
        run: cargo install cargo-pgrx --version "0.12.9" --locked

      - name: Initialize pgrx
        run: cargo pgrx init "--pg${PG_VERSION}=/usr/lib/postgresql/${PG_VERSION}/bin/pg_config"

      - name: Build + install extension
        working-directory: packages/rust/extensions/postgres
        run: |
          cargo pgrx install "--pg-config=/usr/lib/postgresql/${PG_VERSION}/bin/pg_config" --release --features "pg${PG_VERSION}" --no-default-features
          # pgrx 0.12.9 doesn't auto-emit the SQL extension file — copy the
          # handwritten ones into PG's extension dir so `CREATE EXTENSION`
          # (installs default_version, now 0.7.0) and `ALTER EXTENSION ... UPDATE`
          # find them. The schema files are the canonical declaration of public
          # function signatures.
          cp sql/goldenmatch_pg--0.7.0.sql "/usr/share/postgresql/${PG_VERSION}/extension/"
          cp sql/goldenmatch_pg--0.6.0--0.7.0.sql "/usr/share/postgresql/${PG_VERSION}/extension/"
          cp sql/goldenmatch_pg--0.6.0.sql "/usr/share/postgresql/${PG_VERSION}/extension/"
          cp sql/goldenmatch_pg--0.5.0--0.6.0.sql "/usr/share/postgresql/${PG_VERSION}/extension/"

      - name: Expose goldenmatch to Postgres' Python interpreter
        # Postgres runs as user `postgres` under a different Python than the
        # one this workflow's `pip install` modified. The `.pth` redirect
        # makes the install discoverable when pgrx-loaded code calls
        # `import goldenmatch`.
        run: |
          PYTHON_SITE=$(python -c "import site; print(site.getsitepackages()[0])")
          sudo rm -f /usr/lib/python3/dist-packages/typing_extensions.py
          sudo pip install --break-system-packages goldenmatch>=1.1.0 goldenflow 2>/dev/null || true
          echo "${PYTHON_SITE}" | sudo tee /usr/lib/python3/dist-packages/goldenmatch.pth

      - name: psql smoke (scalar scorer, dedupe, autoconfig)
        run: |
          # Multiple PG majors installed → port is non-default; resolve via
          # pg_lsclusters so we always hit the right server.
          sudo pg_createcluster "${PG_VERSION}" main 2>/dev/null || true
          sudo -u postgres pg_ctlcluster "${PG_VERSION}" main start 2>/dev/null || true
          sleep 2
          PG_PORT=$(pg_lsclusters -h | grep "^${PG_VERSION}" | awk '{print $3}')
          export PGPORT="${PG_PORT:-5432}"
          echo "Using PG ${PG_VERSION} on port ${PGPORT}"
          sudo -u postgres psql -p "${PGPORT}" -v ON_ERROR_STOP=1 -c "CREATE EXTENSION goldenmatch_pg;"
          # Confirm new v1.7-v1.12 functions registered alongside the originals.
          sudo -u postgres psql -p "${PGPORT}" -c "SELECT proname FROM pg_proc WHERE proname LIKE 'goldenmatch%' OR proname LIKE 'gm_%' ORDER BY proname;"
          sudo -u postgres psql -p "${PGPORT}" -v ON_ERROR_STOP=1 -c "SELECT goldenmatch.goldenmatch_score('John Smith'::TEXT, 'Jon Smyth'::TEXT, 'jaro_winkler'::TEXT);"
          # Cross-language determinism: the pure-Rust record fingerprint must
          # equal the pinned vector shared with Python / native C ABI / DuckDB.
          # (RAISE under ON_ERROR_STOP fails the lane on any mismatch.)
          sudo -u postgres psql -p "${PGPORT}" -v ON_ERROR_STOP=1 <<'EOSQL'
            DO $$
            DECLARE fp TEXT := goldenmatch.goldenmatch_record_fingerprint('{"a":"x"}');
            BEGIN
              IF fp <> '7381d5ba2dac5be0af49232a3209ab8d0dc2e4ed804a60ce533fdfe5254307e3' THEN
                RAISE EXCEPTION 'goldenmatch_record_fingerprint mismatch: %', fp;
              END IF;
            END $$;
          EOSQL
          # graph + fingerprint SQL surface. These assert the edge cases the
          # kernels.rs #[pg_test]s describe, end-to-end against a real CREATE
          # EXTENSION. (`cargo pgrx test` can't run for this crate -- it needs
          # pgrx SQL schema generation, which is broken here, so the SQL is
          # hand-maintained; see the crate CLAUDE.md + kernels.rs mod tests.)
          sudo -u postgres psql -p "${PGPORT}" -v ON_ERROR_STOP=1 <<'EOSQL'
            DO $$
            DECLARE
              n_comp INT;
              pd RECORD;
            BEGIN
              -- connected_components: empty edge list -> every id is a singleton.
              SELECT count(DISTINCT component) INTO n_comp
              FROM goldenmatch.goldenmatch_connected_components(
                ARRAY[]::BIGINT[], ARRAY[]::BIGINT[], ARRAY[]::DOUBLE PRECISION[],
                ARRAY[10, 20, 30]::BIGINT[]);
              IF n_comp <> 3 THEN
                RAISE EXCEPTION 'connected_components empty-edge: expected 3 singletons, got %', n_comp;
              END IF;

              -- pair_dedup: all three inputs canonicalize to (1,2); keep max 0.7.
              -- One invocation, aggregated so cardinality (dedup collapsed to a
              -- single pair) and the kept values are asserted together. (min/max
              -- over the one row == that row; n<>1 also catches a 0- or N-row
              -- dedup failure, with NULL value comparisons short-circuited by it.)
              SELECT count(*) AS n, min(a) AS a, min(b) AS b, max(s) AS s INTO pd
              FROM goldenmatch.goldenmatch_pair_dedup(
                ARRAY[1, 1, 2]::BIGINT[], ARRAY[2, 2, 1]::BIGINT[],
                ARRAY[0.3, 0.7, 0.5]::DOUBLE PRECISION[]);
              IF pd.n <> 1 OR pd.a <> 1 OR pd.b <> 2 OR abs(pd.s - 0.7) > 1e-9 THEN
                RAISE EXCEPTION 'pair_dedup: expected exactly (1,2,0.7), got n=% (%,%,%)', pd.n, pd.a, pd.b, pd.s;
              END IF;

              -- record_fingerprint: stable across key order (fields sorted by name).
              IF goldenmatch.goldenmatch_record_fingerprint('{"x":"1","y":"2"}')
                 <> goldenmatch.goldenmatch_record_fingerprint('{"y":"2","x":"1"}') THEN
                RAISE EXCEPTION 'record_fingerprint not key-order independent';
              END IF;

              RAISE NOTICE 'graph + fingerprint SQL surface assertions passed';
            END $$;
          EOSQL
          # goldenflow_* transforms (fail-open: pass input through if goldenflow absent).
          sudo -u postgres psql -p "${PGPORT}" -v ON_ERROR_STOP=1 -c "SELECT goldenmatch.goldenflow_normalize_email('  John@Example.COM '::TEXT), goldenmatch.goldenflow_whitespace_normalize('a   b'::TEXT);"
          sudo -u postgres psql -p "${PGPORT}" -v ON_ERROR_STOP=1 <<'EOSQL'
            CREATE TABLE test_customers (name TEXT, email TEXT);
            INSERT INTO test_customers VALUES
              ('John Smith', 'john@x.com'),
              ('JOHN SMITH', 'john@x.com'),
              ('Jane Doe', 'jane@y.com'),
              ('Bob Jones', 'bob@z.com');
            SELECT goldenmatch.goldenmatch_dedupe_table('test_customers'::TEXT, '{"exact": ["email"]}'::TEXT);
            -- v1.7-v1.12 surface (autoconfig / telemetry / dedupe_full) lands
            -- with PR #159; assert it conditionally so this lane goes green on
            -- main today and starts exercising the new surface once #159 merges.
            DO $$
            BEGIN
              IF EXISTS (SELECT 1 FROM pg_proc WHERE proname = 'goldenmatch_autoconfig') THEN
                PERFORM goldenmatch.goldenmatch_autoconfig('test_customers'::TEXT);
                PERFORM goldenmatch.goldenmatch_autoconfig_telemetry('test_customers'::TEXT);
                RAISE NOTICE 'v1.7-v1.12 autoconfig surface present and callable';
              ELSE
                RAISE NOTICE 'v1.7-v1.12 autoconfig surface not yet on main (waiting on PR #159)';
              END IF;
            END$$;
          EOSQL
          # In-house embed (#737): proves `ort`/onnxruntime loads inside the
          # Postgres backend process (the new surface vs the proven DataFusion
          # cdylib case). goldenmatch_embed_local takes an explicit model dir;
          # gm_embed reads GOLDENEMBED_MODEL_DIR from the backend env. The
          # postmaster does NOT inherit env passed to `pg_ctlcluster` (it re-execs);
          # the documented Debian mechanism is the per-cluster `environment` file,
          # which PostgreSQL reads at startup. Write it, then restart.
          # Uses the goldenembed tiny_model fixture.
          MODEL_DIR=/tmp/gm_tiny_model
          sudo mkdir -p "${MODEL_DIR}"
          sudo cp "${GITHUB_WORKSPACE}/packages/rust/extensions/goldenembed/tests/fixtures/tiny_model/"* "${MODEL_DIR}/"
          sudo chmod -R a+rX "${MODEL_DIR}"
          echo "GOLDENEMBED_MODEL_DIR = '${MODEL_DIR}'" | sudo tee -a "/etc/postgresql/${PG_VERSION}/main/environment"
          sudo -u postgres pg_ctlcluster "${PG_VERSION}" main restart
          sleep 2
          # Explicit-path variant (shell-interpolated dir at the top level, where
          # psql doesn't help): proves ort loads in-backend + returns a real vector.
          sudo -u postgres psql -p "${PGPORT}" -v ON_ERROR_STOP=1 \
            -c "SELECT CASE WHEN array_length(goldenmatch.goldenmatch_embed_local('acme corp', '${MODEL_DIR}'), 1) > 0 THEN 'embed_local ok' ELSE NULL END;"
          # gm_embed reads GOLDENEMBED_MODEL_DIR from the (restarted) backend env;
          # also asserts the NULL -> "" convention (function is NOT STRICT).
          sudo -u postgres psql -p "${PGPORT}" -v ON_ERROR_STOP=1 <<'EOSQL'
            DO $$
            DECLARE v_gm real[]; v_nul real[];
            BEGIN
              v_gm := goldenmatch.gm_embed('acme corp');
              IF v_gm IS NULL OR array_length(v_gm, 1) IS NULL THEN
                RAISE EXCEPTION 'gm_embed returned no embedding';
              END IF;
              v_nul := goldenmatch.gm_embed(NULL);  -- NULL -> "" (not STRICT)
              IF v_nul IS NULL OR array_length(v_nul, 1) IS NULL THEN
                RAISE EXCEPTION 'gm_embed(NULL) should embed "" (NULL -> ""), got no array';
              END IF;
              RAISE NOTICE 'gm_embed smoke passed: dim=%', array_length(v_gm, 1);
            END$$;
          EOSQL
          echo "=== PG ${PG_VERSION} smoke passed ==="

  # DuckDB UDF package tests. Pure Python; lives at
  # packages/rust/extensions/duckdb/ alongside the Rust crates but the
  # main `python` matrix job doesn't see it (its dynamic-matrix only
  # enumerates packages/python/<pkg>). This lane fills that gap.
  duckdb_extensions:
    needs: changes
    if: needs.changes.outputs.duckdb_extensions == 'true' || needs.changes.outputs.ci_workflow == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: packages/rust/extensions/duckdb
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install goldenmatch + duckdb UDF package
        run: |
          # The local goldenmatch checkout supplies the controller + autoconfig
          # internals the UDFs delegate to. Editable install means a goldenmatch
          # source change here would surface — but the duckdb lane filter only
          # fires on extensions/duckdb/** changes, so for cross-package
          # regressions, rely on the regular `python` lane to catch them.
          pip install -e "../../../python/goldenmatch[web]"
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          # pytest-timeout converts a hung worker (e.g. wedged auto-config)
          # into an actionable failure with a traceback at the 120s mark
          # instead of letting the job sit at the 6h GH Actions default.
          pip install pytest pytest-timeout pyarrow
      - name: Run DuckDB UDF tests
        run: python -m pytest tests/ -v --timeout=120

  # Pyright strict-mode type check on the goldenmatch core slice. Scope
  # (include list) is pinned in pyrightconfig.json at repo root; CI mirrors
  # that scope via the path filter above. Blocking — any new error in the
  # slice fails CI. To extend the slice, update both pyrightconfig.json's
  # `include` and the `pyright_slice` filter above.
  pyright:
    needs: changes
    if: needs.changes.outputs.pyright_slice == 'true' || needs.changes.outputs.ci_workflow == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            **/pyproject.toml
      - run: uv sync --all-packages
      - run: uv run pyright

  readme_callouts:
    needs: changes
    if: needs.changes.outputs.readme_callouts == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Verify READMEs are in sync with CHANGELOG callouts
        run: python scripts/sync_readme_callouts.py --check

  ts_parity_freshness:
    needs: changes
    if: needs.changes.outputs.ts_parity == 'true' || needs.changes.outputs.ci_workflow == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            **/pyproject.toml
      - run: uv sync --all-packages
      # Regenerate every committed TS parity fixture from the Python emitters,
      # then assert the working tree still matches HEAD within a 4-decimal float
      # tolerance. Closes the silent-drift hole (#856): a pure-Python behaviour
      # change that is not mirrored into the committed TS fixtures turns this lane
      # red, instead of the TS parity test staying green against a stale fixture.
      # Two controller-execution fixtures are allowlisted in the checker
      # (optional-dependency-sensitive; see scripts/check_ts_parity_freshness.py).
      - name: Regenerate TS parity fixtures
        run: PYTHON=.venv/bin/python bash scripts/regen_ts_parity_fixtures.sh
      - name: Assert TS parity fixtures are fresh (float-tolerant)
        run: .venv/bin/python scripts/check_ts_parity_freshness.py

  # Single required-status-check for branch protection. Branch ruleset
  # references `ci-required` (stable name) instead of the matrix-instance
  # check names (`python (goldenmatch)`, `rust_pgrx (15)`, ...) which
  # change per-row and can't be matched by GitHub's exact-name required
  # status check rule.
  #
  # `if: always()` lets the job fire even when upstream jobs are skipped
  # by the `changes` path filter — a doc-only PR with all code jobs
  # skipped should still merge.
  #
  # The check inside fails the summary when an upstream conclusion is
  # `failure` or `cancelled`. `skipped` and `success` both pass. Avoids
  # the trap where `needs:` default behaviour blocks the summary when
  # any upstream was skipped.
  ci-required:
    needs:
      - changes
      - python
      - python_skipped_lanes
      - python_postgres
      - synthetic_benchmarks
      - benchmark_runner_smoke
      - typescript
      - web_ui_e2e
      - rust
      - action
      - rust_pgrx
      - duckdb_extensions
      - native
      - goldencheck_native
      - native_wheel
      - goldenembed
      - embed_wheel
      - distributed
      - sail
      - pyright
      - readme_callouts
      - ts_parity_freshness
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Verify no upstream job failed or was cancelled
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail
          echo "$NEEDS_JSON"
          # Use jq to inspect each upstream's `result`. `success` and
          # `skipped` both pass; anything else (`failure`, `cancelled`)
          # fails the summary.
          BAD=$(echo "$NEEDS_JSON" | jq -r '[.[] | select(.result != "success" and .result != "skipped") | .result] | join(",")')
          if [ -n "$BAD" ]; then
            echo "::error::upstream job(s) failed or were cancelled: $BAD"
            exit 1
          fi
          echo "all required upstream jobs passed or were skipped"
