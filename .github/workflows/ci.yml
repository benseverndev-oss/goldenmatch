name: ci

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  workflow_dispatch:
    inputs:
      run_all:
        description: "Run the full job matrix (bypass path filters)"
        type: boolean
        default: true

# Locked-down by default. Individual jobs escalate as needed.
# OpenSSF Scorecard / Token-Permissions check requires this top-level scope.
permissions:
  contents: read

# Supersede in-flight runs for the same PR — a new push cancels the prior run
# so the expensive matrix (pgrx/maturin/native/distributed lanes) isn't burning
# runners on a commit nobody is waiting on. On `main` the group key falls back to
# the unique run_id, so pushes to main are NEVER cancelled (each gets its own
# group) and every main commit is fully verified.
concurrency:
  group: ci-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

# uv download-cache keying: every setup-uv step below uses
# `cache-dependency-glob: uv.lock` (NOT `**/pyproject.toml`). uv.lock is the
# deterministic, fully-resolved source of truth for what `uv sync` installs, so
# it is a correct and sufficient key. Globbing `**/pyproject.toml` additionally
# busted the cache on EVERY version bump / tool-config edit across the 15+
# package manifests -- deps unchanged, but the key churned -> a near-permanent
# miss ("Prepared 83 packages in 3m20s" cold on each of ~20 jobs). Keying on
# uv.lock alone keeps the cache warm across those no-op manifest edits and cuts
# the distinct-cache count (less eviction pressure under the repo's 10GB cap).
jobs:
  # Path-filter: compute which areas of the monorepo changed so downstream
  # jobs only run when relevant. Doc-only PRs (README, wiki references,
  # screenshots) skip every code job. Workflow-file changes force every job
  # to re-run so the workflow itself stays under test.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      # JSON array of changed Python package names (empty if none).
      python_pkgs: ${{ steps.set_python.outputs.pkgs }}
      typescript: ${{ steps.filter.outputs.typescript }}
      web_ui_e2e: ${{ steps.filter.outputs.web }}
      rust: ${{ steps.filter.outputs.rust }}
      action: ${{ steps.filter.outputs.action }}
      dbt: ${{ steps.filter.outputs.dbt }}
      ci_workflow: ${{ steps.filter.outputs.ci_workflow }}
      # force_all: forces the full job matrix + the dynamic python matrix,
      # bypassing the path filters. True on (1) workflow_dispatch run_all=true,
      # and (2) a merge_group entry that edits ci.yml itself (so the filter
      # wiring is re-validated against main before it lands). A NORMAL
      # merge_group entry is now path-filtered against the group's base_sha
      # (current main) -- see the filter step -- so it no longer force-runs every
      # lane; force_all=false there. At PR time a ci.yml edit still doesn't force
      # every lane (workflow_lint covers YAML cheaply); the merge queue is where
      # the full re-validation happens.
      force_all: ${{ steps.flags.outputs.force_all }}
      pyright_slice: ${{ steps.filter.outputs.pyright_slice }}
      # goldenmatch runs as its own sharded jobs (python_goldenmatch / _heavy /
      # _coverage), NOT in the generic `python` matrix, so expose its filter
      # directly for those jobs + the lanes that gate on goldenmatch changing.
      python_goldenmatch: ${{ steps.filter.outputs.python_goldenmatch }}
      python_goldenmatch_postgres: ${{ steps.filter.outputs.python_goldenmatch_postgres }}
      # goldenflow runs as a generic `python` matrix leg (native-default via
      # matrix-gated steps), but its pure-Python fallback job gates on this
      # filter directly, so expose it as a job output too.
      python_goldenflow: ${{ steps.filter.outputs.python_goldenflow }}
      benchmark_runner: ${{ steps.filter.outputs.benchmark_runner }}
      rust_pgrx: ${{ steps.filter.outputs.rust_pgrx }}
      rust_cores: ${{ steps.filter.outputs.rust_cores }}
      duckdb_extensions: ${{ steps.filter.outputs.duckdb_extensions }}
      native: ${{ steps.filter.outputs.native }}
      goldencheck_native: ${{ steps.filter.outputs.goldencheck_native }}
      goldenprofile_native: ${{ steps.filter.outputs.goldenprofile_native }}
      analysis_native: ${{ steps.filter.outputs.analysis_native }}
      infermap_native: ${{ steps.filter.outputs.infermap_native }}
      goldengraph_native: ${{ steps.filter.outputs.goldengraph_native }}
      native_flow: ${{ steps.filter.outputs.native_flow }}
      goldenflow_nopolars: ${{ steps.filter.outputs.goldenflow_nopolars }}
      goldencheck_nopolars: ${{ steps.filter.outputs.goldencheck_nopolars }}
      goldenmatch_nopolars: ${{ steps.filter.outputs.goldenmatch_nopolars }}
      goldenmatch_frame_diff: ${{ steps.filter.outputs.goldenmatch_frame_diff }}
      goldenflow_duckdb: ${{ steps.filter.outputs.goldenflow_duckdb }}
      goldenpipe_native: ${{ steps.filter.outputs.goldenpipe_native }}
      goldenembed: ${{ steps.filter.outputs.goldenembed }}
      embed: ${{ steps.filter.outputs.embed }}
      goldenhnsw: ${{ steps.filter.outputs.goldenhnsw }}
      hnsw: ${{ steps.filter.outputs.hnsw }}
      distributed: ${{ steps.filter.outputs.distributed }}
      sail: ${{ steps.filter.outputs.sail }}
      readme_callouts: ${{ steps.filter.outputs.readme_callouts }}
      docs: ${{ steps.filter.outputs.docs }}
      wasm_score: ${{ steps.filter.outputs.wasm_score }}
      analysis_wasm: ${{ steps.filter.outputs.analysis_wasm }}
      infermap_wasm: ${{ steps.filter.outputs.infermap_wasm }}
      ts_parity: ${{ steps.filter.outputs.ts_parity }}
      throughput: ${{ steps.filter.outputs.throughput }}
      autoconfig_wasm: ${{ steps.filter.outputs.autoconfig_wasm }}
      suggest_wasm: ${{ steps.filter.outputs.suggest_wasm }}
      documents_wasm: ${{ steps.filter.outputs.documents_wasm }}
      goldencheck_wasm: ${{ steps.filter.outputs.goldencheck_wasm }}
      perceptual_wasm: ${{ steps.filter.outputs.perceptual_wasm }}
      goldenprofile_wasm: ${{ steps.filter.outputs.goldenprofile_wasm }}
      goldengraph_wasm: ${{ steps.filter.outputs.goldengraph_wasm }}
      hnsw_wasm: ${{ steps.filter.outputs.hnsw_wasm }}
      graph_wasm: ${{ steps.filter.outputs.graph_wasm }}
      fingerprint_wasm: ${{ steps.filter.outputs.fingerprint_wasm }}
      goldenembed_wasm: ${{ steps.filter.outputs.goldenembed_wasm }}
      warehouse_udf: ${{ steps.filter.outputs.warehouse_udf }}
      wasm_flow: ${{ steps.filter.outputs.wasm_flow }}
      goldenpipe_wasm: ${{ steps.filter.outputs.goldenpipe_wasm }}
      sketch_wasm: ${{ steps.filter.outputs.sketch_wasm }}
      quality_gate: ${{ steps.filter.outputs.quality_gate }}
      api_parity: ${{ steps.filter.outputs.api_parity }}
      native_symbols: ${{ steps.filter.outputs.native_symbols }}
      config_matrix: ${{ steps.filter.outputs.config_matrix }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        id: filter
        # paths-filter diffs PR head vs base (or push head vs prev). On
        # merge_group there's no implicit diff base, but the event payload
        # carries one: `merge_group.base_sha` is the up-to-date `main` the queued
        # group is being merged onto, so diffing HEAD against it yields exactly
        # what the group changes vs CURRENT main. That makes merge-queue entries
        # path-filterable too (a queued PR that doesn't touch a lane's paths
        # skips it) WITHOUT the staleness risk PR-base filtering carries -- the
        # base here is fresher than the PR's own base. workflow_dispatch still
        # has no diff base, so it's skipped here and `flags` forces the matrix.
        if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'merge_group'
        with:
          # On merge_group, diff against the group's base_sha (latest main);
          # empty elsewhere so paths-filter uses its PR/push default base.
          base: ${{ github.event_name == 'merge_group' && github.event.merge_group.base_sha || '' }}
          # `filters` runs against the diff between the PR head and base
          # (or push head and the previous push for branch builds). Per-path
          # globs are unanchored — `'foo/**'` matches at any depth.
          filters: .github/filters.yml
      # Flag step: decide whether to force the FULL job matrix (bypassing the
      # path filters). Two cases force it:
      #   1. workflow_dispatch with run_all=true (manual full re-run).
      #   2. a merge_group entry that edits ci.yml itself -- the filters are now
      #      live on merge_group (see the filter step), so a normal queued entry
      #      is path-filtered against current main. But a queued ci.yml change
      #      must still re-run EVERY lane so the filter wiring stays validated
      #      against main before it lands (the invariant the old blanket
      #      merge_group force protected). `ci_workflow` comes from the filter
      #      step, which runs on merge_group.
      # A normal merge_group entry (no ci.yml edit) now falls through to
      # force_all=false and runs only the lanes its paths touched.
      - id: flags
        shell: bash
        run: |
          if { [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.run_all }}" = "true" ]; } || \
             { [ "${{ github.event_name }}" = "merge_group" ] && [ "${{ steps.filter.outputs.ci_workflow }}" = "true" ]; }; then
            echo "force_all=true" >> "$GITHUB_OUTPUT"
          else
            echo "force_all=false" >> "$GITHUB_OUTPUT"
          fi
      # Build the python matrix dynamically: only include packages whose code
      # actually changed. A workflow-file or root-pyproject change expands to
      # all packages so dependency-resolution changes can't slip through.
      - id: set_python
        shell: bash
        env:
          ALL: ${{ steps.flags.outputs.force_all == 'true' || steps.filter.outputs.python_root == 'true' }}
        run: |
          set -euo pipefail
          # NB: goldenmatch is intentionally absent here — it runs as the
          # dedicated sharded jobs (python_goldenmatch / _heavy / _coverage)
          # gated on the `python_goldenmatch` output, so the generic `python`
          # matrix below never includes it.
          PKGS=()
          if [ "$ALL" = "true" ]; then
            PKGS=(goldencheck goldencheck-types goldenflow goldenpipe infermap goldensuite-mcp goldenanalysis)
          else
            [ "${{ steps.filter.outputs.python_goldencheck }}" = "true" ]       && PKGS+=(goldencheck)
            [ "${{ steps.filter.outputs.python_goldencheck_types }}" = "true" ] && PKGS+=(goldencheck-types)
            [ "${{ steps.filter.outputs.python_goldenflow }}" = "true" ]        && PKGS+=(goldenflow)
            [ "${{ steps.filter.outputs.python_goldenpipe }}" = "true" ]        && PKGS+=(goldenpipe)
            [ "${{ steps.filter.outputs.python_infermap }}" = "true" ]          && PKGS+=(infermap)
            [ "${{ steps.filter.outputs.python_goldensuite_mcp }}" = "true" ]   && PKGS+=(goldensuite-mcp)
            [ "${{ steps.filter.outputs.python_goldenanalysis }}" = "true" ]    && PKGS+=(goldenanalysis)
          fi
          if [ ${#PKGS[@]} -eq 0 ]; then
            echo "pkgs=[]" >> "$GITHUB_OUTPUT"
          else
            json="["
            for p in "${PKGS[@]}"; do json+="\"$p\","; done
            json="${json%,}]"
            echo "pkgs=$json" >> "$GITHUB_OUTPUT"
          fi

  # Fast required check for workflow edits. PR-level ci.yml changes no longer
  # force the full job matrix (that's now merge_group/dispatch-only via
  # force_all), so this cheap lane gives `.github/workflows/ci.yml` edits a
  # required signal at PR time: it parses every workflow file as YAML. The full
  # matrix still re-validates the filter wiring at merge-queue time (force_all).
  workflow_lint:
    needs: changes
    if: needs.changes.outputs.ci_workflow == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Validate workflow YAML + lint
        shell: bash
        run: |
          python3 -m pip install --quiet pyyaml
          python3 -c "import sys,glob,yaml; [yaml.safe_load(open(f)) for f in glob.glob('.github/workflows/*.yml')]; print('all workflow YAML parses')"
      # #1846: parsing is not meaning. A path filter that lists too few paths
      # makes its job go SILENT on exactly the changes it exists to catch --
      # quality_gate pinned f1_probabilistic while not watching
      # probabilistic.py, and a 0.83 -> 0.33 collapse landed unseen. This
      # asserts each gated filter still covers the surfaces it claims to gate.
      - name: Validate CI path-filter coverage
        shell: bash
        run: python3 scripts/check_filter_coverage.py

  python:
    needs: changes
    if: needs.changes.outputs.python_pkgs != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        pkg: ${{ fromJSON(needs.changes.outputs.python_pkgs) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --all-packages ${{ matrix.pkg != 'goldenpipe' && '--no-install-package goldenmatch-native --no-install-package goldenflow-native' || '' }}
      # GoldenAnalysis's suite adapters consume goldenmatch/goldencheck/goldenflow/
      # goldenpipe outputs. uv sync --all-packages installs those workspace members,
      # but install the [match,check,flow,pipe] extras explicitly so the real-producer
      # integration tests (tests/integration/) actually RUN rather than self-skip via
      # their importlib.find_spec markers — the same false-green guard as the
      # goldenmatch datafusion lane above.
      - if: matrix.pkg == 'goldenanalysis'
        run: uv pip install -e 'packages/python/goldenanalysis[match,check,flow,pipe]'
      # Reference mode (docs/design/2026-07-01-rust-is-the-reference-roadmap.md):
      # goldenflow's DEFAULT test path is now native. Unlike goldenmatch (which
      # has dedicated sharded jobs), goldenflow runs as a generic `python` matrix
      # leg, so these steps are matrix-gated to the goldenflow leg only -- the
      # other 6 packages skip the rust toolchain + native build entirely. The
      # ext is dropped into the package via build_native.py (mirrors the
      # `native_flow` job); pytest below then runs goldenflow native-default.
      # Pure-Python remains covered by the python_goldenflow_fallback job
      # (GOLDENFLOW_NATIVE=0), and native-vs-python parity by the `native_flow`
      # lane.
      - if: matrix.pkg == 'goldenflow'
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - if: matrix.pkg == 'goldenflow'
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: packages/rust/extensions/native-flow
      - if: matrix.pkg == 'goldenflow'
        name: Build native ext (reference mode -> native is the default test path)
        run: uv run python packages/python/goldenflow/scripts/build_native.py
      - if: matrix.pkg == 'goldenflow'
        name: Install pyarrow (zero-copy Series<->kernel bridge for the native path)
        run: uv pip install pyarrow
      # Ruff config is driven by the root pyproject.toml [tool.ruff.lint] section
      # (F/I/B-narrowed/UP). Drop the --select override so pyproject's select+ignore wins.
      - run: uv run ruff check packages/python/${{ matrix.pkg }}
      # (goldenmatch's map_elements lint, datafusion runtime + FFI UDF build, the
      # DataFusion-spine parity gate, its own --ignore list, and the per-module
      # coverage floors all moved to the dedicated `python_goldenmatch` sharded
      # jobs below.)
      # Per-package --ignore lists mirror the pre-fold tuning each repo had
      # (documented in each package's own CLAUDE.md). Without these, packages with
      # known-skip tests would make CI perpetually red and train people to ignore
      # the signal entirely — worse than no step.
      #   infermap: duplicate conftest in benchmark/runners/python/tests/.
      # Skip mechanism is path-based (not name-based) so adding a tests/ dir to a
      # currently-skipped package auto-enables it with a visible notice.
      - name: pytest
        shell: bash
        run: |
          if [ ! -d "packages/python/${{ matrix.pkg }}/tests" ]; then
            echo "::notice::No tests/ directory in packages/python/${{ matrix.pkg }} — skipping pytest"
            exit 0
          fi
          IGNORE=""
          case "${{ matrix.pkg }}" in
            infermap)
              IGNORE="--ignore=packages/python/infermap/benchmark"
              ;;
          esac
          # --timeout=120 surfaces any hung test as a failure with a stack
          # trace (vs the whole job timing out at 6h with zero diagnostics).
          # PR #66 hit a goldencheck pytest hang on Linux that didn't
          # reproduce locally — this converts that into actionable signal.
          # --durations=20 surfaces the slowest tests in the CI log (#433).
          uv run pytest packages/python/${{ matrix.pkg }} -n auto --timeout=120 --timeout-method=thread --durations=20 $IGNORE

  # ---------------------------------------------------------------------------
  # goldenmatch is the CI long pole: a ~12-min pytest suite PLUS a ~6.5-min
  # --release maturin build of the DataFusion/Arrow/ONNX FFI UDF crate that the
  # single matrix leg used to rebuild every run. It runs here as dedicated jobs
  # (NOT in the generic `python` matrix) so the suite shards across runners and
  # the FFI wheel is cached. Three producers feed one floor gate:
  #   python_goldenmatch (xN shards) -> coverage_shard<N>.dat
  #   python_goldenmatch_heavy       -> coverage_heavy.dat  (OOM-prone, serial)
  #   python_goldenmatch_coverage    -> combine -> per-module floors
  # ---------------------------------------------------------------------------
  python_goldenmatch:
    needs: changes
    if: needs.changes.outputs.python_goldenmatch == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    env:
      GM_SPLITS: 3
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --all-packages --no-install-package goldenmatch-native --no-install-package goldenflow-native
      # Scale-mode DataFusion edge stream (cluster_edges_df.py) lives behind the
      # optional `datafusion` extra; install it so the parity tests RUN rather
      # than importorskip-SKIP (a false green). Cheap (wheel download).
      - run: uv pip install 'datafusion>=53,<54'
      # Document/image ingest (goldenmatch.documents) tests need Pillow + PyMuPDF from the
      # optional `documents` extra; install it so tests/documents RUN rather than error at
      # collection (missing PIL/fitz). Same rationale as the datafusion extra above.
      - run: uv pip install -e 'packages/python/goldenmatch[documents]'
      # Suite-wide lints run once (shard 1), not per shard.
      - if: matrix.shard == 1
        run: uv run ruff check packages/python/goldenmatch
      # Arrow-native roadmap Phase 6 (#628): map_elements in prep-stage hot paths
      # must carry a justification noqa. goldenmatch-only gate.
      - if: matrix.shard == 1
        run: uv run python scripts/check_map_elements.py
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: |
            packages/rust/extensions/datafusion-udf
            packages/rust/extensions/native
      # THE BUILD-TIME WIN: cache the built FFI UDF wheel keyed on the Rust
      # sources it's compiled from (the crate + every path-dep crate). On a hit
      # (the common case — these change rarely) the ~6.5-min --release maturin
      # build is skipped entirely; only on a real crate change do the shards
      # rebuild (in parallel, so no extra wall-clock).
      - id: dfudf_cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: dist-dfudf
          key: dfudf-wheel-${{ runner.os }}-${{ hashFiles('packages/rust/extensions/datafusion-udf/**', 'packages/rust/extensions/score-core/**', 'packages/rust/extensions/graph-core/**', 'packages/rust/extensions/goldenembed/**', 'packages/rust/extensions/fingerprint-core/**') }}
      # DataFusion FFI ScalarUDF gate (Stage B): the FFI string scorers
      # (jaro_winkler / token_sort / levenshtein) are diffed against the native
      # per-pair scorers by tests/test_datafusion_ffi_udf.py, which HARD-imports
      # goldenmatch_datafusion_udf (no importorskip), so every shard installs the
      # wheel (the test can land in any shard) and a build break surfaces as a
      # FAILURE, not a skip. Build into the project .venv (NOT maturin's
      # ephemeral --with overlay) so `uv run pytest` sees it.
      - name: Build (cache miss only) + install the FFI UDF wheel into .venv
        run: |
          if [ -z "$(ls -A dist-dfudf/*.whl 2>/dev/null)" ]; then
            uv run --with maturin maturin build --release \
              --manifest-path packages/rust/extensions/datafusion-udf/Cargo.toml --out dist-dfudf
          else
            echo "::notice::datafusion-udf wheel restored from cache; skipping the maturin build"
          fi
          uv pip install dist-dfudf/*.whl
      # Reference mode (docs/design/2026-07-01-rust-is-the-reference-roadmap.md):
      # Rust is the reference implementation, so the DEFAULT goldenmatch suite runs
      # with the native ext BUILT -- native is the test path, not an opt-in lane
      # that skips. Pure-Python is the lossy fallback, asserted separately in
      # python_goldenmatch_fallback (GOLDENMATCH_NATIVE=0). The rust toolchain +
      # cache are already set up above (for datafusion-udf); build_native.py drops
      # goldenmatch._native into the package the way the `native` parity job does.
      - name: Build native ext (reference mode -> native is the default test path)
        run: uv run python scripts/build_native.py
      # Shard the suite with pytest-split (deterministic collection -> stable,
      # disjoint groups). Split by MEASURED duration via the committed
      # packages/python/goldenmatch/.test_durations (--durations-path, absolute so
      # pytest-split's plain open() resolves it regardless of CWD/rootdir). Without
      # it pytest-split falls back to splitting by test COUNT, which skewed the
      # shards badly (483s / 223s / 262s wall for equal counts); duration-based
      # splitting balances them. Refresh the file by re-running the store+harvest
      # step (git history of this job) when the suite's timing profile drifts.
      # The OOM-prone heavy files run in python_goldenmatch_heavy and are --ignored
      # here so they're neither double-run nor split. The standing goldenmatch
      # --ignore list (no-DB / no-GPU / flaky-on-Linux / gitignored-dataset tests)
      # is preserved verbatim. Coverage data only (combined + floor-checked in
      # python_goldenmatch_coverage).
      - name: pytest (shard ${{ matrix.shard }} of ${{ env.GM_SPLITS }})
        env:
          COVERAGE_FILE: coverage_shard${{ matrix.shard }}.dat
        run: |
          uv run --with pytest-split pytest packages/python/goldenmatch \
            -n auto --splits "${GM_SPLITS}" --group ${{ matrix.shard }} \
            --durations-path "${GITHUB_WORKSPACE}/packages/python/goldenmatch/.test_durations" \
            --timeout=120 --timeout-method=thread --durations=20 \
            --cov=goldenmatch --cov-report= \
            --ignore=packages/python/goldenmatch/benchmarks \
            --ignore=packages/python/goldenmatch/tests/test_db.py \
            --ignore=packages/python/goldenmatch/tests/test_reconcile.py \
            --ignore=packages/python/goldenmatch/tests/test_mcp_and_watch.py \
            --ignore=packages/python/goldenmatch/tests/test_embedder.py \
            --ignore=packages/python/goldenmatch/tests/test_llm_boost.py \
            --ignore=packages/python/goldenmatch/tests/test_autoconfig_benchmarks.py \
            --ignore=packages/python/goldenmatch/tests/test_qis_harness.py \
            --ignore=packages/python/goldenmatch/tests/test_controller_adaptive_e2e.py \
            --ignore=packages/python/goldenmatch/tests/test_memory_e2e.py \
            --deselect 'tests/test_memory_pipeline.py::test_pipeline_applies_seeded_correction' \
            --deselect 'tests/test_memory_pipeline.py::test_pipeline_persists_stale_pairs_to_review_queue' \
            --deselect 'tests/test_memory_postflight.py::test_postflight_renders_memory_section'
        # ^ Shard-isolation-fragile (same class as the already-ignored
        # test_memory_e2e.py): a test co-located in the shard clobbers a core
        # transform/scorer registration, so the memory-correction candidate pair
        # never generates and `applied` reads 0. Deterministic in CI, passes in
        # isolation and locally; NOT reproducible off-CI (CI's collection/split
        # membership differs). Deselected to unblock; root-cause tracked in
        # docs/superpowers/notes/2026-07-09-memory-shard-isolation.md.
        # DESELECT PATHS ARE ROOTDIR-RELATIVE, NOT REPO-RELATIVE: pytest's
        # rootdir anchors to packages/python/goldenmatch (its pyproject holds
        # [tool.pytest.ini_options]), so nodeids are 'tests/...'. The original
        # 'packages/python/goldenmatch/tests/...' form matched NOTHING (zero
        # 'deselected' in the summary) and the trio only stayed green while
        # shard membership happened to separate them from the clobberer --
        # any new test file reshuffles pytest-split groups and re-exposes it
        # (bit W2a PR #1632). --ignore= takes filesystem paths and is fine.
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: gm-cov-shard-${{ matrix.shard }}
          path: coverage_shard${{ matrix.shard }}.dat
          retention-days: 1
          if-no-files-found: error

  # The OOM-prone full-pipeline tests, split out of the sharded suite: they
  # OOM-kill xdist workers under `-n auto` + coverage on a 2-core runner (silent
  # "node down", no traceback), so they run SERIALLY (full runner memory) with a
  # 300s timeout. Their coverage folds back in via the combine job. (Was the
  # "SERIAL_HEAVY" pass inside the old single goldenmatch leg.) Needs no
  # datafusion runtime (these files don't import it).
  python_goldenmatch_heavy:
    needs: changes
    if: needs.changes.outputs.python_goldenmatch == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --all-packages --no-install-package goldenmatch-native --no-install-package goldenflow-native
      - name: pytest (heavy, serial)
        env:
          COVERAGE_FILE: coverage_heavy.dat
        run: |
          uv run pytest \
            packages/python/goldenmatch/tests/test_controller_adaptive_e2e.py \
            packages/python/goldenmatch/tests/test_memory_e2e.py \
            --timeout=300 --timeout-method=thread --durations=20 \
            --cov=goldenmatch --cov-report=
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4
        with:
          name: gm-cov-heavy
          path: coverage_heavy.dat
          retention-days: 1
          if-no-files-found: error

  # Combine the per-shard + heavy coverage data into one report and enforce the
  # per-module floors (the gate the old single goldenmatch leg ran inline). All
  # producers checked out to the same runner path, so the data files' absolute
  # paths line up and `source=["goldenmatch"]` relativises the xml filenames to
  # `goldenmatch/...` exactly as the single-run did. Skips (so the gate no-ops)
  # when the shards were skipped; fails if any shard failed (needs unsatisfied).
  python_goldenmatch_coverage:
    needs: [python_goldenmatch, python_goldenmatch_heavy]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --all-packages --no-install-package goldenmatch-native --no-install-package goldenflow-native
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          pattern: gm-cov-*
          merge-multiple: true
          path: .
      - name: Combine coverage + enforce per-module floors
        run: |
          uv run coverage combine --rcfile=packages/python/goldenmatch/pyproject.toml \
            coverage_shard1.dat coverage_shard2.dat coverage_shard3.dat coverage_heavy.dat
          uv run coverage xml --rcfile=packages/python/goldenmatch/pyproject.toml \
            -o packages/python/goldenmatch/coverage.xml
          uv run python scripts/check_coverage_floors.py packages/python/goldenmatch/coverage.xml

  # Reference mode: python_goldenmatch now runs NATIVE by default. This lean lane
  # asserts the pure-Python FALLBACK still imports and passes on a core behavior
  # slice -- the no-wheel path (musl / unsupported platform / GOLDENMATCH_NATIVE=0)
  # must keep working, even though it is non-authoritative (native-vs-python parity
  # is asserted in the `native` lane, not here). No native ext is built; the env
  # var additionally forces the fallback even if a wheel were present.
  python_goldenmatch_fallback:
    needs: changes
    if: needs.changes.outputs.python_goldenmatch == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GOLDENMATCH_NATIVE: "0"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --all-packages --no-install-package goldenmatch-native --no-install-package goldenflow-native
      - name: pytest (pure-Python fallback -- core behavior slice, GOLDENMATCH_NATIVE=0)
        # -k excludes tests that ASSERT native dispatch (e.g. TestNativeFSParity's
        # opt-in-picks-native): the job-level GOLDENMATCH_NATIVE=0 force-disables
        # native, so those tests can't hold here by construction. This lane proves
        # the pure-Python behavior path, not native dispatch (that's the `native`
        # lane's job).
        #
        # FS suite (#1805): native is authoritative-by-default for Fellegi-Sunter,
        # and every native FS parity test is skipif-gated on the kernel, so the
        # pure-Python FS path had NO dedicated fallback coverage beyond
        # test_probabilistic.py. The full FS suite (NE + n-level + bucket + the
        # probabilistic variants) now runs here under GOLDENMATCH_NATIVE=0 with the
        # native-dispatch assertions deselected, closing that hole.
        run: |
          uv run pytest \
            packages/python/goldenmatch/tests/test_cluster.py \
            packages/python/goldenmatch/tests/test_golden.py \
            packages/python/goldenmatch/tests/test_lineage.py \
            packages/python/goldenmatch/tests/test_config.py \
            packages/python/goldenmatch/tests/test_pipeline.py \
            packages/python/goldenmatch/tests/test_pairs.py \
            packages/python/goldenmatch/tests/test_probabilistic.py \
            packages/python/goldenmatch/tests/test_probabilistic_vectorized.py \
            packages/python/goldenmatch/tests/test_probabilistic_determinism.py \
            packages/python/goldenmatch/tests/test_probabilistic_parallel.py \
            packages/python/goldenmatch/tests/test_probabilistic_bench_dump.py \
            packages/python/goldenmatch/tests/test_fs_ne_e2e.py \
            packages/python/goldenmatch/tests/test_fs_ne_em.py \
            packages/python/goldenmatch/tests/test_fs_ne_guards.py \
            packages/python/goldenmatch/tests/test_fs_ne_schema.py \
            packages/python/goldenmatch/tests/test_fs_ne_scoring.py \
            packages/python/goldenmatch/tests/test_nlevel_banding.py \
            packages/python/goldenmatch/tests/test_nlevel_em.py \
            packages/python/goldenmatch/tests/test_nlevel_schema.py \
            packages/python/goldenmatch/tests/test_fs_bucket_native.py \
            packages/python/goldenmatch/tests/test_fs_tf_route_matrix_1805.py \
            packages/python/goldenmatch/tests/test_fs_match_mode_bucket_1805.py \
            packages/python/goldenmatch/tests/test_fs_model_path_native_parity_1805.py \
            packages/python/goldenmatch/tests/test_fs_frame_lane_parity_1805.py \
            -k "not native and not Native" \
            -n auto --timeout=120 --timeout-method=thread -q

  # Reference mode: the goldenflow `python` matrix leg now runs NATIVE by
  # default (native ext built before pytest). This lean lane asserts the
  # pure-Python FALLBACK still imports and passes on the transform + loader
  # slice -- the no-wheel path (musl / unsupported platform / GOLDENFLOW_NATIVE=0)
  # must keep working, even though it is non-authoritative (native-vs-python
  # parity is asserted in the `native_flow` lane, not here). No native ext is
  # built; the env var additionally forces the fallback even if a wheel were
  # present. Mirrors python_goldenmatch_fallback.
  python_goldenflow_fallback:
    needs: changes
    if: needs.changes.outputs.python_goldenflow == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GOLDENFLOW_NATIVE: "0"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --all-packages --no-install-package goldenmatch-native --no-install-package goldenflow-native
      - name: pytest (pure-Python fallback -- transform slice, GOLDENFLOW_NATIVE=0)
        # -k excludes tests that ASSERT native dispatch: the job-level
        # GOLDENFLOW_NATIVE=0 force-disables native, so those tests can't hold
        # here by construction. This lane proves the pure-Python transform
        # behavior path (native dispatch is the native_flow lane's job; the
        # loader gate logic is covered by tests/core in the native-default leg,
        # and "native" in that module name means -k would deselect it here anyway).
        run: |
          uv run pytest \
            packages/python/goldenflow/tests/transforms \
            -k "not native and not Native" \
            -n auto --timeout=120 --timeout-method=thread -q

  # Visibility lanes for tests that the main `python` job currently --ignores.
  # Each lane runs the gated tests with explicit prerequisites; when prereqs
  # aren't met (no DB credential, no API key), the lane reports "not-configured"
  # with a ::notice:: annotation rather than silently passing or failing.
  # This converts "we have tests but skip them in CI" into auditable signal.
  python_skipped_lanes:
    needs: changes
    # Run when goldenmatch python changed OR the workflow itself changed.
    # Matrix runs all lanes regardless of which prereqs are configured;
    # each lane self-reports its prereq state.
    if: needs.changes.outputs.python_goldenmatch == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        lane:
          # `db` lane removed 2026-05-10: now runs for real in the
          # `python_postgres` job below, against a services Postgres container.
          - { name: mcp_watch,    tests: "tests/test_mcp_and_watch.py",              needs: "MCP runtime + watch fixtures" }
          - { name: llm_boost,    tests: "tests/test_llm_boost.py",                  needs: "OPENAI_API_KEY secret + torch (segfaults locally)" }
          - { name: embedder,     tests: "tests/test_embedder.py",                   needs: "Vertex AI credentials + torch" }
          - { name: benchmarks,   tests: "tests/test_autoconfig_benchmarks.py",      needs: "DBLP-ACM/Febrl3/NCVR datasets (gitignored)" }
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --all-packages --no-install-package goldenmatch-native --no-install-package goldenflow-native
      - name: Run ${{ matrix.lane.name }} lane
        shell: bash
        env:
          LANE_NAME: ${{ matrix.lane.name }}
          LANE_TESTS: ${{ matrix.lane.tests }}
          LANE_NEEDS: ${{ matrix.lane.needs }}
        run: |
          set -euo pipefail
          # Each lane decides whether its prereqs are met. Today none are
          # configured in CI; lanes report "not-configured" with a clear
          # message so the gap is visible. As prereqs land (Postgres
          # service, API-key secret, etc.) the corresponding lane flips to
          # "configured" and runs its tests.
          case "$LANE_NAME" in
            mcp_watch)
              CONFIGURED="false"  # No MCP runtime fixtures in CI
              ;;
            llm_boost)
              # OPENAI_API_KEY is set as a repo secret only for nightly benchmark runs
              if [ -n "${OPENAI_API_KEY:-}" ]; then CONFIGURED="true"; else CONFIGURED="false"; fi
              ;;
            embedder)
              CONFIGURED="false"  # No Vertex AI service account in CI
              ;;
            benchmarks)
              # benchmarks data lives in tests/benchmarks/datasets (gitignored).
              # Synthetic-fixture benchmarks run separately in the synthetic_benchmarks job.
              if [ -d packages/python/goldenmatch/tests/benchmarks/datasets/DBLP-ACM ]; then
                CONFIGURED="true"
              else
                CONFIGURED="false"
              fi
              ;;
            *)
              CONFIGURED="false"
              ;;
          esac

          if [ "$CONFIGURED" = "true" ]; then
            echo "::notice title=lane $LANE_NAME::prereqs met — running"
            cd packages/python/goldenmatch
            uv run pytest $LANE_TESTS -n auto --timeout=180 --timeout-method=thread
          else
            # Use ::notice:: (not ::warning:: or ::error::) so the lane
            # passes but is auditable. The lane name + needs string surface
            # in the GitHub Checks UI so reviewers can see what's gated.
            echo "::notice title=lane $LANE_NAME (not-configured)::tests skipped — needs: $LANE_NEEDS"
            echo "::notice::To enable this lane, see docs/ci-lanes.md"
            # Exit zero — "not-configured" is informational, not a failure.
            exit 0
          fi

  # Real Postgres lane for goldenmatch.db tests. Boots a Postgres 16 services
  # container (matches the pinned PG version in packages/rust/extensions) and
  # runs `tests/test_db.py` + `tests/test_reconcile.py` against it. The shared
  # fixture in `tests/_pg_helpers.py` provisions a unique database per test
  # off the admin URL and drops it on teardown — no cross-test pollution.
  # Gated by path filter so the lane only fires when DB code or DB tests
  # change (plus workflow self-edits).
  python_postgres:
    needs: changes
    if: |
      needs.changes.outputs.python_goldenmatch_postgres == 'true' ||
      needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        # `pg_isready` health-check so GH Actions only marks the job started
        # after Postgres is actually accepting connections.
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      # _pg_helpers reads this to provision per-test databases off the admin
      # connection instead of spawning a local `testing.postgresql`.
      GOLDENMATCH_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --all-packages --no-install-package goldenmatch-native --no-install-package goldenflow-native
      - name: Run Postgres-backed tests
        shell: bash
        run: |
          cd packages/python/goldenmatch
          # -n 0 (serial): per-test DB provisioning + the shared admin
          # connection make xdist worker contention plausible; serial avoids
          # the headache for a small (~30-test) lane.
          uv run --extra postgres pytest tests/test_db.py tests/test_reconcile.py \
            tests/test_memory_store_postgres.py \
            -n 0 --timeout=180 --timeout-method=thread -v

  # Synthetic-fixture benchmark smoke. Runs on every PR against committed
  # synthetic fixtures (t3_synthetic.csv, t3_clean_compat.csv, red_provoking.csv,
  # t1_synthetic.csv) so a regression in the auto-config controller is caught
  # at PR time without needing the gitignored real benchmark datasets.
  # Real-benchmark runs (DBLP-ACM/Febrl3/NCVR/DQbench) live in the separate
  # benchmarks.yml workflow (schedule + workflow_dispatch).
  synthetic_benchmarks:
    needs: changes
    if: needs.changes.outputs.python_goldenmatch == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --all-packages --no-install-package goldenmatch-native --no-install-package goldenflow-native
      - name: Run synthetic benchmarks
        shell: bash
        run: |
          # Each synthetic test asserts an end-to-end behavioral contract
          # (T3 collision pairs filtered, T1 corruption pairs deduplicated,
          # red_provoving fixture commits a config, etc.). Failure here means
          # a PR broke something the unit tests didn't catch.
          cd packages/python/goldenmatch
          uv run pytest \
            tests/test_dqbench_t1_recovery.py \
            tests/test_dqbench_t3_recovery.py \
            -n auto --timeout=180 --timeout-method=thread -v
      - name: Synthetic benchmark summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Synthetic benchmark results"
            echo ""
            echo "These run against committed synthetic fixtures on every PR."
            echo "Real-benchmark runs (DBLP-ACM/Febrl3/NCVR/DQbench) require gitignored datasets and run via the separate \`benchmarks.yml\` workflow."
          } >> "$GITHUB_STEP_SUMMARY"

  # Smoke lane for `scripts/run_benchmarks.py` and the committed
  # `scripts/dqbench_adapters/` helpers. The real-dataset runs live in
  # `benchmarks.yml` (Mondays + workflow_dispatch); this lane catches
  # packaging regressions (broken imports, sys.path issues, helper
  # renames) on every PR that touches the runner without needing the
  # gitignored DBLP/NCVR/dqbench datasets.
  #
  # `continue-on-error: true` so a regression here surfaces as a visible
  # red X without blocking merges — the runner is tooling, not a release
  # gate. Real number reproducibility is gated by the benchmarks.yml
  # workflow.
  benchmark_runner_smoke:
    needs: changes
    if: needs.changes.outputs.benchmark_runner == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --all-packages --no-install-package goldenmatch-native --no-install-package goldenflow-native
      # `recordlinkage` ships the Febrl3 dataset bundled — installing it
      # lets the smoke run actually exercise the febrl3 helper end-to-end
      # without needing any gitignored dataset. The other three datasets
      # (DBLP-ACM, NCVR, DQbench) are gracefully skipped by the runner
      # when their files / CLIs aren't on disk.
      - run: uv pip install recordlinkage pyarrow
      - name: Import smoke
        shell: bash
        run: |
          uv run python -c "
          import sys
          from pathlib import Path
          sys.path.insert(0, 'scripts')
          import dqbench_adapters
          from dqbench_adapters import febrl3, ncvr, leipzig_eval
          # goldenmatch_zeroconfig requires dqbench (optional, not installed in CI) — skip import smoke
          print('dqbench_adapters package + 3 standalone helpers imported OK')
          "
      - name: Run benchmarks --help
        shell: bash
        run: |
          uv run python scripts/run_benchmarks.py --help
      - name: Run febrl3 end-to-end
        shell: bash
        env:
          GOLDENMATCH_AUTOCONFIG_MEMORY: "0"
        run: |
          uv run python scripts/run_benchmarks.py \
            --datasets febrl3 --output /tmp/febrl3_smoke.json
          # F1 floor is well below the published 0.9443 number; the lane
          # protects the runner's wiring, not its accuracy. Real floor
          # lives in tests/test_autoconfig_benchmarks.py.
          uv run python -c "
          import json
          r = json.load(open('/tmp/febrl3_smoke.json'))['results'][0]
          # #438: 0.80 -> 0.85 (DOB + surname-substring blocking passes),
          # then 0.85 -> 0.90 after #538's composite name+DOB exact matchkey
          # lifted the CI-measured F1 to 0.9124 (deterministic, memory off).
          assert r['f1'] >= 0.90, f'Febrl3 smoke regressed: {r}'
          print('febrl3 smoke F1=', r['f1'])
          "
      - name: Smoke summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Benchmark runner smoke"
            echo ""
            echo "Imports + \`--help\` + a real Febrl3 run (the only published dataset that ships via pip)."
            echo "DBLP-ACM / NCVR / DQbench composite reproduce against gitignored datasets in \`benchmarks.yml\`."
          } >> "$GITHUB_STEP_SUMMARY"

  # Auto-config quality gate. Runs the harness over the committed anchors (always
  # present) and diffs the resulting decision-kernel signals against the committed
  # baseline (scripts/autoconfig_quality/baselines/scorecard.json). A FAIL means a
  # kernel change moved a host-independent decision (classification / matchkeys /
  # blocking fields+cost) or dropped the anchor_person_match F1 below its floor.
  # Reference mode: this job BUILDS the native ext and runs the gate on the native
  # path, and the committed baseline is blessed native-on -- native is the
  # reference. planner_rung drift is still informational WARN. Real datasets
  # (DBLP-ACM) skip-when-absent. Iterate loop + how to re-bless:
  # scripts/autoconfig_quality/README.md.
  quality_gate:
    needs: changes
    if: needs.changes.outputs.quality_gate == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --all-packages --no-install-package goldenmatch-native --no-install-package goldenflow-native
      # FEBRL3's loader needs recordlinkage (ships the dataset bundled); it is not
      # a declared dep. pyarrow backs pl.from_pandas in the febrl3/ncvr loaders
      # (mirrors the benchmark_runner_smoke precedent). synthetic-NCVR +
      # historical_50k (vendored parquet) need no extra install; real-NCVR +
      # DBLP-ACM skip-when-absent in CI (gitignored).
      - run: uv pip install recordlinkage pyarrow
      # Reference mode (docs/design/2026-07-01-rust-is-the-reference-roadmap.md):
      # native is the reference, so the gate runs on the native path and the
      # baseline is blessed native-on. build_native.py drops goldenmatch._native
      # into the package (as the `native` parity lane does). Kernel signals are
      # parity-identical native/Python; running native keeps planner_rung aligned
      # with the native baseline (it picks `bucket`, not `polars-direct`).
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: packages/rust/extensions/native
      - name: Build native ext (reference mode -> gate runs on the native path)
        run: uv run python scripts/build_native.py
      - name: Run auto-config quality gate
        shell: bash
        env:
          # Determinism: pin auto-config memory off so the gate measures the
          # static decision kernel, not learned per-run adjustments.
          GOLDENMATCH_AUTOCONFIG_MEMORY: "0"
        run: |
          # Repo-root cwd so `python -m scripts.autoconfig_quality` resolves the
          # harness package; the harness adds the goldenmatch package `scripts/`
          # and bench-attribution paths to sys.path internally. No --fast-only:
          # the anchors' fast signals AND the anchor_person_match F1 floor are
          # both gated (anchor_person_match is 400 entities, F1 is seconds).
          uv run python -m scripts.autoconfig_quality gate
      - name: Quality scorecard summary
        if: always()
        shell: bash
        env:
          GOLDENMATCH_AUTOCONFIG_MEMORY: "0"
        run: |
          {
            echo "## Auto-config quality scorecard"
            echo ""
            echo "Diff of the current decision-kernel signals vs the committed baseline."
            echo "FAIL = a host-independent kernel decision moved (or the anchor F1 floor dropped); WARN = host-coupled planner routing drift (informational)."
            echo ""
            echo '```'
            uv run python -m scripts.autoconfig_quality report 2>/dev/null || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # Cross-language API-parity gate (goldenmatch MCP+CLI drift): emits both the
  # Python and TypeScript surfaces, then diffs them against the committed parity
  # manifest. The gate (scripts/check_api_parity.py) shells out to
  # `sys.executable scripts/emit_python_surface.py` (the uv venv python, which
  # carries goldenmatch[mcp]) and `node scripts/emit_ts_surface.mjs` (node from
  # setup-node), so the venv install + the TS build + node-on-PATH all have to be
  # in place before the gate runs.
  api_parity:
    needs: changes
    if: needs.changes.outputs.api_parity == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        package: [goldenmatch, goldencheck, goldenflow, goldenpipe, goldenanalysis, infermap]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9
        # Reads version from root package.json `packageManager` field.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - name: Sync workspace + install the MCP SDK
        # Every package's [mcp] extra is just the shared `mcp` SDK, so one install provisions
        # the Python MCP surface for all six packages.
        run: |
          uv sync --all-packages --no-install-package goldenmatch-native --no-install-package goldenflow-native
          # mcp: the MCP-tool surface; aiohttp: the a2a servers (the a2a_skills
          # emitter imports <pkg>.a2a.server, which needs the [a2a] extra). Without
          # aiohttp the a2a emitter exits 3 (env-gap) and the a2a surface is silently
          # skipped — the gate must PROVISION it so a2a parity is actually checked.
          uv pip install "mcp>=1.0" aiohttp
      - name: Gate unit tests (pure data + all-six emitter smoke)
        # Package-agnostic; run once (on the goldenmatch shard) to avoid 6x redundancy.
        if: matrix.package == 'goldenmatch'
        run: uv run pytest scripts/test_api_parity.py -q
        env:
          POLARS_SKIP_CPU_CHECK: "1"
          GOLDENMATCH_NATIVE: "0"
          GOLDENFLOW_NATIVE: "0"
          GOLDENCHECK_NATIVE: "0"
          GOLDENANALYSIS_NATIVE: "0"
      - name: Build ${{ matrix.package }}-js + its workspace deps (TS emitter imports dist/)
        # turbo build has dependsOn ^build, so this builds the package's wasm-runtime /
        # sibling deps first (the main `typescript` lane relies on the same graph).
        run: |
          pnpm install --frozen-lockfile
          pnpm turbo run build --filter=${{ matrix.package }}
      - name: Parity gate for ${{ matrix.package }} (both emitters + manifest)
        run: uv run python scripts/check_api_parity.py ${{ matrix.package }}
        env:
          POLARS_SKIP_CPU_CHECK: "1"
          GOLDENMATCH_NATIVE: "0"
          GOLDENFLOW_NATIVE: "0"
          GOLDENCHECK_NATIVE: "0"
          GOLDENANALYSIS_NATIVE: "0"
          PYTHONPATH: packages/python/${{ matrix.package }}

  # Native-symbol reconciliation gate: reconcile the goldenmatch host's
  # native-kernel references against the kernel's exports. Box-safe and
  # stdlib-only -- no uv sync / no cargo build (the checker + tests are pure
  # stdlib static analysis), so a bare system Python + pytest is all it needs.
  native_symbols:
    needs: changes
    if: needs.changes.outputs.native_symbols == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        package: [goldenmatch, goldencheck, goldenanalysis, goldenflow, infermap]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.13"
      - name: Reconcile native symbols (${{ matrix.package }})
        run: python scripts/check_native_symbols.py ${{ matrix.package }}
      - name: Install pytest
        if: matrix.package == 'goldenmatch'
        run: pip install pytest
      - name: Gate unit tests
        if: matrix.package == 'goldenmatch'
        run: python -m pytest scripts/test_native_symbols.py -q

  typescript:
    needs: changes
    if: needs.changes.outputs.typescript == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9
        # Reads version from root package.json `packageManager` field.
        # That field MUST be exact semver (pnpm@9.15.0) — ranges error.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: pnpm
        # cache: pnpm requires (a) pnpm on PATH (handled above) and
        # (b) pnpm-lock.yaml committed at repo root.
      - run: pnpm install --frozen-lockfile
      # Drift guard: when the shared autoconfig core/wasm (or the embed script)
      # changes, rebuild the inlined wasm + bindings + parity fixtures from the
      # live core, then prove the fresh build passes parity. The wasm32 target +
      # wasm-pack are only provisioned on these PRs (not every TS change) to keep
      # the common path fast.
      #
      # We diff ONLY the golden fixtures (deterministic JSON from the core's
      # logic) — NOT the .wasm/.js bytes, which vary with the CI rustc/wasm-bindgen
      # version and would false-positive. Stale committed wasm is instead caught
      # behaviorally: the parity test (committed wasm vs committed fixtures) fails
      # if the fixtures moved but the wasm wasn't rebuilt.
      - name: Rebuild + verify embedded autoconfig wasm
        if: needs.changes.outputs.autoconfig_wasm == 'true' || needs.changes.outputs.force_all == 'true'
        working-directory: packages/typescript/goldenmatch
        run: |
          rustup target add wasm32-unknown-unknown
          curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh
          node scripts/build_autoconfig_wasm.mjs
          if ! git diff --exit-code -- tests/parity/fixtures/autoconfig/; then
            echo "::error::autoconfig golden fixtures are stale. Run \
              'node scripts/build_autoconfig_wasm.mjs' in packages/typescript/goldenmatch \
              (after regenerating the core's golden vectors) and commit the result." >&2
            exit 1
          fi
          npx vitest run tests/parity/autoconfig-core.parity.test.ts
      # Same drift-guard pattern for the suggest (healer) wasm core. Rebuild the
      # inlined wasm + bindings + golden fixtures from the live suggest-core, then
      # prove the fresh build passes parity. wasm32 + wasm-pack are only
      # provisioned on suggest-touching PRs (not every TS change).
      #
      # We diff ONLY the kernel {input,expected} golden fixtures — NOT the
      # .wasm/.js bytes (toolchain-variant, would false-positive), and NOT
      # column_signals_basic.json (Python-emitted, never written by this build
      # script). Those fixtures are authored by the suggest-core BLESS golden
      # test; the build script COPIES the committed crate golden, it does NOT
      # re-bless — so this diff catches "crate golden changed but not copied".
      # Stale committed wasm is instead caught behaviorally: the parity test
      # (committed wasm vs committed fixtures) fails if the fixtures moved but the
      # wasm wasn't rebuilt.
      - name: Rebuild + verify embedded suggest wasm
        if: needs.changes.outputs.suggest_wasm == 'true' || needs.changes.outputs.force_all == 'true'
        working-directory: packages/typescript/goldenmatch
        run: |
          rustup target add wasm32-unknown-unknown
          curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh
          node scripts/build_suggest_wasm.mjs
          if ! git diff --exit-code -- tests/parity/fixtures/suggest/; then
            echo "::error::suggest golden fixtures are stale. Re-bless the suggest-core \
              oracle ('BLESS_SUGGEST_FIXTURES=1 cargo test -p goldenmatch-suggest-core \
              --features arrow --test bless'), then run \
              'node scripts/build_suggest_wasm.mjs' in packages/typescript/goldenmatch \
              and commit the result." >&2
            exit 1
          fi
          npx vitest run tests/parity/suggest-wasm.parity.test.ts
      # Same drift-guard pattern for the documents-core kernels. Rebuild the
      # inlined wasm + bindings, copy the Python-authored corpus, diff ONLY the
      # corpus JSONL (deterministic; NOT the toolchain-variant wasm bytes), then
      # prove the committed wasm reproduces it.
      - name: Rebuild + verify embedded documents wasm
        if: needs.changes.outputs.documents_wasm == 'true' || needs.changes.outputs.force_all == 'true'
        working-directory: packages/typescript/goldenmatch
        run: |
          rustup target add wasm32-unknown-unknown
          command -v wasm-pack >/dev/null 2>&1 || curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh
          node scripts/build_documents_wasm.mjs
          if ! git diff --exit-code -- tests/parity/fixtures/documents/documents_corpus.jsonl; then
            echo "::error::documents corpus fixture is stale. Regenerate it \
              ('python packages/python/goldenmatch/scripts/gen_documents_corpus.py'), \
              run 'node scripts/build_documents_wasm.mjs' in \
              packages/typescript/goldenmatch, and commit the result." >&2
            exit 1
          fi
          npx vitest run tests/parity/documents-core.parity.test.ts
      # Same drift-guard pattern for the goldencheck deep-profiling wasm core.
      # Rebuild the inlined wasm + bindings + copy the golden fixture from the
      # live goldencheck-core, diff ONLY the deterministic golden JSON (not the
      # toolchain-variant wasm bytes), then prove the committed wasm reproduces it
      # AND the reroute stays equivalent to the pure-TS path. Working dir is the
      # goldencheck package (not goldenmatch).
      - name: Rebuild + verify embedded goldencheck wasm
        if: needs.changes.outputs.goldencheck_wasm == 'true' || needs.changes.outputs.force_all == 'true'
        working-directory: packages/typescript/goldencheck
        run: |
          rustup target add wasm32-unknown-unknown
          command -v wasm-pack >/dev/null 2>&1 || curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh
          node scripts/build_goldencheck_wasm.mjs
          if ! git diff --exit-code -- tests/parity/fixtures/gc_vectors.json; then
            echo "::error::goldencheck golden fixture is stale. Regenerate \
              goldencheck-core/golden/gc_vectors.json, run \
              'node scripts/build_goldencheck_wasm.mjs' in packages/typescript/goldencheck, \
              and commit the result." >&2
            exit 1
          fi
          npx vitest run tests/parity/goldencheck-wasm.parity.test.ts tests/unit/goldencheck-wasm-reroute.test.ts tests/unit/goldencheck-wasm-relations.test.ts
      # Perceptual image-pHash wasm. Rebuild the inlined wasm from the live kernel
      # (DCT table) and run the BYTE-EXACT parity test (committed wasm vs the
      # Python golden image vectors). No fixture-regen-diff: the perceptual fixture
      # is Python-owned (regenerated by the Python kernel, not a TS step); a stale
      # committed wasm or a kernel change is caught behaviorally by the parity test.
      - name: Rebuild + verify embedded perceptual wasm
        if: needs.changes.outputs.perceptual_wasm == 'true' || needs.changes.outputs.force_all == 'true'
        working-directory: packages/typescript/goldenmatch
        run: |
          rustup target add wasm32-unknown-unknown
          curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh
          node scripts/build_perceptual_wasm.mjs
          npx vitest run tests/parity/perceptual-wasm.parity.test.ts
      # Same drift-guard pattern for the goldenprofile (Virtual Fingerprint)
      # wasm core. Rebuild the inlined wasm + bindings + parity fixtures from the
      # live kernel, then prove the fresh build passes parity. The build script
      # regenerates the fixtures itself (cargo run --example gen_parity_fixtures,
      # which IS the host oracle), so we diff the fixtures to catch "kernel moved
      # but fixtures not regenerated". We diff ONLY the fixtures — NOT the
      # .wasm/.js bytes (toolchain-variant, would false-positive). Stale committed
      # wasm is caught behaviorally by the parity test (committed wasm vs fixtures).
      - name: Rebuild + verify embedded goldenprofile wasm
        if: needs.changes.outputs.goldenprofile_wasm == 'true' || needs.changes.outputs.force_all == 'true'
        working-directory: packages/typescript/goldenprofile
        run: |
          rustup target add wasm32-unknown-unknown
          curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh
          node scripts/build_goldenprofile_wasm.mjs
          if ! git diff --exit-code -- tests/parity/fixtures/goldenprofile/; then
            echo "::error::goldenprofile parity fixtures are stale. Run \
              'node scripts/build_goldenprofile_wasm.mjs' in \
              packages/typescript/goldenprofile and commit the result." >&2
            exit 1
          fi
          npx vitest run tests/parity/goldenprofile-wasm.parity.test.ts
      # Same drift-guard pattern for the goldengraph (KG engine) wasm core.
      - name: Rebuild + verify embedded goldengraph wasm
        if: needs.changes.outputs.goldengraph_wasm == 'true' || needs.changes.outputs.force_all == 'true'
        working-directory: packages/typescript/goldengraph
        run: |
          rustup target add wasm32-unknown-unknown
          curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh
          node scripts/build_goldengraph_wasm.mjs
          if ! git diff --exit-code -- tests/parity/fixtures/goldengraph/; then
            echo "::error::goldengraph parity fixtures are stale. Run \
              'node scripts/build_goldengraph_wasm.mjs' in \
              packages/typescript/goldengraph and commit the result." >&2
            exit 1
          fi
          npx vitest run tests/parity/goldengraph-wasm.parity.test.ts
      # Same drift guard for the goldenhnsw wasm surface: rebuild the inlined
      # wasm + bindings + copy the golden fixture from the live kernel, diff ONLY
      # the deterministic golden JSON (not the version-varying wasm bytes), then
      # prove the committed wasm reproduces it. Stale committed wasm is caught
      # behaviorally by the parity test, exactly like the autoconfig guard above.
      - name: Rebuild + verify embedded goldenhnsw wasm
        if: needs.changes.outputs.hnsw_wasm == 'true' || needs.changes.outputs.force_all == 'true'
        working-directory: packages/typescript/goldenmatch
        run: |
          rustup target add wasm32-unknown-unknown
          command -v wasm-pack >/dev/null 2>&1 || curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh
          node scripts/build_goldenhnsw_wasm.mjs
          if ! git diff --exit-code -- tests/parity/fixtures/hnsw/; then
            echo "::error::goldenhnsw golden fixture is stale. Run \
              'node scripts/build_goldenhnsw_wasm.mjs' in packages/typescript/goldenmatch \
              (after regenerating goldenhnsw/golden/hnsw_vectors.json) and commit the result." >&2
            exit 1
          fi
          npx vitest run tests/parity/hnsw.parity.test.ts tests/unit/hnsw-wasm.test.ts
      # Same drift guard for the sketch (MinHash/LSH) wasm surface: rebuild the
      # inlined wasm + bindings + copy the golden fixture, diff ONLY the
      # deterministic golden JSON (not the version-varying wasm bytes), then run
      # the parity + reroute-equivalence tests (which the fixture_drift job does
      # NOT run — it only diffs fixtures). Stale committed wasm is caught
      # behaviorally by the parity test, exactly like the goldenhnsw guard above.
      - name: Rebuild + verify embedded sketch wasm
        if: needs.changes.outputs.sketch_wasm == 'true' || needs.changes.outputs.force_all == 'true'
        working-directory: packages/typescript/goldenmatch
        run: |
          rustup target add wasm32-unknown-unknown
          command -v wasm-pack >/dev/null 2>&1 || curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh
          node scripts/build_sketch_wasm.mjs
          if ! git diff --exit-code -- tests/parity/fixtures/sketch/; then
            echo "::error::sketch golden fixture is stale. Run \
              'node scripts/build_sketch_wasm.mjs' in packages/typescript/goldenmatch \
              and commit the result." >&2
            exit 1
          fi
          npx vitest run tests/parity/sketch-wasm.parity.test.ts tests/unit/sketch-wasm-reroute.test.ts tests/parity/sketch-simhash-wasm.parity.test.ts
      # Same drift guard for the graph (connected-components) wasm surface:
      # rebuild the inlined wasm + bindings + copy the golden fixture, diff ONLY
      # the deterministic golden JSON (not the version-varying wasm bytes), then
      # run the parity + reroute tests (the fixture_drift job only diffs
      # fixtures — it doesn't run these vitest checks). Stale committed wasm is
      # caught behaviorally by the parity test, like the goldenhnsw guard above.
      - name: Rebuild + verify embedded graph wasm
        if: needs.changes.outputs.graph_wasm == 'true' || needs.changes.outputs.force_all == 'true'
        working-directory: packages/typescript/goldenmatch
        run: |
          rustup target add wasm32-unknown-unknown
          command -v wasm-pack >/dev/null 2>&1 || curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh
          node scripts/build_graph_wasm.mjs
          if ! git diff --exit-code -- tests/parity/fixtures/graph/; then
            echo "::error::graph golden fixture is stale. Run \
              'node scripts/build_graph_wasm.mjs' in packages/typescript/goldenmatch \
              and commit the result." >&2
            exit 1
          fi
          npx vitest run tests/parity/graph-wasm.parity.test.ts tests/unit/graph-wasm-reroute.test.ts
      # Same drift guard for the fingerprint wasm surface: rebuild the inlined
      # wasm + bindings + copy the golden fixture from the live kernel, diff ONLY
      # the deterministic golden JSON (not the version-varying wasm bytes), then
      # prove the committed wasm reproduces it. Stale committed wasm is caught
      # behaviorally by the parity + reroute tests.
      - name: Rebuild + verify embedded fingerprint wasm
        if: needs.changes.outputs.fingerprint_wasm == 'true' || needs.changes.outputs.force_all == 'true'
        working-directory: packages/typescript/goldenmatch
        run: |
          rustup target add wasm32-unknown-unknown
          command -v wasm-pack >/dev/null 2>&1 || curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh
          node scripts/build_fingerprint_wasm.mjs
          if ! git diff --exit-code -- tests/parity/fixtures/fingerprint/; then
            echo "::error::fingerprint golden fixture is stale. Run \
              'node scripts/build_fingerprint_wasm.mjs' in packages/typescript/goldenmatch \
              (after regenerating fingerprint-core/golden/fingerprint_golden.json) and commit the result." >&2
            exit 1
          fi
          npx vitest run tests/parity/fingerprint-wasm.parity.test.ts tests/unit/fingerprint-wasm-reroute.test.ts
      # Same drift guard for the goldenembed (in-house embedder) wasm surface:
      # rebuild the inlined wasm + bindings + copy the golden fixture, diff ONLY
      # the deterministic golden JSON (not the version-varying wasm bytes), then
      # prove the committed wasm reproduces the numpy oracle within cosine
      # tolerance. Stale committed wasm is caught behaviorally by the parity test.
      - name: Rebuild + verify embedded goldenembed wasm
        if: needs.changes.outputs.goldenembed_wasm == 'true' || needs.changes.outputs.force_all == 'true'
        working-directory: packages/typescript/goldenmatch
        run: |
          rustup target add wasm32-unknown-unknown
          command -v wasm-pack >/dev/null 2>&1 || curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh
          node scripts/build_goldenembed_wasm.mjs
          if ! git diff --exit-code -- tests/parity/fixtures/goldenembed/; then
            echo "::error::goldenembed golden fixture is stale. Run \
              'node scripts/build_goldenembed_wasm.mjs' in packages/typescript/goldenmatch \
              (after regenerating goldenembed-core/golden/project_golden.json) and commit the result." >&2
            exit 1
          fi
          npx vitest run tests/parity/goldenembed-wasm.parity.test.ts
      # BigQuery JS-wasm UDF surface (#5): regenerate the committed DDL from the
      # embedded base64 kernels and diff. Pure-node — no wasm toolchain, since the
      # bytes come from the already-committed *WasmBytes.ts. The Node/V8 parity
      # test (warehouse-bigquery.parity.test.ts, runs in the main vitest step)
      # gates cross-surface correctness; this only catches a stale committed .sql.
      #
      # NOTE: on force_all the earlier "Rebuild + verify embedded fingerprint
      # wasm" step REWRITES src/core/_wasm/fingerprintWasm{Bytes.ts,Bindings.js}
      # with CI's toolchain-built (version-varying) bytes — the same bytes that
      # step deliberately does NOT diff. The generator reads those files, so we
      # must restore the committed inputs first; otherwise the regenerated SQL
      # embeds the CI-rebuilt base64 and this guard false-fails on wasm-toolchain
      # drift instead of a genuinely stale committed .sql. Behavioral correctness
      # of the committed bytes is already gated by the fingerprint parity test +
      # that step's golden-JSON diff.
      - name: Regenerate + verify warehouse UDFs (no drift)
        if: needs.changes.outputs.warehouse_udf == 'true' || needs.changes.outputs.force_all == 'true'
        working-directory: packages/typescript/goldenmatch
        run: |
          git checkout -- src/core/_wasm/
          node scripts/generate_warehouse_udfs.mjs
          if ! git diff --exit-code -- warehouse/bigquery/; then
            echo "::error::warehouse UDF DDL is stale. Run \
              'node scripts/generate_warehouse_udfs.mjs' in packages/typescript/goldenmatch \
              and commit warehouse/bigquery/." >&2
            exit 1
          fi
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: .turbo
          # Lockfile-keyed (NOT github.sha — that's unique per commit, so the
          # cache cold-started every push). restore-keys lets a new lockfile
          # still warm-start from the latest prior turbo cache; turbo
          # integrity-checks its own entries, so a stale hit self-corrects.
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: turbo-${{ runner.os }}-
      # `lint` is omitted: every TS package's lint script is currently identical
      # to its typecheck script (`tsc --noEmit`), so running both wastes a turbo
      # task per package on cold runs. Re-add `lint` here when ESLint lands and
      # the scripts diverge.
      - run: pnpm turbo run build test typecheck

  wasm_score:
    needs: changes
    if: needs.changes.outputs.wasm_score == 'true' || needs.changes.outputs.force_all == 'true'
    # Opt-in WASM scorer lane: builds the score-wasm artifact, then runs the
    # parity test UN-skipped (it skips elsewhere with no artifact) + an
    # informational benchmark. The artifact-free wasm-backend/wasm-fallback unit
    # tests already run in the `typescript` lane above.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: packages/rust/extensions/score-wasm
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build WASM artifact (installs the matching wasm-bindgen-cli)
        run: bash packages/rust/extensions/score-wasm/build_wasm.sh
      - name: Build shared wasm-runtime (the parity test imports goldenmatch-wasm-runtime)
        run: pnpm --filter goldenmatch-wasm-runtime build
      - name: WASM parity (un-skipped — artifact now present) [THE GATE]
        run: pnpm --filter goldenmatch exec vitest run tests/parity/wasm-scorer.test.ts
      - name: Benchmark + dist-path validation (enableWasm() must resolve the bundled artifact)
        # No longer continue-on-error: the bench builds dist + runs enableWasm(),
        # which resolves `./artifacts/score_wasm_bg.wasm` from the BUNDLED output.
        # copy_wasm_artifact.mjs now copies to every plausible dist `./artifacts/`
        # parent, so a broken bundled path reddens the lane (bench exits 1 on a
        # failed enableWasm) instead of silently passing.
        run: |
          pnpm --filter goldenmatch build
          node packages/typescript/goldenmatch/scripts/bench_wasm_scorer.mjs 1500

  analysis_wasm:
    needs: changes
    if: needs.changes.outputs.analysis_wasm == 'true' || needs.changes.outputs.force_all == 'true'
    # Opt-in WASM aggregate lane: builds the analysis-wasm artifact, then runs the
    # parity test UN-skipped (it skips elsewhere with no artifact) + an
    # informational benchmark. The artifact-free goldenanalysis tests + the
    # shared goldenmatch-wasm-runtime build run in the `typescript` lane above.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: packages/rust/extensions/analysis-wasm
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build WASM artifact (installs the matching wasm-bindgen-cli)
        run: bash packages/rust/extensions/analysis-wasm/build_wasm.sh
      - name: Build shared wasm-runtime (the parity test imports goldenmatch-wasm-runtime)
        run: pnpm --filter goldenmatch-wasm-runtime build
      - name: WASM aggregate parity (un-skipped — artifact now present) [THE GATE]
        run: pnpm --filter goldenanalysis exec vitest run tests/parity/wasm-aggregate.test.ts
      - name: Benchmark + dist-path validation (enableAnalysisWasm() must resolve the bundled artifact)
        # No longer continue-on-error: the bench builds dist + runs
        # enableAnalysisWasm(), resolving `./artifacts/analysis_wasm_bg.wasm` from
        # the BUNDLED output. copy_wasm_artifact.mjs copies to every plausible dist
        # `./artifacts/` parent, so a broken bundled path reddens the lane.
        run: |
          pnpm --filter goldenanalysis build
          node packages/typescript/goldenanalysis/scripts/bench_wasm_aggregate.mjs 1000000

  infermap_wasm:
    needs: changes
    if: needs.changes.outputs.infermap_wasm == 'true' || needs.changes.outputs.force_all == 'true'
    # Opt-in WASM detect lane: builds the infermap-wasm artifact, then runs the
    # detect parity test UN-skipped (skips elsewhere with no artifact). Advisory.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: packages/rust/extensions/infermap-wasm
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build WASM artifact (installs the matching wasm-bindgen-cli)
        run: bash packages/rust/extensions/infermap-wasm/build_wasm.sh
      - name: Build shared wasm-runtime (the parity test imports goldenmatch-wasm-runtime)
        run: pnpm --filter goldenmatch-wasm-runtime build
      - name: Build infermap's sibling deps (detect.ts imports goldencheck-types)
        run: pnpm --filter "infermap^..." build
      - name: WASM detect parity (un-skipped — artifact now present) [THE GATE]
        run: pnpm --filter infermap exec vitest run tests/parity/infermap-wasm.parity.test.ts
      - name: dist-path validation (enableInfermapWasm() must resolve the bundled artifact)
        run: |
          pnpm --filter infermap build

  wasm_flow:
    needs: changes
    if: needs.changes.outputs.wasm_flow == 'true' || needs.changes.outputs.force_all == 'true'
    # Opt-in GoldenFlow WASM lane (Wave 0c): builds the goldenflow-wasm artifact
    # into the goldenflow TS package's src/core/wasm/artifacts/ (where the loader
    # resolves it), then runs the identifier parity test with the artifact present
    # so its WASM leg (skipped elsewhere with no artifact) actually executes. This
    # is the only cross-surface native-vs-wasm gate for GoldenFlow. The pure-TS
    # parity leg + typecheck already run in the `typescript` lane above (turbo
    # test/typecheck over the goldenflow package); this lane adds the wasm leg.
    #
    # goldenflow-wasm has NO build_wasm.sh (unlike score-wasm), so the build is
    # inlined here mirroring score-wasm/build_wasm.sh: cargo build for wasm32 +
    # wasm-bindgen-cli pinned to the version in the crate's Cargo.lock (a CLI/crate
    # skew silently produces broken JS glue). wasm-pack is avoided because the
    # crate declares wasm-bindgen under a cfg(target_arch="wasm32") table, which
    # wasm-pack's dependency detection doesn't see.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: packages/rust/extensions/goldenflow-wasm
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Corpus sync-check: the oracle corpus is committed in TWO byte-identical
      # copies (Python + TS). A future edit to one that isn't mirrored to the
      # other must fail CI, or the parity gate would silently assert against
      # divergent fixtures.
      - name: Corpus sync-check (Python vs TS copies must be byte-identical)
        run: |
          cmp packages/python/goldenflow/tests/parity/identifiers_corpus.jsonl \
              packages/typescript/goldenflow/tests/parity/identifiers_corpus.jsonl
          cmp packages/python/goldenflow/tests/parity/profile_corpus.jsonl \
              packages/typescript/goldenflow/tests/parity/profile_corpus.jsonl
      - name: Build goldenflow WASM artifact into the loader's artifacts/ dir
        # Mirrors score-wasm/build_wasm.sh: cargo build wasm32 + wasm-bindgen-cli
        # pinned from Cargo.lock, emitting goldenflow_wasm_bg.wasm + .js where the
        # loader resolves `./artifacts/goldenflow_wasm_bg.wasm`.
        run: |
          set -euo pipefail
          CRATE_DIR=packages/rust/extensions/goldenflow-wasm
          OUT_DIR=packages/typescript/goldenflow/src/core/wasm/artifacts
          cargo build --manifest-path "$CRATE_DIR/Cargo.toml" \
            --target wasm32-unknown-unknown --release
          WB_VER="$(grep -A1 '^name = "wasm-bindgen"$' "$CRATE_DIR/Cargo.lock" | grep '^version = ' | head -1 | sed -E 's/version = "([^"]+)"/\1/')"
          if [ -z "$WB_VER" ]; then echo "could not resolve wasm-bindgen version from Cargo.lock" >&2; exit 1; fi
          echo "Using wasm-bindgen $WB_VER"
          if ! wasm-bindgen --version 2>/dev/null | grep -q "$WB_VER"; then
            cargo install wasm-bindgen-cli --version "=$WB_VER" --locked
          fi
          wasm-bindgen \
            "$CRATE_DIR/target/wasm32-unknown-unknown/release/goldenflow_wasm.wasm" \
            --target web --out-dir "$OUT_DIR" --out-name goldenflow_wasm
      - name: Build shared wasm-runtime (the loader imports goldenmatch-wasm-runtime)
        run: pnpm --filter goldenmatch-wasm-runtime build
      - name: WASM identifier + fused-chain parity (un-skipped — artifact now present) [THE GATE]
        run: pnpm --filter goldenflow exec vitest run tests/parity/identifiers.parity.test.ts tests/parity/fused_chain.parity.test.ts

  goldenpipe_wasm:
    needs: changes
    if: needs.changes.outputs.goldenpipe_wasm == 'true' || needs.changes.outputs.force_all == 'true'
    # Opt-in GoldenPipe WASM lane (SP3): builds goldenpipe-wasm into the
    # goldenpipe TS package's src/core/wasm/artifacts/ (where the loader
    # resolves it), then runs Leg A (pure-TS == core vectors) + Leg B
    # (wasm == core vectors, un-skipped once the artifact is present) + the
    # reroute-agreement + backend-registry tests. This is goldenpipe-wasm's CI
    # home and the cross-surface planner drift gate; goldenpipe-core is the
    # single reference (fmt/clippy/test here too).
    #
    # goldenpipe-wasm has no build_wasm.sh (like goldenflow-wasm): the build is
    # inlined mirroring wasm_flow — cargo build wasm32 + wasm-bindgen-cli pinned
    # to the version in the crate's Cargo.lock (a CLI/crate skew silently
    # produces broken JS glue). wasm-pack is avoided because the crate declares
    # wasm-bindgen under a cfg(target_arch="wasm32") table wasm-pack can't see.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: packages/rust/extensions/goldenpipe-wasm
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint the reference + wasm crates (fmt + clippy, -D warnings)
        run: |
          set -euo pipefail
          for C in goldenpipe-core goldenpipe-wasm; do
            cargo fmt    --manifest-path "packages/rust/extensions/$C/Cargo.toml" -- --check
            cargo clippy --manifest-path "packages/rust/extensions/$C/Cargo.toml" -- -D warnings
            cargo test   --manifest-path "packages/rust/extensions/$C/Cargo.toml"
          done
      - name: Build goldenpipe WASM artifact into the loader's artifacts/ dir
        # Mirrors wasm_flow: cargo build wasm32 + wasm-bindgen-cli pinned from
        # Cargo.lock, emitting goldenpipe_wasm_bg.wasm + .js where the loader
        # resolves `./artifacts/goldenpipe_wasm_bg.wasm`.
        run: |
          set -euo pipefail
          CRATE_DIR=packages/rust/extensions/goldenpipe-wasm
          OUT_DIR=packages/typescript/goldenpipe/src/core/wasm/artifacts
          cargo build --manifest-path "$CRATE_DIR/Cargo.toml" \
            --target wasm32-unknown-unknown --release
          WB_VER="$(grep -A1 '^name = "wasm-bindgen"$' "$CRATE_DIR/Cargo.lock" | grep '^version = ' | head -1 | sed -E 's/version = "([^"]+)"/\1/')"
          if [ -z "$WB_VER" ]; then echo "could not resolve wasm-bindgen version from Cargo.lock" >&2; exit 1; fi
          echo "Using wasm-bindgen $WB_VER"
          if ! wasm-bindgen --version 2>/dev/null | grep -q "$WB_VER"; then
            cargo install wasm-bindgen-cli --version "=$WB_VER" --locked
          fi
          wasm-bindgen \
            "$CRATE_DIR/target/wasm32-unknown-unknown/release/goldenpipe_wasm.wasm" \
            --target web --out-dir "$OUT_DIR" --out-name goldenpipe_wasm
      - name: Build shared wasm-runtime (the loader imports goldenmatch-wasm-runtime)
        run: pnpm --filter goldenmatch-wasm-runtime build
      - name: Build goldenpipe's sibling deps (adapters import goldencheck/goldenflow/goldenmatch)
        # The parity suites transitively load src/core/adapters, which import the
        # built sibling packages (e.g. `goldencheck/core` -> its dist/). vitest
        # resolves those from each sibling's dist/, so they must be built first.
        # The `typescript` lane gets this for free via turbo; this standalone lane
        # builds goldenpipe's dependencies explicitly.
        run: pnpm --filter "goldenpipe^..." build
      - name: Planner parity + reroute + backend [THE GATE]
        # Leg A (pure-TS==core), Leg B un-skipped (artifact present), the reroute
        # wiring agreement, and the backend-registry unit test.
        run: |
          pnpm --filter goldenpipe exec vitest run \
            tests/parity/planner-parity.test.ts \
            tests/parity/planner-wasm-parity.test.ts \
            tests/parity/reroute-agreement.test.ts \
            tests/unit/wasm-backend.test.ts

  web_ui_e2e:
    needs: changes
    if: needs.changes.outputs.web_ui_e2e == 'true' || needs.changes.outputs.force_all == 'true'
    # End-to-end smoke for the goldenmatch[web] UI: builds the frontend,
    # boots the FastAPI backend against the pytest fixture project, runs
    # one Playwright scenario covering home → run → cluster.
    # The TS job above already exercises `pnpm build` and the vitest unit
    # tests via turbo — this job adds the Python+browser integration that
    # turbo can't cover.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
      - run: pnpm install --frozen-lockfile
      - name: Install goldenmatch[web]
        run: pip install -e "packages/python/goldenmatch[web]"
      - name: Build + stage frontend into wheel-include path
        run: python packages/python/goldenmatch/scripts/build_web.py
      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Playwright browsers
        run: pnpm -C packages/python/goldenmatch/web/frontend exec playwright install --with-deps chromium
      - name: Playwright smoke
        run: pnpm -C packages/python/goldenmatch/web/frontend exec playwright test
      - name: Upload Playwright trace on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: playwright-trace
          path: packages/python/goldenmatch/web/frontend/test-results
          if-no-files-found: ignore

  rust:
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: packages/rust/extensions
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      # The bridge embeds CPython (pyo3 auto-initialize) and calls the goldenmatch
      # Python API. Provision a CLEAN interpreter -- the system python3 carries a
      # debian-managed typing_extensions (no RECORD) that pip can't upgrade for
      # goldenmatch's pydantic. Install goldenmatch into it and pin PYO3_PYTHON +
      # LD_LIBRARY_PATH so the bridge build embeds that same interpreter and the
      # test binary loads its libpython at runtime. Then the bridge tests exercise
      # the marshalling surface for real instead of self-skipping
      # (GOLDENMATCH_BRIDGE_REQUIRE_PY=1 below -> a Python failure is a hard fail).
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Install goldenmatch + pin the pyo3 interpreter
        run: |
          # Install the LOCAL checkout's base goldenmatch (NO [polars] extra):
          # the bridge's core-API surface is arrow-native (convert.rs feeds a
          # pa.Table), so the #1747 [polars] stopgap is no longer needed. This
          # also proves the bridge against CURRENT source instead of the last
          # PyPI release. Base deps carry pyarrow but NOT polars / goldencheck /
          # goldenflow -- the quality/transform steps degrade gracefully when
          # those are absent, keeping the whole bridge path polars-free.
          python -m pip install "${GITHUB_WORKSPACE}/packages/python/goldenmatch" pyarrow
          echo "PYO3_PYTHON=$(which python)" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$(python -c 'import sysconfig; print(sysconfig.get_config_var("LIBDIR"))')" >> "$GITHUB_ENV"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: |
            packages/rust/extensions
            packages/rust/extensions/graph-core
            packages/rust/extensions/score-core
            packages/rust/extensions/sketch-core
            packages/rust/extensions/perceptual-core
            packages/rust/extensions/graph-layout
            packages/rust/extensions/autoconfig-core
            packages/rust/extensions/suggest-core
            packages/rust/extensions/goldenflow-core
      - run: cargo test --workspace
        # Bridge tests now hard-require goldenmatch (installed above) -- a Python
        # import/marshalling failure fails the lane instead of silently skipping.
        env:
          GOLDENMATCH_BRIDGE_REQUIRE_PY: "1"
          # pyarrow's bundled mimalloc allocator SIGSEGVs in mi_thread_init on the
          # worker threads goldenmatch's pipeline spawns (polars / ThreadPoolExecutor
          # workers call pyarrow.array() -> ConvertPySequence) under this embedded
          # CPython. Reproduces ~deterministically across the 46-test aggregate run
          # (each test in isolation is fine; the accumulated thread churn trips
          # mimalloc's per-thread heap init), NOT a test-thread race -- it segfaults
          # even at --test-threads=1. Force pyarrow onto the system memory pool (the
          # documented Arrow remedy). Verified locally: 20/20 clean with this set vs
          # 20/20 SIGSEGV without. See packages/rust/extensions/CLAUDE.md.
          ARROW_DEFAULT_MEMORY_POOL: system
          # jemalloc page-decay: return freed polars pages to the OS between
          # pipeline stages (root CLAUDE.md scale standard; -33% peak at 1M).
          _RJEM_MALLOC_CONF: "dirty_decay_ms:1000,muzzy_decay_ms:0"
      - run: cargo clippy --workspace -- -D warnings
      # The standalone pyo3-free sibling crates (graph-core, score-core) are
      # each their own [workspace], so `cargo test --workspace` above (which
      # only builds the `bridge` member) never touches them. Their logic IS
      # exercised indirectly (native parity + the datafusion FFI tests), but
      # their own unit tests + clippy were dead in CI. Run them explicitly.
      - run: cargo test --manifest-path graph-core/Cargo.toml
      - run: cargo clippy --manifest-path graph-core/Cargo.toml -- -D warnings
      # graph-wasm: the wasm-bindgen wrapper that lets the TS clustering step run
      # graph-core (one source of truth). Its own [workspace]; check + clippy it
      # here (the wasm32 build runs in the typescript lane's graph drift guard).
      - run: cargo check --manifest-path graph-wasm/Cargo.toml
      - run: cargo clippy --manifest-path graph-wasm/Cargo.toml --all-targets -- -D warnings
      - run: cargo test --manifest-path score-core/Cargo.toml
      - run: cargo clippy --manifest-path score-core/Cargo.toml -- -D warnings
      # fs-core (2026-07-17) is the pyo3-free single source of truth for the
      # Fellegi-Sunter block-scoring math (name/ensemble/tf scorers + normalize),
      # its own [workspace] path-dep of `native`. Exercised indirectly by the
      # native FS parity tests, but its own unit tests + clippy need an explicit
      # run. fs-wasm is the wasm-bindgen wrapper (TS-WASM analogue of `native`);
      # host `cargo test`/clippy validate its rlib logic (the wasm32 build runs in
      # the typescript lane's drift guard).
      - run: cargo test --manifest-path fs-core/Cargo.toml
      - run: cargo clippy --manifest-path fs-core/Cargo.toml --all-targets -- -D warnings
      - run: cargo test --manifest-path fs-wasm/Cargo.toml
      - run: cargo clippy --manifest-path fs-wasm/Cargo.toml --all-targets -- -D warnings
      # goldenflow-core (owned checksummed-identifier kernels, Wave 0b) is its own
      # [workspace] pyo3-free sibling too — excluded from the bridge workspace, so
      # `cargo clippy --workspace` above never touches it and its clippy was DEAD in
      # CI (the native_flow lane only clippy's the native-flow root package, not this
      # path-dep). --all-targets so the per-kernel #[cfg(test)] unit tests are linted
      # too (a clippy violation in the ISBN kernel had shipped green before this).
      - run: cargo test --manifest-path goldenflow-core/Cargo.toml
      - run: cargo clippy --manifest-path goldenflow-core/Cargo.toml --all-targets -- -D warnings
      # The optional `arrow` feature (src/columnar.rs Arrow-columnar apply paths +
      # the columnar_pilot bench) is cfg'd out of the default build above, so its
      # parity tests + clippy need an explicit run. native-flow enables it.
      - run: cargo test --manifest-path goldenflow-core/Cargo.toml --features arrow
      - run: cargo clippy --manifest-path goldenflow-core/Cargo.toml --features arrow --all-targets -- -D warnings
      # sketch-core (MinHash/LSH, #1081) is its own [workspace] pyo3-free sibling
      # too; the native binding exercises it indirectly, but its own unit tests +
      # the golden-vector parity test need an explicit run.
      - run: cargo test --manifest-path sketch-core/Cargo.toml
      - run: cargo clippy --manifest-path sketch-core/Cargo.toml --all-targets -- -D warnings
      # sketch-wasm: the wasm-bindgen wrapper that lets the TS port run sketch-core
      # (one source of truth). Its own [workspace]; check + clippy it here so a
      # kernel or wrapper change is linted (the wasm32 build itself runs in the
      # typescript lane's sketch drift guard).
      - run: cargo check --manifest-path sketch-wasm/Cargo.toml
      - run: cargo clippy --manifest-path sketch-wasm/Cargo.toml --all-targets -- -D warnings
      # perceptual-core (multimodal-ER crawl tier, ADR 0022) is its own
      # [workspace] pyo3-free sibling too; its unit tests + the golden-vector
      # parity test (byte-for-byte vs the Python reference) need an explicit run.
      - run: cargo test --manifest-path perceptual-core/Cargo.toml
      - run: cargo clippy --manifest-path perceptual-core/Cargo.toml --all-targets -- -D warnings
      # graph-layout is its own [workspace] too (demo binary, in the parent
      # `exclude` list), so `cargo test --workspace` never builds it. The rust
      # paths-filter already covers it (packages/rust/**). See #1026.
      - run: cargo test --manifest-path graph-layout/Cargo.toml
      - run: cargo clippy --manifest-path graph-layout/Cargo.toml -- -D warnings
      - run: cargo test --manifest-path autoconfig-core/Cargo.toml
      - run: cargo clippy --manifest-path autoconfig-core/Cargo.toml --all-targets -- -D warnings
      # autoconfig-wasm: the wasm-bindgen wrapper over autoconfig-core that the
      # TS port consumes. Host `cargo check` + clippy validate it compiles against
      # the core (the actual wasm build + embed is exercised in the typescript
      # lane's drift guard, which needs the wasm32 target + wasm-pack).
      - run: cargo check --manifest-path autoconfig-wasm/Cargo.toml
      - run: cargo clippy --manifest-path autoconfig-wasm/Cargo.toml --all-targets -- -D warnings
      # suggest-core: the pyo3-free healer kernel (config-suggestion). Its own
      # [workspace] sibling like autoconfig-core, so `cargo test --workspace`
      # above never builds it. Its unit + golden tests construct arrow
      # RecordBatches, so they need `--features arrow` (bare `cargo test` compiles
      # clean but runs zero arrow tests).
      - run: cargo test --manifest-path suggest-core/Cargo.toml --features arrow
      - run: cargo clippy --manifest-path suggest-core/Cargo.toml --features arrow --all-targets -- -D warnings
      # suggest-wasm: the wasm-bindgen wrapper over suggest-core that the TS healer
      # surface consumes. Host `cargo check` + clippy validate it compiles against
      # the core (the actual wasm build + embed is exercised in the typescript
      # lane's suggest drift guard, which needs the wasm32 target + wasm-pack).
      - run: cargo check --manifest-path suggest-wasm/Cargo.toml
      - run: cargo clippy --manifest-path suggest-wasm/Cargo.toml --all-targets -- -D warnings
      # fingerprint-wasm: the wasm-bindgen wrapper over fingerprint-core that the
      # TS record-fingerprint surface consumes. Host `cargo check` + clippy
      # validate it compiles against the core (the actual wasm build + embed is
      # exercised in the typescript lane's fingerprint drift guard, which needs
      # the wasm32 target + wasm-pack). The core's own tests run in the native
      # lane's "clippy + test (fingerprint-core crate)" step.
      - run: cargo check --manifest-path fingerprint-wasm/Cargo.toml
      - run: cargo clippy --manifest-path fingerprint-wasm/Cargo.toml --all-targets -- -D warnings
      # goldenembed-wasm: the wasm-bindgen wrapper over goldenembed-core (the
      # in-house embedder) that the TS edge-embedding surface consumes. Host
      # `cargo check` + clippy validate it compiles against the core (the actual
      # wasm build + embed is exercised in the typescript lane's goldenembed drift
      # guard). goldenembed-core's own tests run in the `goldenembed` job.
      - run: cargo check --manifest-path goldenembed-wasm/Cargo.toml
      - run: cargo clippy --manifest-path goldenembed-wasm/Cargo.toml --all-targets -- -D warnings

  # Measured Rust line coverage (cargo-llvm-cov). The structural audit's unit
  # tests (graph-core / score-core / fingerprint-core / native / bridge) are now
  # QUANTIFIED + tracked, so coverage regressions and remaining cold spots are
  # visible per PR instead of guessed at. Informational baseline (no floor gate
  # yet): each crate is measured independently and a failure to instrument
  # degrades to "(failed)" in the job summary rather than blocking the job.
  # Reuses the rust job's setup-python + goldenmatch dance so the bridge/native
  # tests run under instrumentation (a skipped test would understate coverage).
  rust_coverage:
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: packages/rust/extensions
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: llvm-tools-preview
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Install goldenmatch + pin the pyo3 interpreter
        run: |
          # Local, polars-free install (see the rust lane above): drops the
          # #1747 [polars] stopgap now that the bridge core-API surface is
          # arrow-native.
          python -m pip install "${GITHUB_WORKSPACE}/packages/python/goldenmatch" pyarrow
          echo "PYO3_PYTHON=$(which python)" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$(python -c 'import sysconfig; print(sysconfig.get_config_var("LIBDIR"))')" >> "$GITHUB_ENV"
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      - name: Measure per-crate line coverage
        env:
          GOLDENMATCH_BRIDGE_REQUIRE_PY: "1"
        run: |
          echo "## Rust line coverage (cargo-llvm-cov --summary-only)" >> "$GITHUB_STEP_SUMMARY"
          measure() {
            local label="$1"; shift
            echo "### $label" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            if cargo llvm-cov --summary-only "$@" >/tmp/cov.txt 2>/tmp/cov.err; then
              local total
              total=$(grep -iE "TOTAL" /tmp/cov.txt | tail -1)
              [ -z "$total" ] && total=$(tail -1 /tmp/cov.txt)
              echo "COVERAGE_RESULT ${label} | ${total}"   # grep-able marker in the job log
              echo "$total" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "COVERAGE_RESULT ${label} | FAILED"
              echo "::warning::rust_coverage: ${label} failed to instrument"
              sed -n '1,15p' /tmp/cov.err || true
              echo "(coverage run failed -- see job log)" >> "$GITHUB_STEP_SUMMARY"
            fi
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          }
          measure "bridge"           --workspace
          measure "native"           --no-default-features --manifest-path native/Cargo.toml
          measure "graph-core"       --manifest-path graph-core/Cargo.toml
          measure "score-core"       --manifest-path score-core/Cargo.toml
          measure "fingerprint-core" --manifest-path fingerprint-core/Cargo.toml
          measure "goldenembed"      --manifest-path goldenembed/Cargo.toml

  # Native acceleration extension (PyO3). The crate is a standalone workspace
  # (its `extension-module` pyo3 feature is incompatible with the bridge's
  # `auto-initialize`), so the `rust` job above never builds it. This lane
  # builds the .so into the goldenmatch package and runs the Python parity
  # suite — which `skipif`s when the ext is absent, so without this lane the
  # native kernels would be UNTESTED in CI. The parity tests assert the native
  # path matches the pure-Python path bit-for-bit (GOLDENMATCH_NATIVE 0 vs 1).
  native:
    needs: changes
    if: needs.changes.outputs.native == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: packages/rust/extensions/native
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --all-packages --no-install-package goldenmatch-native --no-install-package goldenflow-native
      - name: Diagnostics (toolchain + dep versions)
        run: |
          (cd packages/rust/extensions/native && rustc --version && cargo clippy --version)
          uv run python -c "import sys, rapidfuzz, polars; print('python', sys.version.split()[0], 'rapidfuzz', rapidfuzz.__version__, 'polars', polars.__version__)"
      - name: clippy (native crate)
        working-directory: packages/rust/extensions/native
        run: cargo clippy --release -- -D warnings
      - name: clippy + test (fingerprint-core crate)
        # Shared pyo3-free canonicalizer (also a dep of the pgrx crate). Its own
        # unit tests pin the canonical vectors; the native parity + pgrx pg_test
        # exercise it through each surface.
        working-directory: packages/rust/extensions/fingerprint-core
        run: |
          cargo clippy -- -D warnings
          cargo test
      - name: Unit-test the native kernels (pure-Rust helpers)
        # extension-module is gated behind a default feature so the test binary
        # can link libpython (--no-default-features turns it off). Covers
        # soundex/featurize/pairs-math/C-ABI logic that the Python parity suite
        # only exercises indirectly. Build below still uses default features.
        timeout-minutes: 5
        working-directory: packages/rust/extensions/native
        env:
          PYO3_PYTHON: /usr/bin/python3
        run: |
          sudo apt-get update && sudo apt-get install -y libpython3-dev
          cargo test --no-default-features
      - name: Build native extension into the package
        # No --offline: CI has network + a cold cache on first run.
        run: uv run python scripts/build_native.py
      - name: Install ONNX runtime (exercises the in-house embedder export path)
        # The [inhouse-embeddings] extra; without it the ONNX parity tests skip.
        run: uv pip install onnx onnxruntime
      - name: Parity + in-house suite (ext present -> native path runs, not skips)
        run: |
          uv run pytest \
            packages/python/goldenmatch/tests/test_native_parity.py \
            packages/python/goldenmatch/tests/test_native_block_seq_parity.py \
            packages/python/goldenmatch/tests/test_record_fingerprint.py \
            packages/python/goldenmatch/tests/test_pairs.py \
            packages/python/goldenmatch/tests/test_embeddings.py \
            packages/python/goldenmatch/tests/test_inhouse_embedder.py \
            packages/python/goldenmatch/tests/test_autoconfig_native_parity.py \
            packages/python/goldenmatch/tests/test_native_perceptual_parity.py \
            packages/python/goldenmatch/tests/test_healer_default_e2e_native.py \
            -v

  # GoldenCheck native parity: the goldencheck-native ext (PyO3, standalone
  # workspace) isn't built by the `rust` job's `cargo test --workspace`. This
  # lane clippy's the crates, builds the .so into the goldencheck package, and
  # runs the parity suite — which `skipif`s when the ext is absent, so without
  # this lane the goldencheck kernels would be UNTESTED in CI. Parity asserts the
  # native path matches pure-Python (Benford byte-identical; composite-key/FD
  # integer-exact), incl. a GOLDENCHECK_NATIVE=1 required-mode run.
  goldenprofile_native:
    needs: changes
    if: needs.changes.outputs.goldenprofile_native == 'true' || needs.changes.outputs.force_all == 'true'
    # Builds the standalone goldenprofile_native maturin wheel (abi3) and runs
    # the Python<->WASM cross-parity test un-skipped (issue #1304). The wheel is
    # its own [workspace] (not a uv member), so build it directly with maturin.
    # The fixtures are authored from the host kernel, so this closes the loop:
    # Python (native wheel) == the fixtures == WASM (the TS parity lane).
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: packages/rust/extensions/goldenprofile-native
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: test (goldenprofile-core, pyo3-free kernel)
        working-directory: packages/rust/extensions/goldenprofile-core
        run: cargo test
      - name: Build + install the goldenprofile_native wheel (maturin, abi3)
        run: |
          pip install maturin pytest
          maturin build -m packages/rust/extensions/goldenprofile-native/Cargo.toml --release --out dist
          pip install dist/goldenprofile_native*.whl
      - name: Python <-> WASM cross-parity (wheel present -> runs, not skips) [THE GATE]
        run: pytest packages/python/goldengraph/tests/test_goldenprofile_wasm_crossparity.py -v

  goldencheck_native:
    needs: changes
    if: needs.changes.outputs.goldencheck_native == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: packages/rust/extensions/goldencheck-native
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --all-packages --no-install-package goldenmatch-native --no-install-package goldenflow-native
      - name: clippy + test (goldencheck-core, pyo3-free kernels)
        working-directory: packages/rust/extensions/goldencheck-core
        run: |
          cargo clippy -- -D warnings
          cargo test
      - name: clippy (goldencheck-native ext crate)
        working-directory: packages/rust/extensions/goldencheck-native
        run: cargo clippy --release -- -D warnings
      - name: Build native extension into the package
        # No --offline: CI has network + a cold cache on first run.
        run: uv run python scripts/build_goldencheck_native.py
      - name: Install deep-profiling + Arrow deps the parity tests need
        # baseline (numpy/scipy) for the Benford path; pyarrow is the Arrow C
        # Data Interface bridge the kernels read through (the [native] extra).
        run: uv pip install numpy scipy pyarrow
      - name: Parity suite (ext present -> native path runs, not skips)
        run: |
          uv run pytest \
            packages/python/goldencheck/tests/core/test_native_parity.py \
            packages/python/goldencheck/tests/relations/test_composite_key.py \
            packages/python/goldencheck/tests/relations/test_approx_duplicate.py \
            packages/python/goldencheck/tests/relations/test_functional_dependency.py \
            packages/python/goldencheck/tests/relations/test_approx_fd.py \
            packages/python/goldencheck/tests/profilers/test_fuzzy_values.py \
            -v
      - name: Required-native mode (GOLDENCHECK_NATIVE=1 must use the kernel)
        env:
          GOLDENCHECK_NATIVE: "1"
        run: uv run pytest packages/python/goldencheck/tests/core -q

  # GoldenAnalysis native parity: the analysis-native ext (PyO3, standalone
  # workspace) isn't built by the `rust` job. This lane clippy's the crates,
  # builds the .so into the goldenanalysis package, and runs the parity suite —
  # which `skipif`s when the ext is absent. Parity asserts the native histogram/
  # quantile match pure-Python byte-for-byte, incl. a GOLDENANALYSIS_NATIVE=1
  # required-mode run. `_GATED_ON` is empty, so this proves the kernels are READY,
  # not yet wired into the pure path (the wall-verified flip is a follow-up).
  goldenanalysis_native:
    needs: changes
    if: needs.changes.outputs.analysis_native == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: packages/rust/extensions/analysis-native
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --all-packages --no-install-package goldenmatch-native --no-install-package goldenflow-native
      - name: clippy + test (analysis-core, pyo3-free kernels)
        working-directory: packages/rust/extensions/analysis-core
        run: |
          cargo clippy -- -D warnings
          cargo test
      - name: clippy (analysis-native ext crate)
        working-directory: packages/rust/extensions/analysis-native
        run: cargo clippy --release -- -D warnings
      - name: Build native extension into the package
        # No --offline: CI has network + a cold cache on first run.
        run: uv run python scripts/build_analysis_native.py
      - name: Parity suite (ext present -> native path runs, not skips)
        run: |
          uv run pytest \
            packages/python/goldenanalysis/tests/core/test_native_parity.py \
            -v
      - name: Required-native mode (GOLDENANALYSIS_NATIVE=1 must import the wheel)
        env:
          GOLDENANALYSIS_NATIVE: "1"
        run: uv run pytest packages/python/goldenanalysis/tests/core -q

  infermap_native:
    needs: changes
    if: needs.changes.outputs.infermap_native == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: packages/rust/extensions/infermap-native
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --all-packages --no-install-package goldenmatch-native --no-install-package goldenflow-native
      - name: clippy + test (infermap-core, pyo3-free kernels)
        working-directory: packages/rust/extensions/infermap-core
        run: |
          cargo clippy -- -D warnings
          cargo test
      - name: clippy (infermap-native ext crate)
        working-directory: packages/rust/extensions/infermap-native
        run: cargo clippy --release -- -D warnings
      - name: Build native extension into the package
        # No --offline: CI has network + a cold cache on first run.
        run: uv run python scripts/build_infermap_native.py
      - name: Parity suite (ext present -> native path runs, not skips)
        run: |
          uv run pytest \
            packages/python/infermap/tests/test_native_parity.py \
            -v
      - name: Required-native mode (INFERMAP_NATIVE=1 must import the wheel)
        env:
          INFERMAP_NATIVE: "1"
        run: uv run pytest packages/python/infermap/tests/test_native_parity.py -q

  # GoldenGraph knowledge-graph engine native lane. GoldenGraph is
  # native-authoritative (the bi-temporal store + resolution engine live in
  # goldengraph-core, Rust-only, no pure-Python fallback), so the native path is
  # the ONLY path -- this lane builds the .so and asserts the Python JSON
  # boundary is byte-identical to the shared cross-surface `queries.json` oracle
  # (the same fixture the TS goldengraph-wasm parity test uses; generated from
  # the host boundary + drift-guarded by fixture_drift). In ci-required.
  goldengraph_native:
    needs: changes
    if: needs.changes.outputs.goldengraph_native == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: packages/rust/extensions/goldengraph-native
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --all-packages --no-install-package goldenmatch-native --no-install-package goldenflow-native
      - name: clippy + test (goldengraph-core, pyo3-free kernels)
        working-directory: packages/rust/extensions/goldengraph-core
        run: |
          cargo clippy -- -D warnings
          cargo test
      - name: clippy (goldengraph-native ext crate)
        working-directory: packages/rust/extensions/goldengraph-native
        run: cargo clippy --release -- -D warnings
      - name: Build native extension into the package
        # No --offline: CI has network + a cold cache on first run.
        run: uv run python scripts/build_goldengraph_native.py
      - name: Cross-surface parity (native JSON boundary == queries.json oracle)
        env:
          GOLDENGRAPH_NATIVE: "1"
        run: uv run pytest packages/python/goldengraph/tests/test_native_parity.py -v

  # goldenmatch-native distribution smoke: build the SEPARATE maturin/abi3
  # wheel (the polars / polars-runtime split) and prove the runtime loads
  # through the wheel path. Distinct from `native`, which builds the in-tree
  # `goldenmatch._native` .so via build_native.py and runs the parity suite.
  # Here we deliberately DON'T run build_native.py, so the loader must fall
  # back to `goldenmatch_native._native` from the installed wheel.
  native_wheel:
    needs: changes
    if: needs.changes.outputs.native == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: packages/rust/extensions/native
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      # Frontend only (pure-Python goldenmatch); NO build_native.py, so
      # `goldenmatch._native` is absent and the loader must use the wheel.
      - run: uv sync --all-packages --no-install-package goldenmatch-native --no-install-package goldenflow-native
      - name: Build the goldenmatch-native wheel (maturin, abi3)
        run: uv run --with maturin maturin build --release --manifest-path packages/rust/extensions/native/Cargo.toml --out dist
      - name: Install the wheel + smoke-test the split
        run: |
          uv pip install dist/goldenmatch_native-*.whl
          uv run python - <<'PY'
          import goldenmatch_native  # the separately-distributed runtime package
          from goldenmatch.core import _native_loader
          mod = _native_loader.native_module()
          assert mod is not None, "loader did not discover goldenmatch_native"
          assert mod.__name__ == "goldenmatch_native._native", mod.__name__
          fp = mod.record_fingerprint({"a": "x"})
          assert fp == "7381d5ba2dac5be0af49232a3209ab8d0dc2e4ed804a60ce533fdfe5254307e3", fp
          assert _native_loader.native_enabled("hashing") is True
          print("OK: goldenmatch-native wheel loads via the split path; fingerprint vector matches")
          PY

  # GoldenFlow's optional native phone kernel is a standalone maturin workspace,
  # so the `rust` job's cargo test --workspace never builds it and the python
  # matrix runs goldenflow WITHOUT the ext (the native path SKIPS). This lane
  # builds the in-tree goldenflow._native .so via build_native.py and runs the
  # parity suite with the ext PRESENT, so the NANP-gated native path actually
  # executes (GOLDENFLOW_NATIVE auto, plus the explicit 0/1 env tests) and is
  # asserted byte-identical to the pure phonenumbers reference. Mirrors `native`.
  native_flow:
    needs: changes
    if: needs.changes.outputs.native_flow == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: packages/rust/extensions/native-flow
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --all-packages --no-install-package goldenmatch-native --no-install-package goldenflow-native
      - name: clippy + fmt (native-flow crate)
        working-directory: packages/rust/extensions/native-flow
        run: |
          cargo fmt --check
          cargo clippy --release -- -D warnings
      - name: Build native extension into the package
        # No --offline: CI has network + a cold cache on first run.
        run: uv run python packages/python/goldenflow/scripts/build_native.py
      - name: Install pyarrow (zero-copy Series<->kernel bridge for the native path)
        # goldenflow core doesn't depend on pyarrow (only the [native] extra
        # does); without it the native runner returns None and the parity tests
        # that import pyarrow error at collection. Install it explicitly.
        run: uv pip install pyarrow
      - name: Identifier corpus oracle-drift guard (native kernels are the oracle)
        # Regenerate the checked-in identifier parity corpus in-memory from the
        # freshly-built NATIVE kernels and diff vs the committed file. Fails the
        # lane if the corpus drifts from what the native kernels now produce, so a
        # kernel change that alters a checksum/format/mask output can't land with a
        # stale corpus. Runs after the ext is built above so --check uses the native
        # path as the source of truth.
        run: uv run python packages/python/goldenflow/scripts/gen_identifiers_corpus.py --check
      - name: Profile corpus oracle-drift guard (pure-Python _infer_type_list is the oracle)
        # Regenerate the checked-in profile parity corpus in-memory from the pure-
        # Python _infer_type_list reference (which the Rust profile::infer_type unit
        # tests pin) and diff vs the committed file. Fails the lane if the corpus
        # drifts from what the reference now produces, so an inference change can't
        # land with a stale corpus.
        run: uv run python packages/python/goldenflow/scripts/gen_profile_corpus.py --check
      - name: Parity suite (ext present -> NANP-gated native path runs, not skips)
        run: |
          uv run pytest \
            packages/python/goldenflow/tests/transforms/test_native_parity.py \
            packages/python/goldenflow/tests/transforms/test_fastpath_parity.py \
            packages/python/goldenflow/tests/transforms/test_identifiers_parity.py \
            packages/python/goldenflow/tests/transforms/test_phone.py \
            packages/python/goldenflow/tests/transforms/test_dates.py \
            -v

  # Phase 4f (Polars eviction) proof lane. Builds the native in-memory core, then
  # UNINSTALLS polars and runs the polars-absent covered-path tests. This is the
  # living proof that `import goldenflow` + a covered config's transform() work with
  # polars gone — so the 2.0 major that moves `polars` out of the base deps is already
  # de-risked. Advisory (NOT in ci-required); a red here means the polars-free surface
  # regressed (a module grew a top-level `import polars`, or a covered transform now
  # needs the Polars engine), not that main is broken.
  goldenflow_nopolars:
    needs: changes
    if: needs.changes.outputs.goldenflow_nopolars == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: packages/rust/extensions/native-flow
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --all-packages --no-install-package goldenmatch-native --no-install-package goldenflow-native
      - name: Build native in-memory core into the package
        run: uv run python packages/python/goldenflow/scripts/build_native.py
      - name: Uninstall polars (simulate the 2.0 base-deps flip)
        # The covered config path runs on the native in-memory core alone; polars is
        # the OPTIONAL Polars engine for the uncovered tail. Remove it (and its split
        # runtime) so the tests below prove the polars-absent surface for real. NO
        # pyarrow either — the covered in-memory path is pyarrow-free.
        run: uv pip uninstall polars polars-runtime-32 polars-runtime-64 || true
      - name: Confirm polars is gone
        run: uv run --no-sync python -c "import importlib.util,sys; sys.exit(0 if importlib.util.find_spec('polars') is None else 'polars still present')"
      - name: Polars-absent covered-path proof (tests/nopolars)
        # --no-sync so uv doesn't reinstall polars before the run; --noconftest so the
        # polars-importing parent tests/conftest.py isn't collected (the nopolars tests
        # are self-contained, only the builtin tmp_path fixture).
        run: uv run --no-sync python -m pytest packages/python/goldenflow/tests/nopolars --noconftest -v

  # ci-required. Builds the goldencheck native regex kernel, UNINSTALLS polars, then
  # proves the polars-free scan surface for real. 3.0.0 CONTRACT FLIP: the default scan
  # is now Arrow-native, so this lane asserts the FULL scan SUCCEEDS polars-absent --
  # CSV + Parquet + Excel via scan_file()/scan_dataframe(pa.Table), plus the covered
  # scan_columns structural checks. The only path that still declines with the helpful
  # `goldencheck[polars]` ImportError is the scan_dataframe(pl.DataFrame) overload. A red
  # here means a regression (a scan-path module grew a top-level `import polars`, an
  # Arrow reader broke, or the pl.DataFrame overload stopped raising the helpful error)
  # -- gate on it like any other required lane.
  goldencheck_nopolars:
    needs: changes
    if: needs.changes.outputs.goldencheck_nopolars == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --all-packages --no-install-package goldenmatch-native --no-install-package goldenflow-native
      - name: Build goldencheck native (regex kernel, so hard-op checks run covered not skipped)
        # No --offline: same idiom as the goldencheck_native lane. Mirrors goldenflow_nopolars'
        # build-before-uninstall ordering. If this ever fails, the nopolars tests still pass --
        # test_hard_checks_run_without_polars self-skips when native isn't enabled.
        run: uv run python scripts/build_goldencheck_native.py
      - name: Uninstall polars (simulate the P4 base-deps flip)
        run: uv pip uninstall polars polars-runtime-32 polars-runtime-64 || true
      - name: Confirm polars is gone
        run: uv run --no-sync python -c "import importlib.util,sys; sys.exit(0 if importlib.util.find_spec('polars') is None else 'polars still present')"
      - name: Ensure pyarrow present (polars-free Parquet reader)
        # `uv sync --all-packages` does NOT pull the `[parquet]`/`[native]` extras (same
        # gap goldencheck_native papers over with an explicit `uv pip install`), so
        # test_read_columns_parquet_excel_polars_free's pq.write_table/read_columns
        # round-trip would ImportError without this. openpyxl is a base dependency
        # (pyproject.toml [project.dependencies]) so it's already present here.
        run: uv pip install "pyarrow>=14"
      - name: Polars-absent proof (tests/nopolars)
        run: uv run --no-sync python -m pytest packages/python/goldencheck/tests/nopolars --noconftest -v

  # ci-required. Builds the goldenmatch native scoring kernel, UNINSTALLS polars,
  # then proves the arrow-native dedupe surface for real: `import goldenmatch` stays
  # polars-free and zero-config `dedupe_df(pa.Table)` (exactly how goldengraph's
  # cross-document resolution calls it) completes with polars gone. goldenmatch has
  # NO polars base dep -- the lazy `_polars_lazy` proxy defers it -- so a red here
  # means a default path grew a `import polars` (a top-level one, or a hot path that
  # reaches the proxy, e.g. the #1956 bucket fuzzy fallback that forced pl.from_arrow
  # and sat red on main for ~2 weeks). Native is built so the planner takes the
  # `bucket` backend -- the exact path that bug lived on. Gate on it like any other
  # required lane. Mirrors goldencheck_nopolars.
  goldenmatch_nopolars:
    needs: changes
    if: needs.changes.outputs.goldenmatch_nopolars == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: packages/rust/extensions/native
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --all-packages --no-install-package goldenmatch-native --no-install-package goldenflow-native
      - name: Build goldenmatch native scoring kernel (so the planner takes the bucket path)
        # Drops goldenmatch/_native.abi3.so into the package (mirrors the `native`
        # parity job). With native present the planner picks backend=bucket -- the
        # branch that reached the polars-forcing fuzzy fallback in #1956.
        run: uv run python scripts/build_native.py
      - name: Uninstall polars (goldenmatch has no polars base dep)
        # goldenmatch is arrow-native by design; polars is never a base dependency.
        # Remove it (and its split runtime) so the tests below prove the arrow lane
        # is polars-free for real.
        run: uv pip uninstall polars polars-runtime-32 polars-runtime-64 || true
      - name: Confirm polars is gone
        run: uv run --no-sync python -c "import importlib.util,sys; sys.exit(0 if importlib.util.find_spec('polars') is None else 'polars still present')"
      - name: Polars-absent proof (tests/nopolars)
        # --no-sync so uv doesn't reinstall polars; --noconftest so the polars-importing
        # parent tests/conftest.py isn't collected (the nopolars tests are self-contained).
        run: uv run --no-sync python -m pytest packages/python/goldenmatch/tests/nopolars --noconftest -v

  # Polars-eviction Wave 1 proof lane (goldenmatch): runs the file-based
  # dedupe entry point under BOTH GOLDENMATCH_FRAME=polars and =arrow on
  # frozen fixture datasets and diffs the canonicalized clusters/golden/pairs
  # output, failing on any mismatch. Proves the experimental pyarrow ingest
  # front (core/io_arrow.py + ArrowFrame) reproduces the classic Polars path
  # byte-for-byte. Advisory (not ci-required) -- GOLDENMATCH_FRAME=arrow is
  # opt-in, not the default.
  goldenmatch_frame_diff:
    needs: changes
    if: needs.changes.outputs.goldenmatch_frame_diff == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --all-packages
      - name: Frame-backend differential (polars vs arrow)
        run: uv run python scripts/diff_frame_backends.py

  # goldenpipe planner kernel: pyo3-free goldenpipe-core is the REFERENCE. This lane
  # is goldenpipe-core's ONLY CI coverage (it had no consumer to hang a lane on before
  # SP2), and it runs the pure-Python==core parity gate (Leg A) + wheel==core (Leg B)
  # under GOLDENPIPE_NATIVE=1. Parity-gate-only: the pure-Python planner stays the
  # runtime; the core is the oracle it's proven against.
  goldenpipe_native:
    needs: changes
    if: needs.changes.outputs.goldenpipe_native == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: |
            packages/rust/extensions/goldenpipe-core
            packages/rust/extensions/goldenpipe-native
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --all-packages --no-install-package goldenmatch-native --no-install-package goldenflow-native
      - name: fmt + clippy (goldenpipe-core + goldenpipe-native)
        run: |
          cargo fmt --check --manifest-path packages/rust/extensions/goldenpipe-core/Cargo.toml
          cargo clippy --release --manifest-path packages/rust/extensions/goldenpipe-core/Cargo.toml -- -D warnings
          cargo fmt --check --manifest-path packages/rust/extensions/goldenpipe-native/Cargo.toml
          cargo clippy --release --manifest-path packages/rust/extensions/goldenpipe-native/Cargo.toml -- -D warnings
      - name: goldenpipe-core unit + golden-vector tests (the SP1 kernel's CI home)
        run: cargo test --manifest-path packages/rust/extensions/goldenpipe-core/Cargo.toml
      - name: Build the native planner ext into the package (goldenpipe._native)
        run: uv run python packages/python/goldenpipe/scripts/build_native.py
      - name: Parity gate (Leg A pure==core + Leg B wheel==core)
        env:
          GOLDENPIPE_NATIVE: "1"
          POLARS_SKIP_CPU_CHECK: "1"
        run: uv run pytest packages/python/goldenpipe/tests/core/ -v

  # goldenflow-native distribution smoke: build the SEPARATE maturin/abi3 wheel
  # and prove the runtime loads through the wheel path. Distinct from
  # `native_flow`, which builds the in-tree goldenflow._native .so via
  # build_native.py. Here we deliberately DON'T run build_native.py, so the
  # loader must fall back to `goldenflow_native._native` from the wheel.
  native_flow_wheel:
    needs: changes
    if: needs.changes.outputs.native_flow == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: packages/rust/extensions/native-flow
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      # Frontend only (pure-Python goldenflow); NO build_native.py, so
      # `goldenflow._native` is absent and the loader must use the wheel.
      - run: uv sync --all-packages --no-install-package goldenmatch-native --no-install-package goldenflow-native
      - name: Build the goldenflow-native wheel (maturin, abi3)
        run: uv run --with maturin maturin build --release --manifest-path packages/rust/extensions/native-flow/Cargo.toml --out dist
      - name: Install the wheel + smoke-test the split
        run: |
          uv pip install pyarrow dist/goldenflow_native-*.whl
          uv run python - <<'PY'
          import pyarrow as pa
          import goldenflow_native  # the separately-distributed runtime package
          from goldenflow.core import _native_loader
          mod = _native_loader.native_module()
          assert mod is not None, "loader did not discover goldenflow_native"
          assert mod.__name__ == "goldenflow_native._native", mod.__name__
          assert _native_loader.native_enabled("phone") is True
          # nanp_only kernel: NANP resolves, international -> null (Python settles)
          out = mod.phone_e164_arrow(
              pa.array(["(201) 555-0123", "+44 20 7946 0958"], type=pa.string()), "US", True
          ).to_pylist()
          assert out == ["+12015550123", None], out
          print("OK: goldenflow-native wheel loads via the split path; nanp_only kernel correct")
          PY

  # Standalone Rust embedding runtime (goldenembed): builds the crate (which
  # links onnxruntime via the `ort` crate) and runs the featurizer unit tests.
  # The full ONNX-inference parity vs Python is validated out-of-CI against a
  # trained model; the unit tests cover the deterministic featurizer here.
  goldenembed:
    needs: changes
    if: needs.changes.outputs.goldenembed == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: |
            packages/rust/extensions/goldenembed
            packages/rust/extensions/goldenembed-core
      # goldenembed-core: the pyo3/ort/fs-free compute core (featurizer +
      # projection head), shared with the goldenembed-wasm edge surface. Its own
      # [workspace], so goldenembed's build above never touches it — run its
      # unit + project-parity tests (cosine vs the numpy oracle) + clippy here.
      - name: clippy + test (goldenembed-core crate)
        working-directory: packages/rust/extensions/goldenembed-core
        run: |
          cargo clippy --all-targets -- -D warnings
          cargo test
      # Default features = NATIVE (no ort): clippy + the native-load test (loads
      # weights.npz, embeds, matches the numpy reference — no ONNX Runtime).
      - name: clippy
        working-directory: packages/rust/extensions/goldenembed
        run: cargo clippy --release --all-targets -- -D warnings
      - name: test
        working-directory: packages/rust/extensions/goldenembed
        run: cargo test --release
      # Keep the opt-in ONNX backend (`ort`) compiling — it's cfg'd out of the
      # default build, so nothing else exercises it.
      - name: clippy (onnx feature)
        working-directory: packages/rust/extensions/goldenembed
        run: cargo clippy --release --features onnx --all-targets -- -D warnings

  # goldenmatch-embed wheel smoke: build the SEPARATE maturin/pyo3 wheel
  # (packages/rust/extensions/embed-py/) that exposes the goldenembed runtime
  # to Python and prove it loads + embeds a saved fixture model. Distinct from
  # `goldenembed`, which only clippy/tests the underlying Rust crate. maturin
  # normalizes the dist name `goldenmatch-embed` -> `goldenmatch_embed`.
  embed_wheel:
    needs: changes
    if: needs.changes.outputs.embed == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: packages/rust/extensions/embed-py
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --all-packages --no-install-package goldenmatch-native --no-install-package goldenflow-native
      - name: Build the goldenmatch-embed wheel (maturin, pyo3)
        run: uv run --with maturin maturin build --release --manifest-path packages/rust/extensions/embed-py/Cargo.toml --out dist
      - name: Install the wheel + smoke-test load/embed
        run: |
          uv pip install dist/goldenmatch_embed-*.whl
          uv run python - <<'PY'
          from goldenmatch_embed import GoldenEmbed
          import math, pathlib
          model_dir = "packages/rust/extensions/goldenembed/tests/fixtures/tiny_model"
          m = GoldenEmbed.load(model_dir)
          vecs = m.embed(["John Smith", "Jon Smyth"])
          assert len(vecs) == 2, vecs
          assert m.dim == len(vecs[0]) > 0, (m.dim, len(vecs[0]))
          assert all(math.isfinite(x) for x in vecs[0]), "non-finite embedding value"
          # Best-effort parity vs the Python in-house path (acceptance: within tolerance).
          # Skip if the in-house embedder can't load this fixture in CI (don't fail the lane on that).
          try:
              from goldenmatch.embeddings import embed_records
              ref = embed_records(["John Smith"], provider="inhouse", model=model_dir)[0]
              a = vecs[0]
              dot = sum(x*y for x, y in zip(a, ref)); na = math.sqrt(sum(x*x for x in a)); nb = math.sqrt(sum(y*y for y in ref))
              cos = dot/(na*nb) if na and nb else 0.0
              assert cos >= 0.999, f"wheel vs in-house cosine {cos} < 0.999"
              print(f"OK: goldenmatch-embed wheel loads + embeds; in-house parity cosine={cos:.6f}")
          except ImportError as e:
              print(f"OK: goldenmatch-embed wheel loads + embeds (dim={m.dim}); in-house parity skipped ({e})")
          PY

  # Standalone pure-Rust HNSW (IndexHNSWFlat) ANN index: clippy + unit tests
  # (recall vs brute force, exact-parity at small N, determinism). Own
  # workspace, zero C deps — not in the `rust` job's `cargo test --workspace`.
  goldenhnsw:
    needs: changes
    if: needs.changes.outputs.goldenhnsw == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: packages/rust/extensions/goldenhnsw
      - name: clippy
        working-directory: packages/rust/extensions/goldenhnsw
        run: cargo clippy --release --all-targets -- -D warnings
      - name: test
        working-directory: packages/rust/extensions/goldenhnsw
        run: cargo test --release

  # goldenmatch-hnsw wheel smoke: build the SEPARATE maturin/pyo3 wheel
  # (packages/rust/extensions/hnsw-py/) that exposes the goldenhnsw index to
  # Python, install it alongside goldenmatch, and run the ann_blocker native
  # integration tests (recall vs numpy, scores, incremental add). Distinct from
  # `goldenhnsw`, which only clippy/tests the underlying Rust crate. maturin
  # normalizes the dist name `goldenmatch-hnsw` -> `goldenmatch_hnsw`.
  hnsw_wheel:
    needs: changes
    if: needs.changes.outputs.hnsw == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: packages/rust/extensions/hnsw-py
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --all-packages --no-install-package goldenmatch-native --no-install-package goldenflow-native
      - name: Build the goldenmatch-hnsw wheel (maturin, pyo3)
        run: uv run --with maturin maturin build --release --manifest-path packages/rust/extensions/hnsw-py/Cargo.toml --out dist
      - name: Install the wheel + standalone smoke
        run: |
          uv pip install dist/goldenmatch_hnsw-*.whl
          uv run python - <<'PY'
          import numpy as np
          from goldenmatch_hnsw import HnswIndex, __version__
          rng = np.random.default_rng(0)
          X = rng.standard_normal((2000, 32)).astype("<f4")
          X /= np.linalg.norm(X, axis=1, keepdims=True)
          idx = HnswIndex(dim=32, ef_search=128)
          idx.add_batch(X.tobytes(), n=len(X))
          assert len(idx) == 2000
          hits = tot = 0
          for qi in range(0, 2000, 50):
              got = {i for i, _ in idx.search(X[qi].tolist(), 10)}
              want = set(np.argsort(-(X @ X[qi]))[:10].tolist())
              hits += len(got & want); tot += len(want)
          rec = hits / tot
          assert rec >= 0.95, f"recall {rec} < 0.95"
          print(f"OK: goldenmatch-hnsw {__version__} wheel loads; recall@10={rec:.4f}")
          PY
      - name: Run ann_blocker native HNSW integration tests
        run: uv run python -m pytest packages/python/goldenmatch/tests/test_ann_hnsw.py -q

  # Ray-backed distributed lane. The full goldenmatch `python` job runs
  # `uv sync --all-packages` WITHOUT the optional `ray` extra, so every
  # tests/test_distributed_*.py SKIPS there via `pytest.importorskip("ray")`.
  # Installing ray here makes them actually execute — most importantly the
  # quality-invariance gate in test_distributed_clustering.py, which asserts
  # the three distributed routes (scipy.csgraph / label propagation /
  # two-phase WCC) produce the SAME connected components as the in-memory
  # build_clusters AND are invariant to Ray partition count (1/2/3/7).
  # Split into THREE jobs (was one ~20-min job that gated the merge queue):
  #   distributed       -> invariance gate   (blocking, in ci-required)
  #   distributed_wcc   -> #844 WCC gate      (blocking, in ci-required) -- runs
  #                        in PARALLEL with the invariance gate (independent),
  #                        not serially after it.
  #   distributed_broad -> broad coverage     (continue-on-error at JOB level,
  #                        ABSENT from ci-required) -- its ~9 min no longer sits
  #                        on the merge-queue critical path.
  # The two blocking gates each cost ~setup + their pytest; running them as
  # sibling jobs makes the lane's gating wall ~max(invariance, wcc) instead of
  # the old invariance + wcc + broad-coverage sum.
  distributed:
    needs: changes
    if: needs.changes.outputs.distributed == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    # Invariance gate alone is ~5.5 min + setup now that the WCC gate and the
    # broad-coverage suite moved to sibling jobs. 20 gives ample headroom.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --all-packages --no-install-package goldenmatch-native --no-install-package goldenflow-native
      # ray is an optional extra; install it into the uv venv so the ray-gated
      # tests/test_distributed_*.py actually run (they skip everywhere else via
      # pytest.importorskip). pandas<3 because ray pins pandas<3.
      - name: Install ray extra
        run: uv pip install 'ray[default]>=2.0' 'pandas<3'
      # CRITICAL: run the ray tests with the venv python DIRECTLY, not `uv run`.
      # Under `uv run`, ray's raylet spawns workers via uv, which hits a
      # VIRTUAL_ENV mismatch, ignores the venv, and launches a python with no
      # ray on its path -> every worker dies (ModuleNotFoundError: ray) and all
      # tasks hang forever ("object not ready"). Diagnosed 2026-05-26 on a
      # hosted runner via the worker logs. `.venv/bin/python` makes ray spawn
      # workers that can import ray. Serial (no -n auto): xdist workers would
      # each start a ray cluster and race on ports.
      # --timeout=300 (not 120): the label-prop partition-count invariance cases
      # iterate to fixpoint on chains (label-prop's worst case) and sit ~100s on
      # a 2-core hosted runner; 120s clipped them. Job-level timeout-minutes: 20
      # is the real backstop.
      #
      # GATE (blocking): the quality-invariance gate is this lane's reason for
      # existing -- it proves the three distributed clustering routes agree with
      # the in-memory build_clusters and are invariant to Ray partition count.
      - name: Distributed quality-invariance gate (blocking)
        run: |
          .venv/bin/python -c "import ray, scipy, polars; print('ray', ray.__version__)"
          .venv/bin/python -m pytest packages/python/goldenmatch/tests/test_distributed_clustering.py \
            --timeout=300 --durations=20 -v

  # GATE (blocking, #844): the randomized-contraction WCC ray gate, in its own
  # job so it runs in PARALLEL with the invariance gate (the two are
  # independent). Required via ci-required. Proves the distributed path matches
  # the scipy-verified pure-Polars driver + the routing contract. Same ray/uv
  # venv gotcha as the `distributed` job above (see the long comment there).
  distributed_wcc:
    needs: changes
    if: needs.changes.outputs.distributed == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --all-packages --no-install-package goldenmatch-native --no-install-package goldenflow-native
      - name: Install ray extra
        run: uv pip install 'ray[default]>=2.0' 'pandas<3'
      - name: Randomized-contraction WCC ray gate (blocking)
        run: |
          .venv/bin/python -m pytest packages/python/goldenmatch/tests/test_distributed_randomized_contraction_wcc.py \
            --timeout=300 --durations=20 -v

  # BROAD COVERAGE (non-blocking): the rest of the ray-gated suite (controller /
  # pipeline / golden / e2e). These exercise real ray execution but several
  # carry pre-existing, ray-independent fragilities surfaced the first time they
  # actually ran (degenerate single-/few-value fixtures that explode the
  # in-memory blocking+clustering path; an RSS-growth threshold tuned for a
  # different runner). Split into its OWN job that is `continue-on-error` at the
  # JOB level and deliberately ABSENT from ci-required's needs -- so its ~9 min
  # never sits on the merge-queue critical path (it previously ran as a
  # continue-on-error STEP inside `distributed`, where the merge gate still
  # waited on its wall time). Runs for visibility only; tracked for follow-up,
  # do not gate on it until the fixtures are cleaned up. Same ray/uv venv gotcha
  # as the `distributed` job above.
  distributed_broad:
    needs: changes
    if: needs.changes.outputs.distributed == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --all-packages --no-install-package goldenmatch-native --no-install-package goldenflow-native
      - name: Install ray extra
        run: uv pip install 'ray[default]>=2.0' 'pandas<3'
      - name: Distributed broad coverage (non-blocking)
        run: |
          .venv/bin/python -m pytest packages/python/goldenmatch/tests/test_distributed_*.py \
            --ignore=packages/python/goldenmatch/tests/test_distributed_clustering.py \
            --ignore=packages/python/goldenmatch/tests/test_distributed_randomized_contraction_wcc.py \
            --timeout=300 --durations=20 -v

  # Sail tier (distributed, Spark Connect). The Sail tier re-expresses the
  # one-box DataFusion spine's relational plan against PySpark/Spark Connect.
  # This lane installs goldenmatch[sail] (pysail + pyspark[connect]) and runs
  # tests/test_sail_*.py against an in-process Sail Spark Connect server (they
  # SKIP everywhere else via pytest.importorskip). Spec:
  # docs/superpowers/specs/2026-06-03-sail-tier-design.md (Stage S1).
  sail:
    needs: changes
    if: needs.changes.outputs.sail == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --all-packages --no-install-package goldenmatch-native --no-install-package goldenflow-native
      # Sail (Spark Connect) optional stack. NO Java: pyspark[connect] is a
      # pure-gRPC client (no py4j/JVM launch) and the Sail server is Rust.
      # Install VIA THE EXTRA so the pyproject [sail] entry is exercised.
      - name: Install sail extra
        run: uv pip install -e 'packages/python/goldenmatch[sail]'
      # Run with the venv python directly (NOT `uv run`): the Sail server
      # spawns in-process; mirror the ray lane's venv-python discipline.
      - name: Sail connectivity gate (blocking)
        run: |
          .venv/bin/python -c "import pysail, pyspark; print('pyspark', pyspark.__version__)"
          .venv/bin/python -m pytest packages/python/goldenmatch/tests/test_sail_connectivity.py -v --timeout=300
      # GATE (blocking): the S1 score/dedup pair-set parity vs a python-rapidfuzz
      # reference -- the reason this lane exists at S1.
      - name: Sail score/dedup parity gate (blocking)
        run: |
          .venv/bin/python -m pytest packages/python/goldenmatch/tests/test_sail_score_parity.py -v --timeout=300
      # GATE (blocking): connected-components partition parity -- the make-or-
      # break S2 gate (the Union-Find holdout, computed distributed on Sail).
      - name: Sail WCC parity gate (blocking)
        run: |
          .venv/bin/python -m pytest packages/python/goldenmatch/tests/test_sail_clustering_parity.py -v --timeout=300
      # GATE (blocking): golden survivorship content parity per multi-member
      # cluster vs the one-box merge_field primitive (S3).
      - name: Sail golden parity gate (blocking)
        run: |
          .venv/bin/python -m pytest packages/python/goldenmatch/tests/test_sail_golden_parity.py -v --timeout=300
      # GATE (blocking): identity create + edge-emit parity vs the one-box
      # resolve_clusters on a fresh store (S5) -- same_as edge-set + record->
      # entity partition equivalence + count + determinism.
      - name: Sail identity parity gate (blocking)
        run: |
          .venv/bin/python -m pytest packages/python/goldenmatch/tests/test_sail_identity_parity.py -v --timeout=300
      # GATE (blocking): the full Sail pipeline (load->...->golden[->identity])
      # runs end-to-end on Sail (S4 + S5 emit_identity).
      - name: Sail end-to-end pipeline gate (blocking)
        run: |
          .venv/bin/python -m pytest packages/python/goldenmatch/tests/test_sail_pipeline.py -v --timeout=300

  # dbt-goldensuite — restored after #464 dropped the lane that pointed at the
  # since-deleted packages/dbt/goldencheck and never re-pointed it at the merged
  # package. Parses the macro package under an in-memory DuckDB profile and runs
  # its pytest suite (macro-render + correction CRUD) — neither had run in CI
  # since 2026-05-24.
  dbt:
    needs: changes
    if: needs.changes.outputs.dbt == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.11"
          cache: pip
      # dbt-adapters 1.24.0 raises KeyError: 'javascript' against dbt-core 1.11.x
      # during macro parsing — pin <1.24 until upstream ships a clean release.
      - run: pip install 'dbt-core>=1.11,<1.12' 'dbt-adapters<1.24' 'dbt-duckdb>=1.10,<1.11' pytest polars -e 'packages/dbt/goldensuite[quality]'
      - name: dbt parse (macro compile smoke)
        run: cd packages/dbt/goldensuite && dbt parse --no-version-check --profiles-dir .
      - name: pytest (macro render + correction CRUD)
        run: python -m pytest packages/dbt/goldensuite/tests -v

  action:
    needs: changes
    if: needs.changes.outputs.action == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - run: test -f packages/actions/goldencheck/action.yml && echo "action.yml present"

  # Postgres extension build + smoke test across PG 15 / 16 / 17. The pgrx
  # crate is excluded from the cargo workspace (pgrx workspace-mode is
  # broken), so the main `rust` job's `cargo test --workspace` never
  # touches it — this lane covers the gap.
  #
  # Mirrors the matrix the standalone goldenmatch-extensions repo ran
  # before it was archived. Installs the relevant PG dev headers, builds
  # the extension via `cargo pgrx install`, then exercises the SQL
  # surface end-to-end via psql (scalar scorer, table dedupe, autoconfig).
  #
  # If this lane breaks on a Python-only change, the trigger filter is
  # wrong — Postgres extension build failures should only surface when
  # postgres/, bridge/, or workspace files actually change.
  rust_pgrx:
    needs: changes
    if: needs.changes.outputs.rust_pgrx == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        pg: [15, 16, 17]
    env:
      PG_VERSION: ${{ matrix.pg }}
    defaults:
      run:
        working-directory: packages/rust/extensions
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: packages/rust/extensions

      - name: Install PG ${{ matrix.pg }} dev headers
        # The PostgreSQL apt repo carries every PG major in parallel. Required
        # because pgrx needs `pg_config` for the specific PG version it's
        # building against, and Ubuntu ships only one PG by default.
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          # Drop the runner's pre-provisioned Microsoft/Azure apt repos before
          # updating: they intermittently 403 ("no longer signed") on the hosted
          # images and would abort the whole `apt-get update`, yet this lane only
          # needs pgdg + the Ubuntu base repos for the pgrx build.
          sudo rm -f /etc/apt/sources.list.d/*microsoft* /etc/apt/sources.list.d/*azure* || true
          sudo apt-get update
          sudo apt-get install -y "postgresql-${PG_VERSION}" "postgresql-server-dev-${PG_VERSION}" libclang-dev
          sudo chmod a+rwx "/usr/share/postgresql/${PG_VERSION}/extension" "/usr/lib/postgresql/${PG_VERSION}/lib"

      - name: Install goldenmatch (Python bridge target)
        # The pgrx extension embeds Python via pyo3 and imports goldenmatch
        # (and goldenflow, for the goldenflow_* transform functions) at
        # runtime. The package install here is what `init()` in the
        # bridge will find when Postgres starts.
        # [polars] IS required here: the core dedupe/score/autoconfig surface is
        # arrow-native and runs polars-free, but gm_resolve (#1913) drives the
        # identity write path (dedupe_df -> _resolve_identities ->
        # resolve_clusters), which builds polars frames — without polars,
        # identity resolution fail-opens ("No module named 'polars'") and returns
        # an empty summary. psycopg[binary] likewise: the identity postgres store
        # connects from THIS embedded interpreter, so both must be importable in
        # the same site as goldenmatch. (goldenflow stays base — its transforms
        # are the polars-native extra we don't exercise here.)
        run: pip install --break-system-packages "${GITHUB_WORKSPACE}/packages/python/goldenmatch[polars]" goldenflow pyarrow 'psycopg[binary]'

      - name: Install cargo-pgrx
        # 0.12.9 pin matches the pgrx version in
        # packages/rust/extensions/postgres/Cargo.toml. Upgrading pgrx is
        # a coordinated change — bump both pins together.
        run: cargo install cargo-pgrx --version "0.12.9" --locked

      - name: Initialize pgrx
        run: cargo pgrx init "--pg${PG_VERSION}=/usr/lib/postgresql/${PG_VERSION}/bin/pg_config"

      - name: Build + install extension
        working-directory: packages/rust/extensions/postgres
        run: |
          cargo pgrx install "--pg-config=/usr/lib/postgresql/${PG_VERSION}/bin/pg_config" --release --features "pg${PG_VERSION}" --no-default-features
          # pgrx 0.12.9 doesn't auto-emit the SQL extension file — copy the
          # handwritten ones into PG's extension dir so `CREATE EXTENSION`
          # (installs default_version, now 0.16.0) and `ALTER EXTENSION ... UPDATE`
          # find them. The schema files are the canonical declaration of public
          # function signatures.
          cp sql/goldenmatch_pg--0.16.0.sql "/usr/share/postgresql/${PG_VERSION}/extension/"
          cp sql/goldenmatch_pg--0.15.0--0.16.0.sql "/usr/share/postgresql/${PG_VERSION}/extension/"
          cp sql/goldenmatch_pg--0.15.0.sql "/usr/share/postgresql/${PG_VERSION}/extension/"
          cp sql/goldenmatch_pg--0.14.0--0.15.0.sql "/usr/share/postgresql/${PG_VERSION}/extension/"
          cp sql/goldenmatch_pg--0.14.0.sql "/usr/share/postgresql/${PG_VERSION}/extension/"
          cp sql/goldenmatch_pg--0.13.0--0.14.0.sql "/usr/share/postgresql/${PG_VERSION}/extension/"
          cp sql/goldenmatch_pg--0.13.0.sql "/usr/share/postgresql/${PG_VERSION}/extension/"
          cp sql/goldenmatch_pg--0.12.0--0.13.0.sql "/usr/share/postgresql/${PG_VERSION}/extension/"
          cp sql/goldenmatch_pg--0.12.0.sql "/usr/share/postgresql/${PG_VERSION}/extension/"
          cp sql/goldenmatch_pg--0.11.0--0.12.0.sql "/usr/share/postgresql/${PG_VERSION}/extension/"
          cp sql/goldenmatch_pg--0.11.0.sql "/usr/share/postgresql/${PG_VERSION}/extension/"
          cp sql/goldenmatch_pg--0.10.0--0.11.0.sql "/usr/share/postgresql/${PG_VERSION}/extension/"
          cp sql/goldenmatch_pg--0.10.0.sql "/usr/share/postgresql/${PG_VERSION}/extension/"
          cp sql/goldenmatch_pg--0.9.0--0.10.0.sql "/usr/share/postgresql/${PG_VERSION}/extension/"
          cp sql/goldenmatch_pg--0.9.0.sql "/usr/share/postgresql/${PG_VERSION}/extension/"
          cp sql/goldenmatch_pg--0.8.0--0.9.0.sql "/usr/share/postgresql/${PG_VERSION}/extension/"
          cp sql/goldenmatch_pg--0.8.0.sql "/usr/share/postgresql/${PG_VERSION}/extension/"
          cp sql/goldenmatch_pg--0.7.0--0.8.0.sql "/usr/share/postgresql/${PG_VERSION}/extension/"
          cp sql/goldenmatch_pg--0.7.0.sql "/usr/share/postgresql/${PG_VERSION}/extension/"
          cp sql/goldenmatch_pg--0.6.0--0.7.0.sql "/usr/share/postgresql/${PG_VERSION}/extension/"
          cp sql/goldenmatch_pg--0.6.0.sql "/usr/share/postgresql/${PG_VERSION}/extension/"
          cp sql/goldenmatch_pg--0.5.0--0.6.0.sql "/usr/share/postgresql/${PG_VERSION}/extension/"

      - name: Expose goldenmatch to Postgres' Python interpreter
        # Postgres runs as user `postgres` under a different Python than the
        # one this workflow's `pip install` modified. The `.pth` redirect
        # makes the install discoverable when pgrx-loaded code calls
        # `import goldenmatch`.
        run: |
          PYTHON_SITE=$(python -c "import site; print(site.getsitepackages()[0])")
          sudo rm -f /usr/lib/python3/dist-packages/typing_extensions.py
          # [polars] + psycopg mirror the bridge-target install: whichever
          # interpreter pyo3 embeds (this system python, or PYTHON_SITE via the
          # .pth below) must be able to import both for gm_resolve's identity
          # write path (#1913) — polars for resolve_clusters, psycopg for the
          # postgres identity store.
          sudo pip install --break-system-packages "${GITHUB_WORKSPACE}/packages/python/goldenmatch[polars]" goldenflow 'psycopg[binary]' 2>/dev/null || true
          echo "${PYTHON_SITE}" | sudo tee /usr/lib/python3/dist-packages/goldenmatch.pth

      - name: psql smoke (scalar scorer, dedupe, autoconfig)
        run: |
          # Multiple PG majors installed → port is non-default; resolve via
          # pg_lsclusters so we always hit the right server.
          sudo pg_createcluster "${PG_VERSION}" main 2>/dev/null || true
          sudo -u postgres pg_ctlcluster "${PG_VERSION}" main start 2>/dev/null || true
          sleep 2
          PG_PORT=$(pg_lsclusters -h | grep "^${PG_VERSION}" | awk '{print $3}')
          export PGPORT="${PG_PORT:-5432}"
          echo "Using PG ${PG_VERSION} on port ${PGPORT}"
          sudo -u postgres psql -p "${PGPORT}" -v ON_ERROR_STOP=1 -c "CREATE EXTENSION goldenmatch_pg;"
          # Confirm new v1.7-v1.12 functions registered alongside the originals.
          sudo -u postgres psql -p "${PGPORT}" -c "SELECT proname FROM pg_proc WHERE proname LIKE 'goldenmatch%' OR proname LIKE 'gm_%' ORDER BY proname;"
          sudo -u postgres psql -p "${PGPORT}" -v ON_ERROR_STOP=1 -c "SELECT goldenmatch.goldenmatch_score('John Smith'::TEXT, 'Jon Smyth'::TEXT, 'jaro_winkler'::TEXT);"
          # Cross-language determinism: the pure-Rust record fingerprint must
          # equal the pinned vector shared with Python / native C ABI / DuckDB.
          # (RAISE under ON_ERROR_STOP fails the lane on any mismatch.)
          sudo -u postgres psql -p "${PGPORT}" -v ON_ERROR_STOP=1 <<'EOSQL'
            DO $$
            DECLARE fp TEXT := goldenmatch.goldenmatch_record_fingerprint('{"a":"x"}');
            BEGIN
              IF fp <> '7381d5ba2dac5be0af49232a3209ab8d0dc2e4ed804a60ce533fdfe5254307e3' THEN
                RAISE EXCEPTION 'goldenmatch_record_fingerprint mismatch: %', fp;
              END IF;
            END $$;
          EOSQL
          # graph + fingerprint SQL surface. These assert the edge cases the
          # kernels.rs #[pg_test]s describe, end-to-end against a real CREATE
          # EXTENSION. (`cargo pgrx test` can't run for this crate -- it needs
          # pgrx SQL schema generation, which is broken here, so the SQL is
          # hand-maintained; see the crate CLAUDE.md + kernels.rs mod tests.)
          sudo -u postgres psql -p "${PGPORT}" -v ON_ERROR_STOP=1 <<'EOSQL'
            DO $$
            DECLARE
              n_comp INT;
              pd RECORD;
            BEGIN
              -- connected_components: empty edge list -> every id is a singleton.
              SELECT count(DISTINCT component) INTO n_comp
              FROM goldenmatch.goldenmatch_connected_components(
                ARRAY[]::BIGINT[], ARRAY[]::BIGINT[], ARRAY[]::DOUBLE PRECISION[],
                ARRAY[10, 20, 30]::BIGINT[]);
              IF n_comp <> 3 THEN
                RAISE EXCEPTION 'connected_components empty-edge: expected 3 singletons, got %', n_comp;
              END IF;

              -- pair_dedup: all three inputs canonicalize to (1,2); keep max 0.7.
              -- One invocation, aggregated so cardinality (dedup collapsed to a
              -- single pair) and the kept values are asserted together. (min/max
              -- over the one row == that row; n<>1 also catches a 0- or N-row
              -- dedup failure, with NULL value comparisons short-circuited by it.)
              SELECT count(*) AS n, min(a) AS a, min(b) AS b, max(s) AS s INTO pd
              FROM goldenmatch.goldenmatch_pair_dedup(
                ARRAY[1, 1, 2]::BIGINT[], ARRAY[2, 2, 1]::BIGINT[],
                ARRAY[0.3, 0.7, 0.5]::DOUBLE PRECISION[]);
              IF pd.n <> 1 OR pd.a <> 1 OR pd.b <> 2 OR abs(pd.s - 0.7) > 1e-9 THEN
                RAISE EXCEPTION 'pair_dedup: expected exactly (1,2,0.7), got n=% (%,%,%)', pd.n, pd.a, pd.b, pd.s;
              END IF;

              -- hnsw_pairs: 3 dim-2 unit vectors, rows 0 and 1 identical (IP=1),
              -- row 2 orthogonal. At threshold 0.5 exactly one pair (0,1) with
              -- score ~1 must surface (0-based positions).
              SELECT count(*) AS n, min(a) AS a, min(b) AS b, max(s) AS s INTO pd
              FROM goldenmatch.goldenmatch_hnsw_pairs(
                ARRAY[1,0, 1,0, 0,1]::real[], 2, 5, 0.5::DOUBLE PRECISION);
              IF pd.n <> 1 OR pd.a <> 0 OR pd.b <> 1 OR abs(pd.s - 1.0) > 1e-5 THEN
                RAISE EXCEPTION 'hnsw_pairs: expected exactly (0,1,1.0), got n=% (%,%,%)', pd.n, pd.a, pd.b, pd.s;
              END IF;

              -- lsh_pairs: 3 records, rows 0 and 1 near-duplicates (one typo),
              -- row 2 distinct. MinHash-LSH must surface exactly the (0,1) pair
              -- (0-based positions). Config validated against the Python blocker.
              SELECT count(*) AS n, min(a) AS a, min(b) AS b INTO pd
              FROM goldenmatch.goldenmatch_lsh_pairs(
                ARRAY['Acme Corporation', 'Acme Corporaton', 'Zzyzx Widgets']::text[],
                'char', 3, 64, 16, 42);
              IF pd.n <> 1 OR pd.a <> 0 OR pd.b <> 1 THEN
                RAISE EXCEPTION 'lsh_pairs: expected exactly (0,1), got n=% (%,%)', pd.n, pd.a, pd.b;
              END IF;

              -- goldenmatch_score native fast path: jaro_winkler over a near-dup
              -- pair == 0.9125 (validated vs the Python reference); exact over an
              -- identical pair == 1.0. Proves the score-core path (not the bridge)
              -- and that it matches the reference.
              IF abs(goldenmatch.goldenmatch_score('Acme Corporation', 'Acme Corp', 'jaro_winkler') - 0.9125) > 1e-9 THEN
                RAISE EXCEPTION 'score jaro_winkler: expected 0.9125, got %',
                  goldenmatch.goldenmatch_score('Acme Corporation', 'Acme Corp', 'jaro_winkler');
              END IF;
              IF goldenmatch.goldenmatch_score('abc', 'abc', 'exact') <> 1.0 THEN
                RAISE EXCEPTION 'score exact: expected 1.0';
              END IF;

              -- record_fingerprint: stable across key order (fields sorted by name).
              IF goldenmatch.goldenmatch_record_fingerprint('{"x":"1","y":"2"}')
                 <> goldenmatch.goldenmatch_record_fingerprint('{"y":"2","x":"1"}') THEN
                RAISE EXCEPTION 'record_fingerprint not key-order independent';
              END IF;

              -- perceptual_phash: pHash of the 8x8 ramp grid [0..63] == the value
              -- pinned against the Python phash_image (u64 reinterpreted as int8);
              -- perceptual_hamming: ramp vs inverted-ramp differ in 48 bits, and a
              -- hash against itself is 0. Native-direct over perceptual-core.
              IF goldenmatch.goldenmatch_perceptual_phash(
                   (SELECT array_agg(i::double precision ORDER BY i) FROM generate_series(0, 63) AS i),
                   8) <> -7026231021782789055 THEN
                RAISE EXCEPTION 'perceptual_phash: ramp grid expected -7026231021782789055, got %',
                  goldenmatch.goldenmatch_perceptual_phash(
                    (SELECT array_agg(i::double precision ORDER BY i) FROM generate_series(0, 63) AS i), 8);
              END IF;
              IF goldenmatch.goldenmatch_perceptual_hamming(-7026231021782789055, 7004135197453085675) <> 48
                 OR goldenmatch.goldenmatch_perceptual_hamming(42, 42) <> 0 THEN
                RAISE EXCEPTION 'perceptual_hamming: expected 48 (ramp vs inv) and 0 (self)';
              END IF;

              RAISE NOTICE 'graph + fingerprint SQL surface assertions passed';
            END $$;
          EOSQL
          # goldenflow_* transforms (fail-open: pass input through if goldenflow absent).
          sudo -u postgres psql -p "${PGPORT}" -v ON_ERROR_STOP=1 -c "SELECT goldenmatch.goldenflow_normalize_email('  John@Example.COM '::TEXT), goldenmatch.goldenflow_whitespace_normalize('a   b'::TEXT);"
          # De-bridged goldenflow (P9): goldenflow_strip / goldenflow_whitespace_normalize
          # run NATIVE-DIRECT over goldenflow-core (no CPython), so their output is
          # deterministic regardless of whether goldenflow is installed — assert the
          # exact native values (byte-identical to the polars transforms, proven in
          # goldenflow-core/tests/text_golden.rs).
          sudo -u postgres psql -p "${PGPORT}" -v ON_ERROR_STOP=1 <<'EOSQL'
            DO $$
            BEGIN
              IF goldenmatch.goldenflow_strip('  hello  ') <> 'hello' THEN
                RAISE EXCEPTION 'goldenflow_strip: expected hello, got %', goldenmatch.goldenflow_strip('  hello  ');
              END IF;
              IF goldenmatch.goldenflow_whitespace_normalize('a    b   c') <> 'a b c' THEN
                RAISE EXCEPTION 'goldenflow_whitespace_normalize: expected "a b c", got %',
                  goldenmatch.goldenflow_whitespace_normalize('a    b   c');
              END IF;
              RAISE NOTICE 'de-bridged goldenflow (strip / collapse_whitespace) native assertions passed';
            END $$;
          EOSQL
          # goldencheck_* deep-profiling surface (P5): native-direct (no CPython)
          # over goldencheck-core, the SAME kernel the goldencheck[native] wheel +
          # the DuckDB goldencheck_* UDFs run. Assert the pinned values shared with
          # those surfaces (byte-identical by construction — same reference kernel).
          sudo -u postgres psql -p "${PGPORT}" -v ON_ERROR_STOP=1 <<'EOSQL'
            DO $$
            DECLARE
              bh bigint[];
              nfd int;
              nkey int;
              ndup int;
            BEGIN
              -- benford leading-digit histogram (shared pinned vector).
              bh := goldenmatch.goldencheck_benford(ARRAY[1,1,2,11,19,3,100,7,9,9]::double precision[]);
              IF bh <> ARRAY[5,1,1,0,0,0,1,0,2]::bigint[] THEN
                RAISE EXCEPTION 'goldencheck_benford: expected {5,1,1,0,0,0,1,0,2}, got %', bh;
              END IF;
              -- strict FDs over 2 columns of 4 rows (zip<->city both hold).
              SELECT count(*) INTO nfd FROM goldenmatch.goldencheck_discover_fds(
                ARRAY['1','1','2','2','A','A','B','B'], 2)
                WHERE (det, dep) IN ((0,1),(1,0));
              IF nfd <> 2 THEN
                RAISE EXCEPTION 'goldencheck_discover_fds: expected (0,1)+(1,0), got % matching rows', nfd;
              END IF;
              -- composite key {0,1} over (order,line,day); neither col unique alone.
              SELECT count(*) INTO nkey FROM goldenmatch.goldencheck_composite_keys(
                ARRAY['o1','o1','o2','o2','o3','1','2','1','2','1','mon','mon','tue','tue','wed'], 3, 3)
                WHERE key_id = 0 AND col_index IN (0,1);
              IF nkey <> 2 THEN
                RAISE EXCEPTION 'goldencheck_composite_keys: expected key 0 = cols {0,1}, got % cols', nkey;
              END IF;
              -- near-duplicate value cluster {0,1,2}.
              SELECT count(*) INTO ndup FROM goldenmatch.goldencheck_near_duplicates(
                ARRAY['California','Californa','CALIFORNIA','Texas','texas'], 0.7)
                WHERE cluster = 0 AND member IN (0,1,2);
              IF ndup <> 3 THEN
                RAISE EXCEPTION 'goldencheck_near_duplicates: expected cluster 0 = {0,1,2}, got % members', ndup;
              END IF;
              RAISE NOTICE 'goldencheck deep-profiling (benford/fds/composite/near-dup) native assertions passed';
            END $$;
          EOSQL
          sudo -u postgres psql -p "${PGPORT}" -v ON_ERROR_STOP=1 <<'EOSQL'
            CREATE TABLE test_customers (name TEXT, email TEXT);
            INSERT INTO test_customers VALUES
              ('John Smith', 'john@x.com'),
              ('JOHN SMITH', 'john@x.com'),
              ('Jane Doe', 'jane@y.com'),
              ('Bob Jones', 'bob@z.com');
            SELECT goldenmatch.goldenmatch_dedupe_table('test_customers'::TEXT, '{"exact": ["email"]}'::TEXT);
            -- v1.7-v1.12 surface (autoconfig / telemetry / dedupe_full) lands
            -- with PR #159; assert it conditionally so this lane goes green on
            -- main today and starts exercising the new surface once #159 merges.
            DO $$
            BEGIN
              IF EXISTS (SELECT 1 FROM pg_proc WHERE proname = 'goldenmatch_autoconfig') THEN
                PERFORM goldenmatch.goldenmatch_autoconfig('test_customers'::TEXT);
                PERFORM goldenmatch.goldenmatch_autoconfig_telemetry('test_customers'::TEXT);
                RAISE NOTICE 'v1.7-v1.12 autoconfig surface present and callable';
              ELSE
                RAISE NOTICE 'v1.7-v1.12 autoconfig surface not yet on main (waiting on PR #159)';
              END IF;
            END$$;
          EOSQL
          # P4 (#1883): the dedupe/resolve/autoconfig table ops read the input
          # COLUMNAR (Arrow-native pa.Table, no row_to_json) for common built-in
          # column types, with a transparent JSON fallback for exotic types.
          # Exercise BOTH branches and assert the columnar read clusters correctly.
          sudo -u postgres psql -p "${PGPORT}" -v ON_ERROR_STOP=1 <<'EOSQL'
            CREATE TABLE p4_typed (id INT, name TEXT, small INT2, age INT4, big INT8,
                                   f4 FLOAT4, f8 FLOAT8, active BOOL, note TEXT);
            INSERT INTO p4_typed VALUES
              (1,'Acme Corp',5,30,100,1.5,2.5,true, NULL),
              (2,'Acme Corp',5,30,100,1.5,2.5,true, NULL),   -- dup of row 1 on name
              (3,'Beta LLC', 7,40,200,3.5,4.5,false,NULL);
            DO $$
            DECLARE n_members INT;
            BEGIN
              -- Columnar path (int2/4/8, float4/8, bool, text, all-NULL text):
              -- rows 1&2 share `name`, so an exact-name dedupe yields a size-2
              -- cluster (2 member rows). Proves the typed SPI read + all-NULL
              -- handling produce the right pa.Table end-to-end.
              SELECT count(*) INTO n_members
                FROM goldenmatch.goldenmatch_dedupe_clusters('p4_typed', '{"exact":["name"]}')
                WHERE cluster_size = 2;
              IF n_members <> 2 THEN
                RAISE EXCEPTION 'P4 columnar dedupe: expected 2 rows in a size-2 cluster, got %', n_members;
              END IF;
              RAISE NOTICE 'P4 columnar read (int2/4/8,float4/8,bool,text,all-null) assertion passed';
            END$$;
            -- Fallback path: a numeric + date column is exotic → whole-table JSON.
            CREATE TABLE p4_exotic (id INT, name TEXT, amount NUMERIC, ts DATE);
            INSERT INTO p4_exotic VALUES
              (1,'Acme',9.99,'2020-01-01'),(2,'Acme',9.99,'2020-01-01'),(3,'Beta',5.00,'2021-06-15');
            SELECT goldenmatch.goldenmatch_dedupe_table('p4_exotic', '{"exact":["name"]}');
          EOSQL
          # goldenmatch_match_pairs (0.9.0): two-table linkage RETURNS TABLE.
          # Zero-config ('{}') routes through match_df's auto-config -- a minimal
          # explicit fuzzy config yields zero candidate pairs (no blocking).
          sudo -u postgres psql -p "${PGPORT}" -v ON_ERROR_STOP=1 <<'EOSQL'
            CREATE TEMP TABLE t AS SELECT * FROM (VALUES ('John Smith'),('Jane Doe')) v(name);
            CREATE TEMP TABLE r AS SELECT * FROM (VALUES ('Jon Smith'),('Jayne Doe'),('Bob X')) v(name);
            SELECT * FROM goldenmatch.goldenmatch_match_pairs('t','r','{}') LIMIT 5;
          EOSQL
          # goldenmatch_autoconfig(table, mode) -- 1-arg back-compat (mode DEFAULT
          # 'standard') + the new 2-arg 'probabilistic' path, then pipe the
          # probabilistic config straight into goldenmatch_dedupe_full.
          sudo -u postgres psql -p "${PGPORT}" -v ON_ERROR_STOP=1 <<'EOSQL'
            CREATE TEMP TABLE p AS SELECT * FROM (VALUES ('John Smith','Austin'),('Jon Smith','Austin'),('Jane Doe','Dallas')) t(name, city);
            SELECT goldenmatch.goldenmatch_autoconfig('p');
            SELECT goldenmatch.goldenmatch_autoconfig('p','probabilistic');
            SELECT * FROM goldenmatch.goldenmatch_dedupe_full('p', (SELECT goldenmatch.goldenmatch_autoconfig('p','probabilistic'))) LIMIT 1;
          EOSQL
          # In-house embed (#737): proves `ort`/onnxruntime loads inside the
          # Postgres backend process (the new surface vs the proven DataFusion
          # cdylib case). goldenmatch_embed_local takes an explicit model dir;
          # gm_embed reads GOLDENEMBED_MODEL_DIR from the backend env. The
          # postmaster does NOT inherit env passed to `pg_ctlcluster` (it re-execs);
          # the documented Debian mechanism is the per-cluster `environment` file,
          # which PostgreSQL reads at startup. Write it, then restart.
          # Uses the goldenembed tiny_model fixture.
          MODEL_DIR=/tmp/gm_tiny_model
          sudo mkdir -p "${MODEL_DIR}"
          sudo cp "${GITHUB_WORKSPACE}/packages/rust/extensions/goldenembed/tests/fixtures/tiny_model/"* "${MODEL_DIR}/"
          sudo chmod -R a+rX "${MODEL_DIR}"
          echo "GOLDENEMBED_MODEL_DIR = '${MODEL_DIR}'" | sudo tee -a "/etc/postgresql/${PG_VERSION}/main/environment"
          sudo -u postgres pg_ctlcluster "${PG_VERSION}" main restart
          sleep 2
          # Explicit-path variant (shell-interpolated dir at the top level, where
          # psql doesn't help): proves ort loads in-backend + returns a real vector.
          sudo -u postgres psql -p "${PGPORT}" -v ON_ERROR_STOP=1 \
            -c "SELECT CASE WHEN array_length(goldenmatch.goldenmatch_embed_local('acme corp', '${MODEL_DIR}'), 1) > 0 THEN 'embed_local ok' ELSE NULL END;"
          # gm_embed reads GOLDENEMBED_MODEL_DIR from the (restarted) backend env;
          # also asserts the NULL -> "" convention (function is NOT STRICT).
          sudo -u postgres psql -p "${PGPORT}" -v ON_ERROR_STOP=1 <<'EOSQL'
            DO $$
            DECLARE v_gm real[]; v_nul real[];
            BEGIN
              v_gm := goldenmatch.gm_embed('acme corp');
              IF v_gm IS NULL OR array_length(v_gm, 1) IS NULL THEN
                RAISE EXCEPTION 'gm_embed returned no embedding';
              END IF;
              v_nul := goldenmatch.gm_embed(NULL);  -- NULL -> "" (not STRICT)
              IF v_nul IS NULL OR array_length(v_nul, 1) IS NULL THEN
                RAISE EXCEPTION 'gm_embed(NULL) should embed "" (NULL -> ""), got no array';
              END IF;
              RAISE NOTICE 'gm_embed smoke passed: dim=%', array_length(v_gm, 1);
            END$$;
          EOSQL
          # In-DB identity write path (#1913 P1): gm_resolve resolves a table
          # into a Postgres-native identity dataset and, on a second run,
          # ABSORBS a new record into an existing stable id (the incremental /
          # durable-spine proof). The identity store connects back to THIS
          # cluster via the goldenmatch.identity_dsn GUC over the loopback
          # socket (peer auth as postgres). The GUC is set at SESSION level in
          # the SAME connection that calls gm_resolve: a namespaced custom GUC
          # is accepted as a placeholder before the extension .so loads, and
          # _PG_init adopts that value when the first goldenmatch function call
          # loads the library. (ALTER SYSTEM would fail here — the GUC isn't
          # registered until the lib loads.) Passed via psql -v so ${PGPORT}
          # interpolates while the quoted heredoc keeps the DO $$ blocks intact.
          # On any failure here, dump the Postgres server log tail: identity
          # resolution is fail-open, so a psycopg/DSN problem surfaces as a
          # Python WARNING in the server log rather than a psql error, and the
          # run1 guard below (empty summary) turns that into a hard failure.
          identity_smoke_failed() {
            echo "::error::gm_resolve smoke failed on PG ${PG_VERSION}; server log tail:"
            sudo tail -n 120 "/var/log/postgresql/postgresql-${PG_VERSION}-main.log" 2>/dev/null || true
            exit 1
          }
          sudo -u postgres psql -p "${PGPORT}" -v ON_ERROR_STOP=1 \
            -v dsn="host=/var/run/postgresql port=${PGPORT} dbname=postgres user=postgres" <<'EOSQL' || identity_smoke_failed
            SET goldenmatch.identity_dsn = :'dsn';
            CREATE TABLE id_people (id TEXT, email TEXT, name TEXT);
            INSERT INTO id_people VALUES
              ('1', 'a@x.com', 'Al'),
              ('2', 'a@x.com', 'Alice'),
              ('3', 'b@y.com', 'Bob');
            -- exact-email matchkey + source_pk_column so record ids are stable
            -- across runs. gm_resolve injects enabled/backend/connection/dataset.
            SELECT goldenmatch.gm_configure('idjob',
              '{"matchkeys":[{"name":"email_key","type":"exact","fields":[{"field":"email","scorer":"exact"}]}],"identity":{"source_pk_column":"id"}}');
            -- Run 1: creates the graph in this DB (the two a@x.com rows form one
            -- identity; b@y.com forms another) -> created >= 1. An empty summary
            -- ('{}') means identity resolution fail-opened (e.g. the store could
            -- not connect) -- treat that as a hard failure, not a silent skip.
            DO $$
            DECLARE s jsonb;
            BEGIN
              s := goldenmatch.gm_resolve('idjob', 'id_people', 'people')::jsonb;
              IF s->>'created' IS NULL OR (s->>'created')::int < 1 THEN
                RAISE EXCEPTION 'gm_resolve run1: expected created>=1 (empty summary => identity write skipped/failed), got %', s;
              END IF;
              RAISE NOTICE 'gm_resolve run1: %', s;
            END $$;
            -- Add a new record sharing a@x.com; re-resolve must ABSORB it into the
            -- existing identity (not create a new one) -> absorbed_records >= 1,
            -- still exactly 2 identities, one now owning 3 source records.
            INSERT INTO id_people VALUES ('4', 'a@x.com', 'Alex');
            DO $$
            DECLARE s jsonb; n_nodes int; max_recs int;
            BEGIN
              s := goldenmatch.gm_resolve('idjob', 'id_people', 'people')::jsonb;
              IF s->>'absorbed_records' IS NULL OR (s->>'absorbed_records')::int < 1 THEN
                RAISE EXCEPTION 'gm_resolve run2: expected absorbed_records>=1 (incremental), got %', s;
              END IF;
              SELECT count(*) INTO n_nodes FROM identity_nodes;
              SELECT max(c) INTO max_recs
                FROM (SELECT count(*) c FROM source_records GROUP BY entity_id) q;
              IF n_nodes <> 2 OR max_recs <> 3 THEN
                RAISE EXCEPTION 'gm_resolve incremental: expected 2 stable identities + an entity with 3 records, got nodes=% max_recs=%', n_nodes, max_recs;
              END IF;
              RAISE NOTICE 'gm_resolve run2 (absorb): % nodes=% max_recs=%', s, n_nodes, max_recs;
            END $$;
            -- #1913 P2: the read-only identity_* functions serve the SAME in-DB
            -- dataset when db_path is empty (they use the goldenmatch.identity_dsn
            -- GUC). Closes the loop: resolve then query in one database.
            DO $$
            DECLARE lst jsonb; n int; rec jsonb;
            BEGIN
              -- Empty db_path -> the in-DB Postgres store, not a SQLite file.
              lst := goldenmatch.goldenmatch_identity_list('people', '', '')::jsonb;
              n := jsonb_array_length(lst);
              IF n <> 2 THEN
                RAISE EXCEPTION 'identity_list(in-DB): expected 2 identities, got % -> %', n, lst;
              END IF;
              -- Resolve a record written by gm_resolve (source defaults to
              -- "dataframe" when the table has no __source__ column).
              rec := goldenmatch.goldenmatch_identity_resolve('dataframe:1', '')::jsonb;
              IF rec->>'entity_id' IS NULL THEN
                RAISE EXCEPTION 'identity_resolve(in-DB): expected an entity for dataframe:1, got %', rec;
              END IF;
              RAISE NOTICE 'identity read (in-DB, empty db_path): list=% resolve.entity=%', n, rec->>'entity_id';
            END $$;
            -- #1913 P3: in-SQL steward merge/split writes over the same in-DB
            -- dataset. Split a record out of the 3-record identity into a fresh
            -- one, then merge it back — asserting on the return-value contract +
            -- record ownership (status enum internals stay the Python store's).
            DO $$
            DECLARE
              big_entity text; rec_id text; split_res jsonb; new_eid text;
              n_nodes int; new_recs int; merge_res jsonb; back_recs int; big_recs int;
            BEGIN
              -- The absorbed identity owns 3 records; pick it + one of its records.
              SELECT entity_id INTO big_entity
                FROM source_records GROUP BY entity_id ORDER BY count(*) DESC LIMIT 1;
              SELECT record_id INTO rec_id
                FROM source_records WHERE entity_id = big_entity LIMIT 1;

              -- SPLIT: move that record into a brand-new identity.
              split_res := goldenmatch.gm_identity_split('people', big_entity, rec_id)::jsonb;
              new_eid := split_res->>'new_entity_id';
              -- `moved` is the JSON array of moved record ids (not a count).
              IF new_eid IS NULL OR jsonb_array_length(split_res->'moved') <> 1 THEN
                RAISE EXCEPTION 'gm_identity_split: expected 1 moved record + a new_entity_id, got %', split_res;
              END IF;
              SELECT count(*) INTO n_nodes FROM identity_nodes;
              SELECT count(*) INTO new_recs FROM source_records WHERE entity_id = new_eid;
              IF n_nodes <> 3 OR new_recs <> 1 THEN
                RAISE EXCEPTION 'gm_identity_split: expected 3 nodes + the new entity owning 1 record, got nodes=% new_recs=%', n_nodes, new_recs;
              END IF;
              RAISE NOTICE 'gm_identity_split: % (nodes=%)', split_res, n_nodes;

              -- MERGE: absorb the split-out identity back into the big one.
              merge_res := goldenmatch.gm_identity_merge('people', big_entity, new_eid)::jsonb;
              IF merge_res->>'keep' <> big_entity OR merge_res->>'absorbed' <> new_eid THEN
                RAISE EXCEPTION 'gm_identity_merge: expected keep=% absorbed=%, got %', big_entity, new_eid, merge_res;
              END IF;
              -- The absorbed entity's records move back to the keeper.
              SELECT count(*) INTO back_recs FROM source_records WHERE entity_id = new_eid;
              SELECT count(*) INTO big_recs  FROM source_records WHERE entity_id = big_entity;
              IF back_recs <> 0 OR big_recs <> 3 THEN
                RAISE EXCEPTION 'gm_identity_merge: expected absorbed entity to own 0 records + keeper to own 3, got absorbed=% keeper=%', back_recs, big_recs;
              END IF;
              RAISE NOTICE 'gm_identity_merge: % (keeper records=%)', merge_res, big_recs;
            END $$;
            -- 0.16.0: identity audit chain + steward mediation + MDM operator
            -- reads over the SAME in-DB dataset. All 8 new gm_identity_*
            -- functions. Empty dataset = the global chain / whole graph, so the
            -- seal covers every event resolve/split/merge emitted regardless of
            -- per-event dataset tagging.
            DO $$
            DECLARE
              big_entity text; rec_a text; rec_b text;
              seal_res jsonb; verify_res jsonb; audit_res jsonb;
              prof jsonb; stats_res jsonb; worklist_res jsonb;
              conflict_res jsonb; claim_res jsonb;
            BEGIN
              SELECT entity_id INTO big_entity
                FROM source_records GROUP BY entity_id ORDER BY count(*) DESC LIMIT 1;
              SELECT record_id INTO rec_a
                FROM source_records WHERE entity_id = big_entity ORDER BY record_id LIMIT 1;
              SELECT record_id INTO rec_b
                FROM source_records WHERE entity_id = big_entity ORDER BY record_id OFFSET 1 LIMIT 1;

              -- AUDIT SEAL: resolve/split/merge emitted events -> a global seal
              -- folds them, so there IS something new to seal.
              seal_res := goldenmatch.gm_identity_audit_seal('')::jsonb;
              IF (seal_res->>'sealed')::boolean IS NOT TRUE THEN
                RAISE EXCEPTION 'gm_identity_audit_seal: expected sealed=true (events exist), got %', seal_res;
              END IF;

              -- AUDIT VERIFY: replay the seal chain + content hashes -> intact.
              verify_res := goldenmatch.gm_identity_audit_verify('', '')::jsonb;
              IF (verify_res->>'ok')::boolean IS NOT TRUE THEN
                RAISE EXCEPTION 'gm_identity_audit_verify: expected ok=true, got %', verify_res;
              END IF;

              -- AUDIT READ: the append-only log page is non-empty.
              audit_res := goldenmatch.gm_identity_audit('', '')::jsonb;
              IF (audit_res->>'total')::int < 1 OR jsonb_array_length(audit_res->'items') < 1 THEN
                RAISE EXCEPTION 'gm_identity_audit: expected a non-empty log, got %', audit_res;
              END IF;

              -- PROFILE: the surviving entity owns its 3 records.
              prof := goldenmatch.gm_identity_profile(big_entity, '')::jsonb;
              IF (prof->>'record_count')::int <> 3 THEN
                RAISE EXCEPTION 'gm_identity_profile: expected record_count=3 for %, got %', big_entity, prof;
              END IF;

              -- STATS: whole-graph health summary reports the entities.
              stats_res := goldenmatch.gm_identity_stats('', '')::jsonb;
              IF (stats_res->>'total_entities')::int < 1 THEN
                RAISE EXCEPTION 'gm_identity_stats: expected total_entities>=1, got %', stats_res;
              END IF;

              -- WORKLIST: returns an items array (may be empty; assert the shape).
              worklist_res := goldenmatch.gm_identity_worklist('', '')::jsonb;
              IF jsonb_typeof(worklist_res->'items') <> 'array' THEN
                RAISE EXCEPTION 'gm_identity_worklist: expected an items array, got %', worklist_res;
              END IF;

              -- RESOLVE_CONFLICT: a `defer` verdict logs a mediation edge only
              -- (no structural change), proving the write path loads.
              conflict_res := goldenmatch.gm_identity_resolve_conflict('', rec_a, rec_b, 'defer', 'ci-smoke')::jsonb;
              IF conflict_res->>'resolution' IS NULL THEN
                RAISE EXCEPTION 'gm_identity_resolve_conflict: expected a verdict, got %', conflict_res;
              END IF;

              -- CLAIM: re-claim a record into the entity it already lives in -> a
              -- safe no-op move (moved=false), proving the claim write path loads.
              claim_res := goldenmatch.gm_identity_claim(big_entity, rec_a, 'ci-smoke')::jsonb;
              IF (claim_res->>'moved')::boolean IS NOT FALSE THEN
                RAISE EXCEPTION 'gm_identity_claim(same entity): expected moved=false, got %', claim_res;
              END IF;

              RAISE NOTICE 'gm_identity audit/mediation/MDM smoke OK: sealed=% verify_ok=% audit_total=% profile_recs=%',
                seal_res->>'sealed', verify_res->>'ok', audit_res->>'total', prof->>'record_count';
            END $$;
          EOSQL
          echo "=== PG ${PG_VERSION} smoke passed ==="

  # DuckDB UDF package tests. Pure Python; lives at
  # packages/rust/extensions/duckdb/ alongside the Rust crates but the
  # main `python` matrix job doesn't see it (its dynamic-matrix only
  # enumerates packages/python/<pkg>). This lane fills that gap.
  duckdb_extensions:
    needs: changes
    if: needs.changes.outputs.duckdb_extensions == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: packages/rust/extensions/duckdb
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install goldenmatch + duckdb UDF package
        run: |
          # The local goldenmatch checkout supplies the controller + autoconfig
          # internals the UDFs delegate to. Editable install means a goldenmatch
          # source change here would surface — but the duckdb lane filter only
          # fires on extensions/duckdb/** changes, so for cross-package
          # regressions, rely on the regular `python` lane to catch them.
          pip install -e "../../../python/goldenmatch[web,polars]"
          # goldencheck supplies the deep-profiling kernels the goldencheck_* UDFs
          # delegate to (goldencheck.core.kernels). Editable, pure-Python path —
          # the native goldencheck-core wheel isn't built here, so the UDF tests
          # exercise the pure-Python fallback (the reference the native path must
          # match; that parity is proven in goldencheck's own native lane).
          pip install -e "../../../python/goldencheck"
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          # pytest-timeout converts a hung worker (e.g. wedged auto-config)
          # into an actionable failure with a traceback at the 120s mark
          # instead of letting the job sit at the 6h GH Actions default.
          pip install pytest pytest-timeout pyarrow
      - name: Run DuckDB UDF tests
        run: python -m pytest tests/ -v --timeout=120

  # Pyright strict-mode type check on the goldenmatch core slice. Scope
  # (include list) is pinned in pyrightconfig.json at repo root; CI mirrors
  # that scope via the path filter above. Blocking — any new error in the
  # slice fails CI. To extend the slice, update both pyrightconfig.json's
  # `include` and the `pyright_slice` filter above.
  pyright:
    needs: changes
    if: needs.changes.outputs.pyright_slice == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --all-packages --no-install-package goldenmatch-native --no-install-package goldenflow-native
      - run: uv run pyright

  # Enforce per-package version lockstep across every file that declares it
  # (pyproject / __init__ / server.json / Cargo.toml). The CLAUDE.md gotchas
  # documented this rule but nothing enforced it -- goldenflow shipped 1.1.x
  # drifted. No `if:` gate: a drift can be introduced by any change and the
  # check is stdlib-only (~1s), so it always runs.
  version_consistency:
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Enforce per-package version lockstep
        run: python scripts/check_version_consistency.py

  readme_callouts:
    needs: changes
    if: needs.changes.outputs.readme_callouts == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - name: Verify READMEs are in sync with CHANGELOG callouts
        run: python scripts/sync_readme_callouts.py --check

  # Tier-1 doc-lockstep umbrella gate (REQUIRED). Single entry point for all
  # structural doc-consistency checks: runs version_consistency +
  # readme_callouts --check as subprocesses, then adds roster-matrix,
  # docs.json nav integrity (broken-link + orphan), and changelog<->version.
  # stdlib-only (~1s). Gated on the `docs` path filter (or force_all).
  docs_consistency:
    needs: changes
    if: needs.changes.outputs.docs == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Doc consistency (roster matrix + nav integrity + changelog/version)
        run: python scripts/check_docs_consistency.py
      - name: Doc links + frontmatter (in-body cross-links resolve; MDX frontmatter valid)
        run: python scripts/check_docs_links.py
      - name: Doc sections (canonical per-section shape; spine + order + frontmatter + title case)
        run: python scripts/check_docs_sections.py
      - name: Benchmark claims consistent with source of truth
        run: python scripts/check_benchmark_claims.py

  # Mintlify render gate (BLOCKING): the docs site's OWN parser/build, which the
  # stdlib check_docs_links.py cannot replicate. `mint validate` builds the site in
  # strict mode (any warning/error fails) -- it catches malformed MDX/JSX bodies
  # (e.g. a bare `<->` that opens a JSX tag), invalid frontmatter, and docs.json
  # schema errors. `mint broken-links --check-anchors` catches broken internal
  # links AND anchor-slug mismatches (the anchor half is exactly what the Python
  # check strips). Kept alongside docs_consistency so basic link/frontmatter
  # coverage survives even if Mintlify's release CDN is unreachable.
  docs_render:
    needs: changes
    if: needs.changes.outputs.docs == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    defaults:
      run:
        working-directory: docs-site
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
      - name: Install Mintlify CLI
        run: npm i -g mint
      - name: Validate docs build (strict; MDX/JSX + frontmatter + docs.json)
        run: mint validate --disable-openapi
      - name: Broken internal links + anchors
        run: mint broken-links --check-anchors

  # Config-matrix drift gate (BLOCKING), one leg per suite package. Each package's
  # config-matrix.mdx generated block is rendered from its live surface (pydantic
  # tree / constructor kwargs / vocab constants / <PREFIX>_* env scan) by the
  # repo-level scripts/gen_config_matrix.py; this fails if the committed page is
  # stale. Needs the packages importable (introspection) + the source tree (env
  # scan), so it uv-syncs like api_parity.
  config_matrix:
    needs: changes
    if: needs.changes.outputs.config_matrix == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        package: [goldenmatch, goldencheck, goldenflow, goldenpipe, infermap, goldenanalysis]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Sync workspace (importable packages for introspection)
        run: uv sync --all-packages --no-install-package goldenmatch-native --no-install-package goldenflow-native
      - name: Gate unit tests (determinism + markers; run once)
        if: matrix.package == 'goldenmatch'
        run: uv run pytest scripts/test_config_matrix.py scripts/test_agent_codemap.py scripts/test_docs_sections.py scripts/test_api_surface.py -q
        env:
          POLARS_SKIP_CPU_CHECK: "1"
          GOLDENMATCH_NATIVE: "0"
          GOLDENCHECK_NATIVE: "0"
          GOLDENFLOW_NATIVE: "0"
          GOLDENPIPE_NATIVE: "0"
          INFERMAP_NATIVE: "0"
      - name: llms.txt / README capability counts match code (run once; all pkgs synced)
        if: matrix.package == 'goldenmatch'
        run: uv run python scripts/check_llms_counts.py
        env:
          POLARS_SKIP_CPU_CHECK: "1"
          GOLDENMATCH_NATIVE: "0"
          GOLDENCHECK_NATIVE: "0"
          GOLDENFLOW_NATIVE: "0"
          GOLDENPIPE_NATIVE: "0"
          INFERMAP_NATIVE: "0"
          GOLDENANALYSIS_NATIVE: "0"
      - name: Suite surface matrix current (cross-package drift; run once, all pkgs synced)
        if: matrix.package == 'goldenmatch'
        run: |
          uv run python scripts/gen_suite_matrix.py --check
          uv run pytest scripts/test_suite_matrix.py -q
          uv run python scripts/gen_api_surface.py --check
        env:
          POLARS_SKIP_CPU_CHECK: "1"
          GOLDENMATCH_NATIVE: "0"
          GOLDENCHECK_NATIVE: "0"
          GOLDENFLOW_NATIVE: "0"
          GOLDENPIPE_NATIVE: "0"
          INFERMAP_NATIVE: "0"
          GOLDENANALYSIS_NATIVE: "0"
      - name: Config-matrix drift check (${{ matrix.package }})
        run: uv run python scripts/gen_config_matrix.py --check ${{ matrix.package }}
        env:
          POLARS_SKIP_CPU_CHECK: "1"
          GOLDENMATCH_NATIVE: "0"
          GOLDENCHECK_NATIVE: "0"
          GOLDENFLOW_NATIVE: "0"
          GOLDENPIPE_NATIVE: "0"
          INFERMAP_NATIVE: "0"
          GOLDENANALYSIS_NATIVE: "0"
      - name: Docs cross-reference vs the matrix (${{ matrix.package }})
        # The other docs must not name an env knob the code no longer reads.
        run: uv run python scripts/gen_config_matrix.py --refs ${{ matrix.package }}
        env:
          POLARS_SKIP_CPU_CHECK: "1"
          GOLDENMATCH_NATIVE: "0"
          GOLDENCHECK_NATIVE: "0"
          GOLDENFLOW_NATIVE: "0"
          GOLDENPIPE_NATIVE: "0"
          INFERMAP_NATIVE: "0"
          GOLDENANALYSIS_NATIVE: "0"

  # Tier-2 doc-staleness ADVISORY. Diff-aware: flags a GOLDENMATCH_* env-flag
  # change with no tuning.mdx update (gating), and an __all__/re-export change
  # with no doc surface touched (warning). continue-on-error => never blocks
  # ci-required; it surfaces annotations only. NOT in the ci-required needs list.
  docs_staleness:
    needs: changes
    if: needs.changes.outputs.docs == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          fetch-depth: 0  # need the base ref for `git diff`
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Docs staleness (advisory) vs PR base
        run: |
          BASE="${{ github.event.pull_request.base.sha || 'origin/main' }}"
          git fetch origin main --quiet || true
          python scripts/check_docs_staleness.py --base "$BASE" --head HEAD

  ts_parity_freshness:
    needs: changes
    if: needs.changes.outputs.ts_parity == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --all-packages --no-install-package goldenmatch-native --no-install-package goldenflow-native
      # Regenerate every committed TS parity fixture from the Python emitters,
      # then assert the working tree still matches HEAD within a 4-decimal float
      # tolerance. Closes the silent-drift hole (#856): a pure-Python behaviour
      # change that is not mirrored into the committed TS fixtures turns this lane
      # red, instead of the TS parity test staying green against a stale fixture.
      # Two controller-execution fixtures are allowlisted in the checker
      # (optional-dependency-sensitive; see scripts/check_ts_parity_freshness.py).
      - name: Regenerate TS parity fixtures
        run: PYTHON=.venv/bin/python bash scripts/regen_ts_parity_fixtures.sh
      - name: Assert TS parity fixtures are fresh (float-tolerant)
        run: .venv/bin/python scripts/check_ts_parity_freshness.py

  # Single required-status-check for branch protection. Branch ruleset
  # references `ci-required` (stable name) instead of the matrix-instance
  # check names (`python (goldenmatch)`, `rust_pgrx (15)`, ...) which
  # change per-row and can't be matched by GitHub's exact-name required
  # status check rule.
  #
  # `if: always()` lets the job fire even when upstream jobs are skipped
  # by the `changes` path filter — a doc-only PR with all code jobs
  # skipped should still merge.
  #
  # The check inside fails the summary when an upstream conclusion is
  # `failure` or `cancelled`. `skipped` and `success` both pass. Avoids
  # the trap where `needs:` default behaviour blocks the summary when
  # any upstream was skipped.
  # #1086 deterministic throughput-tier perf gate. Runs the bench harness unit
  # tests + the cost gate (machine-independent: candidate_pairs / reduction_ratio /
  # measured recall vs a committed baseline). Pure-Python, no native build, seconds.
  throughput-gate:
    needs: changes
    if: needs.changes.outputs.throughput == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GOLDENMATCH_NATIVE: "0"
      POLARS_SKIP_CPU_CHECK: "1"
      # Clean, reproducible CI runs (no cross-run memory db).
      GOLDENMATCH_AUTOCONFIG_MEMORY: "0"
      # The throughput tier's final output is sketch-distance only, but
      # auto_configure_df first runs the controller's sample pipeline with a
      # normal config, which for a "description" text column adds an embedding
      # scorer -> tries to pull all-MiniLM-L6-v2 from HuggingFace and HANGS on a
      # network-less runner. Force HF offline so any such load fails fast (caught
      # by the controller) instead of stalling the job. The gate + tests use the
      # vendored offline corpus only, so no network is needed.
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --all-packages --no-install-package goldenmatch-native --no-install-package goldenflow-native
      - run: uv pip install -e packages/python/goldenmatch
      - run: uv pip install duckdb
      - name: Bench harness unit tests
        # --timeout converts any hang into a per-test traceback (the bench tests
        # spawn tier subprocesses; a network/model stall must fail actionably).
        run: uv run python -m pytest scripts/bench_corpus_dedup/ -p no:xdist -v --timeout=180 --timeout-method=thread
      - name: Throughput perf gate (cost vs committed baseline)
        run: uv run python scripts/bench_corpus_dedup/throughput_perf_gate.py --check

  pgrx_sql_sync:
    # Guard: every `#[pg_extern]` in the goldenmatch_pg crate is declared in the
    # current base SQL. pgrx 0.12.9's SQL generator is broken in this workspace,
    # so sql/goldenmatch_pg--<version>.sql is hand-maintained (see
    # packages/rust/extensions/CLAUDE.md) — nothing otherwise caught a forgotten
    # CREATE FUNCTION until the pgrx build/smoke, if at all. Python-only, no pgrx
    # toolchain, runs in seconds. Same trigger as rust_pgrx.
    needs: changes
    if: needs.changes.outputs.rust_pgrx == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Check pgrx pg_extern set matches the base SQL
        run: python3 scripts/check_pgrx_sql_sync.py

  fixture_drift:
    # Backstop for stale committed TS wasm parity fixtures. Each surface's own
    # `*_wasm` drift guard only fires when that surface's paths change, but a
    # committed fixture can be stale for reasons its paths never capture (e.g. a
    # branch based on older main). On ANY rust-extension change, regenerate EVERY
    # committed wasm parity fixture from its live core and diff — so a stale
    # sibling fails HERE, on the PR, rather than late in the full-matrix merge
    # queue (which is exactly how the goldengraph fixture bit PR #1398 four times).
    needs: changes
    if: needs.changes.outputs.rust_cores == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: packages/rust/extensions
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
      - name: Install wasm-pack
        run: curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh
      - name: Regenerate every committed wasm parity fixture from its live core and diff
        run: |
          set -euo pipefail
          shopt -s nullglob
          for script in packages/typescript/*/scripts/build_*_wasm.mjs; do
            pkg=$(dirname "$(dirname "$script")")
            name=$(basename "$script")
            echo "::group::regenerate $name ($pkg)"
            ( cd "$pkg" && node "scripts/$name" )
            echo "::endgroup::"
          done
          # Diff ONLY the deterministic golden fixtures — NOT the toolchain-variant
          # wasm bytes/bindings under src/core/_wasm/ (those legitimately differ by
          # wasm-pack / rustc version and are never committed-diffed anywhere). A
          # git `:(glob)` pathspec is used so the match is robust regardless of
          # shell expansion.
          if ! git diff --exit-code -- ':(glob)packages/typescript/**/tests/parity/fixtures/**'; then
            echo "::error::A committed wasm parity fixture is stale vs its Rust core. A (possibly shared) core changed and a fixture was not regenerated. Run the matching packages/typescript/<pkg>/scripts/build_*_wasm.mjs and commit the fixture." >&2
            exit 1
          fi
          echo "all committed wasm parity fixtures are in sync with their live cores"

  goldenflow_duckdb:
    needs: changes
    if: needs.changes.outputs.goldenflow_duckdb == 'true' || needs.changes.outputs.force_all == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: packages/rust/extensions/goldenflow-duckdb
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: packages/rust/extensions/goldenflow-duckdb
      # Hermetic parity: compiles DuckDB in-process (test-bundled) and asserts SQL
      # output == the goldenflow-core reference over the full identifiers_corpus +
      # the multi-arg kernels. This is the cross-surface gate for the DuckDB
      # surface -- a goldenflow-core change can't merge with it red.
      - name: Parity test (bundled)
        run: cargo test --no-default-features --features test-bundled
      # The shippable cdylib compiles against the DuckDB C Extension API.
      - name: Build loadable cdylib
        run: cargo build --release

  ci-required:
    needs:
      - changes
      - workflow_lint
      - goldenflow_duckdb
      - native_flow
      - throughput-gate
      - python
      - python_goldenmatch
      - python_goldenmatch_heavy
      - python_goldenmatch_coverage
      - python_goldenmatch_fallback
      - python_goldenflow_fallback
      - python_skipped_lanes
      - python_postgres
      - synthetic_benchmarks
      - benchmark_runner_smoke
      # #1855: quality_gate is BLOCKING via ci-required (not just its own job).
      # It is path-filtered (skipped -> counts as pass here) and its gate step is
      # not continue-on-error, so a real red blocks the merge queue instead of
      # surfacing as a mergeable UNSTABLE. #1834 (historical_50k f1_probabilistic
      # 0.83 -> 0.33) merged precisely because this was absent.
      - quality_gate
      - typescript
      - wasm_flow
      - web_ui_e2e
      - rust
      - action
      - dbt
      - rust_pgrx
      - pgrx_sql_sync
      - fixture_drift
      - duckdb_extensions
      - native
      - goldencheck_native
      - goldencheck_nopolars
      - goldenmatch_nopolars
      - goldenprofile_native
      - goldengraph_native
      - native_wheel
      - goldenembed
      - embed_wheel
      - goldenhnsw
      - hnsw_wheel
      - distributed
      - distributed_wcc
      # NB: distributed_broad is deliberately ABSENT -- it's continue-on-error
      # (known-fragile fixtures) and must not gate the merge queue.
      - sail
      - pyright
      - version_consistency
      - readme_callouts
      - docs_consistency
      - docs_render
      - ts_parity_freshness
      # api_parity + native_symbols guard cross-surface invariants (Python<->TS
      # tool/CLI/skill/scorer/transform parity; native symbol registration) but
      # were advisory -- a correct red couldn't block a merge. Now required.
      - api_parity
      - native_symbols
      - config_matrix
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Verify no upstream job failed or was cancelled
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail
          echo "$NEEDS_JSON"
          # Use jq to inspect each upstream's `result`. `success` and
          # `skipped` both pass; anything else (`failure`, `cancelled`)
          # fails the summary.
          BAD=$(echo "$NEEDS_JSON" | jq -r '[.[] | select(.result != "success" and .result != "skipped") | .result] | join(",")')
          if [ -n "$BAD" ]; then
            echo "::error::upstream job(s) failed or were cancelled: $BAD"
            exit 1
          fi
          echo "all required upstream jobs passed or were skipped"
