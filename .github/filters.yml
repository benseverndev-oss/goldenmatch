# paths-filter definitions for .github/workflows/ci.yml (the `changes` job).
# Extracted from ci.yml's inline `filters:` block to shrink that monolith's
# add-heavy conflict surface: two PRs each adding a lane now conflict here in a
# small dedicated file instead of deep inside ci.yml. dorny/paths-filter loads
# this via `filters: .github/filters.yml`. Per-path globs are unanchored --
# `'foo/**'` matches at any depth. Adding a lane still means: a filter entry
# HERE + the matching `changes.outputs.*` line + the job's `if:` gate in ci.yml.
ci_workflow:
  - '.github/workflows/ci.yml'
  # #1846: workflow_lint validates path-filter COVERAGE, so an edit to the
  # filters themselves (or to the checker) must run it. Without this, the one
  # file the coverage check exists to validate was the one file that couldn't
  # trigger it -- the same "a filter can't catch what it doesn't list" hole,
  # one level up.
  - '.github/filters.yml'
  - 'scripts/check_filter_coverage.py'
python_root:
  - 'pyproject.toml'
  - 'uv.lock'
python_goldenmatch:
  - 'packages/python/goldenmatch/**'
  # Stage A: the standalone datafusion-ffi UDF crate is built into
  # the goldenmatch venv in the `python` lane and exercised by
  # tests/test_datafusion_ffi_udf.py. A crate-only change must
  # re-trigger that lane so the FFI feasibility gate re-runs.
  - 'packages/rust/extensions/datafusion-udf/**'
  # Stage B: the FFI scorer UDFs delegate to the shared score-core
  # crate. A score-core-only change must re-trigger this lane so the
  # FFI scorer-parity test (vs native) re-runs.
  - 'packages/rust/extensions/score-core/**'
  # The FFI record-fingerprint UDF delegates to fingerprint-core; a
  # fingerprint-core-only change must re-trigger this lane so the
  # cross-surface fingerprint-golden parity test re-runs.
  - 'packages/rust/extensions/fingerprint-core/**'
python_goldenmatch_postgres:
  - 'packages/python/goldenmatch/tests/test_db.py'
  - 'packages/python/goldenmatch/tests/test_reconcile.py'
  - 'packages/python/goldenmatch/tests/test_memory_store_postgres.py'
  - 'packages/python/goldenmatch/tests/_pg_helpers.py'
  - 'packages/python/goldenmatch/goldenmatch/db/**'
  - 'packages/python/goldenmatch/goldenmatch/core/memory/**'
# #1086 throughput-tier perf gate: re-run when the tier code or the
# bench harness changes (so a regression in the sketch-then-verify
# cost is caught), and on ci.yml edits (keeps the gate logic tested).
throughput:
  - 'packages/python/goldenmatch/goldenmatch/core/throughput_verify.py'
  - 'packages/python/goldenmatch/goldenmatch/core/autoconfig_planner.py'
  - 'packages/python/goldenmatch/goldenmatch/config/schemas.py'
  - 'scripts/bench_corpus_dedup/**'
  - '.github/workflows/ci.yml'
python_goldencheck:
  - 'packages/python/goldencheck/**'
python_goldenflow:
  - 'packages/python/goldenflow/**'
  # Reference mode: the goldenflow matrix leg builds the native ext
  # and runs native-default, so a change to the shared -core kernel
  # or the native-flow shim must re-run the goldenflow leg (and its
  # pure-Python fallback lane).
  - 'packages/rust/extensions/goldenflow-core/**'
  - 'packages/rust/extensions/native-flow/**'
python_goldenpipe:
  - 'packages/python/goldenpipe/**'
python_infermap:
  - 'packages/python/infermap/**'
python_goldensuite_mcp:
  - 'packages/python/goldensuite-mcp/**'
python_goldencheck_types:
  - 'packages/python/goldencheck-types/**'
python_goldenanalysis:
  - 'packages/python/goldenanalysis/**'
typescript:
  - 'packages/typescript/**'
  - 'package.json'
  - 'pnpm-lock.yaml'
  - 'pnpm-workspace.yaml'
  - 'turbo.json'
  # The TS port embeds the autoconfig wasm core; a core/wasm change
  # must re-run the TS lane so the drift guard rebuilds the embedded
  # artifacts and fails if they're stale vs the committed copies.
  - 'packages/rust/extensions/autoconfig-core/**'
  - 'packages/rust/extensions/autoconfig-wasm/**'
  # The TS healer surface embeds the suggest wasm core; a core/wasm
  # change must re-run the TS lane so the suggest drift guard rebuilds
  # the embedded artifacts and fails if they're stale vs the committed
  # copies.
  - 'packages/rust/extensions/suggest-core/**'
  - 'packages/rust/extensions/suggest-wasm/**'
  # The TS goldencheck port embeds the goldencheck-core kernels as
  # wasm; a core/wasm change must re-run the TS lane so the drift
  # guard rebuilds the embedded artifacts and fails if they're stale.
  - 'packages/rust/extensions/goldencheck-core/**'
  - 'packages/rust/extensions/goldencheck-wasm/**'
  # Same for the goldenhnsw wasm core: a kernel or wrapper change must
  # re-run the TS lane's HNSW drift guard.
  - 'packages/rust/extensions/goldenhnsw/**'
  - 'packages/rust/extensions/goldenhnsw-wasm/**'
  # Same for the sketch (MinHash/LSH) wasm core: a kernel or wrapper
  # change must re-run the TS lane's sketch drift guard.
  - 'packages/rust/extensions/sketch-core/**'
  - 'packages/rust/extensions/sketch-wasm/**'
  # Same for the graph (connected-components) wasm core: a kernel or
  # wrapper change must re-run the TS lane's graph drift guard.
  - 'packages/rust/extensions/graph-core/**'
  - 'packages/rust/extensions/graph-wasm/**'
  # Same for the fingerprint wasm core: a kernel or wrapper change
  # must re-run the TS lane's record-fingerprint drift guard.
  - 'packages/rust/extensions/fingerprint-core/**'
  - 'packages/rust/extensions/fingerprint-wasm/**'
  # Same for the goldenembed (in-house embedder) wasm core: a kernel
  # or wrapper change must re-run the TS lane's embed drift guard.
  - 'packages/rust/extensions/goldenembed-core/**'
  - 'packages/rust/extensions/goldenembed-wasm/**'
wasm_score:
  - 'packages/rust/extensions/score-wasm/**'
  - 'packages/rust/extensions/score-core/**'
  - 'packages/typescript/goldenmatch/src/core/wasm/**'
  - 'packages/typescript/goldenmatch/src/core/scorer.ts'
  - 'packages/typescript/goldenmatch/tests/parity/wasm-scorer.test.ts'
  - 'packages/typescript/goldenmatch-wasm-runtime/**'
analysis_wasm:
  - 'packages/rust/extensions/analysis-wasm/**'
  - 'packages/rust/extensions/analysis-core/**'
  - 'packages/typescript/goldenanalysis/src/core/wasm/**'
  - 'packages/typescript/goldenanalysis/src/core/aggregate.ts'
  - 'packages/typescript/goldenanalysis/tests/parity/wasm-aggregate.test.ts'
  - 'packages/typescript/goldenmatch-wasm-runtime/**'
infermap_wasm:
  - 'packages/rust/extensions/infermap-wasm/**'
  - 'packages/rust/extensions/infermap-core/**'
  - 'packages/typescript/goldenmatch-wasm-runtime/**'
  - 'packages/typescript/infermap/src/core/wasm/**'
  - 'packages/typescript/infermap/src/core/detect.ts'
  - 'packages/typescript/infermap/src/core/scorers/exact.ts'
  - 'packages/typescript/infermap/src/core/scorers/fuzzy-name.ts'
  - 'packages/typescript/infermap/src/core/scorers/initialism.ts'
  - 'packages/typescript/infermap/src/core/scorers/profile.ts'
  - 'packages/typescript/infermap/src/core/scorers/pattern-type.ts'
  - 'packages/typescript/infermap/tests/parity/infermap-wasm.parity.test.ts'
  - 'packages/typescript/infermap/scripts/copy_wasm_artifact.mjs'
  - 'packages/typescript/infermap/tsup.config.ts'
wasm_flow:
  # Opt-in GoldenFlow WASM lane (Wave 0c): the wasm-bindgen wrapper,
  # the shared -core kernel it wraps, the TS wasm/loader + identifier
  # transforms it dispatches to, the cross-surface parity test, and
  # the shared wasm-runtime the loader imports.
  - 'packages/rust/extensions/goldenflow-wasm/**'
  - 'packages/rust/extensions/goldenflow-core/**'
  - 'packages/typescript/goldenflow/src/core/wasm/**'
  - 'packages/typescript/goldenflow/src/core/transforms/identifiers.ts'
  - 'packages/typescript/goldenflow/tests/parity/**'
  - 'packages/typescript/goldenmatch-wasm-runtime/**'
goldenpipe_wasm:
  # Opt-in GoldenPipe WASM lane (SP3): the wasm-bindgen wrapper, the
  # shared -core planner kernel it wraps, the TS wasm/loader + the
  # planner seams it reroutes, the Leg A/B parity tests, and the
  # shared wasm-runtime the loader imports.
  - 'packages/rust/extensions/goldenpipe-wasm/**'
  - 'packages/rust/extensions/goldenpipe-core/**'
  - 'packages/typescript/goldenpipe/src/core/**'
  - 'packages/typescript/goldenpipe/tests/parity/**'
  - 'packages/typescript/goldenpipe/tests/unit/wasm-backend.test.ts'
  - 'packages/typescript/goldenmatch-wasm-runtime/**'
ts_parity:
  # TS parity-fixture staleness gate (#856): a Python behaviour
  # change that is not mirrored into the committed TS fixtures must
  # turn the ts_parity_freshness lane red. Trigger on the fixture
  # producers (goldenmatch + goldenpipe Python), the committed
  # fixtures, and the gate tooling itself.
  - 'packages/python/goldenmatch/**'
  - 'packages/python/goldenpipe/**'
  - 'packages/typescript/goldenmatch/tests/parity/**'
  - 'packages/typescript/goldenpipe/tests/fixtures/**'
  - 'scripts/regen_ts_parity_fixtures.sh'
  - 'scripts/check_ts_parity_freshness.py'
autoconfig_wasm:
  # Gates the (rust-toolchain-heavy) wasm rebuild + drift guard inside
  # the typescript lane. Only fires when the shared core, the wasm
  # wrapper, or the embed script changes.
  - 'packages/rust/extensions/autoconfig-core/**'
  - 'packages/rust/extensions/autoconfig-wasm/**'
  - 'packages/typescript/goldenmatch/scripts/build_autoconfig_wasm.mjs'
suggest_wasm:
  # Gates the (rust-toolchain-heavy) suggest (healer) wasm rebuild +
  # drift guard inside the typescript lane. Only fires when the shared
  # suggest core, the wasm wrapper, the embed script, or the TS suggest
  # surface changes.
  - 'packages/rust/extensions/suggest-core/**'
  - 'packages/rust/extensions/suggest-wasm/**'
  - 'packages/typescript/goldenmatch/scripts/build_suggest_wasm.mjs'
  - 'packages/typescript/goldenmatch/src/core/suggest*.ts'
  - 'packages/typescript/goldenmatch/src/core/_wasm/suggestWasm*'
documents_wasm:
  # Gates the (rust-toolchain-heavy) documents wasm rebuild + drift
  # guard inside the typescript lane. Fires on the shared documents
  # core, the wasm wrapper, the embed script, the TS surface, or the
  # Python-authored corpus the build script copies.
  - 'packages/rust/extensions/documents-core/**'
  - 'packages/rust/extensions/documents-wasm/**'
  - 'packages/typescript/goldenmatch/scripts/build_documents_wasm.mjs'
  - 'packages/typescript/goldenmatch/src/core/documentsWasm.ts'
  - 'packages/typescript/goldenmatch/src/core/_wasm/documentsWasm*'
  - 'packages/python/goldenmatch/tests/parity/documents_corpus.jsonl'
goldencheck_wasm:
  # Gates the (rust-toolchain-heavy) goldencheck wasm rebuild + drift
  # guard inside the typescript lane. Only fires when the shared
  # goldencheck-core kernels, the wasm wrapper, or the embed script
  # changes.
  - 'packages/rust/extensions/goldencheck-core/**'
  - 'packages/rust/extensions/goldencheck-wasm/**'
  - 'packages/typescript/goldencheck/scripts/build_goldencheck_wasm.mjs'
perceptual_wasm:
  # Gates the perceptual image-pHash wasm rebuild + drift guard inside
  # the typescript lane. Fires on the kernel (DCT table lives here), the
  # wasm wrapper, the build script, or the TS perceptual surface.
  - 'packages/rust/extensions/perceptual-core/**'
  - 'packages/rust/extensions/perceptual-wasm/**'
  - 'packages/typescript/goldenmatch/scripts/build_perceptual_wasm.mjs'
  - 'packages/typescript/goldenmatch/src/core/perceptualWasm.ts'
  - 'packages/typescript/goldenmatch/src/core/_wasm/perceptualWasm*'
  - 'packages/typescript/goldenmatch/tests/parity/fixtures/perceptual/**'
goldenprofile_wasm:
  # Gates the (rust-toolchain-heavy) goldenprofile (Virtual
  # Fingerprint) wasm rebuild + drift guard inside the typescript
  # lane. Fires when the kernel, the wasm wrapper, the build script,
  # or the TS goldenprofile surface changes. graph-core is included
  # because goldenprofile-core links it (the arrow-gating feature).
  - 'packages/rust/extensions/goldenprofile-core/**'
  - 'packages/rust/extensions/goldenprofile-wasm/**'
  - 'packages/rust/extensions/graph-core/**'
  - 'packages/rust/extensions/score-core/**'
  - 'packages/rust/extensions/sketch-core/**'
  - 'packages/rust/extensions/fingerprint-core/**'
  - 'packages/typescript/goldenprofile/**'
goldengraph_wasm:
  # Gates the goldengraph (KG engine) wasm rebuild + drift guard
  # inside the typescript lane. graph-core/score-core are included
  # because goldengraph-core links them.
  - 'packages/rust/extensions/goldengraph-core/**'
  - 'packages/rust/extensions/goldengraph-wasm/**'
  - 'packages/rust/extensions/graph-core/**'
  - 'packages/rust/extensions/score-core/**'
  - 'packages/typescript/goldengraph/**'
hnsw_wasm:
  # Gates the (rust-toolchain-heavy) goldenhnsw wasm rebuild + drift
  # guard inside the typescript lane. Only fires when the HNSW kernel,
  # its wasm wrapper, or the embed script changes.
  - 'packages/rust/extensions/goldenhnsw/**'
  - 'packages/rust/extensions/goldenhnsw-wasm/**'
  - 'packages/typescript/goldenmatch/scripts/build_goldenhnsw_wasm.mjs'
sketch_wasm:
  # Gates the (rust-toolchain-heavy) sketch (MinHash/LSH) wasm rebuild
  # + drift guard inside the typescript lane. Only fires when the
  # sketch kernel, its wasm wrapper, or the embed script changes.
  - 'packages/rust/extensions/sketch-core/**'
  - 'packages/rust/extensions/sketch-wasm/**'
  - 'packages/typescript/goldenmatch/scripts/build_sketch_wasm.mjs'
graph_wasm:
  # Gates the (rust-toolchain-heavy) graph (connected-components) wasm
  # rebuild + drift guard inside the typescript lane. Only fires when
  # the graph kernel, its wasm wrapper, or the embed script changes.
  - 'packages/rust/extensions/graph-core/**'
  - 'packages/rust/extensions/graph-wasm/**'
  - 'packages/typescript/goldenmatch/scripts/build_graph_wasm.mjs'
fingerprint_wasm:
  # Gates the (rust-toolchain-heavy) fingerprint wasm rebuild + drift
  # guard inside the typescript lane. Only fires when the fingerprint
  # canonicalization kernel, its wasm wrapper, or the embed script
  # changes.
  - 'packages/rust/extensions/fingerprint-core/**'
  - 'packages/rust/extensions/fingerprint-wasm/**'
  - 'packages/typescript/goldenmatch/scripts/build_fingerprint_wasm.mjs'
goldenembed_wasm:
  # Gates the (rust-toolchain-heavy) goldenembed wasm rebuild + drift
  # guard inside the typescript lane. Only fires when the in-house
  # embedder core, its wasm wrapper, or the embed script changes.
  - 'packages/rust/extensions/goldenembed-core/**'
  - 'packages/rust/extensions/goldenembed-wasm/**'
  - 'packages/typescript/goldenmatch/scripts/build_goldenembed_wasm.mjs'
warehouse_udf:
  # Gates the BigQuery JS-wasm UDF regenerate + drift guard inside the
  # typescript lane. Pure-node (no wasm toolchain) — the generator
  # embeds the already-committed base64 kernels. Fires when the
  # generator, the generated DDL, or an embedded *WasmBytes blob changes.
  - 'packages/typescript/goldenmatch/scripts/generate_warehouse_udfs.mjs'
  - 'packages/typescript/goldenmatch/warehouse/**'
  - 'packages/typescript/goldenmatch/src/core/_wasm/fingerprintWasmBytes.ts'
web:
  - 'packages/python/goldenmatch/web/**'
  - 'packages/python/goldenmatch/goldenmatch/web/**'
  - 'packages/python/goldenmatch/scripts/build_web.py'
  - 'packages/python/goldenmatch/pyproject.toml'
  - 'pnpm-lock.yaml'
benchmark_runner:
  - 'scripts/run_benchmarks.py'
  - 'scripts/dqbench_adapters/**'
  - 'docs/reproducing-benchmarks.md'
  # #435: changes to the library being benchmarked must also
  # trigger the smoke. Before this, refiner / blocker /
  # scorer / pipeline / autoconfig changes could silently
  # regress benchmark recall + escape CI.
  - 'packages/python/goldenmatch/goldenmatch/core/autoconfig*.py'
  - 'packages/python/goldenmatch/goldenmatch/core/blocker.py'
  - 'packages/python/goldenmatch/goldenmatch/core/blocking_candidates.py'
  - 'packages/python/goldenmatch/goldenmatch/core/scorer.py'
  - 'packages/python/goldenmatch/goldenmatch/core/cluster.py'
  - 'packages/python/goldenmatch/goldenmatch/core/pipeline.py'
  - 'packages/python/goldenmatch/goldenmatch/core/matchkey.py'
  - 'packages/python/goldenmatch/goldenmatch/core/golden*.py'
  - 'packages/python/goldenmatch/goldenmatch/core/probabilistic.py'
  - 'packages/python/goldenmatch/goldenmatch/core/learned_blocking.py'
# Auto-config quality gate (scripts/autoconfig_quality): the
# committed scorecard pins host-independent decision-kernel signals
# (classification, matchkeys, blocking fields/cost) + the
# anchor_person_match F1 floor. Re-run whenever the decision kernel
# (rust core or Python autoconfig/blocking surfaces) or the harness
# itself changes, and on ci.yml edits (keeps the gate under test).
#
# #1846: this list used to cover only the CONFIG-DECISION surfaces, but the
# scorecard also pins F1 and F1_PROBABILISTIC -- so every surface that moves
# those numbers has to trigger it too. It didn't, and the gate went silent on
# exactly the PRs most able to break quality:
#
#   #1829  backends/score_buckets.py + core/probabilistic.py  -> SKIPPED
#   #1834  core/probabilistic.py + core/fused_match.py        -> SKIPPED
#   #1836  core/probabilistic.py                              -> SKIPPED
#   #1840  core/learned_blocking.py                           -> SKIPPED
#
# The gate MEASURED f1_probabilistic while not WATCHING probabilistic.py.
# historical_50k f1_probabilistic then fell 0.83 -> 0.33 on the native path
# and only surfaced later, on unrelated PRs that happened to touch a listed
# path -- which reads as "those PRs broke it" and burns a day on attribution.
#
# This is the same failure #435 fixed for `benchmark_runner` above ("changes
# to the library being benchmarked must also trigger the smoke"); the quality
# gate never got the same treatment. Keep the two lists in sync.
#
# RULE: if a file can move a number the scorecard pins, it belongs here. A
# quality gate that doesn't run is not a gate. Over-running costs ~22min of
# CI; under-running costs a silent recall regression on the reference path.
quality_gate:
  - 'scripts/autoconfig_quality/**'
  - 'packages/rust/extensions/autoconfig-core/**'
  - 'packages/python/goldenmatch/goldenmatch/core/autoconfig*.py'
  - 'packages/python/goldenmatch/goldenmatch/core/blocker.py'
  - 'packages/python/goldenmatch/goldenmatch/core/blocking_candidates.py'
  - 'packages/python/goldenmatch/goldenmatch/core/matchkey.py'
  # --- #1846: surfaces that move the scorecard's F1 / F1_PROBABILISTIC ---
  # Fellegi-Sunter: f1_probabilistic is a pinned column.
  - 'packages/python/goldenmatch/goldenmatch/core/probabilistic*.py'
  - 'packages/python/goldenmatch/goldenmatch/core/fused_match.py'
  # Blocking: learned_blocking is a sibling of blocker.py, not covered by it.
  - 'packages/python/goldenmatch/goldenmatch/core/learned_blocking.py'
  # Scoring + clustering decide the pairs the F1 columns are computed from.
  - 'packages/python/goldenmatch/goldenmatch/core/scorer*.py'
  - 'packages/python/goldenmatch/goldenmatch/core/cluster.py'
  # Routing: pipeline picks WHICH scorer runs (bucket vs legacy), so it can
  # change the numbers without any kernel changing.
  - 'packages/python/goldenmatch/goldenmatch/core/pipeline.py'
  # The backends ARE the scorers the planner routes to. The gate runs native
  # on purpose because native-on makes the planner pick `bucket` -- so a
  # bucket-lane change moves the gate's own reference path (#1829).
  - 'packages/python/goldenmatch/goldenmatch/backends/**'
  # The gate builds the native ext and the baseline is blessed native-on, so
  # the kernel is part of the measured path, not an implementation detail.
  - 'packages/rust/extensions/native/**'
  - '.github/workflows/ci.yml'
  # Self-test: an edit to THIS file must re-run the gate, same rule ci.yml
  # already follows -- otherwise a filter change can't be validated by the
  # thing it gates.
  - '.github/filters.yml'
# Cross-language API-parity gate: the goldenmatch MCP+CLI surface must
# not drift between the Python and TypeScript ports. Re-run the gate
# when either port, the parity manifest, or the emitter/checker tooling
# changes.
api_parity:
  - 'packages/python/*/*/mcp/**'
  - 'packages/python/*/*/cli/**'
  - 'packages/python/*/*/cli.py'
  - 'packages/python/*/*/a2a/**'
  - 'packages/typescript/*/src/node/mcp/**'
  - 'packages/typescript/*/src/node/a2a/**'
  - 'packages/typescript/*/src/cli.ts'
  # scorers/transforms surfaces: the VALID_SCORERS / VALID_SIMPLE_TRANSFORMS
  # (Python) and VALID_SCORERS / VALID_TRANSFORMS (TS) declarations. Without
  # these the gate can't see a scorer/transform added on one side only.
  - 'packages/python/*/*/config/schemas.py'
  - 'packages/typescript/*/src/core/types.ts'
  - 'parity/**'
  - 'scripts/emit_python_surface.py'
  - 'scripts/emit_ts_surface.mjs'
  - 'scripts/check_api_parity.py'
# Config-matrix drift gate (scripts/gen_config_matrix.py --check). The generated
# block of config-matrix.mdx is rendered from the pydantic schema + VALID_*
# vocabularies + the GOLDENMATCH_* env scan, so it must re-check whenever any of
# those move. The env scan reads the whole goldenmatch python + rust source, so
# any .py/.rs change there can add/remove a knob -> re-run the gate.
config_matrix:
  # The generated blocks are rendered from each package's Python + Rust source
  # (schema, vocab constants, <PREFIX>_* env scan), so any of those can move a
  # knob -> re-run the gate. Covers all suite packages + the repo-level generator.
  - 'docs-site/*/config-matrix.mdx'
  - 'packages/python/*/*/**/*.py'
  - 'packages/rust/extensions/**/*.rs'
  - 'scripts/config_matrix/**'
  - 'scripts/gen_config_matrix.py'
  # The agent-navigation manifest is rendered from the same registry; a hand-edit
  # of the committed JSON must re-run the gate so it can't be tampered out of sync.
  - 'docs/agent-manifest.json'
  - 'scripts/test_config_matrix.py'
  # llms.txt / README capability-count gate: the stated counts derive from the
  # package source (already covered above), but a hand-edit to a surface must
  # re-run the check too.
  - 'scripts/check_llms_counts.py'
  - 'packages/python/*/llms.txt'
  - 'packages/python/*/README.md'
  - 'llms.txt'
  # Agent code map (docs/agent-codemap.json): a static-AST structural map of the
  # Python source, gated in the same job. Any .py move re-runs it (already covered
  # above); these cover the generator, its gate, and a hand-edit of the committed JSON.
  - 'scripts/agent_codemap.py'
  - 'scripts/test_agent_codemap.py'
  - 'docs/agent-codemap.json'
  # Repo-level suite surface matrix: reads the parity manifests, the per-package
  # counts (packages/python/** above), and the recipes pages, so any of those can
  # move the cross-package view -> re-run its --check.
  - 'scripts/gen_suite_matrix.py'
  - 'scripts/test_suite_matrix.py'
  - 'docs-site/suite-matrix.mdx'
  - 'docs-site/*/recipes.mdx'
  - 'parity/*.yaml'
  - '.github/workflows/ci.yml'
  - '.github/filters.yml'
# Native-symbol reconciliation gate: the goldenmatch host's
# native-kernel references must not drift from the kernel's exports.
# Re-run the gate when the kernel crate, the host package, the
# checker/test tooling, or its parity corpus changes.
native_symbols:
  - 'packages/rust/extensions/native/**'
  - 'packages/rust/extensions/goldencheck-native/**'
  - 'packages/rust/extensions/analysis-native/**'
  - 'packages/rust/extensions/native-flow/**'
  - 'packages/rust/extensions/infermap-native/**'
  - 'packages/python/goldenmatch/goldenmatch/**'
  - 'packages/python/goldencheck/goldencheck/**'
  - 'packages/python/goldenanalysis/goldenanalysis/**'
  - 'packages/python/goldenflow/goldenflow/**'
  - 'packages/python/infermap/infermap/**'
  - 'scripts/check_native_symbols.py'
  - 'scripts/test_native_symbols.py'
  - 'parity/native_symbols/**'
  - '.github/workflows/ci.yml'
rust:
  - 'packages/rust/**'
rust_pgrx:
  # The Postgres extension lives in `packages/rust/extensions/postgres/`
  # and is excluded from the cargo workspace (pgrx + workspace mode
  # is broken — see root CLAUDE.md). It needs its own lane that
  # builds via `cargo pgrx install`, so trigger only on changes to
  # that subtree, the shared bridge it links against, or workspace
  # configuration.
  - 'packages/rust/extensions/postgres/**'
  - 'packages/rust/extensions/bridge/**'
  # goldenembed is a path dep of the postgres crate (gm_embed /
  # goldenmatch_embed_local) and supplies the embed-smoke fixture,
  # so a goldenembed change must rebuild + re-smoke this lane.
  - 'packages/rust/extensions/goldenembed/**'
  # goldenembed-core (featurizer + native projection) is a transitive
  # path dep via goldenembed — a kernel change must re-smoke embed.
  - 'packages/rust/extensions/goldenembed-core/**'
  # goldenhnsw is a path dep of the postgres crate (goldenmatch_hnsw_pairs),
  # so a kernel change must rebuild + re-smoke this lane.
  - 'packages/rust/extensions/goldenhnsw/**'
  # sketch-core is a path dep of the postgres crate (goldenmatch_lsh_pairs),
  # so a kernel change must rebuild + re-smoke this lane.
  - 'packages/rust/extensions/sketch-core/**'
  # score-core is a path dep of the postgres crate (goldenmatch_score
  # native fast path), so a kernel change must rebuild + re-smoke.
  - 'packages/rust/extensions/score-core/**'
  # perceptual-core is a path dep of the postgres crate
  # (goldenmatch_perceptual_phash / _hamming), so a kernel change must
  # rebuild + re-smoke this lane.
  - 'packages/rust/extensions/perceptual-core/**'
  # goldenflow-core is a path dep of the postgres crate (de-bridged
  # goldenflow_strip / goldenflow_whitespace_normalize), so a kernel
  # change must rebuild + re-smoke this lane.
  - 'packages/rust/extensions/goldenflow-core/**'
  # goldencheck-core is a path dep of the postgres crate (the
  # goldencheck_* deep-profiling functions), so a kernel change must
  # rebuild + re-smoke this lane.
  - 'packages/rust/extensions/goldencheck-core/**'
  - 'packages/rust/extensions/Cargo.toml'
  # The psql smoke (incl. the #1913 gm_resolve identity write path) lives in
  # ci.yml, and the lane's dep/SQL install lines are hand-maintained there, so
  # a change to the workflow (or this filter) must re-run the lane.
  - '.github/workflows/ci.yml'
  - '.github/filters.yml'
rust_cores:
  # ANY Rust extension change re-validates EVERY committed TS wasm
  # parity fixture (the fixture_drift job regenerates them all and
  # diffs). This is deliberately broad — broader than each surface's
  # own `*_wasm` filter — because a committed fixture can be stale for
  # reasons its own paths never capture: e.g. a feature branch based
  # on older main carries an out-of-date fixture, and no per-surface
  # filter fires because that surface wasn't touched. Such a branch
  # almost always touches SOME rust extension (goldenmatch's own HNSW
  # PR #1398 added packages/rust/extensions/goldenhnsw/), so keying on
  # the whole extensions tree catches the stale sibling fixture on the
  # PR instead of late in the full-matrix merge queue. The per-surface
  # `*_wasm` guards stay for their fast, targeted feedback; this is the
  # catch-all backstop.
  - 'packages/rust/extensions/**'
duckdb_extensions:
  # The DuckDB UDF package is pure Python but lives under
  # packages/rust/extensions/duckdb/ alongside the Rust crates.
  # Gate strictly on its own subtree so editing Rust code doesn't
  # spin up a Python lane for it.
  - 'packages/rust/extensions/duckdb/**'
native:
  # The native acceleration ext (PyO3) is a standalone workspace,
  # so the `rust` job's `cargo test --workspace` never builds it.
  # This lane builds the .so and runs the Python parity suite
  # (which SKIPS when the ext is absent). Trigger on the crate plus
  # the Python files it's wired into + the build script.
  - 'packages/rust/extensions/native/**'
  - 'packages/rust/extensions/fingerprint-core/**'
  # Stage B: the native scorers are now thin shims over the shared
  # score-core crate. A score-core change alters native behavior, so
  # re-run the native build + parity suite.
  - 'packages/rust/extensions/score-core/**'
  # perceptual-core: the native ext exposes the multimodal-ER crawl-tier
  # media hashes via PyO3 (ADR 0022); a core change alters native
  # behavior, so re-run the native build + parity suite.
  - 'packages/rust/extensions/perceptual-core/**'
  - 'packages/python/goldenmatch/goldenmatch/core/perceptual.py'
  - 'packages/python/goldenmatch/tests/test_native_perceptual_parity.py'
  - 'packages/python/goldenmatch/goldenmatch/core/_native_loader.py'
  - 'packages/python/goldenmatch/goldenmatch/core/_hashing.py'
  - 'packages/python/goldenmatch/goldenmatch/core/cluster.py'
  - 'packages/python/goldenmatch/goldenmatch/core/pairs.py'
  - 'packages/python/goldenmatch/goldenmatch/embeddings/**'
  - 'packages/python/goldenmatch/tests/test_native_parity.py'
  - 'packages/python/goldenmatch/tests/test_record_fingerprint.py'
  - 'packages/python/goldenmatch/tests/test_pairs.py'
  - 'packages/python/goldenmatch/tests/test_embeddings.py'
  - 'packages/python/goldenmatch/tests/test_inhouse_embedder.py'
  - 'scripts/build_native.py'
  # autoconfig-core: the native ext exposes the autoconfig kernel
  # via PyO3; these paths trigger the native build + parity suite.
  - 'packages/rust/extensions/autoconfig-core/**'
  - 'packages/python/goldenmatch/goldenmatch/core/autoconfig_native.py'
  - 'packages/python/goldenmatch/goldenmatch/core/autoconfig_planner.py'
  - 'packages/python/goldenmatch/goldenmatch/core/autoconfig.py'
  - 'packages/python/goldenmatch/tests/test_autoconfig_native_parity.py'
  # suggest-core: the native ext exposes the config-suggestion kernel
  # (suggest_config) via PyO3. The default-pipeline healer surface +
  # the artifacts-in adapter are wired into dedupe_df, so a change to
  # them must re-run the native suggest e2e (parity + cost short-circuit).
  - 'packages/python/goldenmatch/goldenmatch/core/suggest/**'
  - 'packages/python/goldenmatch/tests/test_healer_default_e2e_native.py'
goldenprofile_native:
  # Builds the goldenprofile_native maturin wheel and runs the
  # Python<->WASM cross-parity test (which SKIPS without the wheel) —
  # so the goldenprofile kernel's Python boundary is actually tested
  # in CI (issue #1304). The fixtures are authored from the host
  # kernel, so this closes the Python == WASM loop.
  - 'packages/rust/extensions/goldenprofile-native/**'
  - 'packages/rust/extensions/goldenprofile-core/**'
  - 'packages/rust/extensions/graph-core/**'
  - 'packages/rust/extensions/score-core/**'
  - 'packages/rust/extensions/sketch-core/**'
  - 'packages/rust/extensions/fingerprint-core/**'
  - 'packages/python/goldengraph/tests/test_goldenprofile_wasm_crossparity.py'
  - 'packages/typescript/goldenprofile/tests/parity/fixtures/goldenprofile/**'
goldencheck_native:
  # GoldenCheck's native acceleration ext (PyO3), a standalone
  # workspace like goldenmatch's `native`. Builds the .so and runs the
  # Python parity suite (which SKIPS when the ext is absent), so
  # without this lane the goldencheck kernels are UNTESTED in CI.
  - 'packages/rust/extensions/goldencheck-native/**'
  - 'packages/rust/extensions/goldencheck-core/**'
  - 'packages/python/goldencheck/goldencheck/core/_native_loader.py'
  - 'packages/python/goldencheck/goldencheck/baseline/statistical.py'
  - 'packages/python/goldencheck/goldencheck/drift/detector.py'
  - 'packages/python/goldencheck/goldencheck/relations/composite_key.py'
  - 'packages/python/goldencheck/goldencheck/relations/functional_dependency.py'
  - 'packages/python/goldencheck/goldencheck/relations/approx_fd.py'
  - 'packages/python/goldencheck/goldencheck/profilers/fuzzy_values.py'
  - 'packages/python/goldencheck/tests/core/test_native_parity.py'
  - 'scripts/build_goldencheck_native.py'
analysis_native:
  # GoldenAnalysis's optional native accelerator (analysis-core/native,
  # PyO3, standalone workspace). Builds the .so and runs the parity
  # suite (which SKIPS when the ext is absent), so without this lane
  # the histogram/quantile kernels are UNTESTED in CI.
  - 'packages/rust/extensions/analysis-native/**'
  - 'packages/rust/extensions/analysis-core/**'
  - 'packages/python/goldenanalysis/goldenanalysis/core/_native_loader.py'
  - 'packages/python/goldenanalysis/goldenanalysis/core/aggregate.py'
  - 'packages/python/goldenanalysis/tests/core/test_native_parity.py'
  - 'scripts/build_analysis_native.py'
infermap_native:
  # InferMap's optional native accelerator (infermap-core/native, PyO3,
  # standalone workspace, Wave 1 = the detect kernel). Builds the .so and
  # runs the parity suite (which SKIPS when the ext is absent), so without
  # this lane the detect_domain kernel is UNTESTED in CI.
  - 'packages/rust/extensions/infermap-native/**'
  - 'packages/rust/extensions/infermap-core/**'
  # Wave 2: infermap-core reuses score-core's jaro-winkler -> a change there
  # must re-run InferMap's fuzzy parity gate (native_flow/goldenflow-core
  # convention). The scorer files hold the _*_pure references the parity
  # test imports.
  - 'packages/rust/extensions/score-core/**'
  - 'packages/python/infermap/infermap/scorers/exact.py'
  - 'packages/python/infermap/infermap/scorers/fuzzy_name.py'
  - 'packages/python/infermap/infermap/scorers/initialism.py'
  - 'packages/python/infermap/infermap/scorers/profile.py'
  - 'packages/python/infermap/infermap/_native_loader.py'
  - 'packages/python/infermap/infermap/detect.py'
  - 'packages/python/infermap/tests/test_native_parity.py'
  - 'packages/python/infermap/infermap/scorers/pattern_type.py'
  - 'packages/python/infermap/tests/pattern_type_corpus.jsonl'
  - 'scripts/build_infermap_native.py'
goldengraph_native:
  # GoldenGraph's knowledge-graph engine (goldengraph-core/native, PyO3,
  # standalone workspace). It is native-AUTHORITATIVE (the store /
  # resolution engine is Rust-only, no pure-Python fallback), so this
  # lane builds the .so and runs the cross-surface parity suite that
  # asserts the Python native JSON boundary == the shared queries.json
  # oracle (the SAME fixture the TS goldengraph-wasm parity test uses).
  # The fixture is generated from the host boundary + drift-guarded by
  # fixture_drift, so a core change re-gates all surfaces.
  - 'packages/rust/extensions/goldengraph-native/**'
  - 'packages/rust/extensions/goldengraph-core/**'
  - 'packages/python/goldengraph/goldengraph/core/_native_loader.py'
  - 'packages/python/goldengraph/tests/test_native_parity.py'
  - 'packages/typescript/goldengraph/tests/parity/fixtures/goldengraph/queries.json'
  - 'scripts/build_goldengraph_native.py'
native_flow:
  # GoldenFlow's optional native phone kernel — a standalone maturin
  # workspace, so the `rust` job's cargo test --workspace never
  # builds it and the python matrix runs goldenflow WITHOUT the ext
  # (native path SKIPS). This lane builds the .so + runs the parity
  # suite. Trigger on the crate, the extensions workspace manifest,
  # the Python files it's wired into, and the build script.
  - 'packages/rust/extensions/native-flow/**'
  # native-flow path-depends on goldenflow-core (the owned pyo3-free
  # kernels), so a core change must fire this lane's cargo checks too.
  - 'packages/rust/extensions/goldenflow-core/**'
  - 'packages/rust/extensions/Cargo.toml'
  - 'packages/python/goldenflow/goldenflow/core/_native_loader.py'
  - 'packages/python/goldenflow/goldenflow/transforms/_native.py'
  - 'packages/python/goldenflow/goldenflow/transforms/phone.py'
  - 'packages/python/goldenflow/goldenflow/transforms/_fastpath.py'
  - 'packages/python/goldenflow/tests/transforms/test_native_parity.py'
  - 'packages/python/goldenflow/tests/transforms/test_fastpath_parity.py'
  - 'packages/python/goldenflow/scripts/build_native.py'
goldenflow_nopolars:
  # Phase 4f (Polars eviction) proof lane: builds the native in-memory
  # core, then installs goldenflow with polars UNINSTALLED and runs the
  # polars-absent covered-path tests (tests/nopolars). Proves `import
  # goldenflow` + covered transform() work with polars gone, so the 2.0
  # base-deps flip is already de-risked. Advisory (not ci-required).
  - 'packages/rust/extensions/native-flow/**'
  - 'packages/rust/extensions/goldenflow-core/**'
  - 'packages/rust/extensions/Cargo.toml'
  - 'packages/python/goldenflow/goldenflow/**'
  - 'packages/python/goldenflow/tests/nopolars/**'
  - 'packages/python/goldenflow/pyproject.toml'
  - 'packages/python/goldenflow/scripts/build_native.py'
goldencheck_nopolars:
  # Stage-2/P4b (Polars eviction) proof lane: installs goldencheck with polars
  # UNINSTALLED and runs the polars-absent tests (tests/nopolars). Proves `import
  # goldencheck` survives, the polars-free read/scan surface (read_columns /
  # scan_file_columns over Parquet + Excel, scan_columns structural checks) works
  # for real, and the uncovered tail (CSV, scan_file()'s full scan) raises cleanly
  # with polars gone. REQUIRED (in ci-required) as of P4b Task 3.
  - 'packages/python/goldencheck/goldencheck/**'
  - 'packages/python/goldencheck/tests/nopolars/**'
  - 'packages/python/goldencheck/pyproject.toml'
goldenmatch_nopolars:
  # Polars-free proof lane: builds the native scoring kernel, UNINSTALLS polars,
  # then runs the polars-absent tests (tests/nopolars). Proves `import goldenmatch`
  # + zero-config `dedupe_df(pa.Table)` (goldengraph's arrow-native resolve path)
  # work with polars gone -- goldenmatch has NO polars base dep, and this is the
  # contract that regressed silently in #1956 (a bucket fuzzy fallback forced the
  # polars import) and sat red on `main` for ~2 weeks because nothing required
  # exercised goldenmatch polars-absent. REQUIRED (in ci-required), like the
  # goldencheck_nopolars sibling.
  - 'packages/rust/extensions/native/**'
  - 'packages/rust/extensions/fingerprint-core/**'
  - 'packages/python/goldenmatch/goldenmatch/**'
  - 'packages/python/goldenmatch/tests/nopolars/**'
  - 'packages/python/goldenmatch/pyproject.toml'
  - 'scripts/build_native.py'
goldenmatch_frame_diff:
  # Polars-eviction Wave 1 proof lane: runs the file-based dedupe
  # entry point under BOTH GOLDENMATCH_FRAME=polars and =arrow on
  # frozen fixture datasets and diffs the canonicalized output
  # (clusters/golden/pairs), failing on any mismatch. Proves the
  # experimental pyarrow ingest lane (core/io_arrow.py + ArrowFrame)
  # is output-equivalent to the classic Polars path. Advisory (not
  # ci-required) -- the arrow lane is opt-in via env var, not the
  # default.
  - 'packages/python/goldenmatch/**'
  - 'scripts/diff_frame_backends.py'
goldenflow_duckdb:
  # goldenflow-duckdb: the compiled zero-Python DuckDB extension over
  # goldenflow-core. A core change must re-gate its bundled parity
  # (SQL == reference kernel over the full corpus) + loadable build.
  - 'packages/rust/extensions/goldenflow-duckdb/**'
  - 'packages/rust/extensions/goldenflow-core/**'
  - 'packages/rust/extensions/Cargo.toml'
goldenpipe_native:
  # GoldenPipe planner kernel: the pyo3-free goldenpipe-core is the
  # REFERENCE; this lane builds the goldenpipe-native abi3 wheel and
  # runs the pure-Python==core parity gate (Leg A) + wheel==core (Leg B)
  # under GOLDENPIPE_NATIVE=1. This is also goldenpipe-core's ONLY CI
  # coverage (it had no consumer to hang a lane on before SP2).
  - 'packages/rust/extensions/goldenpipe-core/**'
  - 'packages/rust/extensions/goldenpipe-native/**'
  - 'packages/python/goldenpipe/**'
goldenembed:
  # Standalone Rust embedding runtime (char n-gram featurize + ONNX
  # inference via ort). Own workspace, not in the `rust` job's
  # `cargo test --workspace`, so it needs its own lane.
  - 'packages/rust/extensions/goldenembed/**'
  # goldenembed-core: the pyo3/ort/fs-free compute core goldenembed
  # (and goldenembed-wasm) depend on; its project-parity tests run in
  # the goldenembed job.
  - 'packages/rust/extensions/goldenembed-core/**'
embed:
  # goldenmatch-embed: the maturin/pyo3 wheel that exposes the
  # goldenembed runtime to Python (GoldenEmbed.load(...).embed(...)).
  # Own workspace; not in the `rust` job's `cargo test --workspace`,
  # so it needs its own build+smoke lane. The wheel depends on the
  # goldenembed crate, so a goldenembed-only change must re-trigger.
  - 'packages/rust/extensions/embed-py/**'
  - 'packages/rust/extensions/goldenembed/**'
goldenhnsw:
  # Standalone pure-Rust HNSW (IndexHNSWFlat) ANN index. Own
  # workspace, zero C deps, not in the `rust` job's
  # `cargo test --workspace`, so it needs its own lane.
  - 'packages/rust/extensions/goldenhnsw/**'
hnsw:
  # goldenmatch-hnsw: the maturin/pyo3 wheel exposing the goldenhnsw
  # index to Python (goldenmatch.core.ann_blocker's native ANN
  # backend). Own workspace; the wheel depends on the goldenhnsw
  # crate, so a goldenhnsw-only change must re-trigger. The
  # ann_blocker integration tests exercise this wheel.
  - 'packages/rust/extensions/hnsw-py/**'
  - 'packages/rust/extensions/goldenhnsw/**'
  - 'packages/python/goldenmatch/goldenmatch/core/ann_blocker.py'
  - 'packages/python/goldenmatch/tests/test_ann_hnsw.py'
distributed:
  # Ray-backed distributed paths. The main `python` job installs
  # without the `ray` extra, so every tests/test_distributed_*.py
  # SKIPS there (pytest.importorskip("ray")). The `distributed` job
  # installs ray so they actually run. Trigger on the distributed
  # package, its tests, and the core modules those paths call into
  # (cluster.UnionFind backs two_phase_wcc; ray_backend drives
  # distributed scoring).
  - 'packages/python/goldenmatch/goldenmatch/distributed/**'
  - 'packages/python/goldenmatch/tests/test_distributed_*.py'
  - 'packages/python/goldenmatch/goldenmatch/core/cluster.py'
  - 'packages/python/goldenmatch/goldenmatch/backends/ray_backend.py'
sail:
  # Sail tier (distributed, Spark Connect). The main `python` job
  # installs without the `sail` extra, so tests/test_sail_*.py SKIP
  # there (pytest.importorskip). The `sail` job installs
  # goldenmatch[sail] (pysail + pyspark[connect]) so they run.
  - 'packages/python/goldenmatch/goldenmatch/sail/**'
  - 'packages/python/goldenmatch/tests/test_sail_*.py'
action:
  - 'packages/actions/**'
dbt:
  - 'packages/dbt/**'
readme_callouts:
  # README "what's new" callouts are auto-synced from the
  # goldenmatch CHANGELOG by scripts/sync_readme_callouts.py.
  # Trigger the check whenever the source, either target, or
  # the script itself changes.
  - 'README.md'
  - 'packages/python/goldenmatch/README.md'
  - 'packages/python/goldenmatch/CHANGELOG.md'
  - 'scripts/sync_readme_callouts.py'
docs:
  # Doc-lockstep gates (scripts/check_docs_*.py) + the Mintlify render gate.
  # Trigger whenever any tracked doc surface OR the gate scripts themselves
  # change. The required `docs_consistency` and `docs_render` jobs and the
  # advisory `docs_staleness` job all gate on this.
  - 'docs-site/**'
  - '**/README.md'
  - '**/CHANGELOG.md'
  - 'llms*.txt'
  - '**/llms*.txt'
  - '**/server.json'
  - 'scripts/check_docs_consistency.py'
  - 'scripts/check_docs_links.py'
  - 'scripts/check_docs_sections.py'
  - 'scripts/test_docs_sections.py'
  - 'scripts/check_benchmark_claims.py'
  - 'docs/benchmark-claims.json'
  - 'scripts/check_docs_staleness.py'
  - 'scripts/check_docs_sweep.py'
  - 'scripts/check_version_consistency.py'
  - 'scripts/sync_readme_callouts.py'
  - 'scripts/suite_download_badges.py'
  - 'packages/*/**/__init__.py'
pyright_slice:
  - 'pyrightconfig.json'
  - 'packages/python/goldenmatch/goldenmatch/core/autoconfig.py'
  - 'packages/python/goldenmatch/goldenmatch/core/autoconfig_controller.py'
  - 'packages/python/goldenmatch/goldenmatch/core/autoconfig_history.py'
  - 'packages/python/goldenmatch/goldenmatch/core/autoconfig_policy.py'
  - 'packages/python/goldenmatch/goldenmatch/core/autoconfig_rules.py'
  - 'packages/python/goldenmatch/goldenmatch/core/autoconfig_negative_evidence.py'
  - 'packages/python/goldenmatch/goldenmatch/core/autoconfig_memory.py'
  - 'packages/python/goldenmatch/goldenmatch/core/autoconfig_verify.py'
  - 'packages/python/goldenmatch/goldenmatch/core/indicators.py'
  - 'packages/python/goldenmatch/goldenmatch/core/complexity_profile.py'
  - 'packages/python/goldenmatch/goldenmatch/core/scorer.py'
  # The trigger filter must mirror pyrightconfig.json's `include` -- a file that
  # is type-checked but NOT a trigger lets a strict-type regression land
  # undetected (a pipeline.py-only change did exactly that; the errors only
  # surfaced when an unrelated PR touched scorer.py). Keep these in lockstep.
  - 'packages/python/goldenmatch/goldenmatch/core/pipeline.py'
  - 'packages/python/goldenmatch/goldenmatch/core/blocker.py'
  - 'packages/python/goldenmatch/goldenmatch/core/cluster.py'
  - 'packages/python/goldenmatch/goldenmatch/core/profiler.py'
  - 'packages/python/goldenmatch/goldenmatch/core/learned_blocking.py'
  - 'packages/python/goldenmatch/goldenmatch/core/profile_emitter.py'
  - 'packages/python/goldenmatch/goldenmatch/core/_profile_helpers.py'
  - 'packages/python/goldenmatch/goldenmatch/_api.py'
  - 'packages/python/goldenmatch/goldenmatch/utils/transforms.py'
  - 'packages/python/goldenmatch/goldenmatch/config/**'
