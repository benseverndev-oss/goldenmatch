# Sail distributed (kubernetes-cluster mode) on GKE. Adapted from the official
# LakeSail k8s manifest: the driver Deployment spawns ephemeral worker pods
# (RBAC: pods/*), both using our sail-goldenmatch image. Image is substituted
# at apply time from $SAIL_IMAGE.
apiVersion: v1
kind: Namespace
metadata:
  name: sail
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sail-user
  namespace: sail
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sail-spark-server
  namespace: sail
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sail-spark-server
  namespace: sail
subjects:
  - kind: ServiceAccount
    name: sail-user
    namespace: sail
roleRef:
  kind: Role
  name: sail-spark-server
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sail-spark-server
  namespace: sail
  labels:
    app.kubernetes.io/name: sail
    app.kubernetes.io/component: spark-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sail
      app.kubernetes.io/component: spark-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sail
        app.kubernetes.io/component: spark-server
    spec:
      serviceAccountName: sail-user
      containers:
        - name: server
          image: ${SAIL_IMAGE}
          command: ["sail"]
          args: ["spark", "server", "--ip", "0.0.0.0", "--port", "50051"]
          ports:
            - containerPort: 50051
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
          env:
            - name: RUST_LOG
              value: info
            - name: SAIL_MODE
              value: "kubernetes-cluster"
            - name: SAIL_CLUSTER__DRIVER_LISTEN_HOST
              value: "0.0.0.0"
            - name: SAIL_CLUSTER__DRIVER_EXTERNAL_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: SAIL_KUBERNETES__IMAGE
              value: ${SAIL_IMAGE}
            - name: SAIL_KUBERNETES__NAMESPACE
              value: sail
            - name: SAIL_KUBERNETES__DRIVER_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: SAIL_KUBERNETES__WORKER_SERVICE_ACCOUNT_NAME
              value: sail-user
---
apiVersion: v1
kind: Service
metadata:
  name: sail-spark-server
  namespace: sail
  labels:
    app.kubernetes.io/name: sail
    app.kubernetes.io/component: spark-server
spec:
  selector:
    app.kubernetes.io/name: sail
    app.kubernetes.io/component: spark-server
  ports:
    - protocol: TCP
      port: 50051
      targetPort: 50051
