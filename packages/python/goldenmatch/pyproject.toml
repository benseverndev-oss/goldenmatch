[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "goldenmatch"

version = "3.9.0"
description = "Entity resolution toolkit — deduplicate records, match across sources, and maintain golden records"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [{ name = "Ben Severn", email = "ben@bensevern.dev" }]
keywords = ["entity-resolution", "deduplication", "record-linkage", "record-matching", "fuzzy-matching", "golden-record", "data-quality", "splink", "fellegi-sunter", "pprl", "jaro-winkler", "llm", "golden-suite"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Database",
    "Topic :: Scientific/Engineering :: Information Analysis",
    "Typing :: Typed",
]
dependencies = [
    "typer>=0.12",
    "rich>=13.0",
    "pyyaml>=6.0",
    "pydantic>=2.7",
    "rapidfuzz>=3.0",
    "jellyfish>=1.0",
    "numpy>=1.26",
    "openpyxl>=3.1",
    "textual>=1.0",
    "diptest>=0.5.2",
    "psutil>=5.9",
    "duckdb>=0.9",
    "pyarrow>=10",
    # Optional native acceleration runtime, shipped as a marker-guarded default
    # dependency so `pip install goldenmatch` auto-installs the abi3 kernel on the
    # platforms where prebuilt wheels exist. Kept ALSO as the `[native]` extra
    # (back-compat alias). The runtime loader degrades to pure-Python when absent.
    "goldenmatch-native>=0.1.0; sys_platform == 'darwin' or (sys_platform == 'win32' and platform_machine == 'AMD64') or (sys_platform == 'linux' and (platform_machine == 'x86_64' or platform_machine == 'aarch64'))",
]

[project.urls]
Homepage = "https://github.com/benseverndev-oss/goldenmatch"
Repository = "https://github.com/benseverndev-oss/goldenmatch"
Documentation = "https://github.com/benseverndev-oss/goldenmatch/tree/main/packages/python/goldenmatch#readme"
Issues = "https://github.com/benseverndev-oss/goldenmatch/issues"
Changelog = "https://github.com/benseverndev-oss/goldenmatch/blob/main/packages/python/goldenmatch/CHANGELOG.md"
Author = "https://bensevern.dev"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.6",
    "hypothesis>=6.0",
]
embeddings = [
    "sentence-transformers>=2.2",
    "faiss-cpu>=1.7",
]
# Decode adapters for the multimodal-ER crawl tier (ADR 0022). The perceptual
# kernel itself is dependency-free (operates on decoded luma grids / PCM); these
# only back core.perceptual.decode_image_to_luma / decode_audio_to_mono so an
# image-path / audio-path column can be hashed without a manual decode step.
vision = [
    "Pillow>=10.0",
]
# Document/image ingest (goldenmatch.documents): rasterize PDFs to page images
# for the VLM/OCR extractors. Pillow (also in `vision`) normalizes raster images.
documents = [
    "pymupdf>=1.24",
    "Pillow>=10.0",
]
audio = [
    "soundfile>=0.12",
]
# In-house trainable embedder: ONNX export + onnxruntime inference. The numpy
# forward pass works without these; they're needed only for .onnx export and the
# onnxruntime-backed inference path.
inhouse-embeddings = [
    "onnx>=1.22.0",
    "onnxruntime>=1.17",
]
llm = [
    "anthropic>=0.30",
    "openai>=1.30",
]
postgres = [
    "psycopg[binary]>=3.1",
    "psycopg-pool>=3.2",
    "alembic>=1.13",
]
mcp = [
    "mcp>=1.28.1",
]
# mp-spdz is a research crypto library not published to PyPI; users who need
# the pprl extra must install mp-spdz separately (see docs/pprl.md).
pprl = []
snowflake = [
    "snowflake-connector-python>=3.0",
]
bigquery = [
    "google-cloud-bigquery>=3.0",
]
databricks = [
    "databricks-sql-connector>=3.0",
]
salesforce = [
    "simple-salesforce>=1.12",
]
redshift = [
    "redshift-connector>=2.0",
]
s3 = [
    "boto3>=1.26",
]
gcs = [
    "google-cloud-storage>=2.10",
]
azure_blob = [
    "azure-storage-blob>=12.19",
]
sqlserver = [
    "pyodbc>=5.0",
]
mysql = [
    "pymysql>=1.1",
]
duckdb = [
    "duckdb>=0.9",
]
# Optional pgvector (Postgres) backend for the persistent vector index (#1088).
# Needs the `vector` extension in the target database (CREATE EXTENSION vector).
# DuckDB-HNSW is the in-tree default; pgvector is opt-in for a shared PG store.
pgvector = [
    "psycopg[binary]>=3.1",
    "pgvector>=0.3",
]
ray = [
    "ray>=2.0",
]
# Experimental DataFusion backend (spike: docs/superpowers/specs/
# 2026-05-30-datafusion-backend-spike-design.md). Opt-in via
# config.backend="datafusion". Apache Arrow query engine; pairs with
# goldenmatch-native for zero-Python-loop scoring.
datafusion = [
    "datafusion>=53,<54",
]
# Sail tier (distributed, Spark Connect). Spec: docs/superpowers/specs/
# 2026-06-03-sail-tier-design.md. Sail is programmed via PySpark/Spark
# Connect (NOT datafusion-python).
#
# pyspark PINNED < 4: pysail 0.6.x targets the Spark 3.5 Connect protocol, and
# the unbounded `>=3.5` resolved to pyspark 4.2.0, whose Spark Connect client
# does `int(local_relation_size_limit)` on a size-suffixed config ("3GB") and
# raises ValueError -- breaking the whole sail lane (test_sail_score_parity).
# This is the pinning the comment above always anticipated. Revisit the upper
# bound when pysail ships a Spark-4-Connect-compatible release.
sail = [
    "pysail>=0.6",
    "pyspark[connect]>=3.5,<4",
    # pyspark 3.5.x imports the stdlib `distutils`, which Python 3.12 REMOVED.
    # setuptools ships the `distutils` shim (activated by its
    # distutils-precedence .pth), so importing it restores `import distutils`
    # on 3.12 -- the sail lane runs on 3.12 and otherwise dies at Spark Connect
    # session setup with `ModuleNotFoundError: No module named 'distutils'`.
    # Drop when pyspark >= 4 (Spark-4-Connect) is usable and no longer needs it.
    "setuptools>=83.0.0; python_version >= '3.12'",
]
agent = [
    "aiohttp>=3.14.0",
]
# D6: polars is OPTIONAL. The engine is arrow-native (pyarrow is the hard
# dep); installing this extra lights up the polars-present WALL
# optimizations (golden fast columnar, vectorized survivorship, the
# 100M-pair join in ClusterPairScores) and the GOLDENMATCH_FRAME=polars
# classic lane. The zero-polars gate (tests/test_zero_polars_gate.py)
# proves the covered engine without it.
polars = [
    "polars>=1.0",
]
quality = [
    "goldencheck[polars]>=3.0.0",  # cell_quality / functional_dependencies / scan_dataframe take a pl.DataFrame -> goldencheck's [polars] path; NOT [baseline] (no scipy stat/drift features used)
]
transform = [
    "goldenflow>=1.0.0",
]
# Optional native acceleration runtime (compiled Rust/PyO3 abi3 wheel, shipped
# separately, polars / polars-runtime style). goldenmatch.core._native_loader
# discovers it automatically; absent it, the pure-Python paths run unchanged.
# Kept out of `all` (compiled, platform-specific — like `ray`/`duckdb`).
native = [
    "goldenmatch-native>=0.1.0",
]
# Optional Lance-backed base store for out-of-core incremental / match_one
# candidate retrieval. Spec: docs/superpowers/specs/
# 2026-06-13-lance-match-one-base-store-design.md. goldenmatch.core.candidate_store
# imports lance lazily; absent it, the in-memory store runs unchanged.
lance = [
    "pylance>=0.20",
]
# Local GGUF embeddings + LLM judge via llama.cpp (offline, no cloud/torch).
# Embeddings: model='llama:/path.gguf'. LLM scoring: point GOLDENMATCH_LLM_BASE_URL
# at a llama-server / llamafile (OpenAI-compatible). Both lazy-imported.
llama = [
    "llama-cpp-python>=0.3",
]
web = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.29",
    "httpx>=0.27",  # used by TestClient and tests
    "python-multipart>=0.0.9",
]
# Head-to-head accuracy panel (probabilistic vs Splink). Loads datasets via
# splink_datasets (ships with splink) with a vendored-parquet fallback.
bench = [
    "splink>=4.0",
    "duckdb>=0.10",
    "pyarrow>=15",  # splink 4.x requires pyarrow>=15 (stricter than core >=10)
]
all = [
    "goldenmatch[embeddings,llm,postgres,mcp,polars,quality,transform,web,vision,audio]",
]

[tool.hatch.build.targets.wheel]
packages = ["goldenmatch"]

# `packages = ["goldenmatch"]` already collects everything inside
# goldenmatch/, including web/static/. A force-include here would re-add
# the same files and PyPI rejects the wheel with "Duplicate filename in
# local headers" (this caused the v1.7.0 publish to fail).
#
# The publish workflow runs scripts/build_web.py before `python -m build`
# so the static dir contains the staged frontend at wheel-build time —
# packages picks them up automatically.

[project.scripts]
goldenmatch = "goldenmatch.cli.main:app"

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "benchmark: integration tests against real benchmark datasets (skipped by default; run with `pytest -m benchmark`)",
    "keep_real_refuse_at_n: opt out of the test_controller_confidence_gate autouse REFUSE_AT_N monkeypatch (#433)",
    "slow: longer in-process dedupe / subprocess runs (the #510 QIS harness band/determinism/native-parity tests)",
]

[tool.coverage.run]
source = ["goldenmatch"]
omit = [
    # Requires Postgres -- tested via test_db.py/test_reconcile.py (ignored in CI)
    "goldenmatch/db/*",
    # Requires MCP runtime
    "goldenmatch/mcp/*",
    # Requires GCP credentials
    "goldenmatch/core/vertex_embedder.py",
    # Requires Textual TUI runtime -- tested via test_tui.py
    "goldenmatch/tui/screens/*",
    "goldenmatch/tui/widgets/*",
    # REST API server -- tested separately
    "goldenmatch/api/*",
    # Cloud connectors -- require external credentials
    "goldenmatch/connectors/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.",
    "if TYPE_CHECKING:",
]
# Floor for the *overall* package. Per-module floors live in CI's coverage-gate
# step (see .github/workflows/ci.yml — "coverage_gate") so per-module
# regressions don't hide inside the global average.
fail_under = 70
show_missing = true
