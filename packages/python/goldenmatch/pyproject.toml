[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "goldenmatch"

version = "1.13.0"
description = "Entity resolution toolkit — deduplicate records, match across sources, and maintain golden records"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [{ name = "Ben Severn", email = "ben@bensevern.dev" }]
keywords = ["entity-resolution", "deduplication", "record-matching", "golden-record", "data-quality"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Database",
    "Topic :: Scientific/Engineering :: Information Analysis",
    "Typing :: Typed",
]
dependencies = [
    "polars>=1.0",
    "typer>=0.12",
    "rich>=13.0",
    "pyyaml>=6.0",
    "pydantic>=2.7",
    "rapidfuzz>=3.0",
    "jellyfish>=1.0",
    "numpy>=1.26",
    "openpyxl>=3.1",
    "textual>=1.0",
    "diptest>=0.5.2",
]

[project.urls]
Homepage = "https://github.com/benzsevern/goldenmatch"
Repository = "https://github.com/benzsevern/goldenmatch"
Documentation = "https://github.com/benzsevern/goldenmatch/tree/main/packages/python/goldenmatch#readme"
Issues = "https://github.com/benzsevern/goldenmatch/issues"
Changelog = "https://github.com/benzsevern/goldenmatch/blob/main/packages/python/goldenmatch/CHANGELOG.md"
Author = "https://bensevern.dev"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.6",
    "hypothesis>=6.0",
]
embeddings = [
    "sentence-transformers>=2.2",
    "faiss-cpu>=1.7",
]
llm = [
    "anthropic>=0.30",
    "openai>=1.30",
]
postgres = [
    "psycopg2-binary>=2.9",
]
mcp = [
    "mcp>=1.0",
]
# mp-spdz is a research crypto library not published to PyPI; users who need
# the pprl extra must install mp-spdz separately (see docs/pprl.md).
pprl = []
snowflake = [
    "snowflake-connector-python>=3.0",
]
bigquery = [
    "google-cloud-bigquery>=3.0",
]
databricks = [
    "databricks-sql-connector>=3.0",
]
salesforce = [
    "simple-salesforce>=1.12",
]
duckdb = [
    "duckdb>=0.9",
]
ray = [
    "ray>=2.0",
]
agent = [
    "aiohttp>=3.9",
]
quality = [
    "goldencheck>=0.5.0",
]
transform = [
    "goldenflow>=1.0.0",
]
web = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.29",
    "httpx>=0.27",  # used by TestClient and tests
]
all = [
    "goldenmatch[embeddings,llm,postgres,mcp,quality,transform,web]",
]

[tool.hatch.build.targets.wheel]
packages = ["goldenmatch"]

# `packages = ["goldenmatch"]` already collects everything inside
# goldenmatch/, including web/static/. A force-include here would re-add
# the same files and PyPI rejects the wheel with "Duplicate filename in
# local headers" (this caused the v1.7.0 publish to fail).
#
# The publish workflow runs scripts/build_web.py before `python -m build`
# so the static dir contains the staged frontend at wheel-build time —
# packages picks them up automatically.

[project.scripts]
goldenmatch = "goldenmatch.cli.main:app"

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "benchmark: integration tests against real benchmark datasets (skipped by default; run with `pytest -m benchmark`)",
]

[tool.coverage.run]
source = ["goldenmatch"]
omit = [
    # Requires Postgres -- tested via test_db.py/test_reconcile.py (ignored in CI)
    "goldenmatch/db/*",
    # Requires MCP runtime
    "goldenmatch/mcp/*",
    # Requires GCP credentials
    "goldenmatch/core/vertex_embedder.py",
    # Requires Textual TUI runtime -- tested via test_tui.py
    "goldenmatch/tui/screens/*",
    "goldenmatch/tui/widgets/*",
    # REST API server -- tested separately
    "goldenmatch/api/*",
    # Cloud connectors -- require external credentials
    "goldenmatch/connectors/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.",
    "if TYPE_CHECKING:",
]
# Floor for the *overall* package. Per-module floors live in CI's coverage-gate
# step (see .github/workflows/ci.yml — "coverage_gate") so per-module
# regressions don't hide inside the global average.
fail_under = 70
show_missing = true
