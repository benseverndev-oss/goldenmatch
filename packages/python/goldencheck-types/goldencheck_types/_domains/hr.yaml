description: "HR / employee — employee ids, job titles, departments, compensation, hire dates, employment status, org hierarchy, performance"

types:
  employee_id:
    name_hints: ["employee_id", "emp_id", "staff_id", "worker_id", "personnel_id"]
    value_signals:
      min_unique_pct: 0.90
    suppress: ["cardinality", "pattern_consistency", "drift_detection"]

  job_title:
    name_hints: ["job_title", "designation"]
    value_signals:
      max_unique: 50
    suppress: ["uniqueness", "range_distribution"]

  department:
    name_hints: ["department", "dept", "division"]
    value_signals:
      max_unique: 30
    suppress: ["uniqueness", "range_distribution"]

  salary:
    name_hints: ["salary", "compensation", "annual_salary", "base_salary", "ctc"]
    value_signals:
      numeric: true
    suppress: ["pattern_consistency"]

  pay_grade:
    name_hints: ["pay_grade", "job_level"]
    value_signals:
      max_unique: 20
    suppress: ["uniqueness", "range_distribution"]

  hire_date:
    name_hints: ["hire_date", "join_date", "joining_date", "date_of_joining", "doj"]
    suppress: ["pattern_consistency", "uniqueness"]

  employment_status:
    name_hints: ["employment_status", "employee_status", "employment_type", "status"]
    value_signals:
      max_unique: 15
    suppress: ["uniqueness", "range_distribution"]

  manager:
    name_hints: ["manager", "supervisor", "reports_to", "reporting_manager"]
    value_signals:
      mixed_case: true
    suppress: ["pattern_consistency"]

  performance_rating:
    name_hints: ["performance", "performance_score", "performance_rating", "appraisal"]
    value_signals:
      max_unique: 15
    suppress: ["uniqueness", "range_distribution"]

  work_arrangement:
    name_hints: ["remote_work", "work_mode", "work_location"]
    value_signals:
      max_unique: 15
    suppress: ["uniqueness", "range_distribution"]

  tenure:
    name_hints: ["tenure", "years_of_service"]
    value_signals:
      numeric: true
    suppress: ["pattern_consistency"]
