[project]
name = "goldenpipe"
version = "1.2.1"
description = "Pluggable pipeline framework for data quality workflows"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
authors = [{ name = "Ben Severn", email = "ben@bensevern.dev" }]
keywords = ["pipeline", "orchestration", "data-quality", "data-validation", "data-transformation", "entity-resolution", "polars"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "License :: OSI Approved :: MIT License",
    "Typing :: Typed",
]
dependencies = [
    "polars>=1.0",
    "typer>=0.12",
    "rich>=13.0",
    "pydantic>=2.7",
    "pyyaml>=6.0",
    "goldencheck-types",
    "infermap",
]

[project.optional-dependencies]
check = ["goldencheck>=0.5.0"]
flow = ["goldenflow>=0.1.0"]
match = ["goldenmatch>=1.2.0"]
golden-suite = ["goldencheck>=0.5.0", "goldenflow>=0.1.0", "goldenmatch>=1.2.0"]
tui = ["textual>=1.0"]
api = ["fastapi>=0.110", "uvicorn>=0.30"]
mcp = ["mcp>=1.0"]
agent = ["aiohttp>=3.14.0"]
all = ["goldenpipe[golden-suite,tui,api,mcp,agent]"]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23", "pytest-aiohttp>=1.0", "httpx>=0.27", "ruff>=0.6", "pytest-cov>=5.0"]

[project.scripts]
goldenpipe = "goldenpipe.cli.main:app"

[project.urls]
Homepage = "https://github.com/benseverndev-oss/goldenmatch"
Repository = "https://github.com/benseverndev-oss/goldenmatch"
Documentation = "https://github.com/benseverndev-oss/goldenmatch/tree/main/packages/python/goldenpipe#readme"
Issues = "https://github.com/benseverndev-oss/goldenmatch/issues"
Changelog = "https://github.com/benseverndev-oss/goldenmatch/blob/main/packages/python/goldenpipe/CHANGELOG.md"
Author = "https://bensevern.dev"

[project.entry-points."goldenpipe.stages"]
"goldencheck.scan" = "goldenpipe.adapters.check:ScanStage"
"goldenflow.transform" = "goldenpipe.adapters.flow:TransformStage"
"goldenmatch.dedupe" = "goldenpipe.adapters.match:DedupeStage"
"goldenmatch.identity_resolve" = "goldenpipe.adapters.identity:IdentityResolveStage"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
