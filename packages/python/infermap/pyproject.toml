[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "infermap"
version = "0.4.0"
description = "Inference-driven schema mapping engine"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [{ name = "Ben Severn", email = "ben@bensevern.dev" }]
keywords = ["schema", "mapping", "etl", "data-engineering"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    "polars>=1.0",
    "rapidfuzz>=3.0",
    "scipy>=1.11",
    "pyyaml>=6.0",
    "typer>=0.12",
    "goldencheck-types",
]

[project.optional-dependencies]
postgres = ["psycopg2-binary>=2.9"]
mysql = ["mysql-connector-python>=8.0"]
duckdb = ["duckdb>=0.9"]
excel = ["openpyxl>=3.1"]
llm = ["openai>=1.30", "anthropic>=0.30"]
all = ["infermap[postgres,mysql,duckdb,excel,llm]"]
mcp = ["mcp>=1.0"]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.6"]

[project.scripts]
infermap = "infermap.cli:app"

[project.urls]
Homepage = "https://github.com/benseverndev-oss/goldenmatch"
Repository = "https://github.com/benseverndev-oss/goldenmatch"
Documentation = "https://github.com/benseverndev-oss/goldenmatch/tree/main/packages/python/infermap#readme"
Issues = "https://github.com/benseverndev-oss/goldenmatch/issues"
Changelog = "https://github.com/benseverndev-oss/goldenmatch/blob/main/packages/python/infermap/CHANGELOG.md"
Author = "https://bensevern.dev"

[tool.pytest.ini_options]
testpaths = ["tests"]

