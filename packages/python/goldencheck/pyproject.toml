[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "goldencheck"
version = "1.3.0"
description = "Data validation that discovers rules from your data so you don't have to write them"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [{ name = "Ben Severn", email = "ben@bensevern.dev" }]
keywords = ["data-validation", "data-quality", "profiling", "data-checks", "data-profiling", "llm", "tui", "csv", "parquet", "baseline", "drift-detection", "statistical-profiling"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Database",
    "Topic :: Scientific/Engineering :: Information Analysis",
    "Typing :: Typed",
]
dependencies = [
    "polars>=1.0",
    "typer>=0.12",
    "rich>=13.0",
    "pyyaml>=6.0",
    "pydantic>=2.7",
    "openpyxl>=3.1",
    "textual>=1.0",
    "goldencheck-types",
]

[project.urls]
Homepage = "https://github.com/benseverndev-oss/goldenmatch"
Repository = "https://github.com/benseverndev-oss/goldenmatch"
Documentation = "https://github.com/benseverndev-oss/goldenmatch/tree/main/packages/python/goldencheck#readme"
Issues = "https://github.com/benseverndev-oss/goldenmatch/issues"
Changelog = "https://github.com/benseverndev-oss/goldenmatch/blob/main/packages/python/goldencheck/CHANGELOG.md"
Author = "https://bensevern.dev"

[project.scripts]
goldencheck = "goldencheck.cli.main:app"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.6",
]
llm = [
    "anthropic>=0.30",
    "openai>=1.30",
]
db = [
    "connectorx>=0.3",
]
mcp = [
    "mcp>=1.0",
]
agent = [
    "aiohttp>=3.14.0",
]
baseline = [
    "scipy>=1.11",
    "numpy>=1.26",
]
native = [
    # Optional Rust/PyO3 acceleration for the CPU-bound deep-profiling kernels
    # (Benford, composite-key & functional-dependency mining). goldencheck stays
    # pure-Python and falls back automatically when this isn't installed; see
    # goldencheck/core/_native_loader.py. pyarrow is the Arrow C Data Interface
    # bridge the kernels read through.
    "goldencheck-native>=0.1.0",
    "pyarrow>=14",
]
semantic = [
    "sentence-transformers>=2.2",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
