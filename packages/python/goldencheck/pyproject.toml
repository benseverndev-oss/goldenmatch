[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "goldencheck"
version = "3.0.1"
description = "Data validation that discovers rules from your data so you don't have to write them"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [{ name = "Ben Severn", email = "ben@bensevern.dev" }]
keywords = ["data-validation", "data-quality", "profiling", "data-checks", "data-profiling", "llm", "tui", "csv", "parquet", "baseline", "drift-detection", "statistical-profiling", "great-expectations", "pandera", "data-observability", "golden-suite"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Database",
    "Topic :: Scientific/Engineering :: Information Analysis",
    "Typing :: Typed",
]
dependencies = [
    # Polars is NOT a base dep. In 2.0.0 it moved to the [polars] extra; in 3.0.0
    # the default scan path is Arrow-native (the fused Rust/Arrow seam), so polars
    # is only needed for the opt-in [baseline] stat/drift features and the
    # scan_dataframe(pl.DataFrame) convenience overload ([polars] extra).
    # pyarrow is a BASE dep in 3.0.0 -- the scan frame is a pyarrow.Table and every
    # scan routes through the Arrow seam. The compiled goldencheck-native kernel
    # ([native] extra) accelerates the numeric/sequence/date/regex checks and the
    # profilers self-skip those when it is absent (same pattern as 2.x).
    "pyarrow>=14",
    "typer>=0.12",
    "rich>=13.0",
    "pyyaml>=6.0",
    "pydantic>=2.7",
    "openpyxl>=3.1",
    "textual>=1.0",
    "goldencheck-types",
    # Fast C Levenshtein for the fuzzy_values / cell_quality Python path (the
    # fallback when goldencheck-native is absent). Same pin as the rest of the
    # suite (goldenmatch/goldenflow). ~38x over the pure-Python DP it replaced.
    "rapidfuzz>=3.0",
]

[project.urls]
Homepage = "https://github.com/benseverndev-oss/goldenmatch"
Repository = "https://github.com/benseverndev-oss/goldenmatch"
Documentation = "https://github.com/benseverndev-oss/goldenmatch/tree/main/packages/python/goldencheck#readme"
Issues = "https://github.com/benseverndev-oss/goldenmatch/issues"
Changelog = "https://github.com/benseverndev-oss/goldenmatch/blob/main/packages/python/goldencheck/CHANGELOG.md"
Author = "https://bensevern.dev"

[project.scripts]
goldencheck = "goldencheck.cli.main:app"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.6",
]
llm = [
    "anthropic>=0.30",
    "openai>=1.30",
]
db = [
    "connectorx>=0.3",
]
mcp = [
    "mcp>=1.0",
]
agent = [
    "aiohttp>=3.14.0",
]
baseline = [
    # The baseline statistics + drift + correlation subsystems are opt-in and still
    # run on Polars (group_by/pivot/join) + scipy. 3.0.0 gates them here rather than
    # porting them off Polars -- installing [baseline] pulls the polars they need.
    "scipy>=1.11",
    "numpy>=1.26",
    "polars>=1.0",
]
native = [
    # Optional Rust/PyO3 acceleration for the CPU-bound deep-profiling kernels
    # (Benford, composite-key & functional-dependency mining). goldencheck stays
    # pure-Python and falls back automatically when this isn't installed; see
    # goldencheck/core/_native_loader.py. pyarrow is the Arrow C Data Interface
    # bridge the kernels read through.
    "goldencheck-native>=0.1.0",
    "pyarrow>=14",
]
semantic = [
    "sentence-transformers>=2.2",
]
parquet = ["pyarrow>=14"]
polars = ["polars>=1.0"]

[tool.pytest.ini_options]
testpaths = ["tests"]
