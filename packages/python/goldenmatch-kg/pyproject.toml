[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "goldenmatch-kg"
version = "0.1.0"
description = "Drop-in goldenmatch entity resolution for knowledge-graph frameworks (neo4j-graphrag, LlamaIndex, Graphiti)."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
dependencies = ["goldenmatch>=2.1.0", "polars>=1.0.0"]

[project.optional-dependencies]
neo4j-graphrag = ["neo4j-graphrag>=1.7.0"]
llamaindex = ["llama-index-core>=0.12.0"]
graphiti = ["graphiti-core>=0.10.0"]

[tool.hatch.build.targets.wheel]
packages = ["goldenmatch_kg"]
