[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "goldenmatch-kg"
version = "0.1.0"
description = "Drop-in goldenmatch entity resolution for knowledge-graph frameworks (neo4j-graphrag, LlamaIndex, Graphiti)."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
dependencies = ["goldenmatch>=2.1.0", "polars>=1.0.0"]

[project.optional-dependencies]
# Floors are the versions the `goldenmatch-kg` CI lane actually tests against
# (the bindings are verified only there). graphiti-core exposes no __version__,
# so its floor stays a conservative best-guess; the lane confirms the binding works.
neo4j-graphrag = ["neo4j-graphrag>=1.17.0"]   # tested 1.17.0
llamaindex = ["llama-index-core>=0.14.22"]    # tested 0.14.22
graphiti = ["graphiti-core>=0.10.0"]          # tested (version unknown; __version__ not exposed)

[tool.hatch.build.targets.wheel]
packages = ["goldenmatch_kg"]
