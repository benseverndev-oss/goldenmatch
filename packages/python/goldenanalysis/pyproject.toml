[project]
name = "goldenanalysis"
version = "0.1.0"
description = "Read-only cross-cutting analysis, metrics, and reporting engine for the Golden Suite"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
authors = [{ name = "Ben Severn", email = "ben@bensevern.dev" }]
keywords = ["analysis", "metrics", "reporting", "data-quality", "entity-resolution", "regression-detection", "polars", "drift-detection", "golden-suite"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "License :: OSI Approved :: MIT License",
    "Typing :: Typed",
]
dependencies = [
    "polars>=1.0",
    "pydantic>=2.7",
    "typer>=0.12",
    "rich>=13.0",
    "pyarrow>=15",
]

[project.optional-dependencies]
match = ["goldenmatch>=1.15.0"]
check = ["goldencheck>=1.2.0"]
flow = ["goldenflow>=1.1.5"]
pipe = ["goldenpipe>=1.2.0"]
suite = ["goldenanalysis[match,check,flow,pipe]"]
# Optional Rust accelerator (analysis-core/analysis-native crates, Phase 4). The
# matching `[tool.uv.sources] goldenanalysis-native = { path = ... }` at the repo
# root lets `uv sync` resolve this workspace-locally without PyPI -- the extra +
# the path source land in LOCKSTEP (see packages/python/CLAUDE.md, the
# goldenmatch[native] uv-sync bite).
native = ["goldenanalysis-native>=0.1.0"]
mcp = ["mcp>=1.0"]
api = ["fastapi>=0.110", "uvicorn>=0.30"]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.6"]

[project.scripts]
goldenanalysis = "goldenanalysis.cli.main:app"

[project.urls]
Homepage = "https://github.com/benseverndev-oss/goldenmatch"
Repository = "https://github.com/benseverndev-oss/goldenmatch"
Documentation = "https://github.com/benseverndev-oss/goldenmatch/tree/main/packages/python/goldenanalysis#readme"
Issues = "https://github.com/benseverndev-oss/goldenmatch/issues"
Changelog = "https://github.com/benseverndev-oss/goldenmatch/blob/main/packages/python/goldenanalysis/CHANGELOG.md"
Author = "https://bensevern.dev"

[project.entry-points."goldenanalysis.analyzers"]
"frame.summary" = "goldenanalysis.analyzers.frame_summary:FrameSummaryAnalyzer"
"match.rates" = "goldenanalysis.analyzers.match_rates:MatchRatesAnalyzer"
"cluster.distribution" = "goldenanalysis.analyzers.cluster_dist:ClusterDistributionAnalyzer"
"quality.rollup" = "goldenanalysis.analyzers.quality_rollup:QualityRollupAnalyzer"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
testpaths = ["tests"]
