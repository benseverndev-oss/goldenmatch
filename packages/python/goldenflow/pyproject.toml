[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "goldenflow"
version = "1.1.2"
description = "Data transformation toolkit — standardize, reshape, and normalize messy data before it hits your pipeline."
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [{ name = "Ben Severn", email = "ben@bensevern.dev" }]
keywords = ["data-transformation", "data-quality", "etl", "standardization", "normalization", "data-cleaning", "polars"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "License :: OSI Approved :: MIT License",
    "Typing :: Typed",
]
dependencies = [
    "polars>=1.0",
    "pydantic>=2.7",
    "typer>=0.12",
    "rich>=13.0",
    "textual>=0.50",
    "fastapi>=0.110",
    "python-multipart>=0.0.20",
    "uvicorn>=0.30",
    "phonenumbers>=8.13",
    "python-dateutil>=2.9",
    "pyyaml>=6.0",
    "rapidfuzz>=3.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.6", "httpx>=0.27", "python-multipart>=0.0.20"]
check = ["goldencheck>=1.0"]
excel = ["openpyxl>=3.1"]
db = ["connectorx>=0.3"]
mcp = ["mcp>=1.0"]
llm = ["anthropic>=0.30", "openai>=1.30"]
s3 = ["boto3>=1.34"]
gcs = ["google-cloud-storage>=2.14"]
agent = ["aiohttp>=3.9"]
all = ["goldenflow[check,excel,db,mcp,agent,s3,gcs]"]

[project.scripts]
goldenflow = "goldenflow.cli.main:app"

[project.urls]
Homepage = "https://github.com/benzsevern/goldenmatch"
Repository = "https://github.com/benzsevern/goldenmatch"
Documentation = "https://github.com/benzsevern/goldenmatch/tree/main/packages/python/goldenflow#readme"
Issues = "https://github.com/benzsevern/goldenmatch/issues"
Changelog = "https://github.com/benzsevern/goldenmatch/blob/main/packages/python/goldenflow/CHANGELOG.md"
Author = "https://bensevern.dev"

[tool.pytest.ini_options]
testpaths = ["tests"]
