# Standalone workspace: a thin wasm-bindgen wrapper over goldenmatch-suggest-core,
# so the JS/TS healer surface consumes the SAME suggestion kernel as the Python
# -native wheel (one source of truth, no hand-maintained parallel rules). No
# `arrow` feature -> the wasm build carries no Arrow (arrow does not build for
# wasm32); the always-compiled `suggest_from_json` holds the identical math.
[workspace]

[package]
name = "goldenmatch-suggest-wasm"
version = "0.1.0"
edition = "2021"
license = "MIT"
authors = ["Ben Severn <benzsevern@gmail.com>"]
description = "wasm-bindgen wrapper over goldenmatch-suggest-core for the JS/TS healer port"

[lib]
crate-type = ["cdylib"]

[dependencies]
wasm-bindgen = "0.2"
goldenmatch-suggest-core = { path = "../suggest-core" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[profile.release]
opt-level = "s"   # optimize for small wasm size
lto = true

# wasm-opt (binaryen) is an extra size pass that wasm-pack runs after the build.
# It downloads a binaryen release at build time, which is unavailable in
# network-restricted CI sandboxes. opt-level="s"+lto already give a small wasm;
# disable the post-pass so the build is hermetic (no network fetch).
[package.metadata.wasm-pack.profile.release]
wasm-opt = false
