# Standalone workspace: a thin wasm-bindgen wrapper over `goldenhnsw`, so the
# JS/TS port consumes the SAME native HNSW kernel as the Python wheel and the
# Rust core (one source of truth, byte-identical inner-product semantics). No C
# deps, no rayon -> a clean wasm32-unknown-unknown build. Mirrors the sibling
# `autoconfig-wasm` / `score-wasm` crates.
[workspace]

[package]
name = "goldenhnsw-wasm"
version = "0.1.0"
edition = "2021"
license = "MIT"
authors = ["Ben Severn <benzsevern@gmail.com>"]
description = "wasm-bindgen wrapper over goldenhnsw (native HNSW) for the JS/TS port"

[lib]
crate-type = ["cdylib"]

[dependencies]
wasm-bindgen = "0.2"
goldenhnsw = { path = "../goldenhnsw" }

[profile.release]
opt-level = "s"   # optimize for small wasm size
lto = true

# wasm-opt (binaryen) is an extra size pass wasm-pack runs post-build; it
# downloads a binaryen release at build time, unavailable in network-restricted
# CI sandboxes. opt-level="s"+lto already give a small wasm; disable the pass so
# the build is hermetic (no network fetch). Same rationale as autoconfig-wasm.
[package.metadata.wasm-pack.profile.release]
wasm-opt = false
