# Standalone workspace (empty [workspace]) so pyo3's `extension-module` feature
# is not unified with the bridge crate's `auto-initialize` feature — the two are
# mutually incompatible. Mirrors packages/rust/extensions/native (goldenmatch).
[workspace]

[package]
name = "goldenflow-native"
version = "0.7.0"
edition = "2021"
license = "MIT"
authors = ["Ben Severn <benzsevern@gmail.com>"]
description = "Native acceleration kernels for GoldenFlow (PyO3 extension module)"

[lib]
# Produces lib_native.so; maturin installs it as goldenflow_native/_native.
# The #[pymodule] is `_native`, so the init symbol is PyInit__native.
name = "_native"
crate-type = ["cdylib"]

[dependencies]
# abi3-py311: one stable-ABI artifact spans CPython 3.11-3.13.
# extension-module: don't link libpython (this .so is imported BY CPython).
pyo3 = { version = ">=0.28, <0.29", features = ["extension-module", "abi3-py311"] }
# Arrow C Data Interface for zero-copy kernel input/output (Utf8 / LargeUtf8
# string buffers in, string/int/bool buffers out). default features off — we
# only read/build array buffers, no csv/ipc/json/compute.
arrow = { version = "59", default-features = false, features = ["pyarrow"] }
# Dates are intentionally NOT a native kernel: GoldenFlow's Polars fast path
# (str.to_date coalesce) already resolves the 4-digit-year formats in vectorized
# Rust, and a per-row chrono parser would be slower while reintroducing the
# 2-digit-year parity hazard. The ragged date tail stays on dateutil.
#
# Owned reference kernels (pure phone logic). native-flow is now a marshaling
# shim: Arrow in/out + GIL release here, the actual computation in the core.
goldenflow-core = { path = "../goldenflow-core" }

[profile.release]
opt-level = 3
lto = "thin"
