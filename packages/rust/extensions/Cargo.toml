[workspace]
resolver = "2"
members = [
    "bridge",
]
exclude = [
    "postgres",
    "native",
    # goldencheck-native is a standalone workspace (abi3 ext-module, like
    # `native`); goldencheck-core is its pyo3-free path dependency. Neither
    # belongs in the `bridge` workspace.
    "goldencheck-native",
    "goldencheck-core",
    "native-flow",
    # analysis-native is a standalone abi3 ext-module workspace (like the above);
    # analysis-core is its pyo3-free path dependency. GoldenAnalysis's optional
    # accelerator (goldenanalysis[native]); neither belongs in `bridge`.
    "analysis-native",
    "analysis-core",
    # graph-layout is a standalone demo binary (Barnes-Hut + multilevel force
    # layout → frames). Heavy/optional; its own workspace, kept out of the
    # default rust build.
    "graph-layout",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT"
authors = ["Ben Severn <benzsevern@gmail.com>"]
repository = "https://github.com/benseverndev-oss/goldenmatch"
homepage = "https://github.com/benseverndev-oss/goldenmatch"
