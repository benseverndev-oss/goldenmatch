[workspace]
resolver = "2"
members = [
    "bridge",
]
exclude = [
    "postgres",
    "native",
    # goldencheck-native is a standalone workspace (abi3 ext-module, like
    # `native`); goldencheck-core is its pyo3-free path dependency. Neither
    # belongs in the `bridge` workspace.
    "goldencheck-native",
    "goldencheck-core",
    "native-flow",
    # goldenflow-core is native-flow's pyo3-free path dependency (standalone
    # workspace, like score-core/goldencheck-core). Not a bridge member.
    "goldenflow-core",
    # goldenflow-duckdb is a cdylib DuckDB loadable extension over goldenflow-core
    # (zero-Python SQL surface). Its own [workspace] + special DuckDB linking keep
    # it out of the bridge build, like native-flow.
    "goldenflow-duckdb",
    # analysis-native is a standalone abi3 ext-module workspace (like the above);
    # analysis-core is its pyo3-free path dependency. GoldenAnalysis's optional
    # accelerator (goldenanalysis[native]); neither belongs in `bridge`.
    "analysis-native",
    "analysis-core",
    # goldengraph-native is a standalone abi3 ext-module workspace (like the
    # above); goldengraph-core is its pyo3-free path dependency (and carries its
    # own empty [workspace], so it self-isolates). Neither belongs in `bridge`.
    "goldengraph-native",
    # graph-layout is a standalone demo binary (Barnes-Hut + multilevel force
    # layout → frames). Heavy/optional; its own workspace, kept out of the
    # default rust build.
    "graph-layout",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT"
authors = ["Ben Severn <benzsevern@gmail.com>"]
repository = "https://github.com/benseverndev-oss/goldenmatch"
homepage = "https://github.com/benseverndev-oss/goldenmatch"
