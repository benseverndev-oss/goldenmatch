# Standalone workspace (isolated from the pyo3 crates).
[workspace]

[package]
name = "goldenembed"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Local embedding runtime for GoldenMatch: char n-gram featurize + ONNX inference"

[lib]
name = "goldenembed"
path = "src/lib.rs"

[[bin]]
name = "goldenembed"
path = "src/main.rs"

[dependencies]
ort = "2.0.0-rc.10"
blake2 = "0.10"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"

[profile.release]
opt-level = 3
