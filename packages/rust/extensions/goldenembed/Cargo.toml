# Standalone workspace (isolated from the pyo3 crates).
[workspace]

[package]
name = "goldenembed"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Local embedding runtime for GoldenMatch: char n-gram featurize + native linear projection (optional ONNX)"

[lib]
name = "goldenembed"
path = "src/lib.rs"

[[bin]]
name = "goldenembed"
path = "src/main.rs"

[features]
# Default = native: the projection is a matmul over weights.npz (no ONNX
# Runtime), so consumers (postgres / datafusion-udf / embed-py) stop linking the
# native ort/libonnxruntime dep. `onnx` re-adds the legacy `model.onnx` backend
# via `ort` for onnx-only deployments that ship no weights.npz.
default = []
onnx = ["dep:ort"]

[dependencies]
# The pure compute core (featurizer + projection head) — shared with the wasm
# edge surface, so the featurizer + matmul live in exactly one place.
goldenembed-core = { path = "../goldenembed-core" }
# ONNX Runtime backend — optional (behind the `onnx` feature). Not built by
# default; the native weights.npz matmul path replaces it.
ort = { version = "2.0.0-rc.10", optional = true }
blake2 = "0.10"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
redb = "3"
sha2 = "0.10"
zip = { version = "8", default-features = false, features = ["deflate"] }

[profile.release]
opt-level = 3
