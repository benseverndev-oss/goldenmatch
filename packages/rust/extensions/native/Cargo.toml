# Standalone workspace (empty [workspace]) so pyo3's `extension-module` feature
# here is NOT unified with the `bridge` crate's `auto-initialize` feature — the
# two are mutually incompatible (ext-module must NOT link libpython; embedding
# must). Mirrors why `postgres` is excluded from the bridge workspace.
[workspace]

[package]
name = "goldenmatch-native"
version = "0.1.12"
edition = "2021"
license = "MIT"
authors = ["Ben Severn <benzsevern@gmail.com>"]
description = "Native acceleration kernels for GoldenMatch (PyO3 extension module)"

[lib]
# Produces lib_native.so; renamed to goldenmatch/_native.abi3.so at install.
# The #[pymodule] is `_native`, so the init symbol is PyInit__native.
name = "_native"
crate-type = ["cdylib"]

[features]
default = ["extension-module"]
extension-module = ["pyo3/extension-module"]

[dependencies]
# abi3-py311: one stable-ABI artifact spans CPython 3.11-3.13.
# extension-module is a DEFAULT feature (not always-on) so `cargo test
# --no-default-features` can link the test binary against libpython. maturin
# (native_wheel lane) and scripts/build_native.py both build with default
# features, so the shipped wheel/.so still gets extension-module. See the
# pyo3 FAQ "I can't run cargo test".
pyo3 = { version = ">=0.28, <0.29", features = ["abi3-py311"] }
# BLAKE2b for the char-n-gram feature hashing kernel — must match Python
# hashlib.blake2b(digest_size=8) byte-for-byte (see featurize.rs).
blake2 = "0.10"
# Canonical record fingerprint canonicalizer (sha256 + JSON parsing live here),
# shared pyo3-free with the pgrx `postgres` crate so both compute the same id.
goldenmatch-fingerprint-core = { path = "../fingerprint-core" }
# Canonical string scorers (jaro_winkler / levenshtein / token_sort / score_one),
# shared pyo3-free with the `datafusion-udf` FFI crate so both surfaces score
# identically by construction. The #[pyfunction] scorers below are thin shims
# over this crate; score_one is re-imported verbatim.
goldenmatch-score-core = { path = "../score-core" }
# Pyo3-free graph kernels (dedup + connected components, columnar + scalar).
# The #[pyfunction] graph shims below delegate here so DuckDB/DataFusion and
# this extension module share one behavior-exact path.
goldenmatch-graph-core = { path = "../graph-core" }
# Pyo3-free MinHash/LSH sketch kernels (#1081). The sketch.rs shims delegate
# here; byte-identical with core/sketch.py and the TS port (shared golden vectors).
goldenmatch-sketch-core = { path = "../sketch-core" }
# Pyo3-free perceptual media-hash kernels (DCT image pHash + Haitsma-Kalker audio
# fingerprint, multimodal-ER crawl tier, ADR 0022). The perceptual.rs shims
# delegate here; byte-identical with core/perceptual.py (shared golden vectors).
goldenmatch-perceptual-core = { path = "../perceptual-core" }
# Autoconfig planner + column classifier — deterministic decisions shared
# across surfaces. Thin PyO3 shims in autoconfig.rs expose these via JSON
# in / JSON out so Python can call the same deterministic logic.
goldenmatch-autoconfig-core = { path = "../autoconfig-core" }
# Config-suggestion kernel — ingests a finished run's Arrow artifacts and
# emits ranked config adjustments. Thin PyO3 shim in suggest.rs delegates here.
# `arrow` feature required: native/src/suggest.rs calls the arrow-gated
# `goldenmatch_suggest_core::suggest()`. suggest-core's `arrow` is optional
# (default-off) so the wasm consumer stays arrow-free; the native wheel must
# opt in or the maturin build fails (suggest() not compiled).
goldenmatch-suggest-core = { path = "../suggest-core", features = ["arrow"] }
rustc-hash = "2"
# Document-ingest kernels (schema/parse/prompt/normalize) -- thin PyO3 shim in
# documents.rs delegates here so the native ext and documents-wasm share one
# canonical implementation.
goldenmatch-documents-core = { path = "../documents-core" }
serde_json = "1"
rayon = "1.12.0"
# CLK bloom-filter hashing (bloom.rs) -- MUST match Python hashlib.sha256 /
# hmac.new(..., sha256) byte-for-byte. sha2 is also a transitive dep via
# fingerprint-core; pinned here explicitly because bloom.rs uses it directly.
sha2 = "0.11"
hmac = "0.13"
# Arrow C Data Interface for zero-copy kernel input (see score.rs
# score_block_pairs_arrow). `pyarrow` brings the PyArrowType FFI bridge;
# default features (csv/ipc/json/compute) are off — we only read array buffers.
arrow = { version = "59", default-features = false, features = ["pyarrow"] }
# Return per-field score matrices as PyArray2<f32> for the slow-path field-
# matrix kernel (score.rs::score_field_matrix). Pinned to the pyo3 0.28 line.
numpy = ">=0.28, <0.29"

[profile.release]
opt-level = 3
lto = "thin"
