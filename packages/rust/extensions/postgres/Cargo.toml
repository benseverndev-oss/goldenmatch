[package]
name = "goldenmatch_pg"
version = "0.6.0"
edition = "2021"
license = "MIT"
authors = ["Ben Severn <benzsevern@gmail.com>"]
description = "GoldenMatch entity resolution as a PostgreSQL extension"
repository = "https://github.com/benseverndev-oss/goldenmatch"
homepage = "https://github.com/benseverndev-oss/goldenmatch"

[lib]
crate-type = ["cdylib", "lib"]

[features]
default = ["pg16"]
pg16 = ["pgrx/pg16"]
pg15 = ["pgrx/pg15"]
pg17 = ["pgrx/pg17"]
pg_test = []

[dependencies]
pgrx = "0.12.9"
goldenmatch-bridge = { path = "../bridge" }
# Pure-Rust canonical fingerprint — computed in-process, NOT through the
# embedded-CPython bridge (the decoupling lever; see kernels.rs).
goldenmatch-fingerprint-core = { path = "../fingerprint-core" }
# Pure-Rust connected-components + pair-dedup graph kernels (no pyo3) — the graph
# UDFs call these native-direct, NOT through the embedded-CPython bridge.
goldenmatch-graph-core = { path = "../graph-core" }
# Pure-Rust in-house embedder (goldenembed-rs, no pyo3) — goldenmatch_embed_local
# calls this native-direct, NOT through the embedded-CPython bridge.
goldenembed = { path = "../goldenembed" }
serde_json = "1"

[[bin]]
name = "pgrx_embed_goldenmatch_pg"
path = "src/bin/pgrx_embed.rs"

[dev-dependencies]
pgrx-tests = "0.12.9"
