# Standalone workspace so this wasm-bindgen wrapper can path-depend on the
# pyo3-free `score-core` WITHOUT either crate's workspace claiming it — same
# isolation rationale as `score-core`/`native`. NO rust-toolchain.toml: inherits
# the caller's toolchain. This crate is the TS analogue of `native` (pyo3): it
# wraps the SAME `score-core`, so scoring is byte-identical by construction.
[workspace]

[package]
name = "goldenmatch-score-wasm"
version = "0.1.0"
edition = "2021"
license = "MIT"
authors = ["Ben Severn <benzsevern@gmail.com>"]
description = "wasm-bindgen wrapper over goldenmatch-score-core for the goldenmatch TS opt-in WASM backend"

[lib]
name = "goldenmatch_score_wasm"
crate-type = ["cdylib", "rlib"]  # cdylib for wasm; rlib so host unit tests link

[dependencies]
# The `alias` feature (score_one id 8 + the `regex` engine) is ENABLED: alias_match
# is WASM-backed via injected business/given-name tables (`set_business_aliases` /
# `set_given_name_canonicals`), so the edge bundle carries the `regex` engine
# (~+36 KB) to canonicalize legal-form suffixes byte-for-byte with Python. Every
# other score-core default feature is inherited.
goldenmatch-score-core = { path = "../score-core", features = ["alias"] }
# `fs-core` carries the name scorers (name_freq_weighted_jw / given_name_aliased_jw)
# as `*_sim` fns over INJECTED reference-data tables -- it bundles no data and its
# only dep is `score-core` (default-features = false, so no regex reaches the edge
# bundle). The TS loader injects the census / alias tables at `enableWasm()`.
goldenmatch-fs-core = { path = "../fs-core" }

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
