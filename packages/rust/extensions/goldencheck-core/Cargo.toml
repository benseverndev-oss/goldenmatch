# goldencheck-core -- pyo3-free kernel library for GoldenCheck's CPU-bound
# deep-profiling work. The `score-core` analogue: pure compute, no Python
# (pyo3-free). Benford + the shared `arrow_support` interning helper take Arrow
# arrays (`&dyn Array`) directly -- the Arrow boundary lives in this pyo3-free
# core, not in the sibling `goldencheck-native` crate, which path-depends on
# this one and now only marshals pyarrow<->Arrow. Keeping the kernel logic
# pyo3-free means it can later back a DuckDB/DataFusion SQL surface (as
# `score-core`/`graph-core` do for goldenmatch) without dragging in CPython.
[package]
name = "goldencheck-core"
version = "0.1.0"
edition = "2021"
license = "MIT"
authors = ["Ben Severn <ben@bensevern.dev>"]
description = "Pyo3-free deep-profiling kernels for GoldenCheck (Benford, composite-key & functional-dependency mining)"

[lib]
name = "goldencheck_core"

[dependencies]
# Fast, deterministic hashing for the combinatorial key/FD kernels. rustc-hash
# is already in the dependency graph (pulled by the goldenmatch native stack),
# so this adds no new crates.io fetch.
rustc-hash = "2"
# Same engine Polars uses for str.contains/replace_all, so regex ops are
# byte-identical. Already resolved transitively (1.12.x) in the native lock.
regex = "1"
# Same engine Polars uses for str.to_date, so date parsing is byte-identical.
chrono = { version = "0.4", default-features = false, features = ["std"] }
# Arrow arrays cross the core<->native boundary as concrete types; pin the SAME
# version + crate form as goldencheck-native (arrow 59) -- a mismatch is a linker/type error.
# default-features = false keeps csv/ipc/json/compute out; we only read array
# buffers. We deliberately do NOT enable `pyarrow` here (native's shims stay
# the only place that needs it) -- this crate stays pyo3-free.
arrow = { version = "59", default-features = false }
# Pure-Rust CSV tokenizer (no pyo3, WASM-safe) for the owned CSV
# type-inference kernel (`csv_infer`) -- mirrors the stdlib `csv` module the
# Python reference uses.
csv = "1"
# Chi-squared goodness-of-fit p-value (`gof` kernel): we call
# `statrs::function::gamma::gamma_ur` (the UPPER regularized incomplete gamma =
# scipy's `chdtrc`/`gammaincc`) directly, so the p-value is tail-accurate (no
# `1 - cdf` catastrophic cancellation in the small-p tail). `default-features =
# false` is LOAD-BEARING for wasm: it drops the `rand`/`nalgebra`->`getrandom`
# transitive chain (getrandom 0.2 is a COMPILE-TIME error on
# `wasm32-unknown-unknown` without its `js` feature; the `function` module we
# use needs no rng). NOTE the version: 0.17 default-features=false STILL pulled
# `rand` (via `nalgebra`) and broke the wasm build; 0.18 drops it cleanly, so
# goldencheck-wasm stays green with NO feature gate. Pin 0.18+.
statrs = { version = "0.18", default-features = false }

[dev-dependencies]
# Property/parity checks for the Benford leading-digit extraction, plus the
# cross-surface golden fixture (golden/gc_vectors.json) parity test.
serde_json = "1"
