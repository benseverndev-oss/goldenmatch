# Standalone workspace so this pyo3-free core can be a path dependency of BOTH
# the `native-flow` crate (its own workspace, extension-module) and, in Wave 0c,
# the `goldenflow-wasm` crate — without either workspace claiming it. Same
# isolation rationale as goldenmatch's score-core / fingerprint-core. No
# rust-toolchain.toml on purpose: inherits each parent crate's toolchain when
# built as a path dep.
[workspace]

[package]
name = "goldenflow-core"
version = "0.6.0"
edition = "2021"
license = "MIT"
authors = ["Ben Severn <benzsevern@gmail.com>"]
description = "Owned reference kernels for GoldenFlow (phone; identifiers in Wave 0b), pyo3-free, shared across the native ext, WASM, and future SQL surfaces"

[lib]
name = "goldenflow_core"

[dependencies]
# Same pin native-flow used, so phone output is byte-identical before/after the
# extraction (parity by construction — one source of truth).
phonenumber = "0.3"
# OPTIONAL (feature `arrow`, off by default): the Arrow-columnar apply paths in
# src/columnar.rs. The wasm / pure-logic surfaces never enable this, so the core
# stays arrow-free for them; native-flow (which already ships arrow) enables it.
arrow-array = { version = "59", default-features = false, optional = true }
arrow-buffer = { version = "59", default-features = false, optional = true }

[features]
arrow = ["dep:arrow-array", "dep:arrow-buffer"]

[dev-dependencies]
# Parse the polars-generated text-transform golden corpus (tests/text_golden.rs).
serde_json = "1"

# scalar-per-element vs Arrow-columnar apply bench (W6 pillar-1/3 decision).
# harness=false -> plain fn main() with std::time 5-run-median (repo convention,
# no criterion/nightly). Needs the `arrow` feature for the StringArray shape.
[[bench]]
name = "columnar_pilot"
harness = false
required-features = ["arrow"]

# Fused columnar apply bench (Pillar-1): a realistic multi-op cleanup chain run
# per-transform (N boundary crossings) vs fused in one pass. Same std::time
# 5-run-median convention as columnar_pilot.
[[bench]]
name = "chain_apply"
harness = false
required-features = ["arrow"]
