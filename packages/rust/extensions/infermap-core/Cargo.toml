[package]
name = "infermap-core"
version = "0.1.0"
edition = "2021"
license = "MIT"
authors = ["Ben Severn <ben@bensevern.dev>"]
description = "Pyo3-free kernels for InferMap (schema mapping); the single source of truth."

[lib]
name = "infermap_core"

[dependencies]
# Wave 2: fuzzy_name reuses goldenmatch's Jaro-Winkler (cross-package). score-core is
# pyo3-free (its own [workspace], rapidfuzz only) so the pyo3-free invariant holds.
goldenmatch-score-core = { path = "../score-core" }
regex = "1"

[profile.release]
opt-level = 3
lto = "thin"
