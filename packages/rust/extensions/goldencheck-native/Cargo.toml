# Standalone workspace (empty [workspace]) so pyo3's `extension-module` feature
# here is NOT unified with the `bridge` crate's `auto-initialize` feature -- the
# two are mutually incompatible (ext-module must NOT link libpython; embedding
# must). Mirrors goldenmatch's `native` crate for exactly this reason.
[workspace]

[package]
name = "goldencheck-native"
version = "0.1.0"
edition = "2021"
license = "MIT"
authors = ["Ben Severn <ben@bensevern.dev>"]
description = "Native acceleration kernels for GoldenCheck (PyO3 extension module)"

[lib]
# Produces lib_native.so; renamed to goldencheck/_native.abi3.so at install
# (scripts/build_goldencheck_native.py), or shipped as goldencheck_native/_native
# by maturin. The #[pymodule] is `_native`, so the init symbol is PyInit__native.
name = "_native"
crate-type = ["cdylib"]

[dependencies]
# abi3-py311: one stable-ABI artifact spans CPython 3.11-3.13.
# extension-module: don't link libpython (this .so is imported BY CPython).
pyo3 = { version = ">=0.23.3, <0.25", features = ["extension-module", "abi3-py311"] }
# Pyo3-free deep-profiling kernels (Benford, composite-key & FD mining). The
# #[pyfunction] shims below are thin Arrow-reading wrappers over this crate.
goldencheck-core = { path = "../goldencheck-core" }
# Dense per-column value interning for the key/FD kernels.
rustc-hash = "2"
# Arrow C Data Interface for zero-copy kernel input (mirrors goldenmatch's
# native crate). `pyarrow` brings the PyArrowType FFI bridge; default features
# (csv/ipc/json/compute) are off -- we only read array buffers.
arrow = { version = "55", default-features = false, features = ["pyarrow"] }

[profile.release]
opt-level = 3
lto = "thin"
