# Standalone workspace so this pyo3-free core can be a path dependency of the
# `native` crate (its own workspace, extension-module) without either workspace
# claiming it. Same isolation rationale as the sibling `sketch-core` /
# `score-core` / `fingerprint-core` crates. NO rust-toolchain.toml here on
# purpose: the crate inherits each parent crate's toolchain when built as a path
# dep.
[workspace]

[package]
name = "goldenmatch-perceptual-core"
version = "0.1.0"
edition = "2021"
license = "MIT"
authors = ["Ben Severn <benzsevern@gmail.com>"]
description = "Deterministic perceptual media hashes (DCT image pHash + Haitsma-Kalker audio fingerprint, no pyo3) shared across surfaces"

[lib]
name = "goldenmatch_perceptual_core"

[dev-dependencies]
# Only for the golden-vector integration test (reads the committed fixture
# generated from the Python reference).
serde_json = "1"
