# Standalone workspace so this pyo3-free core can be a path dependency of BOTH
# the `native` crate (extension-module) and the `autoconfig-wasm` crate
# (wasm-bindgen) without either workspace claiming it. Same isolation rationale
# as the sibling fingerprint-core / score-core / graph-core crates.
[workspace]

[package]
name = "goldenmatch-autoconfig-core"
version = "0.1.0"
edition = "2021"
license = "MIT"
authors = ["Ben Severn <benzsevern@gmail.com>"]
description = "Deterministic auto-config decisions (8-rule planner + column classifier, no pyo3) shared across the native ext and the WASM/TS port"

[lib]
name = "goldenmatch_autoconfig_core"

[dependencies]
fancy-regex = "0.18"
once_cell = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[features]
arrow = ["dep:arrow", "dep:rand", "dep:rand_chacha"]

[dependencies.arrow]
version = "59"
default-features = false
optional = true

[dependencies.rand]
version = "0.10"
optional = true

[dependencies.rand_chacha]
version = "0.10"
optional = true
