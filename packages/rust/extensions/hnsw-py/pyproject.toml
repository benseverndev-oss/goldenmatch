# goldenmatch-hnsw — native HNSW ANN index for GoldenMatch, shipped as a
# SEPARATE maturin/abi3 wheel. Thin pyo3 wrapper over the pyo3-free `goldenhnsw`
# crate so `goldenmatch.core.ann_blocker` gets a FAISS-free native ANN backend.
# Build is maturin (this crate IS the package — same layout as the sibling
# `goldenmatch-embed` / `goldenmatch-native` wheels).
[build-system]
requires = ["maturin>=1.7,<2"]
build-backend = "maturin"

[project]
name = "goldenmatch-hnsw"
version = "0.1.0"
description = "Native HNSW (IndexHNSWFlat) ANN index for goldenmatch (goldenhnsw-rs)"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Ben Severn", email = "ben@bensevern.dev" }]
classifiers = [
    "Programming Language :: Rust",
    "Programming Language :: Python :: 3 :: Only",
    "License :: OSI Approved :: MIT License",
    "Intended Audience :: Developers",
    "Topic :: Scientific/Engineering",
]

[project.urls]
Homepage = "https://github.com/benseverndev-oss/goldenmatch"

[tool.maturin]
# Mixed layout: the thin Python wrapper lives in python/goldenmatch_hnsw/;
# the compiled abi3 ext lands at goldenmatch_hnsw/_hnsw (pymodule `_hnsw`,
# so the last path component matches and no Rust rename is needed).
python-source = "python"
module-name = "goldenmatch_hnsw._hnsw"
# One abi3 wheel per platform spans CPython 3.11-3.13 (pyo3 abi3-py311 in
# Cargo.toml). extension-module (no libpython link) is already a default pyo3
# feature on the crate, so maturin inherits it.
