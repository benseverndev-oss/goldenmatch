# Standalone workspace so this pyo3-free core can be a path dependency of BOTH
# the `native` crate (its own workspace, extension-module) and the
# `datafusion-udf` crate (its own workspace, extension-module) without either
# workspace claiming it. Same isolation rationale as the sibling
# `fingerprint-core` crate. NO rust-toolchain.toml here on purpose: the crate
# inherits each parent crate's toolchain when built as a path dep.
[workspace]

[package]
name = "goldenmatch-score-core"
version = "0.1.0"
edition = "2021"
license = "MIT"
authors = ["Ben Severn <benzsevern@gmail.com>"]
description = "Canonical string scorers (jaro_winkler / levenshtein / token_sort, no pyo3) shared across the native ext and the DataFusion FFI UDFs"

[lib]
name = "goldenmatch_score_core"

[dependencies]
# Same pin the `native` crate uses, so the scorers are byte-identical across the
# native ext and the FFI UDFs (parity by construction — one source of truth).
rapidfuzz = "0.5.0"
# `soundex` replicates `jellyfish.soundex` byte-for-byte, incl. its Unicode step
# `unicodedata.normalize("NFKD", s).upper()`; this provides the NFKD normalizer.
unicode-normalization = "0.1"
# `alias_match`'s business canonicalization ports `refdata.business.strip_legal_form`,
# which strips a trailing legal-form suffix via a data-built regex
# `[\s,\-.]+(?:<variant>...)[\s.,]*$` (IGNORECASE). Rebuilt here from the host-shipped
# variant list so the kernel canonicalizes byte-for-byte with the Python reference.
# OPTIONAL behind the default `alias` feature: `alias_match` (id 8) is a Python-bucket
# kernel only, so the wasm surface (`score-wasm`) turns the feature OFF to keep the
# heavy `regex` engine out of the edge bundle. `native`/`datafusion-udf` inherit the
# default and get it.
regex = { version = "1", optional = true }

[features]
default = ["alias"]
# `alias` pulls in `regex` and compiles the alias_match (score_one id 8) subsystem.
alias = ["dep:regex"]
