# Standalone workspace: a thin wasm-bindgen wrapper over goldenmatch-documents-core,
# so the JS/TS surface consumes the SAME document-ingest kernels as the Python
# -native wheel (one source of truth). No TS consumer yet (Task 8 is a build
# check only, mirrors suggest-wasm's shape).
[workspace]

[package]
name = "goldenmatch-documents-wasm"
version = "0.1.0"
edition = "2021"
license = "MIT"
authors = ["Ben Severn <benzsevern@gmail.com>"]
description = "wasm-bindgen wrapper over goldenmatch-documents-core"

[lib]
crate-type = ["cdylib"]

[dependencies]
wasm-bindgen = "0.2"
goldenmatch-documents-core = { path = "../documents-core" }
serde_json = "1"

[profile.release]
opt-level = "s"   # optimize for small wasm size
lto = true

# wasm-opt (binaryen) is an extra size pass that wasm-pack runs after the build.
# It downloads a binaryen release at build time, which is unavailable in
# network-restricted CI sandboxes. opt-level="s"+lto already give a small wasm;
# disable the post-pass so the build is hermetic (no network fetch).
[package.metadata.wasm-pack.profile.release]
wasm-opt = false
