# scorer_kernels surface: the scorers with a Rust/-core kernel (the REFERENCE fast
# path) -- Python `_NATIVE_SCORER_IDS` (backends.score_buckets) vs TS
# `WASM_COVERED_SCORERS` (core/wasm/backend SCORER_ID). Every scorer in the
# `scorers` surface NOT listed here is a pure-language fallback with no kernel.
# shared: `qgram` (id 5), `date` (id 4), `soundex_match` (id 6), `dice` (id 9),
# `jaccard` (id 10) are kernel-backed on BOTH surfaces -- Python arrow-native (bucket)
# AND TS WASM (score-wasm delegates the id to score_one; the WASM output is byte-exact
# with the pure-TS fallback -- qgram is rational set-Jaccard, date's true-DL==OSA for the
# equal-length 8-digit inputs it buckets, soundex_match is the shared Unicode-folding
# standard-Soundex spec + empty-guard, dice/jaccard are integer bloom-popcount + one divide).
# `ensemble` (id 12) is also shared: score-wasm overrides id 12 to recompose it with
# the TS-parity normalized token_sort (jw + normalized token_sort + 0.8*soundex_match),
# matching the pure-TS `ensembleScore` to 4dp -- the same bar its jw/token_sort
# components hold vs rapidfuzz (soundex byte-exact). `phash` (id 11) is also shared:
# perceptual-hash similarity (1 - hamming/nbits over hex pHashes), integer XOR popcount,
# byte-exact WASM<->pure-TS like dice/jaccard.
# `alias_match` (id 8) is now shared: score-wasm ENABLES the `alias` cargo feature (the
# `regex` engine, ~+36 KB) and the kernel needs TWO tables injected at enableWasm() --
# the business alias table (set_business_aliases: the FULL 81-entry legal-form variant
# list, from which the kernel rebuilds the trailing-suffix strip regex, + the surface->
# canonical alias map) and the given-name nickname map (set_given_name_canonicals). The
# loader seeds both with the ported refdata/business.ts + refdata/givenNames.ts tables so
# WASM == pure-TS byte-exact. `initialism_match` is shared: the kernel needs the ~77-entry
# legal_forms table injected at enableWasm() (set_legal_forms), which the loader seeds with
# the ported refdata/business.ts table so WASM == pure-TS byte-exact.
# `given_name_aliased_jw` / `name_freq_weighted_jw` are now shared too: the census/alias
# name scorers are kernel-backed on BOTH surfaces -- TS WASM (score-wasm ids 20/21 over
# fs-core) AND Python native (WEIGHTED bucket ids 15/16 in score_block_pairs/_arrow,
# dispatched through fs-core's `name_freq_weighted_sim`/`given_name_aliased_sim` over the
# process-global census/alias tables from `set_name_reference_data`, gated on the
# `NATIVE_SUPPORTS_NAME_BUCKET_SCORERS` capability + `_ensure_name_tables_installed`). ONE
# fs-core reference on both sides, so Python native == TS WASM by construction. Parity vs
# the pure-Python plugin is TOLERANCE-bounded (native base JW is rapidfuzz-rs vs the
# plugin's rapidfuzz-py; empirically machine-epsilon since there is no FS-style level
# banding) -- native is the reference. `name_freq_weighted_jw` declines native for a field
# carrying a per-dataset `tf_freqs` table (#1207): fs-core ports only the static-census
# branch, so those fields stay on the vectorized find_fuzzy_matches (like `date` declining
# on a stale wheel -- the kernel exists + is reachable, which is the shared contract).
scorer_kernels:
  shared:
  - alias_match
  - audio_fp
  - date
  - dice
  - ensemble
  - exact
  - given_name_aliased_jw
  - initialism_match
  - jaccard
  - jaro_winkler
  - levenshtein
  - name_freq_weighted_jw
  - phash
  - qgram
  - radial
  - soundex_match
  - token_sort
  python_only:
  # FS domain comparators (spec 2026-07-23), Phase 3: native score-core kernels
  # (score_one ids 17/18), byte-parity gated in tests/test_native_date_diff_geo_
  # parity.py. Python-native-backed only; the TS WASM port is Phase 4 (they move
  # to `shared` then). numeric_diff stays deferred (band rides the scorer string,
  # which the fixed-id score_one(id,a,b) contract can't carry).
  - date_diff
  - geo_haversine
  ts_only: []
# scorer_kernels_deferred: the COVERAGE FLOOR. Every scorer in the `scorers` surface
# that is NOT kernel-backed (absent from `scorer_kernels`) MUST appear here with a
# reason -- the `check_scorer_coverage` gate FAILS on any uncovered scorer, so a new
# scorer, or a kernel that regresses to a pure-language fallback, can no longer sit
# unaddressed the way "5 of 19 kernel-backed" did (nothing forced per-scorer
# classification). Deferral is a conscious act with a rationale: `deferred --` = will
# kernelize (with the blocker); `declined --` = won't (with why); `n/a --` = not a
# string kernel. Removing a scorer's kernel without adding it here fails CI.
scorer_kernels_deferred:
  embedding: "n/a -- model-backed (sentence-transformers / Vertex); belongs to goldenembed, not a string kernel"
  record_embedding: "n/a -- model-backed multi-field embedding"
  numeric_diff: "deferred -- native score-core kernel declined (spec 2026-07-23-fs-domain-comparators Phase 3): the abs/pct band rides on the scorer string, which the fixed-id score_one(id,a,b) contract can't carry, and auto-config emits the parameterized form which would decline native regardless; pure-Python numpy path, like soundex_match declining"
