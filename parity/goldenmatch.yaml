# (given_name_aliased_jw / name_freq_weighted_jw) are now FIRST-CLASS in Python
# FULL parity as of the name-scorer promotion: the census/alias name scorers
# VALID_SCORERS (were plugin-registry-only), matching the TS VALID_SCORERS — so
# a config referencing them validates + scores without a manual refdata import.
# both move ts_only -> shared. refdata registers them at `import goldenmatch`, so
# scorers surface (config.schemas.VALID_SCORERS <-> types.ts VALID_SCORERS).
scorers:
  shared:
  - alias_match
  - audio_fp
  - date
  - dice
  - embedding
  - ensemble
  - exact
  - given_name_aliased_jw
  - initialism_match
  - jaccard
  - jaro_winkler
  - levenshtein
  - name_freq_weighted_jw
  - phash
  - qgram
  - radial
  - record_embedding
  - soundex_match
  - token_sort
  python_only:
  # FS domain comparators (spec 2026-07-23-fs-domain-comparators), FS-path only.
  # Native score-core kernels are Phase 3; TS parity port is Phase 4.
  # Magnitude-aware date comparator (day-distance bands).
  - date_diff
  # Great-circle (haversine) distance on a single combined "lat,long" field.
  - geo_haversine
  # Magnitude-aware numeric comparator (abs/pct banded distance).
  - numeric_diff
  ts_only: []
