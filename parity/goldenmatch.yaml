# Cross-language API parity manifest for goldenmatch (MCP tools + CLI commands).
# See docs/superpowers/specs/2026-07-04-api-parity-gate-design.md.
# GENERATED by `check_api_parity.py goldenmatch --init`, then human-reviewed (2026-07-05).
# Each surface is partitioned into shared / python_only / ts_only; the CI `api_parity`
# gate fails if the real Python/TS surface stops matching this partition. Every add/
# remove/rename of a tool or command must be reflected here in the same PR.
#
# Review of the current gaps (three categories):
#   1. NAMING ALIASES (resolved 2026-07-05 via non-breaking aliases — both
#      servers now answer to both names, so these are shared: dedupe/find_duplicates,
#      match/match_record, explain_pair/explain_match, profile/profile_data, and
#      explain_cluster (alias of the shared agent_explain_cluster)). CLI info/score/
#      tui(TS) vs interactive(PY) are NOT aliases (distinct ops) — left as coverage gaps.
#   2. PYTHON-RICHER COVERAGE (intentional — Python is the fuller, STATEFUL server):
#      get_stats / get_cluster / list_clusters are Python-only BECAUSE the TS MCP is
#      stateless — its dedupe() returns stats + clusters inline (DedupeResult), so there
#      is no server-held dataset to query. Domains (create_domain/list_domains/test_domain)
#      and PPRL (pprl_link/pprl_auto_config) are Python-only subsystems. Plus identity-audit
#      trio, routing tools, learning-memory plugins, and the Python-only CLI commands
#      (autoconfig, anomalies, lineage, sensitivity, serve-ui, ...).
#   3. TS-SPECIFIC PRIMITIVES (intentional — edge helpers): score_strings, score_pair,
#      find_exact_matches, find_fuzzy_matches, read_file, write_csv, server_info.
#
# NOTE: goldencheck's sole py-only MCP tool `install_domain` is likewise intentional
# (TS core exposes a read-only domain registry, no install path). That annotation
# lands in parity/goldencheck.yaml once PR #1449 (the 6-package rollout) merges.
#
# a2a_skills surface (A2A AgentCard skills). The core ops share canonical ids and ARE shared
# (deduplicate, match, explain, evaluate, autoconfig, compare_strategies, transform, identity_*,
# learn_thresholds, memory_stats, ...). RECONCILED 2026-07-05: autoconfig/auto_configure,
# compare_strategies/agent_compare_strategies, transform/run_transforms were verified same-op
# and aliased to Python's canonical id (TS card advertises the canonical, legacy tool id still
# dispatches) — now shared.
# Remaining a2a_skills divergences are VERIFIED-DIFFERENT ops, NOT drift: PY `quality` is one
# scan+fix skill vs TS's `scan_quality` + `fix_quality` (1:2 granularity); PY `pprl` RUNS
# linkage (`pprl_link`, two files) while TS `suggest_pprl` SUGGESTS params (`profileForAgent`,
# "recommend") — TS suggest_pprl is the A2A analogue of Python's own suggest_pprl, not pprl.
# TS also exposes the agent_* skill variants
# (agent_deduplicate/agent_match_sources/agent_explain_pair/agent_explain_cluster/
# agent_review_queue/agent_approve_reject) and edge primitives (score, profile, suggest_config,
# list_scorers/list_strategies/list_transforms, memory_export); Python ships the richer
# identity-audit trio + routing/lifecycle skills. The TS set is the deduped union of
# BASE_SKILLS + AGENT_SKILLS + MEMORY_TOOLS + IDENTITY_TOOLS (src/node/a2a/server.ts).
