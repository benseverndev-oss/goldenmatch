# Cross-language API parity manifest for goldenanalysis (MCP tools + CLI commands).
# See docs/superpowers/specs/2026-07-04-api-parity-gate-design.md.
# GENERATED by `check_api_parity.py goldenanalysis --init`, human-reviewed (2026-07-05). The CI
# api_parity gate fails if the real Python/TS surface stops matching this partition; every
# tool/command add/remove/rename must be reflected here in the same PR.
# Review: goldenanalysis-js now ships an MCP server (src/node/mcp/server.ts), wrapping the
#   engines the TS package already carries (registry.availableAnalyzers / analyze / render /
#   ReportHistory) — so all four MCP tools are SHARED, and the `mcp-serve` CLI command that
#   launches it is shared too. (.parquet input is Python-only on analyze_frame — the edge-safe
#   TS port ships no Parquet reader — but the tool itself exists on both surfaces.)
package: goldenanalysis
mcp_tools:
  shared:
  - analyze_frame
  - detect_regressions
  - get_trend
  - list_analyzers
  python_only: []
  ts_only: []
cli_commands:
  shared:
  - mcp-serve
  - regressions
  - report
  - trend
  python_only: []
  ts_only: []
